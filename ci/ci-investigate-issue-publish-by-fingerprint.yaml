kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/ci-investigate-issue-publish-by-fingerprint
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when a ci-investigate triage run needs to create one GitHub issue per newly investigated failure fingerprint. Writes caller-rendered issue bodies with `ci-investigate` markers and never appends comments.
tags: ["ci", "ci-investigate", "github-issues", "publish", "triage"]
defaults:
  retryable: true
  timeout: 30m
inputs:
  target_repo:
    type: string
    required: true
    description: GitHub repository in owner/name form where ci-investigate issues live
  gh_token:
    type: secret
    required: false
    description: Optional GitHub token secret used as GH_TOKEN for gh CLI commands. When unset, use ambient gh authentication.
  cluster_reports:
    type: array
    required: true
    description: One entry per cluster to publish. The template never invents content — caller pre-renders issue_body_md.
    schema:
      type: array
      items:
        type: object
        properties:
          cheap_fingerprint:
            type: string
          issue_title:
            type: string
            description: Final post-investigation issue title, without the title_prefix.
          classification:
            type: string
            description: Root-cause classification, such as framework-bug, framework-dependency, single-client, multi-client, devnet-network, config-issue, test-design, infra-flake, mixed, or unknown.
          diagnosis_confidence:
            type: number
            description: Conservative confidence that the rendered issue identifies the actual mechanism and source surface.
          notification_confidence:
            type: number
            description: Confidence that the created issue is safe and useful to alert humans about.
          confidence_bucket:
            type: string
            description: Human-facing diagnosis confidence bucket, such as High, Medium, Low, or Unknown.
          issue_body_md:
            type: string
            description: Full markdown for the issue body, ALREADY containing all required ci-investigate markers.
          labels:
            type: array
            items:
              type: string
            description: Labels to apply to the issue.
        required: [cheap_fingerprint, issue_title, issue_body_md, labels]
  title_prefix:
    type: string
    default: "[ci-triage]"
    description: Prefix for created issue titles.
tasks:
  publish:
    selection:
      capabilities: [tool-use]
    run: ci-investigate-issue-publish-by-fingerprint
    quality-gate: "${{ has(result.results) && size(result.results) == size(inputs.cluster_reports) }}"
    instructions: |-
      Create one GitHub issue per cluster report.

      ALL `gh` commands MUST be scoped to `target_repo` via `--repo <target_repo>` (or `/repos/<target_repo>/` for raw API calls). Never run a `gh` command that depends on the worker's current-directory git remote; an unscoped command can silently target the wrong repo.

      GitHub authentication:
      - `gh_token` is an optional secret. When present, use it only as the `GH_TOKEN` environment variable for `gh` commands and set `GH_PROMPT_DISABLED=1`.
      - When `gh_token` is absent, use the worker's ambient `gh` authentication (`gh auth status` should pass).
      - Command examples below omit the environment wrapper; apply the authentication environment to every `gh` invocation.
      - Do not run `gh auth login`, `gh auth token`, or `gh auth status --show-token`. Do not print, echo, persist, return, or write the token into files. Keep shell tracing and `GH_DEBUG` disabled while a token is in scope.

      Body-only contract: write `issue_body_md` as the issue body. Do not create investigation comments.

      Marker contract — every caller-rendered issue body MUST contain these HTML-comment markers. This template writes the provided body verbatim and never parses prose to invent state.

      Issue body markers (one line each, anywhere in the body):
      - `<!-- ci-investigate:schema-version=<integer> -->`
      - `<!-- ci-investigate:cheap-fingerprint=<value> -->`
      - `<!-- ci-investigate:classification=<value-or-unknown> -->`

      Caller pre-renders `issue_body_md` with the markers already in place. Do not modify the markdown — write it verbatim. The template's job is the `gh` orchestration.

      Empty input is a no-op: when `cluster_reports` is empty, do not call `gh`; return `results=[]` and a short summary.

      Label handling:
      - Never let a missing label prevent issue creation. Create the issue first, then apply labels best-effort.
      - Before adding a label, check whether it exists. If missing, create it with a neutral color (`ededed`) and a short description such as `Managed by ci-investigate`; if creation fails, continue.
      - If `gh issue edit --add-label` fails after retry, record the label failure in the cluster note/summary but keep the issue action as `created`.

      Algorithm per cluster report:

      1. Write `issue_body_md` to a temporary markdown file.
      2. Create the issue: `gh issue create --repo <target_repo> --title "<title_prefix> <issue_title>" --body <file>`. Use `issue_title` exactly as provided except for trimming surrounding whitespace; do not derive the title from `cheap_fingerprint` or labels. Do not pass labels on create; apply labels afterward.
      3. Capture `issue_number` and `issue_url` from the create result. Use `gh issue view <number> --repo <target_repo> --json number,url` if the create command returns only a URL.
      4. Apply each requested label best-effort:
         - Create missing labels as described above.
         - Add the label with `gh issue edit <number> --repo <target_repo> --add-label <label>`.
      5. Do not write comments.

      Output one entry per cluster_report in the same order:
      - `cheap_fingerprint`, `issue_title`, `issue_number`, `issue_url`, `action`, `issue_body_chars`, and optional `note`.
      - Use `action=created` when the issue body was created, even if label application had warnings.
      - Use `action=skipped` only when issue creation failed after one retry for that cluster. For skipped entries, set `issue_number=0` and `issue_url=""`.

      Failure handling: if issue creation fails, retry once. If still failing for a given cluster, record `action=skipped` with a brief reason in `note` and `summary`, then continue to the next cluster.

      Return `results` aligned with input order and a short overall `summary`.
    inputs:
      target_repo: ${{ inputs.target_repo }}
      gh_token: ${{ inputs.?gh_token }}
      cluster_reports: ${{ inputs.cluster_reports }}
      title_prefix: ${{ inputs.title_prefix }}
    outputs:
      results: "${{ result.results }}"
      summary: "${{ has(result.summary) ? result.summary : '' }}"
      schema:
        results:
          type: array
          items:
            type: object
            properties:
              cheap_fingerprint:
                type: string
              issue_title:
                type: string
              issue_number:
                type: number
              issue_url:
                type: string
              action:
                type: string
                enum: [created, skipped]
              issue_body_chars:
                type: number
                description: Character count of the issue body written this run
              note:
                type: string
                description: Optional short note, used when action=skipped to explain why
            required: [cheap_fingerprint, issue_title, issue_number, issue_url, action]
          description: Per-cluster publish results aligned with input order
        summary:
          type: string
outputs:
  results: ${{ tasks.publish.outputs.results }}
  summary: ${{ tasks.publish.outputs.summary }}
