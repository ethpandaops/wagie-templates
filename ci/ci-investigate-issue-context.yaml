kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/ci-investigate-issue-context
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when a ci-investigate run needs compact context from existing GitHub issues before minting new fingerprints. Usually called before domain-specific fingerprinting so similar current failures can reuse an existing canonical issue key.
tags: ["ci", "ci-investigate", "github-issues", "dedup", "fingerprint", "context"]
defaults:
  retryable: true
  timeout: 30m
inputs:
  target_repo:
    type: string
    required: true
    description: GitHub repository in owner/name form where ci-investigate issues live
  gh_token:
    type: secret
    required: false
    description: Optional GitHub token secret used as GH_TOKEN for gh CLI commands. When unset, use ambient gh authentication.
  schema_version:
    type: number
    default: 1
    description: Marker schema version the caller understands
  max_issues:
    type: number
    default: 500
    description: Maximum ci-investigate issues to include in the merged context
  closed_window_days:
    type: number
    default: 14
    description: Include marker-bearing closed issues closed within this many days as fingerprint naming context only. Closed issues never cover, block, reopen, or receive recurrence updates.
tasks:
  collect:
    selection:
      capabilities: [tool-use]
    run: ci-investigate-issue-context
    quality-gate: "${{ has(result.issues) && has(result.fingerprints) && has(result.summary) }}"
    instructions: |-
      Collect compact context from existing open and recently closed ci-investigate issues in `target_repo`. This context helps fingerprinting reuse stable names; only open issues are authoritative coverage later in state-check.

      This task is READ-ONLY against GitHub — never run any `gh` write commands here. ALL `gh` commands MUST be scoped to `target_repo` via `--repo <target_repo>`.

      GitHub authentication:
      - `gh_token` is an optional secret. When present, use it only as the `GH_TOKEN` environment variable for `gh` commands and set `GH_PROMPT_DISABLED=1`.
      - When `gh_token` is absent, use the worker's ambient `gh` authentication (`gh auth status` should pass).
      - Command examples below omit the environment wrapper; apply the authentication environment to every `gh` invocation.
      - Do not run `gh auth login`, `gh auth token`, or `gh auth status --show-token`. Do not print, echo, persist, return, or write the token into files. Keep shell tracing and `GH_DEBUG` disabled while a token is in scope.

      Procedure:

      1. Build a de-duplicated candidate issue set. Use `max_issues` as the per-query limit, then sort and cap the merged result to `max_issues` after de-duplication.
         - List open labelled issues:
           `gh issue list --repo <target_repo> --state open --label ci-investigate --limit <max_issues> --json number,url,title,state,createdAt,updatedAt,closedAt,labels`.
         - Also list open marker-bearing issues even if labels are missing:
           `gh issue list --repo <target_repo> --state open --search "in:body ci-investigate:cheap-fingerprint" --limit <max_issues> --json number,url,title,state,createdAt,updatedAt,closedAt,labels`.
         - If `closed_window_days > 0`, include recently closed marker-bearing issues. Compute a UTC cutoff date `closed_window_days` before now, then either use GitHub search with `closed:>=<YYYY-MM-DD>` when supported or list closed marker-bearing issues and filter by `closedAt` locally:
           `gh issue list --repo <target_repo> --state closed --search "in:body ci-investigate:cheap-fingerprint" --limit <max_issues> --json number,url,title,state,createdAt,updatedAt,closedAt,labels`.
         - Merge by issue number. Do not let a failing query erase results from another query; record it in `summary` and continue.

      2. Fetch each candidate body with `gh issue view <number> --repo <target_repo> --json number,url,title,state,createdAt,updatedAt,closedAt,labels,body`.

      3. Normalize labels and parse ci-investigate HTML markers from the body:
         - GitHub CLI returns `labels` as objects. Immediately convert labels to a flat array of label names using each object's `.name` value. Treat absent/null labels as an empty array.
         - `ci-investigate:schema-version`
         - `ci-investigate:cheap-fingerprint`
         - `ci-investigate:classification`
         - `ci-investigate:state`
         - `ci-investigate:first-seen-run`
         - `ci-investigate:last-seen-run`
         - `ci-investigate:last-seen-at`
         - `ci-investigate:last-investigated-run`
         - `ci-investigate:last-investigated-at`
         - `ci-investigate:title-locked`

      4. Skip issues that do not carry a `ci-investigate:cheap-fingerprint` marker. Also skip issues with label `ci-investigate:ignore`. For closed issues, skip anything whose `closedAt` is older than the `closed_window_days` cutoff.

      5. Build `body_excerpt` for each issue as compact matching context, not a full archive:
         - Remove the ci-investigate HTML marker lines from the excerpt.
         - Prefer high-signal sections such as Summary, Verdict, Root Cause, Current State, Evidence, and Suggested Actions when present.
         - Include enough surrounding text for a fingerprinting worker to tell whether the mechanism matches a current failure.
         - Cap each excerpt at roughly 3000 characters.

      Return issues sorted with open issues first, then recently closed issues, each group by `updated_at` descending. Return `fingerprints` as the flat list of parsed `cheap_fingerprint` values in the same issue order. Return a short `summary` with the number collected and skipped.
    inputs:
      target_repo: ${{ inputs.target_repo }}
      gh_token: ${{ inputs.?gh_token }}
      schema_version: ${{ inputs.schema_version }}
      max_issues: ${{ inputs.max_issues }}
      closed_window_days: ${{ inputs.closed_window_days }}
    outputs:
      issues: "${{ result.issues }}"
      fingerprints: "${{ result.fingerprints }}"
      summary: "${{ result.summary }}"
      schema:
        issues:
          type: array
          items:
            type: object
            properties:
              number:
                type: number
              url:
                type: string
              title:
                type: string
              state:
                type: string
              created_at:
                type: string
              updated_at:
                type: string
              closed_at:
                type: string
              labels:
                type: array
                items:
                  type: string
              cheap_fingerprint:
                type: string
              schema_version:
                type: number
              marker_state:
                type: string
              classification:
                type: string
              first_seen_run:
                type: string
              last_seen_run:
                type: string
              last_seen_at:
                type: string
              last_investigated_run:
                type: string
              last_investigated_at:
                type: string
              title_locked:
                type: boolean
              body_excerpt:
                type: string
            required: [number, url, title, cheap_fingerprint, body_excerpt]
          description: Non-ignored open and recently closed ci-investigate issues with compact body context for semantic fingerprint reuse. Closed entries are context only, not coverage.
        fingerprints:
          type: array
          items:
            type: string
          description: Existing ci-investigate cheap fingerprints, aligned with issues
        summary:
          type: string
outputs:
  issues: ${{ tasks.collect.outputs.issues }}
  fingerprints: ${{ tasks.collect.outputs.fingerprints }}
  summary: ${{ tasks.collect.outputs.summary }}
