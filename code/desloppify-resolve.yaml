name: ethpandaops/desloppify-resolve
version: "1.0"
description: >-
  Use when marking a desloppify queue item fixed after code changes; records the fix
  with `desloppify plan resolve` using a concrete note.
tags: ["desloppify", "code-quality", "resolution"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff: { delay: 5s, factor: 2, max-delay: 20s, jitter: true }
    timeout: 2m
inputs:
  repo:
    type: string
    required: true
    description: "Repository in owner/name format"
  branch_name:
    type: string
    required: true
    description: "Branch whose planned finding should be resolved"
  state:
    type: artifact
    description: "Desloppify state to carry across operations"
  finding_pattern:
    type: string
    required: true
    description: "Finding ID or other plan pattern to resolve"
  note:
    type: string
    required: true
    description: "Concrete note describing what was fixed"
  force_resolve:
    type: boolean
    default: false
    description: "Bypass triage guardrails when the upstream command requires it"
tasks:
  resolve:
    worker:
      match: "'tool-use' in capabilities"
    run: desloppify-resolve
    quality-gate: "${{ has(result.resolved) && result.resolved == true }}"
    instructions: |-
      Clone or reuse `repo`, fetch `origin/branch_name`, and checkout the branch before
      invoking desloppify.
      If the `state` input is provided, pass it to the upstream command with `--state`.
      After the command finishes, write the active state file as the `state` output artifact.
      Run `desloppify plan resolve <finding_pattern> --note "<note>" --confirm`.
      Add `--force-resolve` only when `force_resolve` is true.
      Confirm the queue item was recorded as fixed.
    inputs:
      repo: "${{ inputs.repo }}"
      branch_name: "${{ inputs.branch_name }}"
      state: "${{ has(inputs.state) ? inputs.state : '' }}"
      finding_pattern: "${{ inputs.finding_pattern }}"
      note: "${{ inputs.note }}"
      force_resolve: "${{ inputs.force_resolve }}"
      schema:
        state: artifact
    outputs:
      resolved: "${{ result.resolved }}"
      finding_pattern: "${{ inputs.finding_pattern }}"
      note: "${{ inputs.note }}"
      schema:
        resolved: { type: boolean }
        state:
          kind: artifact
          content-type: application/json
          description: Updated desloppify state
          required: true
        finding_pattern: { type: string }
        note: { type: string }
outputs:
  resolved: ${{ tasks.resolve.outputs.resolved }}
  state: ${{ tasks.resolve.outputs.state }}
  finding_pattern: ${{ tasks.resolve.outputs.finding_pattern }}
  note: ${{ tasks.resolve.outputs.note }}
