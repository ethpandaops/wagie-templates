name: ethpandaops/code-review-fix-loop
version: "1.0"
description: >-
  Use when code needs iterative improvement via committee review; reviews with
  the full persona panel, fixes flagged issues, optionally verifies against the
  project's test suite, and re-reviews until the committee approves or iterations
  are exhausted. Tracks findings-count decay and verification status for
  convergence.
tags: ["code-review", "fix-loop", "iterative", "convergence", "verification"]
defaults:
  retry:
    max: 3
    on: [error, timeout]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 2m
inputs:
  diff:
    type: artifact
    required: true
    description: "Git diff output or equivalent patch content (e.g. git diff main...HEAD)"
  personas:
    type: array
    description: >-
      Array of reviewer personas for the committee. If omitted, the committee's
      default panel is used (Security Auditor, Correctness, Performance,
      Maintainability, Research Reviewer, General Reviewer).
    schema:
      type: array
      items:
        type: object
        properties:
          role:
            type: string
          focus:
            type: string
          principles:
            type: string
          severity_default:
            type: string
            description: "Default severity for findings from this persona"
          model:
            type: string
            description: "Preferred model for this reviewer (e.g. claude-opus-4-6, gpt-5.3)"
          provider:
            type: string
            description: "Preferred provider for this reviewer (e.g. claudecode, codex)"
          requires_tools:
            type: boolean
            description: "Whether this persona needs tool-use capability (e.g. web search, doc lookup)"
        required: [role, focus]
  providers:
    type: array
    description: >-
      Optional provider axis. When non-empty, each persona fans out across these
      providers every iteration (e.g. ['claudecode', 'codex']). Personas that
      pin their own provider skip the fan-out. When omitted, the committee's
      own default applies.
    schema:
      type: array
      items:
        type: string
  repo:
    type: string
    description: "Repository to clone for verification (owner/name or full URL). When provided, enables test/lint/typecheck verification after each fix."
  ref:
    type: string
    description: "Git ref being reviewed (e.g. branch name, commit SHA). Used as the checkout target for verification."
  context:
    type: string
    description: Optional repository or architectural context
  checks:
    type: array
    description: "Explicit verification checks to run. If omitted, auto-discovered from project config. Only used when repo is provided."
    schema:
      type: array
      items:
        type: object
        properties:
          category:
            type: string
            enum: [test, lint, typecheck, build, format, custom]
          command:
            type: string
          name:
            type: string
          required:
            type: boolean
        required: [category]
  max_iterations:
    type: number
    default: 3
    description: Maximum review-fix iterations (research shows 2-3 captures 75-87% of fixable issues)
  threshold:
    type: number
    default: 90
    description: Minimum committee average score to approve
tasks:
  improve:
    loop:
      max: "${{ inputs.max_iterations }}"
      init:
        current_code: "${{ inputs.diff }}"
        score: "${{ 0 }}"
        findings_count: "${{ 999 }}"
        prev_findings_count: "${{ 999 }}"
        verification_passed: "${{ true }}"
        iteration_log: "${{ '' }}"
        dismissed_findings: "${{ [] }}"
        false_positive_count: "${{ 0 }}"
      until: "${{ (loop.score >= inputs.threshold && loop.findings_count == 0 && loop.verification_passed) || (loop.findings_count > loop.prev_findings_count && loop.prev_findings_count < 999) }}"
      on-max-exhausted: continue
    inputs:
      diff: "${{ loop.current_code }}"
      repo: "${{ inputs.?repo }}"
      ref: "${{ inputs.?ref }}"
      context: "${{ inputs.?context }}"
      personas: "${{ inputs.?personas }}"
      providers: "${{ inputs.?providers }}"
      checks: "${{ inputs.?checks }}"
      threshold: "${{ inputs.threshold }}"
      prev_findings_count: "${{ loop.findings_count }}"
      prev_verification_passed: "${{ loop.verification_passed }}"
      prev_log: "${{ loop.iteration_log }}"
      dismissed_findings: "${{ loop.dismissed_findings }}"
      prev_fp_count: "${{ loop.false_positive_count }}"
    tasks:
      review:
        uses: ethpandaops/code-review-committee@1
        inputs:
          diff: "${{ inputs.diff }}"
          personas: "${{ inputs.?personas }}"
          providers: "${{ inputs.?providers }}"
          repo: "${{ inputs.?repo }}"
          ref: "${{ inputs.?ref }}"
          context: "${{ inputs.?context }}"
          threshold: "${{ inputs.threshold }}"
          dismissed_findings: "${{ inputs.dismissed_findings }}"
        outputs:
          average_score: average_score
          verdict: verdict
          findings: findings
          summary: summary
      fix:
        needs: [review]
        if: "${{ tasks.review.outputs.verdict != 'approve' }}"
        selection: {skills: [coding]}
        run: apply-review-fixes
        quality-gate: "${{ has(result.revised_code) && size(result.revised_code) > 0 }}"
        instructions: |
          You are a skilled developer addressing code review findings.

          Apply the minimum targeted changes to resolve the flagged issues.
          Do not refactor, restructure, or improve code beyond what the
          findings require. Each fix should be traceable to a specific finding.

          Prioritize fixes by severity: critical > high > medium > low.
          If a fix would conflict with another finding, note the conflict
          and choose the safer option.

          If verification ran on the previous iteration and failed, pay
          attention to what broke — do not introduce fixes that would cause
          the same verification failures.

          If any finding looks like a false positive (the code is actually
          correct, or fixing it would break something else, or the reviewer
          misunderstood the intent), do NOT fix it. Instead list it in
          false_positives with your reasoning. Be specific in your reasoning —
          it will be fed back to reviewers in the next iteration to prevent
          them from re-flagging the same issue.

          You may also receive previously dismissed findings. Do not re-dismiss
          findings that are already in the dismissed list — only add new ones.

          Return the complete revised code, not just patches.
        inputs:
          diff: "${{ inputs.diff }}"
          findings: "${{ tasks.review.outputs.findings }}"
          context: "${{ has(inputs.context) ? inputs.context : '' }}"
          dismissed_findings: "${{ inputs.dismissed_findings }}"
          prev_verification_passed: "${{ inputs.prev_verification_passed }}"
        outputs:
          revised_code: "${{ result.revised_code }}"
          fixes_applied: "${{ result.fixes_applied }}"
          false_positives: "${{ result.false_positives }}"
          schema:
            revised_code:
              kind: artifact
              description: Complete revised code with fixes applied
              required: true
            fixes_applied:
              type: array
              items:
                type: object
                properties:
                  finding:
                    type: string
                    description: The finding that was addressed
                  change:
                    type: string
                    description: What was changed and why
                required: [finding, change]
              description: Log of fixes applied in this iteration
            false_positives:
              type: array
              items:
                type: object
                properties:
                  finding:
                    type: string
                    description: The finding dismissed as false positive
                  reasoning:
                    type: string
                    description: Why this is a false positive
                required: [finding, reasoning]
              description: Findings the developer believes are incorrect or unfixable
      verify:
        needs: [fix]
        if: "${{ has(inputs.repo) && inputs.repo != '' && has(tasks.fix.outputs.revised_code) }}"
        uses: ethpandaops/code-verification@1
        inputs:
          repo: "${{ inputs.?repo }}"
          source_ref: "${{ inputs.?ref }}"
          patch: "${{ tasks.fix.outputs.revised_code }}"
          checks: "${{ inputs.?checks }}"
          context: "${{ inputs.?context }}"
        outputs:
          passed: passed
          checks: checks
          summary: summary
      log_iteration:
        needs: [review, fix, verify]
        run: log-review-iteration
        quality-gate: "${{ has(result.iteration_summary) && size(result.iteration_summary) > 0 }}"
        instructions: |
          Produce a one-line summary of this review-fix iteration including:
          score, findings count, fixes applied, verification result (if run),
          and whether findings decreased from the previous round (converging)
          or increased (regressing).
        inputs:
          score: "${{ tasks.review.outputs.average_score }}"
          verdict: "${{ tasks.review.outputs.verdict }}"
          findings_count: "${{ tasks.review.outputs.findings.size() }}"
          fixes_applied: "${{ has(tasks.fix.outputs.fixes_applied) ? tasks.fix.outputs.fixes_applied.size() : 0 }}"
          prev_findings_count: "${{ inputs.prev_findings_count }}"
          verification_passed: "${{ has(tasks.verify.outputs.passed) ? tasks.verify.outputs.passed : true }}"
          verification_summary: "${{ has(tasks.verify.outputs.summary) ? tasks.verify.outputs.summary : 'skipped' }}"
        outputs:
          iteration_summary: "${{ result.iteration_summary }}"
          schema:
            iteration_summary:
              type: string
              description: One-line summary of this iteration
    outputs:
      current_code: "${{ has(tasks.fix.outputs.revised_code) ? tasks.fix.outputs.revised_code : inputs.diff }}"
      score: "${{ tasks.review.outputs.average_score }}"
      findings_count: "${{ tasks.review.outputs.findings.size() }}"
      prev_findings_count: "${{ inputs.prev_findings_count }}"
      verification_passed: "${{ has(tasks.verify.outputs.passed) ? tasks.verify.outputs.passed : true }}"
      iteration_log: '${{ inputs.prev_log + "\n" + tasks.log_iteration.outputs.iteration_summary }}'
      dismissed_findings: "${{ inputs.dismissed_findings + (has(tasks.fix.outputs.false_positives) ? tasks.fix.outputs.false_positives : []) }}"
      false_positive_count: "${{ inputs.dismissed_findings.size() + (has(tasks.fix.outputs.false_positives) ? tasks.fix.outputs.false_positives.size() : 0) }}"
      schema:
        current_code:
          type: string
        score:
          type: number
        findings_count:
          type: number
        prev_findings_count:
          type: number
        verification_passed:
          type: boolean
        iteration_log:
          type: string
        dismissed_findings:
          type: array
          items:
            type: object
            properties:
              finding:
                type: string
              reasoning:
                type: string
            required: [finding, reasoning]
        false_positive_count:
          type: number
outputs:
  result: ${{ tasks.improve.outputs.current_code }}
  score: ${{ tasks.improve.outputs.score }}
  converged: ${{ tasks.improve.loop.converged }}
  iterations_used: ${{ tasks.improve.loop.iteration }}
  verification_passed: ${{ tasks.improve.outputs.verification_passed }}
  iteration_log: ${{ tasks.improve.outputs.iteration_log }}
  dismissed_findings: ${{ tasks.improve.outputs.dismissed_findings }}
  false_positive_count: ${{ tasks.improve.outputs.false_positive_count }}
