name: wagie/desloppify-fix-apply
version: "1.0"
description: >-
  Use when applying a code change for one desloppify finding; make the smallest
  behavior-preserving fix, verify it, then commit and push it to the working branch.
tags: ["type:atomic", "desloppify", "code-quality", "fix", "cap:coding", "cap:tool-use"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff: { delay: 5s, factor: 2, max-delay: 20s, jitter: true }
    timeout: 5m
inputs:
  repo:
    type: string
    required: true
    description: "Repository in owner/name format"
  branch_name:
    type: string
    required: true
    description: "Branch where the fix should be committed and pushed"
  finding:
    type: object
    required: true
    description: "The finding object from desloppify next (finding_id, file_path, detector, description, tier)"
    schema:
      type: object
      properties:
        finding_id:
          type: string
        file_path:
          type: string
        detector:
          type: string
        description:
          type: string
        tier:
          type: string
tasks:
  fix:
    worker:
      match: "'tool-use' in capabilities && 'coding' in skills"
    run: desloppify-fix-apply
    quality-gate: "${{ has(result.fixed) && has(result.files_changed) }}"
    instructions: |-
      Clone or reuse `repo`, fetch `origin/branch_name`, and checkout the branch before
      editing.
      Fix the provided `finding`.
      Start with `finding.file_path`, expand to nearby files only when required, and prefer
      the smallest change that actually resolves the issue.
      Preserve behavior, tests, and public APIs.
      Run the smallest meaningful verification available after editing.
      If a fix is applied, create a focused git commit, push it to `origin/branch_name`,
      and retry on push conflicts by rebasing.
    inputs:
      repo: "${{ inputs.repo }}"
      branch_name: "${{ inputs.branch_name }}"
      finding: "${{ inputs.finding }}"
    outputs:
      fixed: "${{ result.fixed }}"
      files_changed: "${{ result.files_changed }}"
      description: "${{ result.description }}"
      commit_sha: "${{ result.commit_sha }}"
      schema:
        fixed: { type: boolean }
        files_changed: { type: array, items: { type: string } }
        description: { type: string }
        commit_sha: { type: string }
outputs:
  fixed: ${{ tasks.fix.outputs.fixed }}
  files_changed: ${{ tasks.fix.outputs.files_changed }}
  description: ${{ tasks.fix.outputs.description }}
  commit_sha: ${{ tasks.fix.outputs.commit_sha }}
