name: wagie/desloppify-fix-loop
version: "1.0"
description: >-
  Use when draining the planned desloppify queue; loop through `next`, apply one fix,
  record it with `plan resolve`, and continue until the queue is empty or the fix budget
  is exhausted.
tags: ["type:pattern", "desloppify", "code-quality", "fix", "flow:compose", "flow:loop", "cap:coding", "cap:tool-use"]
inputs:
  repo:
    type: string
    required: true
    description: "Repository in owner/name format"
  branch_name:
    type: string
    required: true
    description: "Branch where queued fixes should be committed and pushed"
  state_json:
    type: string
    default: ""
    description: "Serialized desloppify state to carry across loop iterations"
  max_fixes:
    type: number
    default: 10
    description: "Maximum number of findings to fix in this loop"
tasks:
  fix_iteration:
    loop:
      max: "${{ inputs.max_fixes }}"
      init:
        fixes_completed: "${{ 0 }}"
        fix_log: "${{ [] }}"
        queue_empty: "${{ false }}"
        state_json: "${{ inputs.state_json }}"
      until: "${{ loop.queue_empty == true }}"
      on-max-exhausted: continue
    inputs:
      repo: "${{ inputs.repo }}"
      branch_name: "${{ inputs.branch_name }}"
      state_json: "${{ loop.state_json }}"
      prev_fixes_completed: "${{ loop.fixes_completed }}"
      prev_fix_log: "${{ loop.fix_log }}"
    tasks:
      get_next:
        uses: wagie/desloppify-next@1
        inputs:
          repo: "${{ inputs.repo }}"
          branch_name: "${{ inputs.branch_name }}"
          state_json: "${{ inputs.state_json }}"
        outputs:
          items: items
          queue_empty: queue_empty
          state_json: state_json
      apply_fix:
        needs: [get_next]
        if: "${{ tasks.get_next.outputs.queue_empty == false }}"
        uses: wagie/desloppify-fix-apply@1
        inputs:
          repo: "${{ inputs.repo }}"
          branch_name: "${{ inputs.branch_name }}"
          finding: "${{ tasks.get_next.outputs.items[0] }}"
        outputs:
          fixed: fixed
          files_changed: files_changed
          description: description
          commit_sha: commit_sha
      mark_resolved:
        needs: [get_next, apply_fix]
        if: "${{ has(tasks.apply_fix.outputs.fixed) && tasks.apply_fix.outputs.fixed == true }}"
        uses: wagie/desloppify-resolve@1
        inputs:
          repo: "${{ inputs.repo }}"
          branch_name: "${{ inputs.branch_name }}"
          state_json: "${{ tasks.get_next.outputs.state_json }}"
          finding_pattern: "${{ tasks.get_next.outputs.items[0].finding_id }}"
          note: "${{ tasks.apply_fix.outputs.description }}"
        outputs:
          resolved: resolved
          state_json: state_json
      accumulate:
        needs: [get_next, mark_resolved]
        worker:
          match: "'reasoning' in skills"
        run: accumulate-fix-state
        instructions: |-
          Update the loop state after one queue attempt.
          Increment `fixes_completed` only when the finding was resolved.
          Append a concise log entry only for resolved fixes.
        inputs:
          prev_fixes_completed: "${{ inputs.prev_fixes_completed }}"
          prev_fix_log: "${{ inputs.prev_fix_log }}"
          queue_empty: "${{ tasks.get_next.outputs.queue_empty }}"
          resolved: "${{ has(tasks.mark_resolved.outputs.resolved) ? tasks.mark_resolved.outputs.resolved : false }}"
          previous_state_json: "${{ inputs.state_json }}"
          current_state_json: "${{ has(tasks.mark_resolved.outputs.state_json) ? tasks.mark_resolved.outputs.state_json : tasks.get_next.outputs.state_json }}"
          current_finding_id: "${{ has(tasks.get_next.outputs.items) && size(tasks.get_next.outputs.items) > 0 ? tasks.get_next.outputs.items[0].finding_id : '' }}"
          current_file_path: "${{ has(tasks.get_next.outputs.items) && size(tasks.get_next.outputs.items) > 0 ? tasks.get_next.outputs.items[0].file_path : '' }}"
          current_description: "${{ has(tasks.apply_fix.outputs.description) ? tasks.apply_fix.outputs.description : '' }}"
          current_commit_sha: "${{ has(tasks.apply_fix.outputs.commit_sha) ? tasks.apply_fix.outputs.commit_sha : '' }}"
        outputs:
          fixes_completed: "${{ result.fixes_completed }}"
          fix_log: "${{ result.fix_log }}"
          queue_empty: "${{ result.queue_empty }}"
          state_json: "${{ result.state_json }}"
          schema:
            fixes_completed:
              type: number
            fix_log:
              type: array
              items:
                type: string
            queue_empty:
              type: boolean
            state_json:
              type: string
    outputs:
      fixes_completed: "${{ tasks.accumulate.outputs.fixes_completed }}"
      fix_log: "${{ tasks.accumulate.outputs.fix_log }}"
      queue_empty: "${{ tasks.accumulate.outputs.queue_empty }}"
      state_json: "${{ tasks.accumulate.outputs.state_json }}"
      schema:
        fixes_completed:
          type: number
        fix_log:
          type: array
          items:
            type: string
        queue_empty:
          type: boolean
        state_json:
          type: string
outputs:
  manual_fixes_completed: "${{ tasks.fix_iteration.outputs.fixes_completed }}"
  fix_log: "${{ tasks.fix_iteration.outputs.fix_log }}"
  queue_empty: "${{ tasks.fix_iteration.outputs.queue_empty }}"
  state_json: "${{ tasks.fix_iteration.outputs.state_json }}"
