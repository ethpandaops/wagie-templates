name: ethpandaops/desloppify-scan
version: "1.0"
description: >-
  Use when running static analysis on a codebase with desloppify; executes language-specific
  detectors and produces mechanical findings merged into persistent state.
tags: ["desloppify", "code-quality", "static-analysis"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff: { delay: 5s, factor: 2, max-delay: 20s, jitter: true }
    timeout: 5m
inputs:
  repo:
    type: string
    required: true
    description: "Repository in owner/name format"
  branch_name:
    type: string
    required: true
    description: "Branch to scan"
  state:
    type: artifact
    description: "Desloppify state to carry across operations"
  exclusions:
    type: array
    default: []
    description: "Directories to exclude from scanning"
    schema:
      type: array
      items:
        type: string
tasks:
  scan:
    worker:
      match: "'tool-use' in capabilities"
    run: desloppify-scan
    quality-gate: "${{ has(result.findings_count) && result.findings_count >= 0 }}"
    instructions: |-
      Clone or reuse `repo`, fetch `origin/branch_name`, and checkout the branch before
      invoking desloppify.
      Apply any requested exclusions with `desloppify exclude`.
      If the `state` input is provided, pass it to the upstream command with `--state`.
      After the command finishes, write the active state file as the `state` output artifact.
      Run `desloppify scan` and parse the scan summary into the declared outputs.
    inputs:
      repo: "${{ inputs.repo }}"
      branch_name: "${{ inputs.branch_name }}"
      state: "${{ has(inputs.state) ? inputs.state : '' }}"
      exclusions: "${{ inputs.exclusions }}"
      schema:
        state: artifact
    outputs:
      findings_count: "${{ result.findings_count }}"
      detectors_run: "${{ result.detectors_run }}"
      tier_breakdown: "${{ result.tier_breakdown }}"
      languages_detected: "${{ result.languages_detected }}"
      schema:
        findings_count: { type: number }
        state:
          kind: artifact
          content-type: application/json
          description: Updated desloppify state
          required: true
        detectors_run: { type: array, items: { type: string } }
        tier_breakdown:
          type: object
          properties:
            t1: { type: number }
            t2: { type: number }
            t3: { type: number }
            t4: { type: number }
        languages_detected: { type: array, items: { type: string } }
outputs:
  findings_count: ${{ tasks.scan.outputs.findings_count }}
  state: ${{ tasks.scan.outputs.state }}
  detectors_run: ${{ tasks.scan.outputs.detectors_run }}
  tier_breakdown: ${{ tasks.scan.outputs.tier_breakdown }}
  languages_detected: ${{ tasks.scan.outputs.languages_detected }}
