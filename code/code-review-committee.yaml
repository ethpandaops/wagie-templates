kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/code-review-committee
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when code needs multi-perspective review; fans out reviewer personas in
  parallel — optionally crossing each persona with multiple providers — then a
  per-persona judge converges provider reviews and a top-level judge
  deduplicates, resolves conflicts, and produces a unified verdict with
  confidence scores.
tags: ["code-review", "committee", "multi-agent", "review-panel"]
defaults:
  retry:
    max: 3
    on: [error, timeout]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 1h
inputs:
  diff:
    type: artifact
    required: true
    description: "Git diff output or equivalent patch content (e.g. git diff main...HEAD)"
  personas:
    type: array
    description: Array of reviewer personas to form the committee
    default:
      - role: Security Auditor
        focus: "Injection flaws, authentication/authorization gaps, secrets exposure, input validation, OWASP Top 10"
        principles: "Assume code is vulnerable until proven otherwise. Flag any path where untrusted input reaches a sensitive operation without validation."
        severity_default: high
      - role: Correctness Reviewer
        focus: "Logic errors, off-by-one bugs, null/undefined handling, race conditions, edge cases, error propagation"
        principles: "Mentally execute each code path. Ask what happens with empty input, maximum values, concurrent access, and partial failures."
        severity_default: high
      - role: Performance Engineer
        focus: "Algorithmic complexity, N+1 queries, unnecessary allocations, missing caching, blocking operations in hot paths"
        principles: "Flag obvious inefficiencies but do not speculate without evidence. Measure before optimizing — unless the cost is clearly O(n^2) or worse."
        severity_default: medium
      - role: Maintainability Reviewer
        focus: "Naming clarity, function length, code duplication, coupling between modules, test coverage gaps"
        principles: "Code is read far more than written. Prefer clear over clever. Each function should have one reason to change."
        severity_default: medium
      - role: Research Reviewer
        focus: "API correctness against official docs, deprecated patterns, outdated dependencies, known CVEs, library misuse, stale configuration options"
        principles: "Do not trust static knowledge — verify every library, API, and pattern against current official documentation. Only flag issues you can back with a concrete external source. Quality over quantity."
        severity_default: medium
        requires_tools: true
      - role: General Reviewer
        focus: "Any issue not covered by specialist reviewers — integration problems, API misuse, business logic errors, unexpected interactions between components, missing validation at system boundaries"
        principles: "Review without a specific lens. Look for what the specialists would miss. Focus on how the pieces fit together, not how each piece works in isolation."
    schema:
      type: array
      items:
        type: object
        properties:
          role:
            type: string
          focus:
            type: string
          principles:
            type: string
          severity_default:
            type: string
            description: "Default severity for findings from this persona"
          model:
            type: string
            description: "Preferred model for this reviewer (e.g. claude-opus-4-6, gpt-5.3). Pinning a model opts this persona out of the provider fan-out."
          provider:
            type: string
            description: "Preferred provider for this reviewer (e.g. claudecode, codex). Pinning a provider opts this persona out of the provider fan-out."
          requires_tools:
            type: boolean
            description: "Whether this persona needs tool-use capability (e.g. web search, doc lookup)"
        required: [role, focus]
  providers:
    type: array
    default: []
    description: >-
      Optional provider axis. When non-empty, each persona fans out across these
      providers (e.g. ['claudecode', 'codex']) and a per-persona judge converges
      the reviews before the top-level judge. Personas that pin their own
      provider skip the fan-out and run once with their pinned choice. When
      empty, each persona runs once with its own declared provider (or any
      available worker).
    schema:
      type: array
      items:
        type: string
  repo:
    type: string
    description: "Repository identifier (e.g. owner/name) for context"
  ref:
    type: string
    description: "Git ref being reviewed (e.g. branch name, PR number)"
  context:
    type: string
    description: Optional repository or architectural context
  threshold:
    type: number
    default: 90
    description: Minimum average score across reviewers to pass
  dismissed_findings:
    type: array
    description: "Findings from prior iterations dismissed as false positives with reasoning, passed through to each reviewer"
    schema:
      type: array
      items:
        type: object
        properties:
          finding:
            type: string
            description: The original finding that was dismissed
          reasoning:
            type: string
            description: Why this was dismissed as a false positive
        required: [finding, reasoning]
tasks:
  review_panel:
    strategy:
      matrix:
        persona_idx: "${{ range(inputs.personas.size()) }}"
      fail-fast: false
    inputs:
      diff: "${{ inputs.diff }}"
      persona: "${{ inputs.personas[matrix.persona_idx] }}"
      providers: "${{ inputs.providers }}"
      threshold: "${{ inputs.threshold }}"
      repo: "${{ inputs.?repo }}"
      ref: "${{ inputs.?ref }}"
      context: "${{ inputs.?context }}"
      dismissed_findings: "${{ inputs.?dismissed_findings }}"
    tasks:
      provider_fanout:
        strategy:
          matrix:
            provider_idx: "${{ range(size(inputs.providers) > 0 && (!has(inputs.persona.provider) || inputs.persona.provider == '') ? size(inputs.providers) : 1) }}"
          fail-fast: false
        inputs:
          diff: "${{ inputs.diff }}"
          persona: "${{ inputs.persona }}"
          threshold: "${{ inputs.threshold }}"
          repo: "${{ inputs.?repo }}"
          ref: "${{ inputs.?ref }}"
          context: "${{ inputs.?context }}"
          dismissed_findings: "${{ inputs.?dismissed_findings }}"
          provider_override: "${{ size(inputs.providers) > 0 && (!has(inputs.persona.provider) || inputs.persona.provider == '') ? inputs.providers[matrix.provider_idx] : '' }}"
        tasks:
          single_review:
            uses: io.ethpandaops/code-reviewer@1.0.0
            inputs:
              diff: "${{ inputs.diff }}"
              persona: "${{ inputs.persona }}"
              threshold: "${{ inputs.threshold }}"
              repo: "${{ inputs.?repo }}"
              ref: "${{ inputs.?ref }}"
              context: "${{ inputs.?context }}"
              dismissed_findings: "${{ inputs.?dismissed_findings }}"
              provider_override: "${{ inputs.provider_override }}"
            outputs:
              score: score
              verdict: verdict
              findings: findings
              reasoning: reasoning
              reviewer_role: reviewer_role
        outputs:
          provider_reviews: 'append(${{ {"role": tasks.single_review.outputs.reviewer_role, "provider": inputs.provider_override, "score": tasks.single_review.outputs.score, "verdict": tasks.single_review.outputs.verdict, "findings": tasks.single_review.outputs.findings, "reasoning": tasks.single_review.outputs.reasoning} }})'
          schema:
            provider_reviews:
              type: array
              items:
                type: object
                properties:
                  role:
                    type: string
                  provider:
                    type: string
                    description: "Provider that produced this review. Empty string when no override was applied."
                  score:
                    type: number
                  verdict:
                    type: string
                  findings:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        severity:
                          type: string
                        location:
                          type: string
                        observation:
                          type: string
                        impact:
                          type: string
                        suggestion:
                          type: string
                        source:
                          type: string
                      required: [type, severity, observation]
                  reasoning:
                    type: string
                required: [role, score, verdict, findings, reasoning]
      persona_judge:
        needs: [provider_fanout]
        if: "${{ size(tasks.provider_fanout.outputs.provider_reviews) > 1 }}"
        selection: {capabilities: [reasoning]}
        run: persona-provider-judge
        quality-gate: "${{ result.score >= 0 && result.score <= 100 && has(result.verdict) && (result.verdict == 'pass' || result.verdict == 'fail') && has(result.findings) && has(result.reasoning) && size(result.reasoning) > 0 && has(result.role) && size(result.role) > 0 }}"
        instructions: |
          You are converging multiple provider reviews produced by the SAME
          persona into one authoritative review for that persona. Each input
          review came from the identical prompt and persona, differing only in
          the backing provider — so divergences are provider-specific signal,
          not disagreement between experts.

          Process:
          1. Average the per-provider scores to produce one persona score.
          2. Collapse verdicts conservatively: if any provider says "fail",
             the persona verdict is "fail". Otherwise "pass".
          3. Deduplicate findings across providers. Two findings are the same
             when they reference the same location and describe the same
             underlying issue. When merging:
             - Preserve the strongest severity among duplicates
             - Preserve the most specific location and impact text
             - Preserve any source citation (URL, CVE, doc reference)
             - Record every provider that flagged it in providers_agreeing
          4. Keep findings only one provider flagged, but mark them accordingly
             in providers_agreeing. Do not drop them — they are evidence from
             that provider's perspective; the top-level judge decides confidence.
          5. Resolve contradictions. If provider A flags an issue and provider
             B explicitly states that code is fine, keep the flagged finding
             but record the dissenting provider in contradicted_by. Sourced
             findings (source field set) win against memory-only contradictions.
          6. Do NOT introduce new findings. You are aggregating only.

          Write reasoning as a short provider-agreement summary: which
          providers agreed, which disagreed, and how confident the merged
          review is overall.

          The output role MUST match the persona role shared across all input
          reviews.
        inputs:
          reviews: "${{ tasks.provider_fanout.outputs.provider_reviews }}"
          threshold: "${{ inputs.threshold }}"
        outputs:
          role: "${{ result.role }}"
          score: "${{ result.score }}"
          verdict: "${{ result.verdict }}"
          findings: "${{ result.findings }}"
          reasoning: "${{ result.reasoning }}"
          schema:
            role:
              type: string
              description: The persona role this converged review represents
            score:
              type: number
              description: Mean score across providers (0-100)
            verdict:
              type: string
              enum: [pass, fail]
              description: Conservative verdict — fail if any provider failed
            findings:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  severity:
                    type: string
                  location:
                    type: string
                  observation:
                    type: string
                  impact:
                    type: string
                  suggestion:
                    type: string
                  source:
                    type: string
                    description: "URL or doc reference (present when finding is backed by external evidence)"
                  providers_agreeing:
                    type: array
                    items:
                      type: string
                    description: Providers that flagged this finding
                  contradicted_by:
                    type: array
                    items:
                      type: string
                    description: Providers that explicitly disagreed with this finding
                required: [type, severity, observation]
              description: Deduplicated findings with per-provider agreement tracking
            reasoning:
              type: string
              description: Summary of provider agreement for this persona
    outputs:
      reviews: >-
        append(${{
          size(tasks.provider_fanout.outputs.provider_reviews) > 1
            ? {"role": tasks.persona_judge.outputs.role, "score": tasks.persona_judge.outputs.score, "verdict": tasks.persona_judge.outputs.verdict, "findings": tasks.persona_judge.outputs.findings, "reasoning": tasks.persona_judge.outputs.reasoning}
            : {"role": tasks.provider_fanout.outputs.provider_reviews[0].role, "score": tasks.provider_fanout.outputs.provider_reviews[0].score, "verdict": tasks.provider_fanout.outputs.provider_reviews[0].verdict, "findings": tasks.provider_fanout.outputs.provider_reviews[0].findings, "reasoning": tasks.provider_fanout.outputs.provider_reviews[0].reasoning}
        }})
      schema:
        reviews:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              score:
                type: number
              verdict:
                type: string
              findings:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    severity:
                      type: string
                    observation:
                      type: string
                    location:
                      type: string
                    impact:
                      type: string
                    suggestion:
                      type: string
                    source:
                      type: string
                      description: "URL or doc reference (present when finding is backed by external evidence)"
                    providers_agreeing:
                      type: array
                      items:
                        type: string
                      description: Providers that flagged this finding (only set when the persona fanned out across providers)
                    contradicted_by:
                      type: array
                      items:
                        type: string
                      description: Providers that explicitly disagreed with this finding
                  required: [type, severity, observation]
              reasoning:
                type: string
            required: [role, score, verdict, findings, reasoning]
  judge:
    needs: [review_panel]
    selection: {capabilities: [reasoning]}
    run: review-committee-judge
    quality-gate: "${{ result.average_score >= 0 && result.average_score <= 100 && has(result.verdict) && (result.verdict == 'approve' || result.verdict == 'request_changes' || result.verdict == 'reject') && has(result.findings) && has(result.summary) && size(result.summary) > 0 && result.agreement_score >= 0 && result.agreement_score <= 100 }}"
    instructions: |
      You are the judge of a code review committee. Multiple specialist
      reviewers have independently assessed the same code. Your job is to
      produce a single, authoritative review.

      You will receive reviews from ALL committee members. You MUST process
      every single review — do not skip, collapse, or summarize over any
      reviewer. The scores_by_reviewer output MUST contain one entry per
      reviewer with their exact role and score.

      Each review represents a single persona. If the persona was fanned out
      across multiple providers upstream, its findings may carry
      providers_agreeing (and contradicted_by) metadata. Treat this as
      evidence weight: cross-provider agreement on a finding is a stronger
      signal than single-provider evidence.

      Process:
      1. List every reviewer's role and score. Calculate the arithmetic
         mean of ALL scores — not just one reviewer's score
      2. Deduplicate findings — when multiple reviewers flag the same
         code location with similar descriptions, merge into one entry.
         Preserve the exact file:line location from the original finding.
         Use the strongest severity among duplicates. Record all agreeing
         reviewer roles in agreed_by. When merging, preserve the union of
         providers_agreeing across the contributing findings
      3. Resolve conflicts — when reviewers disagree on severity or
         whether something is an issue, weigh the specialist in that
         domain more heavily (e.g. Security Auditor wins on security
         findings, Performance Engineer wins on performance findings).
         Findings that include a source citation (URL, doc reference, CVE)
         win over contradicting findings based on memory alone
      4. Filter noise — drop findings that meet ALL of these criteria:
         severity is low or info, only one reviewer flagged it, and the
         evidence is weak or speculative. Keep low-severity findings if
         multiple reviewers agree. NEVER filter findings that include a
         source citation or that were confirmed across multiple providers
         (providers_agreeing size >= 2) — those are evidence, not speculation
      5. Rank remaining findings by severity (critical > high > medium >
         low) then by confidence (multi-reviewer > single-reviewer).
         Findings with source citations get a confidence floor of 70
         regardless of agreement count. Findings where providers_agreeing
         size >= 2 get an additional +10 confidence boost
      6. Determine verdict: approve (avg >= threshold and no critical
         findings), request_changes (any critical or high findings),
         reject (avg < 50 or multiple critical findings)

      For each unified finding, record which reviewers flagged it and
      assign confidence: 90+ if 3+ reviewers agree, 70-89 if 2 agree,
      50-69 if only one reviewer flagged it with strong evidence.
      Preserve the source field and providers_agreeing union from findings
      when present.

      Do not introduce new findings — you are aggregating, not reviewing.

      Finally, compute an agreement_score (0-100) reflecting how aligned the
      reviewers were. If all scores are within 10 points of each other,
      agreement is 90+. If scores span 30+ points, agreement is below 50.
      Low agreement signals the review may need human attention.

      BIAS CHECK: Resist the tendency to soften or dismiss findings during
      aggregation. If a specialist reviewer flagged an issue in their domain,
      default to keeping it unless another specialist in the same domain
      explicitly contradicts it. When in doubt, keep the finding.
    inputs:
      reviews: "${{ tasks.review_panel.outputs.reviews }}"
      threshold: "${{ inputs.threshold }}"
    outputs:
      average_score: "${{ result.average_score }}"
      verdict: "${{ result.verdict }}"
      findings: "${{ result.findings }}"
      scores_by_reviewer: "${{ result.scores_by_reviewer }}"
      agreement_score: "${{ result.agreement_score }}"
      summary: "${{ result.summary }}"
      schema:
        average_score:
          type: number
          description: Average score across all reviewers
        verdict:
          type: string
          enum: [approve, request_changes, reject]
          description: Unified committee verdict
        findings:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
                enum: [critical, high, medium, low, info]
              location:
                type: string
                description: "File path and line reference (e.g. src/auth.ts:42)"
              observation:
                type: string
              impact:
                type: string
              suggestion:
                type: string
              source:
                type: string
                description: "URL or doc reference (present when finding is backed by external evidence)"
              agreed_by:
                type: array
                items:
                  type: string
                description: Reviewer roles that flagged this finding
              providers_agreeing:
                type: array
                items:
                  type: string
                description: Union of providers that flagged this finding across all contributing reviewers (only set when the committee fanned out across providers)
              confidence:
                type: number
                description: Confidence score 0-100 based on reviewer agreement and provider agreement
            required: [severity, location, observation, impact, suggestion, agreed_by, confidence]
          description: Deduplicated, ranked findings with agreement tracking
        scores_by_reviewer:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              score:
                type: number
            required: [role, score]
          description: Individual scores from each reviewer
        agreement_score:
          type: number
          description: How aligned reviewers were (0-100). Low scores signal the review needs human attention
        summary:
          type: string
          description: Unified committee assessment
outputs:
  average_score: ${{ tasks.judge.outputs.average_score }}
  verdict: ${{ tasks.judge.outputs.verdict }}
  findings: ${{ tasks.judge.outputs.findings }}
  scores_by_reviewer: ${{ tasks.judge.outputs.scores_by_reviewer }}
  agreement_score: ${{ tasks.judge.outputs.agreement_score }}
  summary: ${{ tasks.judge.outputs.summary }}
