name: wagie/desloppify-status
version: "1.0"
description: >-
  Use when checking current desloppify health scores for a codebase; returns composite
  scores across all scoring modes and per-dimension breakdowns.
tags: ["type:atomic", "desloppify", "code-quality", "scoring", "cap:tool-use"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff: { delay: 5s, factor: 2, max-delay: 20s, jitter: true }
    timeout: 2m
inputs:
  repo:
    type: string
    required: true
    description: "Repository in owner/name format"
  branch_name:
    type: string
    required: true
    description: "Branch whose desloppify state should be scored"
  state_json:
    type: string
    default: ""
    description: "Serialized desloppify state to materialize locally before running"
tasks:
  check_status:
    worker:
      match: "'tool-use' in capabilities"
    run: desloppify-status
    quality-gate: "${{ has(result.overall_score) && result.overall_score >= 0 && result.overall_score <= 100 }}"
    instructions: |-
      Clone or reuse `repo`, fetch `origin/branch_name`, and checkout the branch before
      invoking desloppify.
      If `state_json` is provided, write it to a temporary state file and pass `--state`
      to the upstream command. After the command finishes, read the active state file and
      return it as `state_json`.
      Run `desloppify status` and parse the reported score modes, counts, and
      per-dimension breakdown.
    inputs:
      repo: "${{ inputs.repo }}"
      branch_name: "${{ inputs.branch_name }}"
      state_json: "${{ inputs.state_json }}"
    outputs:
      overall_score: "${{ result.overall_score }}"
      strict_score: "${{ result.strict_score }}"
      objective_score: "${{ result.objective_score }}"
      verified_score: "${{ result.verified_score }}"
      open_count: "${{ result.open_count }}"
      fixed_count: "${{ result.fixed_count }}"
      wontfix_count: "${{ result.wontfix_count }}"
      dimensions: "${{ result.dimensions }}"
      state_json: "${{ result.state_json }}"
      schema:
        overall_score: { type: number }
        strict_score: { type: number }
        objective_score: { type: number }
        verified_score: { type: number }
        open_count: { type: number }
        fixed_count: { type: number }
        wontfix_count: { type: number }
        dimensions:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              score: { type: number }
              strict_score: { type: number }
        state_json: { type: string }
outputs:
  overall_score: ${{ tasks.check_status.outputs.overall_score }}
  strict_score: ${{ tasks.check_status.outputs.strict_score }}
  objective_score: ${{ tasks.check_status.outputs.objective_score }}
  verified_score: ${{ tasks.check_status.outputs.verified_score }}
  open_count: ${{ tasks.check_status.outputs.open_count }}
  fixed_count: ${{ tasks.check_status.outputs.fixed_count }}
  wontfix_count: ${{ tasks.check_status.outputs.wontfix_count }}
  dimensions: ${{ tasks.check_status.outputs.dimensions }}
  state_json: ${{ tasks.check_status.outputs.state_json }}
