kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/source-investigation-committee
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when candidate source files need multi-perspective investigation against observed failure evidence; fans out investigator personas in parallel — each reads the candidate files and assesses whether they contain the bug surface — then a judge converges agreement, ranks the top candidates, and writes a unified source-surface diagnosis with separate source-surface, regression-pinning, and fix-target confidence. Mirrors the code-review-committee shape but takes (workdir + candidate paths + evidence) instead of a diff. Language-agnostic.
tags: ["investigation", "committee", "source-dive", "parallel-review", "bug-hunt"]
defaults:
  retryable: true
  timeout: 1h
inputs:
  workdir:
    type: string
    required: true
    description: Absolute path to the cloned repo root. Investigators `cd` here.
  candidate_paths:
    type: array
    required: true
    description: Ranked candidate file paths (output of code-evidence-locate or equivalent). Each entry carries a `path`, optional `line_range`, `snippet`, and `note`.
    schema:
      type: array
      items:
        type: object
        properties:
          path:
            type: string
          relevance:
            type: number
          line_range:
            type: string
          snippet:
            type: string
          note:
            type: string
        required: [path]
  evidence_excerpts:
    type: array
    required: true
    description: Failure evidence (log excerpts, error strings, stack traces) the investigators cross-reference against the candidate files.
    schema:
      type: array
      items:
        type: string
  bug_context:
    type: string
    default: ""
    description: Optional natural-language summary of the bug (e.g. from upstream bug-hunt). Helps investigators anchor their analysis.
  personas:
    type: array
    description: Investigator personas. Defaults to a four-persona panel suitable for ethereum-client / framework bug investigation.
    default:
      - role: Bug Surface Investigator
        focus: "Identifying the specific function, code path, or state-machine transition that produced the observed failure"
        principles: "Ground every claim in the actual file contents. Follow control flow from entry point to failure site. A candidate is plausible only if a reader can trace inputs through the code and see how the observed evidence would emerge."
        severity_default: high
      - role: Implementation Auditor
        focus: "Validating that the code actually does what its surrounding comments, types, and identifiers claim"
        principles: "Read the candidate carefully. Look for mismatches between intent and behaviour — off-by-one, swapped conditions, missing locks, lost errors, wrong default fallthroughs. Trust nothing the code claims it does without checking."
        severity_default: high
      - role: Concurrency & Lifecycle Reviewer
        focus: "Race conditions, cancellation paths, partial state, in-flight work cancelled mid-operation, retry/cancellation interaction"
        principles: "Many integration-test failures are concurrency artefacts. If the evidence mentions context cancellation, deadlines, retries, or 'in-flight' state, prioritize examining cancellation handlers, defer/finally blocks, and shared-state mutations."
        severity_default: high
      - role: Pragmatic Fix Reviewer
        focus: "What change would most directly address the observed failure — the simplest plausible fix, not the most elegant refactor"
        principles: "Bias toward minimal, low-risk changes that target the failure mode directly. Note when a candidate looks correct but its CALLER is at fault. Suggest fixes phrased as concrete diffs (in prose), not architecture rewrites."
        severity_default: medium
    schema:
      type: array
      items:
        type: object
        properties:
          role:
            type: string
          focus:
            type: string
          principles:
            type: string
          severity_default:
            type: string
        required: [role, focus]
tasks:
  review_panel:
    strategy:
      matrix:
        persona_idx: "${{ range(inputs.personas.size()) }}"
      fail-fast: false
    inputs:
      workdir: "${{ inputs.workdir }}"
      candidate_paths: "${{ inputs.candidate_paths }}"
      evidence_excerpts: "${{ inputs.evidence_excerpts }}"
      bug_context: "${{ inputs.bug_context }}"
      persona: "${{ inputs.personas[matrix.persona_idx] }}"
    tasks:
      investigate:
        selection:
          capabilities: [reasoning, tool-use]
        run: persona-source-investigation
        quality-gate: "${{ has(result.findings) && has(result.plausibility) }}"
        instructions: |-
          You are a source-code investigator with a specific persona. Adopt the persona fully — its `role`, `focus`, and `principles` define what you look for and how critically you assess.

          You have a cloned repository at `workdir`, a ranked list of candidate files (`candidate_paths`), failure evidence (`evidence_excerpts`), and optional `bug_context` summarising the bug from upstream investigation.

          Procedure:
          1. `cd` into `workdir`.
          2. Read each candidate file (or the indicated line range). Spend more reading on higher-`relevance` candidates first. Stop when you have read enough to form a judgment.
          3. For each candidate, decide through the lens of your persona's focus:
             - `plausible` — the file plausibly contains the bug surface, with reasoning grounded in its actual contents.
             - `unlikely` — the file is in the search space but the evidence doesn't really land here.
             - `refuted` — the file is in the search space but its contents are clearly inconsistent with the evidence.
          4. For each plausible candidate, produce a finding with: path, optional `line_range` (your best guess), `observation` (what you saw in the file), `relevance_to_evidence` (how it ties back to the failure), and `suggested_change` (NL description of what should be changed — NOT a diff).

          Be honest about uncertainty. If your persona's focus is not represented in the candidates, score `plausibility: 0-20` and say so in `reasoning`. Do not stretch.

          Confidence calibration (`plausibility` 0-100): 90+ = a single candidate clearly contains the bug surface; 70-89 = a strong leading candidate with plausible alternatives; 50-69 = several roughly-equal candidates; <50 = evidence does not localise here from your persona's view.

          Stay in your lane — don't flag findings outside your focus.
        inputs:
          workdir: "${{ inputs.workdir }}"
          candidate_paths: "${{ inputs.candidate_paths }}"
          evidence_excerpts: "${{ inputs.evidence_excerpts }}"
          bug_context: "${{ inputs.bug_context }}"
          persona: "${{ inputs.persona }}"
        outputs:
          findings: "${{ result.findings }}"
          plausibility: "${{ result.plausibility }}"
          reasoning: "${{ result.reasoning }}"
          schema:
            findings:
              type: array
              items:
                type: object
                properties:
                  path:
                    type: string
                  line_range:
                    type: string
                  status:
                    type: string
                    enum: [plausible, unlikely, refuted]
                  observation:
                    type: string
                  relevance_to_evidence:
                    type: string
                  suggested_change:
                    type: string
                required: [path, status, observation]
            plausibility:
              type: number
            reasoning:
              type: string
    outputs:
      reviews: 'append(${{ {"role": inputs.persona.role, "plausibility": tasks.investigate.outputs.plausibility, "findings": tasks.investigate.outputs.findings, "reasoning": tasks.investigate.outputs.reasoning} }})'
      schema:
        reviews:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              plausibility:
                type: number
              findings:
                type: array
                items:
                  type: object
                  properties:
                    path:
                      type: string
                    line_range:
                      type: string
                    status:
                      type: string
                    observation:
                      type: string
                    relevance_to_evidence:
                      type: string
                    suggested_change:
                      type: string
                  required: [path, status, observation]
              reasoning:
                type: string
            required: [role, plausibility, findings, reasoning]
  falsify:
    needs: [review_panel]
    if: "${{ size(tasks.review_panel.outputs.reviews) > 0 }}"
    selection: {capabilities: [reasoning, tool-use]}
    run: source-investigation-falsify
    quality-gate: "${{ has(result.refutations) && has(result.summary) }}"
    instructions: |-
      You are an adversarial reviewer. The cooperative investigator panel has produced its findings — you now read those findings AND the actual code and try to break them. Your job is to manufacture the strongest possible case that the panel is wrong WITHIN the candidate repo, using code-grounded counter-evidence.

      **Hard rules — read before you start:**
      - A refutation must cite SPECIFIC code in the candidate repo that contradicts the panel's claim. "Looks fine to me," "could be elsewhere," "might be a config thing" are NOT refutations. They are gestures.
      - This task is scoped to the candidate repo selected upstream. To refute a panel claim, you must either (a) show the cited code paths actually behave correctly under the observed failure conditions, or (b) propose a DIFFERENT file in THE SAME REPO that better explains the failure.
      - Absence of the bug in a panel-cited file is not proof that the upstream target selection was wrong. First surface stronger in-repo alternatives as `missed_paths`; if no in-repo evidence survives, say the candidate set is exhausted rather than shifting blame to another repo.
      - A file can be the correct source surface even when it did not change in the previous-success/current-failure window. Treat that as weak regression pinning, not as proof the file or component did not cause this failure.

      For each candidate the panel marked `plausible`:
      1. Re-read the cited code in `workdir` at the indicated `line_range` (± 30 lines context).
      2. Look for code-grounded evidence that REFUTES the panel's claim:
         - Default values, guards, or upstream callers that make the candidate behave correctly under the observed failure conditions
         - Control-flow paths where the bug would NOT manifest even if the panel's claim were true
         - Identifiers or types in the code that contradict the panel's `observation`
         - Test coverage / asserts / runtime checks the panel ignored
         - Whether the panel mis-read a value-copy as a shared reference (or vice versa)
         - Whether the failure evidence is consistent with a DIFFERENT path in the same file (cite the path)
      3. For each candidate, decide:
         - `survives` — refutation attempt failed; the panel's claim holds against the code. THIS IS A VALID AND IMPORTANT VERDICT — say so plainly when it applies.
         - `weakened` — specific code-grounded counter-evidence against parts of the panel's claim, but the file is still suspect.
         - `refuted` — concrete code-grounded counter-evidence shows the panel's claim is wrong at the cited location AND no closely-related path in the same file matches the failure either.
      4. For each refutation, cite specific lines / identifiers / quotes that disprove or weaken the panel's claim. If you can't cite specific code, you don't have a refutation — verdict is `survives`.

      Also surface any candidate paths IN THIS REPO that the panel MISSED — files you'd expect to be implicated by the failure evidence that nobody on the panel reviewed. Do NOT surface paths outside this repo as `missed_paths`.

      Write a 3-5 sentence `summary` covering: which panel candidates survived, which were weakened, which were refuted, and any new in-repo paths the panel missed. The judge weighs this against the panel's findings to calibrate final confidence.

      BIAS CHECK: Do not invent refutations to look smart. The panel is more likely right than wrong — most of your verdicts should be `survives`. `refuted` should be rare and requires the strongest code-grounded counter-evidence. A `survives` verdict on the panel's leading candidate is the most useful signal you can give the judge.
    inputs:
      workdir: "${{ inputs.workdir }}"
      candidate_paths: "${{ inputs.candidate_paths }}"
      evidence_excerpts: "${{ inputs.evidence_excerpts }}"
      bug_context: "${{ inputs.bug_context }}"
      reviews: "${{ tasks.review_panel.outputs.reviews }}"
    outputs:
      refutations: "${{ result.refutations }}"
      missed_paths: "${{ has(result.missed_paths) ? result.missed_paths : [] }}"
      summary: "${{ result.summary }}"
      schema:
        refutations:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              verdict:
                type: string
                enum: [survives, weakened, refuted]
              counter_evidence:
                type: string
              cited_lines:
                type: string
            required: [path, verdict, counter_evidence]
        missed_paths:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              reason:
                type: string
            required: [path, reason]
        summary:
          type: string
  judge:
    needs: [review_panel, falsify]
    selection: {capabilities: [reasoning]}
    run: source-investigation-judge
    quality-gate: "${{ has(result.root_cause_description) && size(result.root_cause_description) > 0 && has(result.top_candidates) && has(result.confidence) && has(result.source_surface_confidence) && has(result.regression_pin_confidence) && has(result.fix_target_confidence) }}"
    instructions: |-
      You are the judge of a source-investigation committee. Specialist investigators have independently read the candidate files and produced findings against the failure evidence; a separate adversarial reviewer has then read those findings and tried to refute them. Your job is to converge their work into a single, authoritative diagnosis that respects both the cooperative and adversarial signals.

      Scope check: this task is limited to the provided repository and candidate files. Report what those files actually support. Keep two questions separate: (a) whether these files explain the observed failure/source surface, and (b) whether a specific regression-introducing edit is pinned. If the panel and falsifier together cannot localise the bug surface to a specific file with confidence, output "low confidence in cited file, suggest expanding in-repo candidate search to <missed_paths>" when missed paths exist, or "candidate set exhausted; target selection needs review" when no in-repo evidence survives.

      Process:
      1. For each candidate path mentioned across reviews, collect every finding that touched it. Group by path.
      2. Compute path-level support: how many investigators marked it `plausible`, how many `unlikely`, how many `refuted`. Plausible-from-multiple-personas is a strong signal; refuted-by-multiple is a strong negative.
      3. Apply the adversarial layer: for each candidate, look up the falsifier's verdict in `refutations`:
         - `survives` — the panel's claim withstood refutation; treat as full support. THIS IS THE COMMON CASE for valid panel findings.
         - `weakened` — discount panel support by ~30% for this path; mention the counter-evidence in `relevance_assessment`. Still a viable candidate.
         - `refuted` — drop the path unless multiple panel members marked it plausible AND the falsifier's counter-evidence is itself thin. When kept, prominently caveat in `relevance_assessment`.
      4. Consider falsifier's `missed_paths`: when any look credible, surface them in `root_cause_description` as recommended next-investigation targets. Do NOT promote them into `top_candidates` (they weren't reviewed by the panel), but DO note they exist as additional in-repo candidates to investigate. **Critically:** missed_paths are still IN THIS REPO — they mean "expand candidate search here," NOT "look outside this repo."
      5. Rank surviving candidates by adjusted support, then by average per-finding confidence.
      6. Pick the top 1-3 candidates. For each, write a unified entry:
         - `path`
         - `line_range` — preserve the narrowest agreed-upon range; empty if investigators didn't agree
         - `relevance_assessment` — one paragraph synthesising what the candidate plausibly contains and why it ties to the evidence; explicitly note when the falsifier weakened it
         - `suggested_change` — synthesised NL fix description (not a diff). Prefer the simplest plausible fix when investigators disagree on approach
         - `agreed_by` — array of persona roles that supported this candidate
      7. Write `root_cause_description` — 4-8 sentences synthesising the most plausible root cause across the top candidates, explicitly tying back to the original `bug_context` and `evidence_excerpts`. Cite the falsifier's strongest counter-points when they remain unresolved. State uncertainty plainly. If candidate files match the runtime failure but did not change in the regression window, say they are the source surface or fix surface and that the exact regression edit remains unpinned.
         - Keep the description scoped to this repo's evidence. If confidence is low, say whether to expand in-repo candidate search or review upstream target selection; do not invent an alternate owner.
      8. Render `suggested_change_md` — markdown with the `root_cause_description` followed by a bulleted suggested-changes list (one bullet per top candidate).
      9. Compute separate confidence axes:
         - `source_surface_confidence` (0-100): confidence that this repo/file set explains the observed failure mechanism or emitted error path. The falsifier signal MUST be reflected here: 80+ requires at least 2 personas agreeing on one candidate, code-grounded evidence, and no strong refutation; 60-79 = strong panel support with a weakened caveat, or moderate panel support that survives; 40-59 = thin panel support, panel split, or a weakened leading candidate; <40 = refuted top candidates or no agreement. Do NOT reduce this solely because the exact regression-introducing edit is unknown or the code existed in a previous passing version.
         - `regression_pin_confidence` (0-100): confidence that the exact regressing edit is pinned. 80+ needs a concrete commit/PR/line-level diff that explains the failure; 60-79 means the changed repo/component is isolated but the precise edit is still inferred; 30-59 means the runtime owner changed but the reviewed source surface is unchanged or the cause may be latent/newly exposed; <30 means history is missing, contradictory, or points away from a recent source change.
         - `fix_target_confidence` (0-100): confidence that the top candidates are the right place for a patch or defensive hardening. This can be lower than source-surface confidence when the files only emit/report the symptom.
         - `confidence`: set equal to `source_surface_confidence`. Also return the dedicated confidence axes for callers that need more detail.

      BIAS CHECK: A `survives` from the falsifier is a strong positive signal — don't ignore it. A `refuted` is a strong negative — don't bury it. A correctly-pessimistic verdict beats a confidently-wrong one. Low confidence is honest when the code evidence is thin.

      Compute `agreement_score` (0-100): all plausibility scores within 15 of each other → 90+; spans 40+ → below 50. Surface as a separate field.
    inputs:
      reviews: "${{ tasks.review_panel.outputs.reviews }}"
      refutations: "${{ has(tasks.falsify.outputs.refutations) ? tasks.falsify.outputs.refutations : [] }}"
      falsifier_missed_paths: "${{ has(tasks.falsify.outputs.missed_paths) ? tasks.falsify.outputs.missed_paths : [] }}"
      falsifier_summary: "${{ has(tasks.falsify.outputs.summary) ? tasks.falsify.outputs.summary : '' }}"
      bug_context: "${{ inputs.bug_context }}"
      evidence_excerpts: "${{ inputs.evidence_excerpts }}"
    outputs:
      root_cause_description: "${{ result.root_cause_description }}"
      suggested_change_md: "${{ has(result.suggested_change_md) ? result.suggested_change_md : '' }}"
      top_candidates: "${{ result.top_candidates }}"
      confidence: "${{ result.confidence }}"
      source_surface_confidence: "${{ result.source_surface_confidence }}"
      regression_pin_confidence: "${{ result.regression_pin_confidence }}"
      fix_target_confidence: "${{ result.fix_target_confidence }}"
      agreement_score: "${{ has(result.agreement_score) ? result.agreement_score : 0 }}"
      schema:
        root_cause_description:
          type: string
        suggested_change_md:
          type: string
        top_candidates:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              line_range:
                type: string
              relevance_assessment:
                type: string
              suggested_change:
                type: string
              agreed_by:
                type: array
                items:
                  type: string
            required: [path, relevance_assessment, suggested_change]
        confidence:
          type: number
        source_surface_confidence:
          type: number
        regression_pin_confidence:
          type: number
        fix_target_confidence:
          type: number
        agreement_score:
          type: number
  verify_findings:
    needs: [judge]
    if: "${{ size(tasks.judge.outputs.top_candidates) > 0 }}"
    selection: {capabilities: [tool-use]}
    run: verify-source-investigation-findings
    quality-gate: "${{ has(result.verified_candidates) }}"
    instructions: |-
      Grounding check on the judge's top candidates. For each entry, open the actual file in `workdir` (read the indicated `line_range` ± 20 lines for context) and verify whether the `relevance_assessment` is anchored in the code at the cited location.

      Procedure:
      1. `cd` into `workdir`.
      2. For each candidate in `top_candidates`:
         - Resolve the `path` — if it does not exist in the repo, mark `verified=false` with `verification_notes="path not in repo"`.
         - Read the file at `line_range` (or whole file if empty). Pull ~20 lines of context above and below.
         - Compare the code you read against the candidate's `relevance_assessment`. Look for:
           - Functions / identifiers / control flow named in the assessment — do they exist there?
           - Concrete claims (e.g. "value-copy of struct with pointer field", "loop walks indices", "checks TCP only") — do they hold against the actual code?
           - Line numbers — do they roughly contain what the assessment describes?
         - Verdict:
           - `verified="true"` when the assessment's specific claims are clearly grounded in the cited code (line refs roughly correct, identifiers match, control-flow described actually exists).
           - `verified="uncertain"` when the file exists and contains relevant material but specific line refs or identifier claims are off (e.g. the function exists but at different lines).
           - `verified="false"` when the assessment is contradicted by the code — claimed identifiers don't exist, control flow described is absent, or the file is unrelated to the assessment.
         - Write a short `verification_notes` (1-3 sentences) summarising what you checked and what you saw. Quote the actual code briefly when refuting.
      3. Return the original candidates list enriched with `verified` + `verification_notes` fields per entry.

      Be terse. This is a sanity check, not a re-analysis. Read enough to corroborate or refute; don't redo the investigation.
    inputs:
      workdir: "${{ inputs.workdir }}"
      top_candidates: "${{ tasks.judge.outputs.top_candidates }}"
    outputs:
      verified_candidates: "${{ result.verified_candidates }}"
      schema:
        verified_candidates:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              line_range:
                type: string
              relevance_assessment:
                type: string
              suggested_change:
                type: string
              agreed_by:
                type: array
                items:
                  type: string
              verified:
                type: string
                enum: ["true", "false", uncertain]
              verification_notes:
                type: string
            required: [path, verified, verification_notes]
  calibrate_confidence:
    needs: [judge, verify_findings]
    if: "${{ size(tasks.judge.outputs.top_candidates) > 0 }}"
    selection: {capabilities: [reasoning]}
    run: calibrate-source-investigation-confidence
    quality-gate: "${{ has(result.confidence) && has(result.source_surface_confidence) && has(result.regression_pin_confidence) && has(result.fix_target_confidence) && has(result.top_candidates) }}"
    instructions: |-
      Calibrate the source-investigation confidence axes after the grounding check.

      Procedure:
      1. Start from the judge's `source_surface_confidence`, `regression_pin_confidence`, `fix_target_confidence`, and compatibility `confidence`.
      2. Use `verified_candidates` as the returned `top_candidates` when present, preserving every field. If verification did not produce candidates, return `judge_top_candidates` and the judge scores unchanged.
      3. Apply verification caps to `source_surface_confidence` and `fix_target_confidence`:
         - 80+ requires at least one top candidate with `verified="true"` and no leading candidate with `verified="false"`.
         - If the leading candidate is `verified="false"`, cap at 45.
         - If every candidate is `verified="false"`, cap at 30.
         - If any candidate is `verified="false"` but at least one survives, cap at 65.
         - If every candidate is `verified="uncertain"`, cap at 60.
         - If the leading candidate is `verified="uncertain"` and another candidate is verified true, cap at 75.
      4. Do not lower `source_surface_confidence` merely because `regression_pin_confidence` is low. A verified error path can be high-confidence even when the exact introducing edit is unknown.
      5. Preserve `regression_pin_confidence` unless every candidate is verified false; in that case cap it at 30 because the reviewed history is no longer grounded in surviving source candidates.
      6. Never raise any score above the judge's corresponding score. The goal is to prevent an ungrounded or contradicted code citation from looking high-confidence downstream.

      Return `confidence` equal to calibrated `source_surface_confidence`, plus all dedicated confidence axes, `top_candidates`, and a concise `confidence_note` explaining any cap or regression-pinning caveat.
    inputs:
      judge_confidence: ${{ tasks.judge.outputs.confidence }}
      judge_source_surface_confidence: ${{ tasks.judge.outputs.source_surface_confidence }}
      judge_regression_pin_confidence: ${{ tasks.judge.outputs.regression_pin_confidence }}
      judge_fix_target_confidence: ${{ tasks.judge.outputs.fix_target_confidence }}
      judge_top_candidates: ${{ tasks.judge.outputs.top_candidates }}
      verified_candidates: "${{ has(tasks.verify_findings.outputs.verified_candidates) ? tasks.verify_findings.outputs.verified_candidates : [] }}"
    outputs:
      confidence: "${{ result.confidence }}"
      source_surface_confidence: "${{ result.source_surface_confidence }}"
      regression_pin_confidence: "${{ result.regression_pin_confidence }}"
      fix_target_confidence: "${{ result.fix_target_confidence }}"
      top_candidates: "${{ result.top_candidates }}"
      confidence_note: "${{ has(result.confidence_note) ? result.confidence_note : '' }}"
      schema:
        confidence:
          type: number
        source_surface_confidence:
          type: number
        regression_pin_confidence:
          type: number
        fix_target_confidence:
          type: number
        top_candidates:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              line_range:
                type: string
              relevance_assessment:
                type: string
              suggested_change:
                type: string
              agreed_by:
                type: array
                items:
                  type: string
              verified:
                type: string
              verification_notes:
                type: string
        confidence_note:
          type: string
outputs:
  root_cause_description: ${{ tasks.judge.outputs.root_cause_description }}
  suggested_change_md: ${{ tasks.judge.outputs.suggested_change_md }}
  top_candidates: "${{ has(tasks.calibrate_confidence.outputs.top_candidates) ? tasks.calibrate_confidence.outputs.top_candidates : (has(tasks.verify_findings.outputs.verified_candidates) ? tasks.verify_findings.outputs.verified_candidates : tasks.judge.outputs.top_candidates) }}"
  confidence: "${{ has(tasks.calibrate_confidence.outputs.confidence) ? tasks.calibrate_confidence.outputs.confidence : tasks.judge.outputs.confidence }}"
  source_surface_confidence: "${{ has(tasks.calibrate_confidence.outputs.source_surface_confidence) ? tasks.calibrate_confidence.outputs.source_surface_confidence : tasks.judge.outputs.source_surface_confidence }}"
  regression_pin_confidence: "${{ has(tasks.calibrate_confidence.outputs.regression_pin_confidence) ? tasks.calibrate_confidence.outputs.regression_pin_confidence : tasks.judge.outputs.regression_pin_confidence }}"
  fix_target_confidence: "${{ has(tasks.calibrate_confidence.outputs.fix_target_confidence) ? tasks.calibrate_confidence.outputs.fix_target_confidence : tasks.judge.outputs.fix_target_confidence }}"
  confidence_note: "${{ has(tasks.calibrate_confidence.outputs.confidence_note) ? tasks.calibrate_confidence.outputs.confidence_note : '' }}"
  agreement_score: ${{ tasks.judge.outputs.agreement_score }}
  reviews: ${{ tasks.review_panel.outputs.reviews }}
