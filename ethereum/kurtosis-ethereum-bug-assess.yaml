name: ethpandaops/kurtosis-ethereum-bug-assess
version: "1.0"
description: >-
  Use when accumulated Kurtosis Ethereum bug-hunt findings need a structured stop-or-continue decision. Returns remaining gaps, a completeness judgment, and an information-gain signal for the next round.
tags: ["kurtosis", "ethereum", "ethpandaops", "bug-hunt", "evaluation", "type:building-block", "cap:evaluation"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 2m
inputs:
  goal:
    type: string
    required: true
    description: Hunt objective
  hunt_focus:
    type: string
    default: general
    description: Optional focus such as finality, interop, forks, or service-health
  findings:
    type: array
    required: true
    description: Accumulated findings from all prior rounds
    schema:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
          severity:
            type: string
          summary:
            type: string
          affected_scope:
            type: string
          category:
            type: string
          confidence:
            type: number
          status:
            type: string
          evidence:
            type: array
            items:
              type: string
          warrants_devnet_debug:
            type: boolean
          next_check:
            type: string
        required: [title, severity, summary, affected_scope]
  prior_gaps:
    type: array
    default: []
    description: Remaining gaps from the previous round
    schema:
      type: array
      items:
        type: object
        properties:
          question:
            type: string
          priority:
            type: string
          reason:
            type: string
        required: [question, priority, reason]
  suggested_gaps:
    type: array
    default: []
    description: New candidate gaps suggested by the latest round
    schema:
      type: array
      items:
        type: object
        properties:
          question:
            type: string
          priority:
            type: string
          reason:
            type: string
        required: [question, priority, reason]
  previous_gap_count:
    type: number
    default: 0
    description: Number of gaps identified in the previous iteration
  latest_round_summary:
    type: string
    description: Summary of the most recent probe round
tasks:
  assess:
    worker: {match: "'reasoning' in capabilities"}
    run: assess-kurtosis-ethereum-bug-hunt
    quality-gate: "${{ has(result.completeness) && has(result.information_gain) && has(result.gaps) && has(result.summary) && size(result.summary) > 0 }}"
    instructions: |
      Assess whether a Kurtosis Ethereum bug hunt should continue.

      Evaluate the accumulated findings against the hunt objective and focus.

      Completeness:
      - Mark `sufficient` when the hunt has produced enough actionable signal
        for follow-up, or when the network appears healthy and no meaningful
        high-priority gaps remain.
      - Mark `insufficient` when important high-priority uncertainties remain.

      Information gain:
      - `high` when the latest round materially improved understanding.
      - `moderate` when it sharpened confidence but did not change the picture
        dramatically.
      - `diminishing` when it mostly repeated known information or left the
        same unresolved gaps in place.

      Gap rules:
      - Merge `prior_gaps` and `suggested_gaps` into a concise deduplicated set.
      - Keep only the highest-value remaining gaps.
      - Prefer gaps that would confirm or refute the most severe or ambiguous
        findings.
      - Return at most 4 gaps.

      Be direct. The point of this task is to decide whether another round is
      worth the cost.
    inputs:
      goal: ${{ inputs.goal }}
      hunt_focus: ${{ inputs.hunt_focus }}
      findings: ${{ inputs.findings }}
      prior_gaps: ${{ inputs.prior_gaps }}
      suggested_gaps: ${{ inputs.suggested_gaps }}
      previous_gap_count: ${{ inputs.previous_gap_count }}
      latest_round_summary: "${{ has(inputs.latest_round_summary) ? inputs.latest_round_summary : '' }}"
    outputs:
      completeness: "${{ result.completeness }}"
      information_gain: "${{ result.information_gain }}"
      gaps: "${{ result.gaps }}"
      summary: "${{ result.summary }}"
      schema:
        completeness:
          type: string
          enum: [insufficient, sufficient]
          description: Whether another probe round is materially necessary
        information_gain:
          type: string
          enum: [high, moderate, diminishing]
          description: Whether another round is likely to add substantial new information
        gaps:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              priority:
                type: string
                enum: [high, medium, low]
              reason:
                type: string
            required: [question, priority, reason]
          description: Highest-value remaining gaps for another probe round
        summary:
          type: string
          description: Concise stop-or-continue assessment
outputs:
  completeness: ${{ tasks.assess.outputs.completeness }}
  information_gain: ${{ tasks.assess.outputs.information_gain }}
  gaps: ${{ tasks.assess.outputs.gaps }}
  summary: ${{ tasks.assess.outputs.summary }}
