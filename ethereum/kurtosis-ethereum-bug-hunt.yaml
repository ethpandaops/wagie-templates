kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/kurtosis-ethereum-bug-hunt
version: "1.1.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when a workflow needs to launch or inspect a Kurtosis Ethereum network and iteratively hunt for candidate bugs or anomalies. Carries forward typed findings and remaining gaps across rounds until coverage is sufficient or additional probing has diminishing value.
tags: ["kurtosis", "ethereum", "ethpandaops", "bug-hunt", "debugging", "investigation", "iterative"]
inputs:
  goal:
    type: string
    required: true
    description: Desired network setup or bug-hunting objective
  enclave_name:
    type: string
    required: true
    description: Kurtosis enclave name to create or inspect
  hunt_focus:
    type: string
    default: general
    description: Optional focus such as finality, interop, forks, or service-health
  constraints:
    type: string
    description: Optional implementation constraints
  example_hint:
    type: string
    description: Optional CI example or package feature hint
  package_ref:
    type: string
    default: github.com/ethpandaops/ethereum-package
    description: Kurtosis package reference to run
  config_mode:
    type: string
    default: minimal
    description: Whether to design a sensible minimal config or replicate an existing devnet profile
    schema:
      type: string
      enum: [minimal, devnet-profile]
  devnet_name:
    type: string
    description: Existing devnet or devnet-group name to model when `config_mode` is `devnet-profile`
  client_type:
    type: string
    description: Optional client type to preserve explicitly in the generated config
  image_hint:
    type: string
    description: Optional image or build hint to preserve explicitly in the generated config
  client_pairs:
    type: array
    description: Optional explicit client-pair and image combinations to pass through to config design
    schema:
      type: array
      items:
        type: object
        properties:
          el_type:
            type: string
          cl_type:
            type: string
          vc_type:
            type: string
          el_image:
            type: string
          cl_image:
            type: string
          vc_image:
            type: string
          el_extra_params:
            type: array
            items:
              type: string
          cl_extra_params:
            type: array
            items:
              type: string
          vc_extra_params:
            type: array
            items:
              type: string
          count:
            type: number
        required: [el_type, cl_type]
  max_iterations:
    type: number
    default: 3
    description: Maximum bug-hunt probe rounds before returning the best accumulated result
  launch:
    type: boolean
    default: true
    description: Whether to launch a fresh network before hunting
  auto_cleanup:
    type: boolean
    default: true
    description: Whether to remove the enclave after the hunt
tasks:
  lifecycle:
    uses: io.ethpandaops/kurtosis-ethereum-network-lifecycle@1.0.0
    selection: {sticky: true}
    inputs:
      goal: ${{ inputs.goal }}
      enclave_name: ${{ inputs.enclave_name }}
      constraints: "${{ inputs.?constraints }}"
      example_hint: "${{ inputs.?example_hint }}"
      package_ref: ${{ inputs.package_ref }}
      config_mode: ${{ inputs.config_mode }}
      devnet_name: "${{ inputs.?devnet_name }}"
      client_type: "${{ inputs.?client_type }}"
      image_hint: "${{ inputs.?image_hint }}"
      client_pairs: "${{ inputs.?client_pairs }}"
      launch: ${{ inputs.launch }}
      auto_cleanup: false
    outputs:
      resolved_network_name: resolved_network_name
      resolved_network_group: resolved_network_group
      config: config
      config_summary: config_summary
      effective_client_pairs: effective_client_pairs
      fallback_pair_added: fallback_pair_added
      launch_summary: launch_summary
      status_summary: status_summary
      service_names: service_names
      public_endpoints: public_endpoints
  hunt:
    needs: [lifecycle]
    loop:
      max: "${{ inputs.max_iterations }}"
      init:
        findings: "${{ [] }}"
        gaps: "${{ [] }}"
        gap_count: "${{ 0 }}"
        findings_count: "${{ 0 }}"
        prev_findings_count: "${{ 999 }}"
        rounds_completed: "${{ 0 }}"
        completeness: "${{ 'insufficient' }}"
        information_gain: "${{ 'high' }}"
        iteration_log: "${{ '' }}"
      until: "${{ loop.completeness == 'sufficient' || loop.information_gain == 'diminishing' }}"
      on-max-exhausted: continue
    inputs:
      enclave_name: ${{ inputs.enclave_name }}
      goal: ${{ inputs.goal }}
      hunt_focus: ${{ inputs.hunt_focus }}
      config_summary: ${{ tasks.lifecycle.outputs.config_summary }}
      launch_summary: ${{ tasks.lifecycle.outputs.launch_summary }}
      status_summary: ${{ tasks.lifecycle.outputs.status_summary }}
      service_names: ${{ tasks.lifecycle.outputs.service_names }}
      public_endpoints: ${{ tasks.lifecycle.outputs.public_endpoints }}
      previous_findings: "${{ loop.findings }}"
      previous_gaps: "${{ loop.gaps }}"
      previous_gap_count: "${{ loop.gap_count }}"
      previous_findings_count: "${{ loop.findings_count }}"
      previous_rounds_completed: "${{ loop.rounds_completed }}"
      previous_log: "${{ loop.iteration_log }}"
    tasks:
      probe_round:
        selection: {capabilities: [reasoning, tool-use]}
        run: hunt-kurtosis-ethereum-bug-round
        retry:
          max: 1
          on: [error, timeout, schema-validation, quality-gate]
          backoff:
            delay: 10s
            factor: 2
            max-delay: 30s
            jitter: true
          timeout: 1h
        quality-gate: "${{ has(result.summary) && size(result.summary) > 0 && has(result.findings) && has(result.suggested_gaps) }}"
        instructions: |-
          Run one focused Kurtosis Ethereum bug-hunt round.

          Use the `kurtosis` CLI as the primary tool surface for enclave operations.
          Use the `panda` CLI and MCP tools for network analysis when available.

          Strategy:
          - If `previous_findings` is empty, start broad: establish a baseline
            for service health, consensus progress, finality, fork agreement,
            sync state, and obvious log anomalies.
          - If `gaps` are present, prioritize the highest-value unresolved
            questions first and use targeted checks to confirm, refute, or
            sharpen prior hypotheses.
          - Do not repeat already-established findings unless you are materially
            upgrading them with stronger evidence or refuting them.

          Evidence rules:
          - Every finding must cite concrete evidence from this round.
          - Reference specific commands, endpoints, log excerpts, or observed
            service states rather than generic statements.
          - Prefer a small number of substantive findings over a long weak list.

          For each finding:
          - Set severity as critical, high, medium, or low.
          - Set status as suspected, confirmed, or refuted.
          - State the affected scope precisely.
          - Include a confidence score from 0-100.
          - Set `warrants_devnet_debug` when the finding deserves deeper
            follow-up via a devnet-debug workflow.

          Return only new or materially upgraded findings from this round.
          Also return `suggested_gaps`: the next checks that would most improve
          confidence or close unresolved ambiguity.
        inputs:
          enclave_name: ${{ inputs.enclave_name }}
          goal: ${{ inputs.goal }}
          hunt_focus: ${{ inputs.hunt_focus }}
          config_summary: "${{ has(inputs.config_summary) ? inputs.config_summary : '' }}"
          launch_summary: "${{ has(inputs.launch_summary) ? inputs.launch_summary : '' }}"
          status_summary: "${{ has(inputs.status_summary) ? inputs.status_summary : '' }}"
          service_names: ${{ inputs.service_names }}
          public_endpoints: ${{ inputs.public_endpoints }}
          previous_findings: ${{ inputs.previous_findings }}
          gaps: ${{ inputs.previous_gaps }}
        outputs:
          findings: "${{ has(result.findings) ? result.findings : [] }}"
          summary: "${{ result.summary }}"
          suggested_gaps: "${{ has(result.suggested_gaps) ? result.suggested_gaps : [] }}"
          schema:
            findings:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                  severity:
                    type: string
                    enum: [critical, high, medium, low]
                  summary:
                    type: string
                  affected_scope:
                    type: string
                  category:
                    type: string
                  confidence:
                    type: number
                  status:
                    type: string
                    enum: [suspected, confirmed, refuted]
                  evidence:
                    type: array
                    items:
                      type: string
                  warrants_devnet_debug:
                    type: boolean
                  next_check:
                    type: string
                required: [title, severity, summary, affected_scope, status, evidence]
              description: New or materially upgraded candidate bugs from this round
            summary:
              type: string
              description: Concise summary of this probe round
            suggested_gaps:
              type: array
              items:
                type: object
                properties:
                  question:
                    type: string
                  priority:
                    type: string
                    enum: [high, medium, low]
                  reason:
                    type: string
                required: [question, priority, reason]
              description: Targeted next checks suggested by this round
      accumulate_findings:
        needs: [probe_round]
        selection: {capabilities: [reasoning]}
        run: accumulate-kurtosis-ethereum-bug-findings
        quality-gate: "${{ has(result.findings) }}"
        instructions: |
          Merge prior bug-hunt findings with the latest probe round.

          Rules:
          - Preserve prior findings unless the new round materially upgrades
            or refutes them.
          - Do not duplicate the same anomaly under slightly different wording.
          - Prefer the strongest available severity, confidence, and evidence.
          - When new evidence strengthens an existing finding, update that
            finding instead of appending a duplicate.
          - When a prior finding is refuted, keep it but mark status as
            `refuted` and explain why in the summary or evidence.
          - Keep evidence concrete and attributable to specific tool outputs.
          - When in doubt, preserve information rather than dropping it.
        inputs:
          previous_findings: "${{ inputs.previous_findings }}"
          new_findings: "${{ tasks.probe_round.outputs.findings }}"
        outputs:
          findings: "${{ result.findings }}"
          schema:
            findings:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                  severity:
                    type: string
                    enum: [critical, high, medium, low]
                  summary:
                    type: string
                  affected_scope:
                    type: string
                  category:
                    type: string
                  confidence:
                    type: number
                  status:
                    type: string
                    enum: [suspected, confirmed, refuted]
                  evidence:
                    type: array
                    items:
                      type: string
                  warrants_devnet_debug:
                    type: boolean
                  next_check:
                    type: string
                required: [title, severity, summary, affected_scope, status, evidence]
              description: Accumulated Kurtosis Ethereum bug-hunt findings
      assess_progress:
        needs: [probe_round, accumulate_findings]
        selection: {capabilities: [reasoning]}
        run: assess-kurtosis-ethereum-bug-hunt
        retry:
          max: 1
          on: [error, timeout, schema-validation, quality-gate]
          backoff:
            delay: 5s
            factor: 2
            max-delay: 20s
            jitter: true
          timeout: 1h
        quality-gate: "${{ has(result.completeness) && has(result.information_gain) && has(result.gaps) && has(result.summary) && size(result.summary) > 0 }}"
        instructions: |
          Assess whether a Kurtosis Ethereum bug hunt should continue.

          Evaluate the accumulated findings against the hunt objective and focus.

          Completeness:
          - Mark `sufficient` when the hunt has produced enough actionable signal
            for follow-up, or when the network appears healthy and no meaningful
            high-priority gaps remain.
          - Mark `insufficient` when important high-priority uncertainties remain.

          Information gain:
          - `high` when the latest round materially improved understanding.
          - `moderate` when it sharpened confidence but did not change the picture
            dramatically.
          - `diminishing` when it mostly repeated known information or left the
            same unresolved gaps in place.

          Gap rules:
          - Merge `prior_gaps` and `suggested_gaps` into a concise deduplicated set.
          - Keep only the highest-value remaining gaps.
          - Prefer gaps that would confirm or refute the most severe or ambiguous
            findings.
          - Return at most 4 gaps.

          Be direct. The point of this task is to decide whether another round is
          worth the cost.
        inputs:
          goal: ${{ inputs.goal }}
          hunt_focus: ${{ inputs.hunt_focus }}
          findings: ${{ tasks.accumulate_findings.outputs.findings }}
          prior_gaps: ${{ inputs.previous_gaps }}
          suggested_gaps: ${{ tasks.probe_round.outputs.suggested_gaps }}
          previous_gap_count: ${{ inputs.previous_gap_count }}
          latest_round_summary: "${{ has(tasks.probe_round.outputs.summary) ? tasks.probe_round.outputs.summary : '' }}"
        outputs:
          completeness: "${{ result.completeness }}"
          information_gain: "${{ result.information_gain }}"
          gaps: "${{ result.gaps }}"
          summary: "${{ result.summary }}"
          schema:
            completeness:
              type: string
              enum: [insufficient, sufficient]
              description: Whether another probe round is materially necessary
            information_gain:
              type: string
              enum: [high, moderate, diminishing]
              description: Whether another round is likely to add substantial new information
            gaps:
              type: array
              items:
                type: object
                properties:
                  question:
                    type: string
                  priority:
                    type: string
                    enum: [high, medium, low]
                  reason:
                    type: string
                required: [question, priority, reason]
              description: Highest-value remaining gaps for another probe round
            summary:
              type: string
              description: Concise stop-or-continue assessment
      log_iteration:
        needs: [probe_round, accumulate_findings, assess_progress]
        run: log-kurtosis-ethereum-bug-iteration
        quality-gate: "${{ has(result.iteration_summary) && size(result.iteration_summary) > 0 }}"
        instructions: |
          Produce a one-line summary of this bug-hunt iteration including:
          new findings count, total findings count, remaining gaps count,
          information gain, and whether findings increased from the previous
          round or stayed flat.
        inputs:
          new_findings_count: "${{ size(tasks.probe_round.outputs.findings) }}"
          findings_count: "${{ size(tasks.accumulate_findings.outputs.findings) }}"
          previous_findings_count: "${{ inputs.previous_findings_count }}"
          remaining_gap_count: "${{ size(tasks.assess_progress.outputs.gaps) }}"
          information_gain: "${{ tasks.assess_progress.outputs.information_gain }}"
          round_summary: "${{ tasks.probe_round.outputs.summary }}"
        outputs:
          iteration_summary: "${{ result.iteration_summary }}"
          schema:
            iteration_summary:
              type: string
              description: One-line summary of this bug-hunt iteration
    outputs:
      findings: "${{ tasks.accumulate_findings.outputs.findings }}"
      gaps: "${{ tasks.assess_progress.outputs.gaps }}"
      gap_count: "${{ size(tasks.assess_progress.outputs.gaps) }}"
      findings_count: "${{ size(tasks.accumulate_findings.outputs.findings) }}"
      prev_findings_count: "${{ inputs.previous_findings_count }}"
      rounds_completed: "${{ inputs.previous_rounds_completed + 1 }}"
      completeness: "${{ tasks.assess_progress.outputs.completeness }}"
      information_gain: "${{ tasks.assess_progress.outputs.information_gain }}"
      summary: "${{ tasks.assess_progress.outputs.summary }}"
      iteration_log: '${{ inputs.previous_log + "\n" + tasks.log_iteration.outputs.iteration_summary }}'
      schema:
        findings:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              severity:
                type: string
                enum: [critical, high, medium, low]
              summary:
                type: string
              affected_scope:
                type: string
              category:
                type: string
              confidence:
                type: number
              status:
                type: string
                enum: [suspected, confirmed, refuted]
              evidence:
                type: array
                items:
                  type: string
              warrants_devnet_debug:
                type: boolean
              next_check:
                type: string
            required: [title, severity, summary, affected_scope, status, evidence]
        gaps:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              priority:
                type: string
                enum: [high, medium, low]
              reason:
                type: string
            required: [question, priority, reason]
        gap_count:
          type: number
        findings_count:
          type: number
        prev_findings_count:
          type: number
        rounds_completed:
          type: number
        completeness:
          type: string
          enum: [insufficient, sufficient]
        information_gain:
          type: string
          enum: [high, moderate, diminishing]
        summary:
          type: string
        iteration_log:
          type: string
  render_report:
    needs: [hunt]
    run: render-kurtosis-ethereum-bug-hunt-report
    quality-gate: "${{ has(result.summary) && size(result.summary) > 0 }}"
    instructions: |-
      Render a concise markdown bug-hunt report from the accumulated
      findings and convergence state.

      Structure:
      1. Title
      2. Hunt objective and network context
      3. Overall assessment
      4. Candidate findings ranked by severity and confidence
      5. Remaining gaps or unresolved questions
      6. Recommended actions
      7. Iteration log

      Writing standards:
      - Ground every finding in concrete evidence from the findings array.
      - Call out confirmed findings separately from suspected ones.
      - If no meaningful bug candidates were found, say so directly.
      - Keep the report operational and easy to scan.

      Write the rendered markdown as the `report` output artifact.
    inputs:
      goal: ${{ inputs.goal }}
      enclave_name: ${{ inputs.enclave_name }}
      hunt_focus: ${{ inputs.hunt_focus }}
      config_summary: ${{ tasks.lifecycle.outputs.config_summary }}
      launch_summary: ${{ tasks.lifecycle.outputs.launch_summary }}
      status_summary: ${{ tasks.lifecycle.outputs.status_summary }}
      findings: ${{ tasks.hunt.outputs.findings }}
      gaps: ${{ tasks.hunt.outputs.gaps }}
      completeness: ${{ tasks.hunt.outputs.completeness }}
      information_gain: ${{ tasks.hunt.outputs.information_gain }}
      iteration_log: ${{ tasks.hunt.outputs.iteration_log }}
      iterations_used: ${{ tasks.hunt.outputs.rounds_completed }}
      converged: "${{ tasks.hunt.loop.converged }}"
    outputs:
      summary: "${{ result.summary }}"
      recommended_actions: "${{ has(result.recommended_actions) ? result.recommended_actions : [] }}"
      schema:
        report:
          kind: artifact
          content-type: text/markdown
          description: Bug hunt report with findings, summaries, and recommended actions
          required: true
        summary:
          type: string
          description: Concise final bug-hunt summary
        recommended_actions:
          type: array
          items:
            type: string
          description: Suggested next actions after the hunt
finally:
  cleanup_enclave:
    if: ${{ inputs.auto_cleanup == true && inputs.launch == true }}
    uses: io.ethpandaops/kurtosis-enclave-cleanup@1.0.0
    inputs:
      enclave_name: ${{ inputs.enclave_name }}
      force: true
    outputs:
      removed: removed
      summary: summary
outputs:
  resolved_network_name: "${{ has(tasks.lifecycle.outputs.resolved_network_name) ? tasks.lifecycle.outputs.resolved_network_name : '' }}"
  resolved_network_group: "${{ has(tasks.lifecycle.outputs.resolved_network_group) ? tasks.lifecycle.outputs.resolved_network_group : '' }}"
  config: ${{ tasks.lifecycle.outputs.config }}
  effective_client_pairs: "${{ has(tasks.lifecycle.outputs.effective_client_pairs) ? tasks.lifecycle.outputs.effective_client_pairs : [] }}"
  fallback_pair_added: "${{ has(tasks.lifecycle.outputs.fallback_pair_added) ? tasks.lifecycle.outputs.fallback_pair_added : false }}"
  launch_summary: ${{ tasks.lifecycle.outputs.launch_summary }}
  report: ${{ tasks.render_report.outputs.report }}
  findings: ${{ tasks.hunt.outputs.findings }}
  remaining_gaps: ${{ tasks.hunt.outputs.gaps }}
  summary: ${{ tasks.render_report.outputs.summary }}
  recommended_actions: ${{ tasks.render_report.outputs.recommended_actions }}
  completeness: ${{ tasks.hunt.outputs.completeness }}
  information_gain: ${{ tasks.hunt.outputs.information_gain }}
  converged: ${{ tasks.hunt.loop.converged }}
  iterations_used: ${{ tasks.hunt.outputs.rounds_completed }}
  iteration_log: ${{ tasks.hunt.outputs.iteration_log }}
