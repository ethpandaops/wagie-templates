name: ethpandaops/kurtosis-ethereum-bug-hunt
version: "1.1"
description: >-
  Use when a workflow needs to launch or inspect a Kurtosis Ethereum network and iteratively hunt for candidate bugs or anomalies. Carries forward typed findings and remaining gaps across rounds until coverage is sufficient or additional probing has diminishing value.
tags: ["kurtosis", "ethereum", "ethpandaops", "bug-hunt", "debugging", "iterative", "type:domain", "flow:loop", "cap:investigation"]
inputs:
  goal:
    type: string
    required: true
    description: Desired network setup or bug-hunting objective
  enclave_name:
    type: string
    required: true
    description: Kurtosis enclave name to create or inspect
  hunt_focus:
    type: string
    default: general
    description: Optional focus such as finality, interop, forks, or service-health
  constraints:
    type: string
    description: Optional implementation constraints
  example_hint:
    type: string
    description: Optional CI example or package feature hint
  package_ref:
    type: string
    default: github.com/ethpandaops/ethereum-package
    description: Kurtosis package reference to run
  config_mode:
    type: string
    default: minimal
    description: Whether to design a sensible minimal config or replicate an existing devnet profile
    schema:
      type: string
      enum: [minimal, devnet-profile]
  devnet_name:
    type: string
    description: Existing devnet or devnet-group name to model when `config_mode` is `devnet-profile`
  client_type:
    type: string
    description: Optional client type to preserve explicitly in the generated config
  image_hint:
    type: string
    description: Optional image or build hint to preserve explicitly in the generated config
  client_pairs:
    type: array
    description: Optional explicit client-pair and image combinations to pass through to config design
    schema:
      type: array
      items:
        type: object
        properties:
          el_type:
            type: string
          cl_type:
            type: string
          vc_type:
            type: string
          el_image:
            type: string
          cl_image:
            type: string
          vc_image:
            type: string
          el_extra_params:
            type: array
            items:
              type: string
          cl_extra_params:
            type: array
            items:
              type: string
          vc_extra_params:
            type: array
            items:
              type: string
          count:
            type: number
        required: [el_type, cl_type]
  max_iterations:
    type: number
    default: 3
    description: Maximum bug-hunt probe rounds before returning the best accumulated result
  launch:
    type: boolean
    default: true
    description: Whether to launch a fresh network before hunting
  auto_cleanup:
    type: boolean
    default: true
    description: Whether to remove the enclave after the hunt
tasks:
  lifecycle:
    uses: ethpandaops/kurtosis-ethereum-network-lifecycle@1
    session: true
    inputs:
      goal: ${{ inputs.goal }}
      enclave_name: ${{ inputs.enclave_name }}
      constraints: "${{ has(inputs.constraints) ? inputs.constraints : '' }}"
      example_hint: "${{ has(inputs.example_hint) ? inputs.example_hint : '' }}"
      package_ref: ${{ inputs.package_ref }}
      config_mode: ${{ inputs.config_mode }}
      devnet_name: "${{ has(inputs.devnet_name) ? inputs.devnet_name : '' }}"
      client_type: "${{ has(inputs.client_type) ? inputs.client_type : '' }}"
      image_hint: "${{ has(inputs.image_hint) ? inputs.image_hint : '' }}"
      client_pairs: "${{ has(inputs.client_pairs) ? inputs.client_pairs : [] }}"
      launch: ${{ inputs.launch }}
      auto_cleanup: false
    outputs:
      resolved_network_name: resolved_network_name
      resolved_network_group: resolved_network_group
      config: config
      config_summary: config_summary
      effective_client_pairs: effective_client_pairs
      fallback_pair_added: fallback_pair_added
      launch_summary: launch_summary
      status_summary: status_summary
      service_names: service_names
      public_endpoints: public_endpoints
  hunt:
    needs: [lifecycle]
    loop:
      max: "${{ inputs.max_iterations }}"
      init:
        findings: "${{ [] }}"
        gaps: "${{ [] }}"
        gap_count: "${{ 0 }}"
        findings_count: "${{ 0 }}"
        prev_findings_count: "${{ 999 }}"
        rounds_completed: "${{ 0 }}"
        completeness: "${{ 'insufficient' }}"
        information_gain: "${{ 'high' }}"
        iteration_log: "${{ '' }}"
      until: "${{ loop.completeness == 'sufficient' || loop.information_gain == 'diminishing' }}"
      on-max-exhausted: continue
    inputs:
      enclave_name: ${{ inputs.enclave_name }}
      goal: ${{ inputs.goal }}
      hunt_focus: ${{ inputs.hunt_focus }}
      config_summary: ${{ tasks.lifecycle.outputs.config_summary }}
      launch_summary: ${{ tasks.lifecycle.outputs.launch_summary }}
      status_summary: ${{ tasks.lifecycle.outputs.status_summary }}
      service_names: ${{ tasks.lifecycle.outputs.service_names }}
      public_endpoints: ${{ tasks.lifecycle.outputs.public_endpoints }}
      previous_findings: "${{ loop.findings }}"
      previous_gaps: "${{ loop.gaps }}"
      previous_gap_count: "${{ loop.gap_count }}"
      previous_findings_count: "${{ loop.findings_count }}"
      previous_rounds_completed: "${{ loop.rounds_completed }}"
      previous_log: "${{ loop.iteration_log }}"
    tasks:
      probe_round:
        uses: ethpandaops/kurtosis-ethereum-bug-round@1
        inputs:
          enclave_name: ${{ inputs.enclave_name }}
          goal: ${{ inputs.goal }}
          hunt_focus: ${{ inputs.hunt_focus }}
          config_summary: ${{ inputs.config_summary }}
          launch_summary: ${{ inputs.launch_summary }}
          status_summary: ${{ inputs.status_summary }}
          service_names: ${{ inputs.service_names }}
          public_endpoints: ${{ inputs.public_endpoints }}
          previous_findings: ${{ inputs.previous_findings }}
          gaps: ${{ inputs.previous_gaps }}
        outputs:
          findings: findings
          summary: summary
          suggested_gaps: suggested_gaps
      accumulate_findings:
        needs: [probe_round]
        worker: {match: "'reasoning' in capabilities"}
        run: accumulate-kurtosis-ethereum-bug-findings
        quality-gate: "${{ has(result.findings) }}"
        instructions: |
          Merge prior bug-hunt findings with the latest probe round.

          Rules:
          - Preserve prior findings unless the new round materially upgrades
            or refutes them.
          - Do not duplicate the same anomaly under slightly different wording.
          - Prefer the strongest available severity, confidence, and evidence.
          - When new evidence strengthens an existing finding, update that
            finding instead of appending a duplicate.
          - When a prior finding is refuted, keep it but mark status as
            `refuted` and explain why in the summary or evidence.
          - Keep evidence concrete and attributable to specific tool outputs.
          - When in doubt, preserve information rather than dropping it.
        inputs:
          previous_findings: "${{ inputs.previous_findings }}"
          new_findings: "${{ tasks.probe_round.outputs.findings }}"
        outputs:
          findings: "${{ result.findings }}"
          schema:
            findings:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                  severity:
                    type: string
                    enum: [critical, high, medium, low]
                  summary:
                    type: string
                  affected_scope:
                    type: string
                  category:
                    type: string
                  confidence:
                    type: number
                  status:
                    type: string
                    enum: [suspected, confirmed, refuted]
                  evidence:
                    type: array
                    items:
                      type: string
                  warrants_devnet_debug:
                    type: boolean
                  next_check:
                    type: string
                required: [title, severity, summary, affected_scope, status, evidence]
              description: Accumulated Kurtosis Ethereum bug-hunt findings
      assess_progress:
        needs: [probe_round, accumulate_findings]
        uses: ethpandaops/kurtosis-ethereum-bug-assess@1
        inputs:
          goal: ${{ inputs.goal }}
          hunt_focus: ${{ inputs.hunt_focus }}
          findings: ${{ tasks.accumulate_findings.outputs.findings }}
          prior_gaps: ${{ inputs.previous_gaps }}
          suggested_gaps: ${{ tasks.probe_round.outputs.suggested_gaps }}
          previous_gap_count: ${{ inputs.previous_gap_count }}
          latest_round_summary: ${{ tasks.probe_round.outputs.summary }}
        outputs:
          completeness: completeness
          information_gain: information_gain
          gaps: gaps
          summary: summary
      log_iteration:
        needs: [probe_round, accumulate_findings, assess_progress]
        run: log-kurtosis-ethereum-bug-iteration
        quality-gate: "${{ has(result.iteration_summary) && size(result.iteration_summary) > 0 }}"
        instructions: |
          Produce a one-line summary of this bug-hunt iteration including:
          new findings count, total findings count, remaining gaps count,
          information gain, and whether findings increased from the previous
          round or stayed flat.
        inputs:
          new_findings_count: "${{ size(tasks.probe_round.outputs.findings) }}"
          findings_count: "${{ size(tasks.accumulate_findings.outputs.findings) }}"
          previous_findings_count: "${{ inputs.previous_findings_count }}"
          remaining_gap_count: "${{ size(tasks.assess_progress.outputs.gaps) }}"
          information_gain: "${{ tasks.assess_progress.outputs.information_gain }}"
          round_summary: "${{ tasks.probe_round.outputs.summary }}"
        outputs:
          iteration_summary: "${{ result.iteration_summary }}"
          schema:
            iteration_summary:
              type: string
              description: One-line summary of this bug-hunt iteration
    outputs:
      findings: "${{ tasks.accumulate_findings.outputs.findings }}"
      gaps: "${{ tasks.assess_progress.outputs.gaps }}"
      gap_count: "${{ size(tasks.assess_progress.outputs.gaps) }}"
      findings_count: "${{ size(tasks.accumulate_findings.outputs.findings) }}"
      prev_findings_count: "${{ inputs.previous_findings_count }}"
      rounds_completed: "${{ inputs.previous_rounds_completed + 1 }}"
      completeness: "${{ tasks.assess_progress.outputs.completeness }}"
      information_gain: "${{ tasks.assess_progress.outputs.information_gain }}"
      summary: "${{ tasks.assess_progress.outputs.summary }}"
      iteration_log: "${{ inputs.previous_log + '\n' + tasks.log_iteration.outputs.iteration_summary }}"
      schema:
        findings:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              severity:
                type: string
                enum: [critical, high, medium, low]
              summary:
                type: string
              affected_scope:
                type: string
              category:
                type: string
              confidence:
                type: number
              status:
                type: string
                enum: [suspected, confirmed, refuted]
              evidence:
                type: array
                items:
                  type: string
              warrants_devnet_debug:
                type: boolean
              next_check:
                type: string
            required: [title, severity, summary, affected_scope, status, evidence]
        gaps:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              priority:
                type: string
                enum: [high, medium, low]
              reason:
                type: string
            required: [question, priority, reason]
        gap_count:
          type: number
        findings_count:
          type: number
        prev_findings_count:
          type: number
        rounds_completed:
          type: number
        completeness:
          type: string
          enum: [insufficient, sufficient]
        information_gain:
          type: string
          enum: [high, moderate, diminishing]
        summary:
          type: string
        iteration_log:
          type: string
  render_report:
    needs: [hunt]
    worker: {match: "'writing' in skills"}
    run: render-kurtosis-ethereum-bug-hunt-report
    quality-gate: "${{ has(result.report) && size(result.report) > 0 && has(result.summary) && size(result.summary) > 0 }}"
    instructions: |-
      Render a concise markdown bug-hunt report from the accumulated
      findings and convergence state.

      Structure:
      1. Title
      2. Hunt objective and network context
      3. Overall assessment
      4. Candidate findings ranked by severity and confidence
      5. Remaining gaps or unresolved questions
      6. Recommended actions
      7. Iteration log

      Writing standards:
      - Ground every finding in concrete evidence from the findings array.
      - Call out confirmed findings separately from suspected ones.
      - If no meaningful bug candidates were found, say so directly.
      - Keep the report operational and easy to scan.

      Write the rendered markdown as the `report` output artifact.
    inputs:
      goal: ${{ inputs.goal }}
      enclave_name: ${{ inputs.enclave_name }}
      hunt_focus: ${{ inputs.hunt_focus }}
      config_summary: ${{ tasks.lifecycle.outputs.config_summary }}
      launch_summary: ${{ tasks.lifecycle.outputs.launch_summary }}
      status_summary: ${{ tasks.lifecycle.outputs.status_summary }}
      findings: ${{ tasks.hunt.outputs.findings }}
      gaps: ${{ tasks.hunt.outputs.gaps }}
      completeness: ${{ tasks.hunt.outputs.completeness }}
      information_gain: ${{ tasks.hunt.outputs.information_gain }}
      iteration_log: ${{ tasks.hunt.outputs.iteration_log }}
      iterations_used: ${{ tasks.hunt.outputs.rounds_completed }}
      converged: "${{ tasks.hunt.loop.converged }}"
    outputs:
      report: "${{ result.report }}"
      summary: "${{ result.summary }}"
      recommended_actions: "${{ has(result.recommended_actions) ? result.recommended_actions : [] }}"
      schema:
        report:
          kind: artifact
          content-type: text/markdown
          description: Bug hunt report with findings, summaries, and recommended actions
          required: true
        summary:
          type: string
          description: Concise final bug-hunt summary
        recommended_actions:
          type: array
          items:
            type: string
          description: Suggested next actions after the hunt
finally:
  cleanup_enclave:
    if: ${{ inputs.auto_cleanup == true && inputs.launch == true }}
    uses: ethpandaops/kurtosis-enclave-cleanup@1
    inputs:
      enclave_name: ${{ inputs.enclave_name }}
      force: true
    outputs:
      removed: removed
      summary: summary
outputs:
  resolved_network_name: "${{ has(tasks.lifecycle.outputs.resolved_network_name) ? tasks.lifecycle.outputs.resolved_network_name : '' }}"
  resolved_network_group: "${{ has(tasks.lifecycle.outputs.resolved_network_group) ? tasks.lifecycle.outputs.resolved_network_group : '' }}"
  config: ${{ tasks.lifecycle.outputs.config }}
  effective_client_pairs: "${{ has(tasks.lifecycle.outputs.effective_client_pairs) ? tasks.lifecycle.outputs.effective_client_pairs : [] }}"
  fallback_pair_added: "${{ has(tasks.lifecycle.outputs.fallback_pair_added) ? tasks.lifecycle.outputs.fallback_pair_added : false }}"
  launch_summary: ${{ tasks.lifecycle.outputs.launch_summary }}
  report: ${{ tasks.render_report.outputs.report }}
  findings: ${{ tasks.hunt.outputs.findings }}
  remaining_gaps: ${{ tasks.hunt.outputs.gaps }}
  summary: ${{ tasks.render_report.outputs.summary }}
  recommended_actions: ${{ tasks.render_report.outputs.recommended_actions }}
  completeness: ${{ tasks.hunt.outputs.completeness }}
  information_gain: ${{ tasks.hunt.outputs.information_gain }}
  converged: ${{ tasks.hunt.loop.converged }}
  iterations_used: ${{ tasks.hunt.outputs.rounds_completed }}
  iteration_log: ${{ tasks.hunt.outputs.iteration_log }}
