name: ethpandaops/devnet-debug
version: "1.0"
description: >-
  Use when an Ethereum devnet incident needs structured diagnosis; gathers network context, builds a baseline, investigates likely failure modes, validates hypotheses, and returns an operator-ready debug summary.
tags: ["domain", "devnet", "ethereum", "ethpandaops", "debugging", "incident", "observability", "type:domain", "flow:compose", "cap:reasoning", "cap:tool-use"]
inputs:
  network:
    type: string
    required: true
    description: Target devnet to investigate
  problem_statement:
    type: string
    required: true
    description: User-reported symptom or debugging goal
  timeframe:
    type: string
    default: past 1 hour
    description: Requested investigation timeframe or epoch range
  focus:
    type: string
    default: general
    description: Optional focus such as split, offline-nodes, finality-delay, logs, or rpc-validation
  suspected_instances:
    type: array
    default: []
    description: Specific node instances to prioritize
    schema:
      type: array
      items:
        type: string
tasks:
  context:
    uses: ethpandaops/devnet-context@1
    inputs:
      network: ${{ inputs.network }}
      timeframe: ${{ inputs.timeframe }}
      include_ci_surfaces: true
    outputs:
      network_name: network_name
      network_group: network_group
      investigation_timeframe: investigation_timeframe
      clusters: clusters
      instances: instances
      data_profile: data_profile
      summary: summary
      notes_url: notes_url
      notes_summary: notes_summary
      notes_highlights: notes_highlights
  baseline:
    needs: [context]
    uses: ethpandaops/devnet-baseline@1
    inputs:
      problem_statement: ${{ inputs.problem_statement }}
      focus: ${{ inputs.focus }}
      network_name: ${{ tasks.context.outputs.network_name }}
      investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
      instances: "${{ size(inputs.suspected_instances) > 0 ? inputs.suspected_instances : tasks.context.outputs.instances }}"
      data_profile: ${{ tasks.context.outputs.data_profile }}
      context_summary: ${{ tasks.context.outputs.summary }}
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.context.outputs.notes_highlights) ? tasks.context.outputs.notes_highlights : [] }}"
    outputs:
      suspected_issue_type: suspected_issue_type
      issue_type_confidence: issue_type_confidence
      issue_type_reasoning: issue_type_reasoning
      baseline_summary: baseline_summary
      affected_instances: affected_instances
      baseline_evidence: baseline_evidence
      instance_reports: instance_reports
  assess_finality:
    needs: [context, baseline]
    if: ${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' }}
    uses: ethpandaops/devnet-finality-assessment@1
    inputs:
      network_name: ${{ tasks.context.outputs.network_name }}
      investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
      threshold_epochs: 4
      instances: ${{ tasks.context.outputs.instances }}
      data_profile: ${{ tasks.context.outputs.data_profile }}
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.context.outputs.notes_highlights) ? tasks.context.outputs.notes_highlights : [] }}"
    outputs:
      finality_status: finality_status
      finality_status_confidence: finality_status_confidence
      finality_status_reasoning: finality_status_reasoning
      finality_summary: finality_summary
      epochs_behind: epochs_behind
      evidence: evidence
  analyze_finality_causes:
    needs: [context, baseline, assess_finality]
    if: ${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' }}
    worker: {match: "'tool-use' in capabilities && 'reasoning' in skills"}
    run: analyze-finality-causes
    retry:
      max: 1
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 10s
        factor: 2
        max-delay: 30s
        jitter: true
      timeout: 5m
    quality-gate: "${{ has(result.likely_causes) && size(result.likely_causes) > 0 && has(result.recommended_actions) && size(result.recommended_actions) > 0 }}"
    instructions: |-
      Analyze the most likely causes of the finality problem.

      Use the `panda` binary as the primary tool surface for this task.

      Finality thresholds:
      - Finality requires >66.7% (2/3) of stake attesting.
      - Normal finality lag: 2 epochs.
      - Concern: >4 epochs without finality.
      - Critical: >8 epochs without finality.

      Consider these cause categories:
      - Low participation: too few validators attesting to cross the 2/3 threshold.
      - Offline or isolated nodes: nodes not participating due to crash, network partition, or misconfiguration.
      - Network split or fork disagreement: validators attesting on different forks, diluting effective participation.
      - Client-specific bug: a single client type failing causes all its validators to miss.
      - Execution-side issue affecting consensus progress: EL errors blocking CL from processing payloads.
      - Transient condition that is already recovering: participation improving epoch-over-epoch.

      Use available CL metrics first, then logs, then direct node validation when needed.
      Return likely causes ordered from strongest to weakest, plus practical operator actions.
      Include concrete instance-level findings using full instance names when identifiable.
      Include concrete log or RPC evidence examples when they materially support the conclusion.
    inputs:
      network_name: ${{ tasks.context.outputs.network_name }}
      investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
      data_profile: ${{ tasks.context.outputs.data_profile }}
      finality_status: ${{ tasks.assess_finality.outputs.finality_status }}
      finality_summary: ${{ tasks.assess_finality.outputs.finality_summary }}
      epochs_behind: ${{ tasks.assess_finality.outputs.epochs_behind }}
      evidence: ${{ tasks.assess_finality.outputs.evidence }}
      affected_instances: "${{ has(tasks.baseline.outputs.affected_instances) ? tasks.baseline.outputs.affected_instances : [] }}"
      baseline_instance_reports: "${{ has(tasks.baseline.outputs.instance_reports) ? tasks.baseline.outputs.instance_reports : [] }}"
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.context.outputs.notes_highlights) ? tasks.context.outputs.notes_highlights : [] }}"
    outputs:
      likely_causes: likely_causes
      recommended_actions: recommended_actions
      summary: summary
      instance_reports: "${{ has(result.instance_reports) ? result.instance_reports : [] }}"
      log_examples: "${{ has(result.log_examples) ? result.log_examples : [] }}"
      schema:
        likely_causes:
          type: array
          items:
            type: string
          description: Ordered likely causes of the finality issue
        recommended_actions:
          type: array
          items:
            type: string
          description: Practical next actions for operators
        summary:
          type: string
          description: Finality-incident summary
        instance_reports:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              role:
                type: string
              client:
                type: string
              status:
                type: string
              summary:
                type: string
              evidence:
                type: array
                items:
                  type: string
              suggested_actions:
                type: array
                items:
                  type: string
            required: [instance_name, summary]
          description: Instance-level findings using full resolved instance names
        log_examples:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              source:
                type: string
              excerpt:
                type: string
              significance:
                type: string
            required: [source, excerpt, significance]
          description: Concrete log or RPC evidence examples supporting the finality diagnosis
  investigate_generic:
    needs: [context, baseline]
    if: ${{ tasks.baseline.outputs.suspected_issue_type != 'finality-delay' }}
    worker: {match: "'tool-use' in capabilities && 'reasoning' in skills"}
    run: investigate-devnet-incident
    retry:
      max: 1
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 10s
        factor: 2
        max-delay: 30s
        jitter: true
      timeout: 5m
    quality-gate: "${{ has(result.findings_summary) && size(result.findings_summary) > 0 && has(result.suspected_root_cause) && size(result.suspected_root_cause) > 0 }}"
    instructions: |-
      Investigate the devnet issue deeply using the baseline and the available surfaces.

      Use the `panda` binary as the primary tool surface for this task.

      CL-first investigation priority: the network moves forward via the CL — block proposals, attestations, and finality are all CL concerns. Most devnet issues originate at the CL level. Always investigate CL before EL.

      Investigation guidance:
      - For network-split, compare fork views, divergence timing, and client or instance clustering. Identify the divergence slot/epoch. Examine the first block where forks diverge — what is special about that block?
      - For offline-nodes, confirm whether nodes are actually unreachable, syncing, isolated, or merely absent from logs.
      - For finality-delay, correlate participation health, missed slots, and checkpoint disagreement.
      - For client-bug or execution-issue, compare CL and EL evidence and look for shared patterns by client type.

      Hypothesis testing:
      - Did the problem start at a specific slot/epoch correlating with a config change, fork boundary, or deployment?
      - Are affected nodes in the same region or infrastructure?
      - Does the error message match a known client issue?

      Log investigation (when Loki is available):
      - Always use label filters in LogQL queries; unfiltered queries may time out.
      - Query patterns depend on the Loki schema (from `data_profile.loki_schema`):
        * **ethpandaops** (remote): `{testnet="<network>", ethereum_cl="<cl_type>", instance="<instance_name>"} |~ "(?i)(CRIT|ERR)" | json | line_format "{{.message}}"`. Message field fallback: if `{{.message}}` is empty, try `{{.log}}` or `{{.msg}}`. As a last resort, drop `| json | line_format` and use raw lines.
        * **kurtosis** (local): stream labels (`job`, `service_name`) are shared across all services and cannot distinguish nodes. Use `| json` to parse, then filter on `kurtosis_service_name`. The log content is always in the `log` field. Example: `{job="kurtosis"} | json | kurtosis_service_name="cl-1-teku-geth" | log=~"(?i)(CRIT|ERR)" | line_format "{{.log}}"`. For broader queries: `{job="kurtosis"} | json | kurtosis_service_name=~"cl-.*" | log=~"(?i)(CRIT|ERR)" | line_format "{{.log}}"`.
      - Log fallback when Loki is unavailable in local mode: use `kurtosis service logs <enclave> <service>` with `--regex-match "<pattern>"` for regex filtering, `--match "<string>"` for literal match, `-n <count>` for line limit, `-v` to invert filter.
      - Log level escalation: start with CRIT/ERR logs from problematic CL nodes, then WARN, then INFO. Use DEBUG only as a last resort.
      - EL escalation criteria: only inspect EL logs if CL logs show engine API errors, payload validation failures, or execution-related issues.
      - CL/EL diagnostic matrix:
        * CL errors only → consensus issue (investigate CL)
        * CL engine API errors + EL errors → execution issue (investigate EL)
        * CL clean + EL errors → EL struggling but not the primary cause
        * Both layers erroring → shared dependency or cascade failure
      - No-logs signal: if Loki returns no logs at all for a node, that is itself a signal. Verify via direct node query (ethnode for remote, localhost port for local) — if the node responds, it runs but is not logging; if unreachable, it is down.
      - Correlate log timestamps against Dora timeline (when Dora data is available): when did errors start relative to missed slots or participation drops? Do errors correlate with specific epochs or slots? Are errors from one client type or spread across multiple?

      RPC validation (when ethnode or direct node access is available):
      - Network split: compare head slots, head roots, and finality checkpoints across fork groups.
      - Node stuck: check sync status and peer counts.
      - Hypothesis testing: query the specific nodes implicated by the leading hypothesis.
      - For local Kurtosis: query CL nodes via their localhost beacon API ports and EL nodes via their localhost JSON-RPC ports directly.

      Root cause classification:
      - By scope: single node, client-specific, network split, or widespread.
      - By layer: CL vs EL.

      Use full resolved instance names in findings, not shortened labels.
      Include concrete log excerpts or RPC observations when they materially support the diagnosis.
      Prefer evidence that tells an operator exactly which instance, client, or subsystem to inspect next.
    inputs:
      problem_statement: ${{ inputs.problem_statement }}
      focus: ${{ inputs.focus }}
      network_name: ${{ tasks.context.outputs.network_name }}
      investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
      data_profile: ${{ tasks.context.outputs.data_profile }}
      suspected_issue_type: ${{ tasks.baseline.outputs.suspected_issue_type }}
      baseline_summary: ${{ tasks.baseline.outputs.baseline_summary }}
      affected_instances: ${{ tasks.baseline.outputs.affected_instances }}
      baseline_evidence: ${{ tasks.baseline.outputs.baseline_evidence }}
      instance_reports: "${{ has(tasks.baseline.outputs.instance_reports) ? tasks.baseline.outputs.instance_reports : [] }}"
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.context.outputs.notes_highlights) ? tasks.context.outputs.notes_highlights : [] }}"
    outputs:
      suspected_root_cause: ${{ result.suspected_root_cause }}
      findings_summary: ${{ result.findings_summary }}
      evidence: "${{ has(result.evidence) ? result.evidence : [] }}"
      recommended_actions: "${{ has(result.recommended_actions) ? result.recommended_actions : [] }}"
      instance_reports: "${{ has(result.instance_reports) ? result.instance_reports : [] }}"
      log_examples: "${{ has(result.log_examples) ? result.log_examples : [] }}"
      schema:
        suspected_root_cause:
          type: string
          description: Most likely root cause hypothesis
        findings_summary:
          type: string
          description: Summary of the key findings
        evidence:
          type: array
          items:
            type: string
          description: Concrete observations supporting the hypothesis
        recommended_actions:
          type: array
          items:
            type: string
          description: Practical next actions for operators
        instance_reports:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              role:
                type: string
              client:
                type: string
              status:
                type: string
              summary:
                type: string
              evidence:
                type: array
                items:
                  type: string
              suggested_actions:
                type: array
                items:
                  type: string
            required: [instance_name, summary]
          description: Instance-level findings using full resolved instance names
        log_examples:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              source:
                type: string
              excerpt:
                type: string
              significance:
                type: string
            required: [source, excerpt, significance]
          description: Concrete log or RPC evidence examples supporting the diagnosis
  conclude:
    needs: [context, baseline, assess_finality, analyze_finality_causes, investigate_generic]
    worker: {match: "'reasoning' in skills"}
    run: summarize-devnet-debug
    retry:
      max: 1
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 5s
        factor: 2
        max-delay: 20s
        jitter: true
      timeout: 2m
    quality-gate: "${{ has(result.summary) && size(result.summary) > 0 }}"
    instructions: |-
      Produce an operator-ready devnet debug summary.

      Structure:
      1. Symptoms: what is happening now (observable behavior).
      2. Root cause: most likely root cause with the concrete evidence that supports it.
      3. Affected scope: which nodes, clients, or forks are involved (use full instance names).
      4. Dora links: include links to relevant epochs, slots, or validators when Dora data was available.
      5. Suggested remediation: practical next steps — restart nodes, inspect a specific client, escalate to a client team, or continue observing.

      Be direct and concise. This output should help a principal decide the immediate next action.
    inputs:
      network_name: ${{ tasks.context.outputs.network_name }}
      problem_statement: ${{ inputs.problem_statement }}
      context_summary: ${{ tasks.context.outputs.summary }}
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      baseline_summary: ${{ tasks.baseline.outputs.baseline_summary }}
      suspected_issue_type: ${{ tasks.baseline.outputs.suspected_issue_type }}
      findings_summary: "${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' ? tasks.analyze_finality_causes.outputs.summary : tasks.investigate_generic.outputs.findings_summary }}"
      suspected_root_cause: "${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' ? (size(tasks.analyze_finality_causes.outputs.likely_causes) > 0 ? tasks.analyze_finality_causes.outputs.likely_causes[0] : 'finality degradation') : tasks.investigate_generic.outputs.suspected_root_cause }}"
      evidence: "${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' ? tasks.assess_finality.outputs.evidence : tasks.investigate_generic.outputs.evidence }}"
      recommended_actions: "${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' ? tasks.analyze_finality_causes.outputs.recommended_actions : tasks.investigate_generic.outputs.recommended_actions }}"
    outputs:
      summary: ${{ result.summary }}
      severity: "${{ has(result.severity) ? result.severity : 'medium' }}"
      schema:
        summary:
          type: string
          description: Final operator-ready devnet debug summary
        severity:
          type: string
          description: Overall incident severity estimate
          enum: [low, medium, high, critical]
outputs:
  network_name: ${{ tasks.context.outputs.network_name }}
  investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
  context_summary: ${{ tasks.context.outputs.summary }}
  notes_url: "${{ has(tasks.context.outputs.notes_url) ? tasks.context.outputs.notes_url : '' }}"
  issue_type: ${{ tasks.baseline.outputs.suspected_issue_type }}
  issue_type_confidence: ${{ tasks.baseline.outputs.issue_type_confidence }}
  baseline_summary: ${{ tasks.baseline.outputs.baseline_summary }}
  affected_instances: ${{ tasks.baseline.outputs.affected_instances }}
  root_cause: "${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' ? (size(tasks.analyze_finality_causes.outputs.likely_causes) > 0 ? tasks.analyze_finality_causes.outputs.likely_causes[0] : 'finality degradation') : tasks.investigate_generic.outputs.suspected_root_cause }}"
  evidence: "${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' ? tasks.assess_finality.outputs.evidence : tasks.investigate_generic.outputs.evidence }}"
  instance_reports: "${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' ? (size(tasks.analyze_finality_causes.outputs.instance_reports) > 0 ? tasks.analyze_finality_causes.outputs.instance_reports : tasks.baseline.outputs.instance_reports) : tasks.investigate_generic.outputs.instance_reports }}"
  log_examples: "${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' ? tasks.analyze_finality_causes.outputs.log_examples : tasks.investigate_generic.outputs.log_examples }}"
  recommended_actions: "${{ tasks.baseline.outputs.suspected_issue_type == 'finality-delay' ? tasks.analyze_finality_causes.outputs.recommended_actions : tasks.investigate_generic.outputs.recommended_actions }}"
  severity: ${{ tasks.conclude.outputs.severity }}
  summary: ${{ tasks.conclude.outputs.summary }}
