name: ethpandaops/devnet-debug
version: "1.0"
description: >-
  Use when an Ethereum devnet needs structured diagnosis or a status report; gathers network context, builds a health baseline, investigates issues if found, validates findings, and returns an operator-ready summary. Works for both active incidents and routine status checks.
tags: ["devnet", "ethereum", "ethpandaops", "debugging", "status", "health", "incident", "observability"]
inputs:
  network:
    type: string
    required: true
    description: Target devnet to investigate
  problem_statement:
    type: string
    default: ""
    description: User-reported symptom or debugging goal (empty for routine status checks)
  timeframe:
    type: string
    default: past 1 hour
    description: Requested investigation timeframe or epoch range
  focus:
    type: string
    default: general
    description: Optional focus such as split, offline-nodes, finality-delay, logs, or rpc-validation
  suspected_instances:
    type: array
    default: []
    description: Specific node instances to prioritize during baseline analysis
    schema:
      type: array
      items:
        type: string
tasks:
  context:
    uses: ethpandaops/devnet-context@1
    inputs:
      network: ${{ inputs.network }}
      timeframe: ${{ inputs.timeframe }}
      include_ci_surfaces: true
    outputs:
      network_name: network_name
      network_group: network_group
      investigation_timeframe: investigation_timeframe
      instances: instances
      data_profile: data_profile
      summary: summary
      notes_url: notes_url
      notes_summary: notes_summary
      notes_highlights: notes_highlights
      notes_assumptions: notes_assumptions
  baseline:
    needs: [context]
    uses: ethpandaops/devnet-baseline@1
    inputs:
      problem_statement: ${{ inputs.problem_statement }}
      focus: ${{ inputs.focus }}
      network_name: ${{ tasks.context.outputs.network_name }}
      investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
      instances: "${{ size(inputs.suspected_instances) > 0 ? inputs.suspected_instances : tasks.context.outputs.instances }}"
      data_profile: ${{ tasks.context.outputs.data_profile }}
      context_summary: ${{ tasks.context.outputs.summary }}
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.context.outputs.notes_highlights) ? tasks.context.outputs.notes_highlights : [] }}"
      notes_assumptions: "${{ has(tasks.context.outputs.notes_assumptions) ? tasks.context.outputs.notes_assumptions : [] }}"
    outputs:
      suspected_issue_type: suspected_issue_type
      issue_type_confidence: issue_type_confidence
      issue_type_reasoning: issue_type_reasoning
      baseline_summary: baseline_summary
      affected_instances: affected_instances
      baseline_evidence: baseline_evidence
      instance_reports: instance_reports
      report: report
      fork_data: fork_data
      validator_activity: validator_activity
      epoch_snapshots: epoch_snapshots
      node_sync_status: node_sync_status
      has_finality_issues: has_finality_issues
  assess_finality:
    needs: [context, baseline]
    if: ${{ tasks.baseline.outputs.has_finality_issues == true }}
    uses: ethpandaops/devnet-finality-assessment@1
    inputs:
      network_name: ${{ tasks.context.outputs.network_name }}
      investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
      threshold_epochs: 4
      instances: "${{ size(inputs.suspected_instances) > 0 ? inputs.suspected_instances : tasks.context.outputs.instances }}"
      data_profile: ${{ tasks.context.outputs.data_profile }}
      context_summary: ${{ tasks.context.outputs.summary }}
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.context.outputs.notes_highlights) ? tasks.context.outputs.notes_highlights : [] }}"
    outputs:
      finality_status: finality_status
      finality_status_confidence: finality_status_confidence
      finality_status_reasoning: finality_status_reasoning
      finality_summary: finality_summary
      epochs_behind: epochs_behind
      finality_broke_epoch: finality_broke_epoch
      participation_trend: participation_trend
      evidence: evidence
      report: report
      finality_checkpoints: finality_checkpoints
      participation_by_epoch: participation_by_epoch
  analyze_finality_causes:
    needs: [context, baseline, assess_finality]
    if: ${{ tasks.baseline.outputs.has_finality_issues == true }}
    selection: {capabilities: [reasoning, tool-use]}
    run: analyze-finality-causes
    retry:
      max: 1
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 10s
        factor: 2
        max-delay: 30s
        jitter: true
      timeout: 5m
    quality-gate: "${{ has(result.likely_causes) && size(result.likely_causes) > 0 && has(result.primary_cause) && size(result.primary_cause) > 0 && has(result.recommended_actions) && size(result.recommended_actions) > 0 }}"
    instructions: |-
      Analyze the most likely causes of the finality problem. You have finality assessment
      data and baseline observations — use them to form and test hypotheses.

      Use the `panda` CLI. For Python API calls, use heredoc stdin:
      ```
      panda execute <<'PYEOF'
      <python code here>
      PYEOF
      ```

      ## Approach

      1. **Hypothesize** — From the finality evidence, rank the most likely causes. State
         what evidence would confirm or refute each.
      2. **Investigate** — For each hypothesis (strongest first), gather targeted evidence.
         Stop when a hypothesis is confirmed or clearly refuted.
      3. **Correlate** — Check for temporal correlation, client clustering, and signal
         agreement across data sources.
      4. **Conclude** — State likely causes with supporting evidence, plus practical actions.
         Set `primary_cause` to the single most likely cause.

      ## Available tools

      - Participation: `panda dora overview/epoch` (start from head_epoch - 1).
      - Offline attesters: Dora `/api/v1/validators/activity` via `panda execute` heredoc.
      - Node health: `panda ethnode syncing/finality`.
      - Logs: `panda loki query <data_profile.loki_datasource> '{network="<network>", instance="<instance>"} |~ "(?i)(CRIT|ERR)"' --limit 100`
      - Runbooks: `panda search runbooks "finality"`.

      ## Cause categories

      - Low participation / offline nodes / network split / client-specific bug
      - Attestation processing bug (CPU spikes, attestation drops on one client type)
      - Execution-side issue (EL errors blocking CL payload processing)
      - Transient condition already recovering (participation trending up)
      - Recent change correlation (client update, config change, fork activation)

      ## Evidence and uncertainty

      Ground every finding in a specific tool output. If evidence is unavailable or ambiguous,
      say so rather than inferring. If you cannot definitively determine the cause, rank the
      candidates by likelihood and note what additional evidence would resolve the ambiguity.

      Use full resolved instance names. Include concrete log or RPC excerpts when they
      materially support the conclusion.
    inputs:
      network_name: ${{ tasks.context.outputs.network_name }}
      investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
      data_profile: ${{ tasks.context.outputs.data_profile }}
      finality_status: ${{ tasks.assess_finality.outputs.finality_status }}
      finality_summary: ${{ tasks.assess_finality.outputs.finality_summary }}
      epochs_behind: ${{ tasks.assess_finality.outputs.epochs_behind }}
      finality_broke_epoch: "${{ has(tasks.assess_finality.outputs.finality_broke_epoch) ? tasks.assess_finality.outputs.finality_broke_epoch : -1 }}"
      participation_trend: "${{ has(tasks.assess_finality.outputs.participation_trend) ? tasks.assess_finality.outputs.participation_trend : 'unknown' }}"
      evidence: ${{ tasks.assess_finality.outputs.evidence }}
      finality_checkpoints: "${{ has(tasks.assess_finality.outputs.finality_checkpoints) ? tasks.assess_finality.outputs.finality_checkpoints : [] }}"
      participation_by_epoch: "${{ has(tasks.assess_finality.outputs.participation_by_epoch) ? tasks.assess_finality.outputs.participation_by_epoch : [] }}"
      affected_instances: "${{ has(tasks.baseline.outputs.affected_instances) ? tasks.baseline.outputs.affected_instances : [] }}"
      baseline_instance_reports: "${{ has(tasks.baseline.outputs.instance_reports) ? tasks.baseline.outputs.instance_reports : [] }}"
      fork_data: "${{ has(tasks.baseline.outputs.fork_data) ? tasks.baseline.outputs.fork_data : {} }}"
      validator_activity: "${{ has(tasks.baseline.outputs.validator_activity) ? tasks.baseline.outputs.validator_activity : [] }}"
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.context.outputs.notes_highlights) ? tasks.context.outputs.notes_highlights : [] }}"
    outputs:
      likely_causes: likely_causes
      primary_cause: "${{ has(result.primary_cause) ? result.primary_cause : 'finality degradation' }}"
      evidence: "${{ has(result.evidence) ? result.evidence : [] }}"
      recommended_actions: recommended_actions
      summary: summary
      instance_reports: "${{ has(result.instance_reports) ? result.instance_reports : [] }}"
      log_examples: "${{ has(result.log_examples) ? result.log_examples : [] }}"
      schema:
        likely_causes:
          type: array
          items:
            type: string
          description: Ordered likely causes of the finality issue
        primary_cause:
          type: string
          description: Single most likely cause (first element of likely_causes)
        evidence:
          type: array
          items:
            type: string
          description: Concrete observations supporting the finality root-cause analysis
        recommended_actions:
          type: array
          items:
            type: string
          description: Practical next actions for operators
        summary:
          type: string
          description: Finality-incident summary
        instance_reports:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              role:
                type: string
              client:
                type: string
              status:
                type: string
              summary:
                type: string
              evidence:
                type: array
                items:
                  type: string
              suggested_actions:
                type: array
                items:
                  type: string
            required: [instance_name, summary]
          description: Instance-level findings using full resolved instance names
        log_examples:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              source:
                type: string
              excerpt:
                type: string
              significance:
                type: string
            required: [source, excerpt, significance]
          description: Concrete log or RPC evidence examples supporting the finality diagnosis
  investigate_generic:
    needs: [context, baseline]
    if: ${{ tasks.baseline.outputs.has_finality_issues != true }}
    selection: {capabilities: [reasoning, tool-use]}
    run: investigate-devnet-incident
    retry:
      max: 1
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 10s
        factor: 2
        max-delay: 30s
        jitter: true
      timeout: 5m
    quality-gate: "${{ has(result.findings_summary) && size(result.findings_summary) > 0 && has(result.suspected_root_cause) && size(result.suspected_root_cause) > 0 }}"
    instructions: |-
      Investigate the devnet issue using the baseline observations and available data surfaces.

      Use the `panda` CLI. For Python API calls, use heredoc stdin:
      ```
      panda execute <<'PYEOF'
      <python code here>
      PYEOF
      ```

      ## Approach

      1. **Hypothesize** — From the baseline, rank the most likely root causes. State what
         evidence would confirm or refute each.
      2. **Investigate** — For each hypothesis (strongest first), gather targeted evidence.
         Stop when confirmed or clearly refuted.
      3. **Correlate** — Cross-reference: temporal correlation, scope clustering (region,
         client type), signal agreement across data sources, recent changes.
      4. **Conclude** — State the root cause with supporting evidence, plus practical actions.

      Investigate CL before EL — the network moves forward via the CL, and most devnet
      issues originate there.

      ## Available tools

      - Dora: `panda dora overview/epoch/slot` (start epochs from head_epoch - 1).
      - Ethnode: `panda ethnode syncing/finality/peers/version/beacon-get`.
      - Fork choice: `panda ethnode beacon-get <network> <instance> /eth/v1/debug/fork_choice`.
      - Logs: `panda loki query <datasource> '<logql>' --limit N --start <time>`. Use `data_profile.loki_datasource` when `has_loki` is true.
      - Runbooks: `panda search runbooks "debug devnet"`.

      ## Log investigation

      Use label filters in LogQL — unfiltered queries time out. Schema depends on `data_profile.loki_schema`:
      - **ethpandaops** (remote): `{network="<network>", instance="<instance>"} |~ "(?i)(CRIT|ERR)" | json | line_format "{{.message}}"`. If `{{.message}}` is empty, try `{{.log}}` or raw lines.
      - **kurtosis** (local): `{job="kurtosis"} | json | kurtosis_service_name="<service>" | log=~"(?i)(CRIT|ERR)" | line_format "{{.log}}"`.
      - Escalate: CRIT/ERR first, then WARN, then INFO.

      If `data_profile.mode == "local"` and `data_profile.has_loki != true`, fall back to
      `kurtosis service logs <enclave> <service>` for targeted log inspection instead of trying
      Loki queries.

      CL/EL diagnostic matrix:
      - CL errors only → consensus issue
      - CL engine API errors + EL errors → execution issue
      - CL clean + EL errors → EL struggling, not primary cause
      - Both erroring → shared dependency or cascade

      ## Issue type guidance

      - **network-split**: compare fork views, find divergence slot, examine the divergence block.
      - **offline-nodes**: confirm unreachable vs syncing vs isolated vs absent from logs.
      - **client-bug / execution-issue**: compare CL and EL evidence, look for client-type patterns.

      ## Evidence and uncertainty

      Ground every finding in a specific tool output. If evidence is unavailable or ambiguous,
      say so. If you cannot definitively determine root cause, rank candidates by likelihood
      and note what additional evidence would help.

      Use full resolved instance names. Include concrete log or RPC excerpts that help an
      operator decide what to inspect next.
    inputs:
      problem_statement: ${{ inputs.problem_statement }}
      focus: ${{ inputs.focus }}
      network_name: ${{ tasks.context.outputs.network_name }}
      investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
      data_profile: ${{ tasks.context.outputs.data_profile }}
      suspected_issue_type: ${{ tasks.baseline.outputs.suspected_issue_type }}
      baseline_summary: ${{ tasks.baseline.outputs.baseline_summary }}
      affected_instances: ${{ tasks.baseline.outputs.affected_instances }}
      baseline_evidence: ${{ tasks.baseline.outputs.baseline_evidence }}
      instance_reports: "${{ has(tasks.baseline.outputs.instance_reports) ? tasks.baseline.outputs.instance_reports : [] }}"
      fork_data: "${{ has(tasks.baseline.outputs.fork_data) ? tasks.baseline.outputs.fork_data : {} }}"
      validator_activity: "${{ has(tasks.baseline.outputs.validator_activity) ? tasks.baseline.outputs.validator_activity : [] }}"
      epoch_snapshots: "${{ has(tasks.baseline.outputs.epoch_snapshots) ? tasks.baseline.outputs.epoch_snapshots : [] }}"
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.context.outputs.notes_highlights) ? tasks.context.outputs.notes_highlights : [] }}"
    outputs:
      suspected_root_cause: ${{ result.suspected_root_cause }}
      findings_summary: ${{ result.findings_summary }}
      evidence: "${{ has(result.evidence) ? result.evidence : [] }}"
      recommended_actions: "${{ has(result.recommended_actions) ? result.recommended_actions : [] }}"
      instance_reports: "${{ has(result.instance_reports) ? result.instance_reports : [] }}"
      log_examples: "${{ has(result.log_examples) ? result.log_examples : [] }}"
      schema:
        suspected_root_cause:
          type: string
          description: Most likely root cause hypothesis
        findings_summary:
          type: string
          description: Summary of the key findings
        evidence:
          type: array
          items:
            type: string
          description: Concrete observations supporting the hypothesis
        recommended_actions:
          type: array
          items:
            type: string
          description: Practical next actions for operators
        instance_reports:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              role:
                type: string
              client:
                type: string
              status:
                type: string
              summary:
                type: string
              evidence:
                type: array
                items:
                  type: string
              suggested_actions:
                type: array
                items:
                  type: string
            required: [instance_name, summary]
          description: Instance-level findings using full resolved instance names
        log_examples:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              source:
                type: string
              excerpt:
                type: string
              significance:
                type: string
            required: [source, excerpt, significance]
          description: Concrete log or RPC evidence examples supporting the diagnosis
  verify_findings:
    needs: [context, baseline, assess_finality, analyze_finality_causes, investigate_generic]
    selection: {capabilities: [reasoning]}
    run: verify-devnet-findings
    retry:
      max: 1
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 5s
        factor: 2
        max-delay: 20s
        jitter: true
      timeout: 2m
    quality-gate: "${{ has(result.verification_summary) && size(result.verification_summary) > 0 && has(result.issues) }}"
    instructions: |-
      Audit the investigation findings before they reach the operator.

      For each claim in the findings:
      - Is it directly supported by a tool output from this session?
      - Could the same evidence support a different conclusion?
      - Are there contradictions between findings?

      Flag issues as:
      - over-confident: claim stronger than evidence supports
      - under-supported: claim without cited tool output
      - contradiction: findings that conflict with each other
      - missing-perspective: obvious investigation path not taken

      If issues are found, note what the adjusted conclusion should be.
      If no issues are found, confirm the findings are well-supported.
    inputs:
      suspected_issue_type: ${{ tasks.baseline.outputs.suspected_issue_type }}
      findings_summary: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.summary : tasks.investigate_generic.outputs.findings_summary }}"
      suspected_root_cause: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.primary_cause : tasks.investigate_generic.outputs.suspected_root_cause }}"
      evidence: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.evidence : tasks.investigate_generic.outputs.evidence }}"
      recommended_actions: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.recommended_actions : tasks.investigate_generic.outputs.recommended_actions }}"
    outputs:
      verification_summary: ${{ result.verification_summary }}
      issues: "${{ has(result.issues) ? result.issues : [] }}"
      schema:
        verification_summary:
          type: string
          description: Summary of verification audit
        issues:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [over-confident, under-supported, contradiction, missing-perspective]
              description:
                type: string
              suggestion:
                type: string
            required: [type, description]
          description: Issues found during verification
  conclude:
    needs: [context, baseline, assess_finality, analyze_finality_causes, investigate_generic, verify_findings]
    selection: {capabilities: [reasoning]}
    run: summarize-devnet-debug
    retry:
      max: 1
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 5s
        factor: 2
        max-delay: 20s
        jitter: true
      timeout: 2m
    quality-gate: "${{ has(result.summary) && size(result.summary) > 100 && has(result.severity) && size(result.severity) > 0 }}"
    instructions: |-
      Produce an operator-ready devnet debug summary.

      Structure:
      1. Symptoms: what is happening now (observable behavior).
      2. Root cause: most likely root cause with the concrete evidence that supports it.
      3. Affected scope: which nodes, clients, or forks are involved (use full instance names).
      4. Confidence caveats: if the verification step flagged issues, note them here.
      5. Dora links: include links to relevant epochs, slots, or validators when Dora data was available.
      6. Suggested remediation: practical next steps — restart nodes, inspect a specific client, escalate to a client team, or continue observing.

      Be direct and concise. This output should help a principal decide the immediate next action.
      If the verification raised concerns, adjust the summary's confidence language accordingly.

      Write the rendered debug summary as the `summary` output artifact.
    inputs:
      network_name: ${{ tasks.context.outputs.network_name }}
      problem_statement: ${{ inputs.problem_statement }}
      context_summary: ${{ tasks.context.outputs.summary }}
      notes_summary: "${{ has(tasks.context.outputs.notes_summary) ? tasks.context.outputs.notes_summary : '' }}"
      baseline_summary: ${{ tasks.baseline.outputs.baseline_summary }}
      suspected_issue_type: ${{ tasks.baseline.outputs.suspected_issue_type }}
      findings_summary: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.summary : tasks.investigate_generic.outputs.findings_summary }}"
      suspected_root_cause: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.primary_cause : tasks.investigate_generic.outputs.suspected_root_cause }}"
      evidence: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.evidence : tasks.investigate_generic.outputs.evidence }}"
      recommended_actions: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.recommended_actions : tasks.investigate_generic.outputs.recommended_actions }}"
      verification_summary: "${{ has(tasks.verify_findings.outputs.verification_summary) ? tasks.verify_findings.outputs.verification_summary : '' }}"
      verification_issues: "${{ has(tasks.verify_findings.outputs.issues) ? tasks.verify_findings.outputs.issues : [] }}"
    outputs:
      summary: ${{ result.summary }}
      severity: "${{ has(result.severity) ? result.severity : 'medium' }}"
      schema:
        summary:
          kind: artifact
          content-type: text/markdown
          description: Final operator-ready devnet debug summary
          required: true
        severity:
          type: string
          description: Overall incident severity estimate
          enum: [low, medium, high, critical]
  render_report:
    needs: [context, baseline, assess_finality, analyze_finality_causes, investigate_generic, conclude]
    uses: ethpandaops/devnet-report@1
    inputs:
      network_name: ${{ tasks.context.outputs.network_name }}
      investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
      problem_statement: "${{ inputs.?problem_statement }}"
      context_summary: ${{ tasks.context.outputs.summary }}
      issue_type: ${{ tasks.baseline.outputs.suspected_issue_type }}
      root_cause: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.primary_cause : tasks.investigate_generic.outputs.suspected_root_cause }}"
      severity: ${{ tasks.conclude.outputs.severity }}
      baseline_summary: ${{ tasks.baseline.outputs.baseline_summary }}
      findings_summary: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.summary : tasks.investigate_generic.outputs.findings_summary }}"
      affected_instances: ${{ tasks.baseline.outputs.affected_instances }}
      evidence: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.evidence : tasks.investigate_generic.outputs.evidence }}"
      instance_reports: "${{ tasks.baseline.outputs.has_finality_issues == true ? (size(tasks.analyze_finality_causes.outputs.instance_reports) > 0 ? tasks.analyze_finality_causes.outputs.instance_reports : tasks.baseline.outputs.instance_reports) : tasks.investigate_generic.outputs.instance_reports }}"
      log_examples: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.log_examples : tasks.investigate_generic.outputs.log_examples }}"
      recommended_actions: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.recommended_actions : tasks.investigate_generic.outputs.recommended_actions }}"
    outputs:
      report: report
outputs:
  network_name: ${{ tasks.context.outputs.network_name }}
  investigation_timeframe: ${{ tasks.context.outputs.investigation_timeframe }}
  context_summary: ${{ tasks.context.outputs.summary }}
  notes_url: "${{ has(tasks.context.outputs.notes_url) ? tasks.context.outputs.notes_url : '' }}"
  issue_type: ${{ tasks.baseline.outputs.suspected_issue_type }}
  issue_type_confidence: ${{ tasks.baseline.outputs.issue_type_confidence }}
  issue_type_reasoning: ${{ tasks.baseline.outputs.issue_type_reasoning }}
  baseline_summary: ${{ tasks.baseline.outputs.baseline_summary }}
  baseline_evidence: ${{ tasks.baseline.outputs.baseline_evidence }}
  node_sync_status: ${{ tasks.baseline.outputs.node_sync_status }}
  affected_instances: ${{ tasks.baseline.outputs.affected_instances }}
  has_finality_issues: ${{ tasks.baseline.outputs.has_finality_issues }}
  finality_status: "${{ has(tasks.assess_finality.outputs.finality_status) ? tasks.assess_finality.outputs.finality_status : '' }}"
  finality_status_confidence: "${{ has(tasks.assess_finality.outputs.finality_status_confidence) ? tasks.assess_finality.outputs.finality_status_confidence : '' }}"
  finality_status_reasoning: "${{ has(tasks.assess_finality.outputs.finality_status_reasoning) ? tasks.assess_finality.outputs.finality_status_reasoning : '' }}"
  findings_summary: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.summary : tasks.investigate_generic.outputs.findings_summary }}"
  root_cause: "${{ tasks.baseline.outputs.has_finality_issues == true ? tasks.analyze_finality_causes.outputs.primary_cause : tasks.investigate_generic.outputs.suspected_root_cause }}"
