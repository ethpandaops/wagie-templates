kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/kurtosis-ethereum-devnet-config
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Internal building block for `kurtosis-ethereum-config` when `config_mode` is `devnet-profile`. Derives a minimal Kurtosis ethereum-package config from an existing devnet or devnet-group profile. Call directly only when you need the full derivation surface (notes, topology, reference) without the facade.
tags: ["kurtosis", "ethereum", "ethpandaops", "devnet", "configuration"]
inputs:
  devnet_name:
    type: string
    required: true
    description: Existing devnet or devnet-group name to model
  goal:
    type: string
    description: Optional goal for how the derived config will be used
  client_type:
    type: string
    description: Optional client type to preserve explicitly in the derived config
  image_hint:
    type: string
    description: Optional image or build hint to preserve explicitly in the derived config
  client_pairs:
    type: array
    description: Optional explicit client-pair and image combinations to preserve or prefer in the derived config
    schema:
      type: array
      items:
        type: object
        properties:
          el_type:
            type: string
          cl_type:
            type: string
          vc_type:
            type: string
          el_image:
            type: string
          cl_image:
            type: string
          vc_image:
            type: string
          el_extra_params:
            type: array
            items:
              type: string
          cl_extra_params:
            type: array
            items:
              type: string
          vc_extra_params:
            type: array
            items:
              type: string
          count:
            type: number
        required: [el_type, cl_type]
  constraints:
    type: string
    description: Optional implementation constraints
  package_ref:
    type: string
    default: github.com/ethpandaops/ethereum-package
    description: Kurtosis package reference to target
tasks:
  devnet_notes:
    uses: io.ethpandaops/devnet-notes@1.0.0
    inputs:
      network: ${{ inputs.devnet_name }}
    outputs:
      notes_url: notes_url
      notes_summary: notes_summary
      notes_highlights: highlights
      notes_assumptions: assumptions
  topology_profile:
    needs: [devnet_notes]
    uses: io.ethpandaops/devnet-topology-profile@1.0.0
    inputs:
      devnet_name: ${{ inputs.devnet_name }}
      goal: "${{ inputs.?goal }}"
      client_type: "${{ inputs.?client_type }}"
      image_hint: "${{ inputs.?image_hint }}"
      client_pairs: "${{ inputs.?client_pairs }}"
      constraints: "${{ inputs.?constraints }}"
      notes_summary: "${{ has(tasks.devnet_notes.outputs.notes_summary) ? tasks.devnet_notes.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.devnet_notes.outputs.notes_highlights) ? tasks.devnet_notes.outputs.notes_highlights : [] }}"
      notes_assumptions: "${{ has(tasks.devnet_notes.outputs.notes_assumptions) ? tasks.devnet_notes.outputs.notes_assumptions : [] }}"
    outputs:
      profile_summary: profile_summary
      assumptions: assumptions
      effective_client_pairs: effective_client_pairs
      fallback_pair_added: fallback_pair_added
  package_reference:
    needs: [topology_profile]
    uses: io.ethpandaops/kurtosis-ethereum-reference@1.0.0
    inputs:
      section: participants
      package_ref: ${{ inputs.package_ref }}
    outputs:
      reference: reference
      reference_summary: reference_summary
      extracted_items: extracted_items
  derive_config:
    needs: [devnet_notes, topology_profile, package_reference]
    selection: {capabilities: [reasoning]}
    run: derive-kurtosis-ethereum-devnet-config
    retry:
      max: 2
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 10s
        factor: 2
        max-delay: 1m
        jitter: true
      timeout: 1h
    quality-gate: "${{ has(result.config_summary) && size(result.config_summary) > 0 }}"
    instructions: |-
      Derive a minimal ethereum-package configuration from the resolved devnet context.

      Rules:
      - Treat the resolved devnet notes and topology profile as the source profile, not an exact guarantee of package parity.
      - Preserve only the parameters and flags that matter for reproducing or approximating the devnet's behavior.
      - Separate inferred facts from assumptions.
      - Only include config fields that differ from ethereum-package defaults.
      - Use the provided participants reference as the authoritative field/value guide.
      - Preserve the minimal representative topology supplied in effective_client_pairs.
      - Do not perform additional package or devnet discovery inside this step.
      - Write the generated configuration as the `config` output artifact.
    inputs:
      devnet_name: ${{ inputs.devnet_name }}
      goal: "${{ has(inputs.goal) ? inputs.goal : '' }}"
      client_type: "${{ has(inputs.client_type) ? inputs.client_type : '' }}"
      image_hint: "${{ has(inputs.image_hint) ? inputs.image_hint : '' }}"
      client_pairs: "${{ has(inputs.client_pairs) ? inputs.client_pairs : [] }}"
      constraints: "${{ has(inputs.constraints) ? inputs.constraints : '' }}"
      package_ref: ${{ inputs.package_ref }}
      resolved_network_name: ${{ inputs.devnet_name }}
      resolved_network_group: ""
      devnet_summary: ${{ tasks.topology_profile.outputs.profile_summary }}
      notes_url: "${{ has(tasks.devnet_notes.outputs.notes_url) ? tasks.devnet_notes.outputs.notes_url : '' }}"
      notes_summary: "${{ has(tasks.devnet_notes.outputs.notes_summary) ? tasks.devnet_notes.outputs.notes_summary : '' }}"
      notes_highlights: "${{ has(tasks.devnet_notes.outputs.notes_highlights) ? tasks.devnet_notes.outputs.notes_highlights : [] }}"
      notes_assumptions: "${{ has(tasks.topology_profile.outputs.assumptions) ? tasks.topology_profile.outputs.assumptions : [] }}"
      participants_reference: "${{ has(tasks.package_reference.outputs.reference) ? tasks.package_reference.outputs.reference : '' }}"
      participants_reference_summary: "${{ has(tasks.package_reference.outputs.reference_summary) ? tasks.package_reference.outputs.reference_summary : '' }}"
      effective_client_pairs_input: "${{ has(tasks.topology_profile.outputs.effective_client_pairs) ? tasks.topology_profile.outputs.effective_client_pairs : [] }}"
      schema:
        participants_reference: artifact
    outputs:
      resolved_network_name: ${{ inputs.devnet_name }}
      resolved_network_group: ""
      config: ${{ result.config }}
      config_summary: ${{ result.config_summary }}
      assumptions: "${{ has(result.assumptions) ? result.assumptions : [] }}"
      effective_client_pairs: "${{ has(result.effective_client_pairs) ? result.effective_client_pairs : [] }}"
      fallback_pair_added: "${{ has(result.fallback_pair_added) ? result.fallback_pair_added : false }}"
      schema:
        resolved_network_name:
          type: string
          description: Resolved devnet name used as the source profile
        resolved_network_group:
          type: string
          description: Resolved devnet group when applicable
        config:
          kind: artifact
          content-type: application/x-yaml
          description: Minimal Kurtosis ethereum-package config derived from the devnet
          required: true
        config_summary:
          type: string
          description: Summary of how the config maps to the source devnet
        assumptions:
          type: array
          items:
            type: string
          description: Assumptions made where exact mapping was not possible
        effective_client_pairs:
          type: array
          items:
            type: object
            properties:
              el_type:
                type: string
              cl_type:
                type: string
              vc_type:
                type: string
              el_image:
                type: string
              cl_image:
                type: string
              vc_image:
                type: string
              el_extra_params:
                type: array
                items:
                  type: string
              cl_extra_params:
                type: array
                items:
                  type: string
              vc_extra_params:
                type: array
                items:
                  type: string
              count:
                type: number
            required: [el_type, cl_type]
          description: Effective participant pairs used in the derived config
        fallback_pair_added:
          type: boolean
          description: Whether a fallback client pair was added because no viable participant pair could be inferred
outputs:
  resolved_network_name: ${{ tasks.derive_config.outputs.resolved_network_name }}
  resolved_network_group: ${{ tasks.derive_config.outputs.resolved_network_group }}
  config: ${{ tasks.derive_config.outputs.config }}
  config_summary: ${{ tasks.derive_config.outputs.config_summary }}
  assumptions: "${{ size(tasks.derive_config.outputs.assumptions) > 0 ? tasks.derive_config.outputs.assumptions : tasks.topology_profile.outputs.assumptions }}"
  effective_client_pairs: "${{ size(tasks.derive_config.outputs.effective_client_pairs) > 0 ? tasks.derive_config.outputs.effective_client_pairs : tasks.topology_profile.outputs.effective_client_pairs }}"
  fallback_pair_added: "${{ tasks.derive_config.outputs.fallback_pair_added ? true : tasks.topology_profile.outputs.fallback_pair_added }}"
