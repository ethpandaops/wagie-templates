kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/assertoor-ci-classify
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when an assertoor CI failure cluster has artifact, reproduction, comparison, or bug-hunt evidence and needs an evidence-grounded root-cause classification for source and issue work.
tags: ["assertoor", "ci", "ethereum", "classification", "triage"]
defaults:
  retryable: true
  timeout: 30m
inputs:
  cluster_label:
    type: string
    required: true
    description: Early cluster label from fingerprinting
  representative:
    type: object
    required: true
    description: NormalizedFailure for the cluster representative
    schema:
      type: object
      properties:
        test_name:
          type: string
        failed_step:
          type: string
        root_failed_step:
          type: string
        category:
          type: string
        error_signature:
          type: string
        evidence_brief:
          type: object
          properties:
            headline:
              type: string
            failure_shape:
              type: string
            client_scope:
              type: string
            task_scope:
              type: string
            artifact_signal:
              type: string
            component_hints:
              type: string
            routing_notes:
              type: string
        package_runtime_identity:
          type: object
          properties:
            package_ref:
              type: string
            package_started_at:
              type: string
            source_repo:
              type: string
            source_revision:
              type: string
            evidence:
              type: string
      required: [test_name, failed_step, category, error_signature]
  reproduction_launched:
    type: boolean
    default: false
    description: Whether local reproduction launched an enclave
  reproduction_reproduced:
    type: boolean
    default: false
    description: Whether local reproduction observed the same failing test outcome
  reproduction_test_result:
    type: string
    default: not-run
    description: Terminal reproduction result
  reproduction_matches_prior:
    type: boolean
    default: false
    description: Whether reproduction matched the original CI failure shape
  reproduction_summary:
    type: string
    default: ""
    description: Short reproduction summary
  reproduction_fidelity_summary:
    type: string
    default: ""
    description: Replay fidelity summary covering original CI image digest pins, package ref pinning, and remaining gaps
  regression_summary:
    type: string
    default: ""
    description: Previous-success/change-window summary
  regression_window:
    type: object
    default: {}
    description: Structured previous-success/change-window facts
    schema:
      type: object
      properties:
        baseline_found:
          type: boolean
        previous_success_run_id:
          type: string
        previous_success_run_url:
          type: string
        previous_success_head_sha:
          type: string
        current_head_sha:
          type: string
        same_source_sha:
          type: boolean
        same_test_sha:
          type: boolean
        changed_components:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              role:
                type: string
              previous_image_ref:
                type: string
              current_image_ref:
                type: string
              previous_digest:
                type: string
              current_digest:
                type: string
              previous_revision:
                type: string
              current_revision:
                type: string
              previous_version:
                type: string
              current_version:
                type: string
              changed:
                type: boolean
              evidence:
                type: string
        unchanged_components:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              role:
                type: string
              previous_digest:
                type: string
              current_digest:
                type: string
              previous_revision:
                type: string
              current_revision:
                type: string
              previous_version:
                type: string
              current_version:
                type: string
              evidence:
                type: string
        unresolved_components:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              role:
                type: string
              previous_image_ref:
                type: string
              current_image_ref:
                type: string
              reason:
                type: string
              evidence:
                type: string
        target_ranking:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              reason:
                type: string
              confidence:
                type: number
        commit_ranges:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              repo_url:
                type: string
              previous_revision:
                type: string
              current_revision:
                type: string
  bug_hunt_findings:
    type: array
    default: []
    description: Findings from local reproduction bug-hunt, when available
    schema:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
          summary:
            type: string
          evidence:
            type: array
            items:
              type: string
          suspected_owner:
            type: string
          confidence:
            type: number
  bug_hunt_summary:
    type: string
    default: ""
    description: Short local reproduction bug-hunt summary
tasks:
  classify:
    uses: dev.wagie/decide@1.0.0
    inputs:
      question: "What is the root-cause classification for this assertoor failure?"
      options: ["framework-bug", "framework-dependency", "single-client", "multi-client", "devnet-network", "config-issue", "test-design", "infra-flake", "mixed", "unknown"]
      context: |-
        Cluster: ${{ inputs.cluster_label }}
        Test: ${{ inputs.representative.test_name }} / step ${{ inputs.representative.failed_step }}
        Root failed step: ${{ has(inputs.representative.root_failed_step) ? inputs.representative.root_failed_step : inputs.representative.failed_step }}
        Original failure category: ${{ inputs.representative.category }}
        Evidence brief:
        - Headline: ${{ has(inputs.representative.evidence_brief.headline) ? inputs.representative.evidence_brief.headline : '' }}
        - Failure shape: ${{ has(inputs.representative.evidence_brief.failure_shape) ? inputs.representative.evidence_brief.failure_shape : '' }}
        - Client scope: ${{ has(inputs.representative.evidence_brief.client_scope) ? inputs.representative.evidence_brief.client_scope : '' }}
        - Task scope: ${{ has(inputs.representative.evidence_brief.task_scope) ? inputs.representative.evidence_brief.task_scope : '' }}
        - Original artifact signal: ${{ has(inputs.representative.evidence_brief.artifact_signal) ? inputs.representative.evidence_brief.artifact_signal : '' }}
        - Component hints: ${{ has(inputs.representative.evidence_brief.component_hints) ? inputs.representative.evidence_brief.component_hints : '' }}
        - Routing notes: ${{ has(inputs.representative.evidence_brief.routing_notes) ? inputs.representative.evidence_brief.routing_notes : '' }}
        Package runtime identity: ${{ has(inputs.representative.package_runtime_identity) ? inputs.representative.package_runtime_identity : {} }}
        Reproduction outcome: launched=${{ inputs.reproduction_launched }}, reproduced=${{ inputs.reproduction_reproduced }}, test_result=${{ inputs.reproduction_test_result }}, matches_prior=${{ inputs.reproduction_matches_prior }}
        Reproduction summary: ${{ inputs.reproduction_summary }}
        Reproduction fidelity: ${{ inputs.reproduction_fidelity_summary }}
        Regression window summary: ${{ inputs.regression_summary }}
        Structured regression window: ${{ inputs.regression_window }}
        Bug-hunt findings (may be empty when not reproduced): ${{ inputs.bug_hunt_findings }}
        Bug-hunt summary (may be empty when not reproduced): ${{ inputs.bug_hunt_summary }}

        Classification rules. Start from the evidence, not a single default owner. The null hypothesis is "client or devnet behavior until proven otherwise," but framework/dependency/config decisions are valid when the original artifacts or bug-hunt identify a concrete non-client mechanism. Do not classify by symptom name alone; choose the owner whose code, runtime, config, or documented behavior best explains the observed mechanism.

        Owner-first and regression rules:
        - When a named client/service emits a concrete RPC/API/log error, classify toward that emitting component first. The caller/tool that submitted the request is not the owner unless evidence shows it generated invalid input or wrong configuration.
        - When previous-success baseline shows a changed image digest/build/source revision for the emitting component, treat that as strong regression evidence and prefer the matching client/source target.
        - When local reproduction is non-faithful (`matches_prior=false`, `test_result=blocked`, `test_result=scope-mismatch`, reproduction_fidelity_summary says image digests or package source were not pinned, bug-hunt shows changed timeout/config/images/workload, or the reproduced failed client pairs/tasks materially differ from the original failed pairs/tasks), do not downgrade the original CI artifact signal. Classify based on original artifacts plus any faithful repro evidence; separately record the repro mismatch.
        - Framework/dependency fallback requires either exhausted/inconclusive client evidence or affirmative caller-side evidence. Absence of a complete client explanation is not by itself a framework/dependency finding.

        Option meanings:
        - **single-client**: one specific EL or CL client is misbehaving. Evidence: errors localized to one client type across the matrix, or bug-hunt cites concrete misbehavior in one client with the others healthy.
        - **multi-client**: spec-level or shared-protocol issue affecting multiple client types. Use this when client behavior is wrong but the cause is not isolated to one implementation.
        - **framework-bug**: assertoor itself, such as scheduling, assertions, orchestration, account/workload setup, or API usage, is misbehaving. Requires affirmative assertoor-side evidence.
        - **framework-dependency**: a dependency used by assertoor is the likely source, such as workload generation, transaction management, account state management, or another helper library. Requires affirmative dependency-side evidence.
        - **devnet-network**: the environment's p2p/discovery/topology or generated network wiring is broken. Use this when the problem is the generated devnet network, not a single client implementation.
        - **config-issue**: kurtosis, assertoor-test config, or ethereum-package launch configuration produced a broken environment. Requires a concrete config mismatch, missing/incorrect flag, wrong test parameter, or launcher behavior.
        - **test-design**: the assertoor test encodes a genuinely-wrong expectation. Requires evidence that the assertion contradicts the Ethereum spec, canonical client docs, or the intended test contract.
        - **infra-flake**: transient and non-deterministic. Use when reproduction passed, timed out, was queue-blocked before the target, hit a narrowed-mode scope mismatch, or differs from prior and original artifacts are thin or contradictory.
        - **mixed**: two separable mechanisms appear in the same cluster and should not be routed to one owner.
        - **unknown**: insufficient evidence to choose any of the above.

        When bug-hunt did not run, do not stop at "unknown" by default. Classify from original CI artifacts, failed task tree, runtime identities, and previous-success delta when those are concrete enough. Prefer `infra-flake` only when reproduction passed/timed out/was queue-blocked/hit scope-mismatch and the original artifacts are thin or contradictory; prefer `config-issue` only if launch itself failed with concrete kurtosis/config errors.

        Confidence calibration: 80+ requires affirmative evidence for the selected owner. Do not blame a symptom-exposing component solely because it surfaces the failure; tie ownership to the component whose behavior, code history, runtime logs, or input generation actually produced the mechanism.
    outputs:
      decision: decision
      confidence: confidence
      reasoning: reasoning
outputs:
  decision: ${{ tasks.classify.outputs.decision }}
  confidence: ${{ tasks.classify.outputs.confidence }}
  reasoning: ${{ tasks.classify.outputs.reasoning }}
