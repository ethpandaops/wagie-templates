name: ethpandaops/devnet-baseline
version: "1.0"
description: >-
  Use when a workflow needs an initial Ethereum devnet state assessment; builds baseline observations and classifies the most likely issue type.
tags: ["pattern", "devnet", "ethereum", "ethpandaops", "debugging", "building-block", "type:pattern", "flow:compose", "cap:reasoning", "cap:tool-use"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 3m
inputs:
  problem_statement:
    type: string
    required: true
    description: User-reported symptom or debugging goal
  focus:
    type: string
    default: general
    description: Optional focus such as split, offline-nodes, finality-delay, logs, or rpc-validation
  network_name:
    type: string
    required: true
    description: Resolved target devnet name
  investigation_timeframe:
    type: string
    required: true
    description: Active investigation timeframe
  instances:
    type: array
    default: []
    description: Specific instances to inspect first
    schema:
      type: array
      items:
        type: string
  data_profile:
    type: object
    required: true
    description: Available debugging surfaces and recommended mode
    schema:
      type: object
      properties:
        mode:
          type: string
          enum: [local, remote]
        has_dora:
          type: boolean
        has_loki:
          type: boolean
        has_ethnode:
          type: boolean
        has_direct_node_access:
          type: boolean
        loki_schema:
          type: string
          enum: [ethpandaops, kurtosis]
      required: [mode, has_dora, has_loki, has_ethnode, has_direct_node_access, loki_schema]
  context_summary:
    type: string
    description: Normalized context summary from intake
  notes_summary:
    type: string
    description: Optional high-signal notes summary for the devnet
  notes_highlights:
    type: array
    default: []
    description: Optional structured notes highlights worth preserving in baseline analysis
    schema:
      type: array
      items:
        type: string
tasks:
  observe:
    worker: {match: "'tool-use' in capabilities && 'reasoning' in skills"}
    run: baseline-devnet-state
    quality-gate: "${{ has(result.baseline_summary) && size(result.baseline_summary) > 0 }}"
    instructions: |-
      Build an initial devnet baseline using the available surfaces.

      Use the `panda` binary as the primary tool surface for this task.

      Priorities:
      - If Dora is available, collect in a single pass: network overview (current slot, epoch, validator count), fork/split status, epoch-level participation, missed proposers (~300 slots/hour lookback), and offline attesters. Note: Dora's `current_slot` is `epoch × 32` (the epoch's first slot), not the actual head slot — do not confuse these.
      - Head epoch caveat: the head epoch is still in progress and will show artificially low participation. Always start analysis from head epoch - 1.
      - Network split override: if Dora shows multiple forks, that overrides the active timeframe. You MUST identify the divergence slot/epoch where the split occurred and refocus the investigation around that point.
      - If Dora is unavailable but nodes are queryable (ethnode for remote, or direct localhost access for local Kurtosis), query each node to build a partial baseline:
        * CL: `/eth/v1/node/syncing`, `/eth/v1/beacon/headers/head`, `/eth/v1/beacon/states/head/finality_checkpoints`
        * EL: `eth_blockNumber`, `eth_syncing` (JSON-RPC)
        * Compare head slots/roots and finality checkpoints across nodes to detect splits or disagreement.
      - If Loki is the only available source, use label discovery and high-signal log queries to build a best-effort baseline.
      - When identifying instances, use the full resolved instance names, not shortened labels.
      - When possible, return instance-level status notes that help an operator decide what to inspect next.

      Baseline summary checklist — address each point:
      1. Single fork or split?
      2. Is finality progressing?
      3. Participation rate (>66.7% of stake required for finality)?
      4. Missed slots or empty epochs?
      5. Which nodes are offline or underperforming?

      Healthy-network early exit: if Dora shows a healthy network (single fork, finality progressing, high participation) but the user reports issues, present the baseline findings and ask the user for more specific details before proceeding further.

      Produce a concise baseline summary plus concrete evidence and affected instances when they can be identified.
      Preserve note-derived expectations when they matter for interpreting the network state.
    inputs:
      problem_statement: ${{ inputs.problem_statement }}
      focus: ${{ inputs.focus }}
      network_name: ${{ inputs.network_name }}
      investigation_timeframe: ${{ inputs.investigation_timeframe }}
      instances: ${{ inputs.instances }}
      data_profile: ${{ inputs.data_profile }}
      context_summary: "${{ has(inputs.context_summary) ? inputs.context_summary : '' }}"
      notes_summary: "${{ has(inputs.notes_summary) ? inputs.notes_summary : '' }}"
      notes_highlights: "${{ has(inputs.notes_highlights) ? inputs.notes_highlights : [] }}"
    outputs:
      baseline_summary: ${{ result.baseline_summary }}
      affected_instances: "${{ has(result.affected_instances) ? result.affected_instances : [] }}"
      baseline_evidence: "${{ has(result.baseline_evidence) ? result.baseline_evidence : [] }}"
      instance_reports: "${{ has(result.instance_reports) ? result.instance_reports : [] }}"
      schema:
        baseline_summary:
          type: string
          description: Concise baseline summary of network state
        affected_instances:
          type: array
          items:
            type: string
          description: Instances most likely involved in the incident
        baseline_evidence:
          type: array
          items:
            type: string
          description: Concrete observations supporting the baseline
        instance_reports:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              role:
                type: string
              client:
                type: string
              status:
                type: string
              summary:
                type: string
              evidence:
                type: array
                items:
                  type: string
            required: [instance_name, summary]
          description: Instance-level status notes using full resolved instance names
  classify_issue:
    needs: [observe]
    worker: {match: "'reasoning' in skills"}
    run: classify-devnet-issue
    quality-gate: "${{ has(result.suspected_issue_type) && size(result.suspected_issue_type) > 0 && result.confidence >= 0 && result.confidence <= 100 && has(result.reasoning) && size(result.reasoning) > 0 }}"
    inputs:
      problem_statement: ${{ inputs.problem_statement }}
      focus: ${{ inputs.focus }}
      baseline_summary: ${{ tasks.observe.outputs.baseline_summary }}
      baseline_evidence: ${{ tasks.observe.outputs.baseline_evidence }}
    outputs:
      suspected_issue_type: ${{ result.suspected_issue_type }}
      confidence: ${{ result.confidence }}
      reasoning: ${{ result.reasoning }}
      schema:
        suspected_issue_type:
          type: string
          description: Most likely top-level devnet issue category
          enum: [healthy, network-split, offline-nodes, finality-delay, client-bug, execution-issue, unknown]
        confidence:
          type: number
          description: Confidence score from 0 to 100
        reasoning:
          type: string
          description: Why this issue type best fits the baseline
outputs:
  suspected_issue_type: ${{ tasks.classify_issue.outputs.suspected_issue_type }}
  issue_type_confidence: ${{ tasks.classify_issue.outputs.confidence }}
  issue_type_reasoning: ${{ tasks.classify_issue.outputs.reasoning }}
  baseline_summary: ${{ tasks.observe.outputs.baseline_summary }}
  affected_instances: ${{ tasks.observe.outputs.affected_instances }}
  baseline_evidence: ${{ tasks.observe.outputs.baseline_evidence }}
  instance_reports: ${{ tasks.observe.outputs.instance_reports }}
