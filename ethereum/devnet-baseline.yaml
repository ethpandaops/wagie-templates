name: ethpandaops/devnet-baseline
version: "1.0"
description: >-
  Use when a workflow needs an initial Ethereum devnet state assessment; builds baseline observations and classifies the most likely issue type.
tags: ["devnet", "ethereum", "ethpandaops", "debugging"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 3m
inputs:
  problem_statement:
    type: string
    required: true
    description: User-reported symptom or debugging goal
  focus:
    type: string
    default: general
    description: Optional focus such as split, offline-nodes, finality-delay, logs, or rpc-validation
  network_name:
    type: string
    required: true
    description: Resolved target devnet name
  investigation_timeframe:
    type: string
    required: true
    description: Active investigation timeframe
  instances:
    type: array
    default: []
    description: Specific instances to inspect first
    schema:
      type: array
      items:
        type: string
  data_profile:
    type: object
    required: true
    description: Available debugging surfaces and recommended mode
    schema:
      type: object
      properties:
        mode:
          type: string
          enum: [local, remote]
        has_dora:
          type: boolean
        has_loki:
          type: boolean
        has_ethnode:
          type: boolean
        has_direct_node_access:
          type: boolean
        loki_schema:
          type: string
          enum: [ethpandaops, kurtosis]
      required: [mode, has_dora, has_loki, has_ethnode, has_direct_node_access, loki_schema]
  context_summary:
    type: string
    description: Normalized context summary from intake
  notes_summary:
    type: string
    description: Optional high-signal notes summary for the devnet
  notes_highlights:
    type: array
    default: []
    description: Optional structured notes highlights worth preserving in baseline analysis
    schema:
      type: array
      items:
        type: string
  observe_model:
    type: string
    description: "Model for observation task (e.g. claude-sonnet-4-6). Tool-heavy; cheaper models work well."
  observe_provider:
    type: string
    description: "Provider for observation task (e.g. claudecode, codex)"
  classify_model:
    type: string
    description: "Model for classification task (e.g. claude-opus-4-6). Benefits from strong reasoning."
  classify_provider:
    type: string
    description: "Provider for classification task (e.g. claudecode, codex)"
tasks:
  observe:
    worker: {match: "'tool-use' in capabilities && 'reasoning' in capabilities"}
    run: baseline-devnet-state
    quality-gate: "${{ has(result.baseline_summary) && size(result.baseline_summary) > 0 }}"
    instructions: |-
      Build an initial devnet baseline using the available surfaces.

      Use the `panda` CLI and MCP tools as the primary tool surface.

      Panda commands for baseline data:
      - Network overview: `panda dora overview <network>` — epoch, slot, participation rate, fork status.
      - Epoch detail: `panda dora epoch <network> <epoch>` — start from head_epoch - 1 (head epoch is in-progress and misleading).
      - Missing proposers: use `panda execute` with `dora.missing_proposers("<network>", epoch=N)`.
      - Offline attesters: use `panda execute` with `dora.offline_attesters("<network>", epoch=N)`.
      - Fork detection: `panda dora overview <network>` — if fork_count > 1, investigate immediately.
      - Node health: `panda ethnode syncing <network> <instance>`, `panda ethnode finality <network> <instance>`.
      - Datasource discovery: `panda datasources` to check what surfaces are available.
      - Reference procedures: `panda search runbooks "debug devnet"` for tested baseline procedures.

      Priorities:
      - If Dora is available, collect in a single pass: network overview (current slot, epoch, validator count), fork/split status, epoch-level participation, missed proposers (~300 slots/hour lookback), and offline attesters. Note: Dora's `current_slot` is `epoch × 32` (the epoch's first slot), not the actual head slot — do not confuse these.
      - Head epoch caveat: the head epoch is still in progress and will show artificially low participation. Always start analysis from head epoch - 1.
      - Network split override: if Dora shows multiple forks, that overrides the active timeframe. You MUST identify the divergence slot/epoch where the split occurred and refocus the investigation around that point.
      - If Dora is unavailable but nodes are queryable (ethnode for remote, or direct localhost access for local Kurtosis), query each node to build a partial baseline:
        * CL: `panda ethnode beacon-get <network> <instance> /eth/v1/node/syncing`, `panda ethnode finality <network> <instance>`
        * EL: `panda ethnode exec-rpc <network> <instance> eth_blockNumber`, `panda ethnode exec-rpc <network> <instance> eth_syncing`
        * Compare head slots/roots and finality checkpoints across nodes to detect splits or disagreement.
      - If Loki is the only available source, use `panda loki labels` and `panda loki query` with high-signal log queries to build a best-effort baseline.
      - When identifying instances, use the full resolved instance names, not shortened labels.
      - When possible, return instance-level status notes that help an operator decide what to inspect next.

      Baseline summary checklist — address each point:
      1. Single fork or split?
      2. Is finality progressing?
      3. Participation rate (>66.7% of stake required for finality)?
      4. Missed slots or empty epochs?
      5. Which nodes are offline or underperforming?

      Healthy-network early exit: if Dora shows a healthy network (single fork, finality progressing, high participation) but the user reports issues, present the baseline findings and ask the user for more specific details before proceeding further.

      Produce a concise baseline summary plus concrete evidence and affected instances when they can be identified.
      Preserve note-derived expectations when they matter for interpreting the network state.

      Evidence rules:
      - Every observation MUST reference a specific tool output from this session.
      - If a data source is unavailable, state that explicitly rather than inferring.
    inputs:
      problem_statement: ${{ inputs.problem_statement }}
      focus: ${{ inputs.focus }}
      network_name: ${{ inputs.network_name }}
      investigation_timeframe: ${{ inputs.investigation_timeframe }}
      instances: ${{ inputs.instances }}
      data_profile: ${{ inputs.data_profile }}
      context_summary: "${{ has(inputs.context_summary) ? inputs.context_summary : '' }}"
      notes_summary: "${{ has(inputs.notes_summary) ? inputs.notes_summary : '' }}"
      notes_highlights: "${{ has(inputs.notes_highlights) ? inputs.notes_highlights : [] }}"
    outputs:
      baseline_summary: ${{ result.baseline_summary }}
      affected_instances: "${{ has(result.affected_instances) ? result.affected_instances : [] }}"
      baseline_evidence: "${{ has(result.baseline_evidence) ? result.baseline_evidence : [] }}"
      instance_reports: "${{ has(result.instance_reports) ? result.instance_reports : [] }}"
      schema:
        baseline_summary:
          type: string
          description: Concise baseline summary of network state
        affected_instances:
          type: array
          items:
            type: string
          description: Instances most likely involved in the incident
        baseline_evidence:
          type: array
          items:
            type: string
          description: Concrete observations supporting the baseline
        instance_reports:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              role:
                type: string
              client:
                type: string
              status:
                type: string
              summary:
                type: string
              evidence:
                type: array
                items:
                  type: string
            required: [instance_name, summary]
          description: Instance-level status notes using full resolved instance names
  classify_issue:
    needs: [observe]
    uses: wagie/decide@1
    inputs:
      question: "Based on the devnet baseline observations, what is the most likely issue type?"
      context: |-
        Problem statement: ${{ inputs.problem_statement }}
        Focus: ${{ inputs.focus }}
        Baseline summary: ${{ tasks.observe.outputs.baseline_summary }}
        Baseline evidence: ${{ tasks.observe.outputs.baseline_evidence }}

        Diagnostic signatures for each issue type:
        - healthy: Single fork, finality progressing, participation > 95%, no missed slot clusters.
        - network-split: Dora shows multiple forks; nodes disagree on head root; fork divergence at a specific slot. If a split is present, it takes priority — other symptoms are likely consequences.
        - offline-nodes: Nodes unreachable or not producing attestations; peer count drops; specific instances absent from Dora.
        - finality-delay: Participation < 66.7%; missed slots rising; finality checkpoints stalled for >2 epochs.
        - client-bug: Single client type failing uniformly; all instances of that client show the same error pattern or behavior.
        - execution-issue: CL engine API errors; EL returning invalid payloads; CL clean but EL erroring.
        - unknown: Symptoms don't match known patterns or evidence is insufficient to classify.
      options: ["healthy", "network-split", "offline-nodes", "finality-delay", "client-bug", "execution-issue", "unknown"]
    outputs:
      suspected_issue_type: decision
      confidence: confidence
      reasoning: reasoning
outputs:
  suspected_issue_type: ${{ tasks.classify_issue.outputs.suspected_issue_type }}
  issue_type_confidence: ${{ tasks.classify_issue.outputs.confidence }}
  issue_type_reasoning: ${{ tasks.classify_issue.outputs.reasoning }}
  baseline_summary: ${{ tasks.observe.outputs.baseline_summary }}
  affected_instances: ${{ tasks.observe.outputs.affected_instances }}
  baseline_evidence: ${{ tasks.observe.outputs.baseline_evidence }}
  instance_reports: ${{ tasks.observe.outputs.instance_reports }}
  preliminary_severity: "${{ tasks.classify_issue.outputs.confidence >= 80 && (tasks.classify_issue.outputs.suspected_issue_type == 'network-split') ? 'critical' : tasks.classify_issue.outputs.confidence >= 80 && tasks.classify_issue.outputs.suspected_issue_type == 'finality-delay' ? 'high' : tasks.classify_issue.outputs.suspected_issue_type == 'healthy' ? 'low' : 'medium' }}"
