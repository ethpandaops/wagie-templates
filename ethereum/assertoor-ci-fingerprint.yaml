kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/assertoor-ci-fingerprint
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when one normalized assertoor CI failure needs a canonical cheap-fingerprint string for dedup and cross-run matching. Encodes Ethereum/client/test-harness failure modes into a stable three-segment key.
tags: ["assertoor", "ci", "ethereum", "fingerprint", "dedup", "triage"]
defaults:
  retryable: true
  timeout: 30m
inputs:
  failure:
    type: object
    required: true
    description: A single normalized assertoor CI failure to fingerprint
    schema:
      type: object
      properties:
        job_id:
          type: string
        job_name:
          type: string
        shard_id:
          type: string
        test_name:
          type: string
        failed_step:
          type: string
        category:
          type: string
        error_signature:
          type: string
        prior_ai_summary:
          type: string
        failed_task_leaves:
          type: array
          items:
            type: object
            properties:
              task_name:
                type: string
              title:
                type: string
              role:
                type: string
              client_pair:
                type: string
        affected_client_pairs:
          type: array
          items:
            type: string
        client_pairs:
          type: array
          items:
            type: object
            properties:
              pair_id:
                type: string
              el_type:
                type: string
              cl_type:
                type: string
        original_artifact_evidence:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              category:
                type: string
              summary:
                type: string
              excerpt:
                type: string
        component_hints:
          type: array
          items:
            type: string
        evidence_brief:
          type: object
          properties:
            headline:
              type: string
            failure_shape:
              type: string
            client_scope:
              type: string
            task_scope:
              type: string
            artifact_signal:
              type: string
            component_hints:
              type: string
            routing_notes:
              type: string
      required: [test_name, failed_step, category, error_signature]
  existing_issues:
    type: array
    default: []
    description: Existing ci-investigate issues from the target issue repo. Used to reuse an already-canonical fingerprint when the issue content describes the same mechanism.
    schema:
      type: array
      items:
        type: object
        properties:
          number:
            type: number
          url:
            type: string
          title:
            type: string
          cheap_fingerprint:
            type: string
          classification:
            type: string
          body_excerpt:
            type: string
        required: [number, title, cheap_fingerprint]
tasks:
  fingerprint:
    run: assertoor-ci-fingerprint
    quality-gate: "${{ has(result.cheap_fingerprint) && size(result.cheap_fingerprint) > 0 && has(result.cluster_label) && size(result.cluster_label) > 0 }}"
    instructions: |-
      Produce a canonical assertoor cheap-fingerprint string for the provided failure.

      Goal: identical failure surfaces across runs and shards must produce identical fingerprints. The fingerprint is the match key for cross-run dedup against GitHub issues.

      Algorithm — apply deterministically:

      1. Take three fields from the failure input: `test_name`, `category`, `error_signature` (plus `prior_ai_summary`, `evidence_brief`, artifact evidence, and `failed_step` for context in step 2 — but `failed_step` is DELIBERATELY excluded from the fingerprint key; see step 2d).
      2. Build three normalised segments:
         a. `test_name`: normalise by lowercasing, replacing runs of whitespace with `-`, replacing any non-`[a-z0-9_-]` character with `-`, collapsing repeated `-`, trimming leading/trailing `-`, and capping at 80 chars.
         b. Second segment is a **canonical outcome family**, not blindly the raw `category`. Derive it from `category` plus `error_signature`, `prior_ai_summary`, `failed_task_leaves`, and artifact evidence:
            - Use `timeout` when the observed surface is a deadline, context deadline, timed-out task, missing block/transaction before a wait window elapsed, or an assertoor task that completed with failure because its inner wait expired. Do this even when the input `category` says `assertion`; assertion-vs-timeout is adapter-sensitive noise for long-running checks.
            - Use `assertion` only when the failure is primarily a concrete value/expectation mismatch rather than a wait/deadline surface.
            - Use `crash`, `startup`, `infra`, or `unknown` when those are the dominant outcome families.
            - Normalize the chosen outcome family with the same segment rules as `test_name`.
         c. Third segment is a **canonical failure-mode tag** — NOT the raw error_signature. Two failures describing the SAME underlying bug must produce the SAME tag, even when their narrative wording differs across shards/runs.
         d. To derive the canonical tag from `error_signature` (plus `prior_ai_summary`, `evidence_brief`, `failed_task_leaves`, `affected_client_pairs`, `client_pairs`, `original_artifact_evidence`, and `component_hints` when present for additional context):
            - Identify the 2-4 most-specific TECHNICAL keywords that describe the failure mode. Examples of good tags: `account-nonce-gap`, `txpool-policy-reject`, `txpool-promotion-stuck`, `block-proposal-empty`, `el-p2p-mesh-broken`, `finality-loss`, `client-panic-block-import`, `engine-payload-mismatch`, `attestation-flood`, `testnet-startup-timeout`.
            - DROP all of the following before tag generation:
              * Narrative connectives (`multiple`, `on`, `with`, `from`, `the`, `and`, `is`, `are`).
              * Hedging / softening words (`appears to be`, `seems`, `likely`, `possibly`).
              * Per-shard specifics: pair names (`pair 1`, `1-reth-teku`), shard ids, run ids, hex addresses, uuids, timestamps, counts, port numbers.
              * Pluralisation suffixes when they don't change meaning (`transactions` → `tx`).
            - Usually drop implementation names (`reth`, `teku`, `geth`, …), but KEEP the emitting component name when it is part of the root-cause identifier rather than incidental matrix noise. Good generic shapes: `<client>-<subsystem>-<mechanism>`, `<tool>-<subsystem>-<mechanism>`, or `<network-component>-<mechanism>`.
            - Preserve distinctive client policy/rejection reason words when they are part of the emitted error or documented mechanism, such as `too-large`, `too-low`, `underpriced`, `replacement-underpriced`, `insufficient-funds`, or `invalid-sender`. Do not collapse a thresholded policy rejection into only the generic subsystem name; the emitted qualifier often distinguishes a concrete behavior change from a broad symptom family.
            - Lowercase, kebab-case-join (`-`), cap at 80 chars.
         e. **`failed_step` is deliberately excluded from the fingerprint.** Many assertoor tests have nested task trees where the same root cause is observed at different depths — e.g. an account-state or client-policy mechanism can surface at a leaf workload task on one shard, and at the parent task that owns child operations on another shard. These are the SAME bug seen at different points in the tree, and must produce the same fingerprint. The failed_step is retained on `NormalizedFailure` for human-readable rendering but does NOT participate in matching.
         f. For broad symptom families, split by mechanism when the evidence supports it. Do NOT collapse every "expected activity did not happen" surface into one bucket merely because the top-level test or assertion is the same.
            - When a named client/service emits a concrete RPC/API/log reject/error, derive the tag from that emitting component plus the subsystem/mechanism in the error, e.g. `<client>-<subsystem>-<mechanism>`. Do not tag the caller/tool as owner merely because it submitted the request.
            - Use a caller/workload/account-lifecycle tag when evidence names invalid input, reused state, cancelled work, skipped bookkeeping, account/nonce gaps created before the client receives the request, or another generator-side state-management problem.
            - Use a client txpool-policy or validation tag when a client explicitly rejects, drops, deprioritizes, or refuses to promote the request because of a documented or changed local policy.
            - Use a network/propagation tag when evidence shows sparse or broken peering, discovery problems, peers never connecting, or different clients observing disjoint state that points to propagation failure.
            - Use a promotion/staging tag when requests are accepted but remain queued/pending/staged despite prerequisite state appearing satisfied.
            - Use a late-observation/timeout tag when the expected effect eventually happens after the test deadline/window.
            - Use a generic surface tag only for thin evidence where the symptom is known but source, policy, propagation, and workload mechanisms cannot yet be distinguished.

            Other worked examples (different bugs, different tags):
            - `"reth panic in block_import: index out of bounds at consensus.rs:142"` → `client-panic-block-import` (the client name and line number are per-build noise; the mode is the panic location category)
            - `"teku FATAL: invalid attestation signature on slot 1234"` → `consensus-attestation-validation-failure`
            - `"kurtosis testnet failed during startup"` → `testnet-startup-failure`
         g. When `prior_ai_summary` explicitly names a ROOT CAUSE with concrete evidence, prefer that mechanism wording for the tag; it is already a compact diagnosis hint.
      3. Before finalising the fingerprint, compare the candidate fingerprint and current failure evidence against `existing_issues`:
         - Prefer exact reuse over renaming. If an existing issue's fingerprint, title, and body excerpt describe the SAME underlying mechanism as the current failure, emit that existing issue's exact `cheap_fingerprint`. GitHub open/closed state does not change fingerprint reuse.
         - Treat wording changes as noise when the issue content matches the same mechanism. Examples of wording noise include synonyms like broken/partitioned, stuck/not-promoted, rejected/refused, delayed/timeout, or old/new cluster labels.
         - Match on mechanism, not only on shared top-level test names or broad symptoms. A same-test timeout caused by client txpool policy is NOT the same mechanism as a same-test timeout caused by P2P propagation.
         - When several existing issues look close, choose the one whose body excerpt most specifically explains the observed emitting component, subsystem, and failure mechanism. If still tied, prefer the oldest issue number as the canonical long-lived issue.
         - Existing issues may carry suppression labels such as `ci-investigate:ignore`. Still reuse that issue's exact fingerprint when the mechanism matches; skip/publish decisions are based on issue state outside fingerprint generation.
         - Only mint a new fingerprint when no existing issue body/title describes the current mechanism.
         - Do not mutate or invent aliases here; just choose the final `cheap_fingerprint`.
      4. If no existing issue is reused, join the three normalised segments with `/`:
         `<test_name>/<canonical_outcome_family>/<canonical_failure_mode_tag>`
      5. If any of the three input fields is empty (or the tag cannot be derived from the available evidence), substitute the placeholder `unknown` in that position. Segment count must always be exactly three.

      Bias toward MERGING over splitting when the failure modes are clearly the same despite narrative variation — under-clustering creates one issue per shard for what is one bug. The cost of an incorrect merge is one existing issue update; the cost of an incorrect split is one extra GitHub issue per shard. Merging losses are recoverable, splitting losses are noisy.

      Bias toward SPLITTING when the root-cause mechanism is genuinely different, even if the same top-level assertoor test fails. In particular, split caller/workload state evidence from network propagation evidence and from client-local policy/promotion evidence. When unsure, lean toward the more canonical / less-specific tag that captures the family.

      Also produce a `cluster_label`: a 6-12 word phrase describing the pre-investigation bug surface, e.g. "Client txpool policy rejects nonce-gap workload". This is the early cluster label used for reports and context; the final issue renderer may produce a more precise post-investigation `issue_title` while preserving this fingerprint.

      Return both `cheap_fingerprint` and `cluster_label`.
    inputs:
      failure: ${{ inputs.failure }}
      existing_issues: ${{ inputs.existing_issues }}
    outputs:
      cheap_fingerprint: ${{ result.cheap_fingerprint }}
      cluster_label: ${{ result.cluster_label }}
      schema:
        cheap_fingerprint:
          type: string
          description: Slash-delimited three-segment canonical fingerprint
        cluster_label:
          type: string
          description: Short pre-investigation label for cluster summaries
outputs:
  cheap_fingerprint: ${{ tasks.fingerprint.outputs.cheap_fingerprint }}
  cluster_label: ${{ tasks.fingerprint.outputs.cluster_label }}
