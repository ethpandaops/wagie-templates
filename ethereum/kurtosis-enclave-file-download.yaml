kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/kurtosis-enclave-file-download
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when a workflow needs a Kurtosis enclave file locally; downloads a named file such as genesis data or network configs.
tags: ["kurtosis", "ethereum", "ethpandaops", "files"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 1h
inputs:
  enclave_name:
    type: string
    required: true
    description: Kurtosis enclave that owns the file
  file_name:
    type: string
    required: true
    description: Kurtosis file name to download
tasks:
  download_file:
    selection: {capabilities: [tool-use]}
    run: download-kurtosis-file
    quality-gate: "${{ has(result.summary) }}"
    instructions: |-
      Download a named file from a Kurtosis enclave.

      Use the `kurtosis` CLI as the primary tool surface for this task.
      Download the file and write it as the `file` output artifact.
    inputs:
      enclave_name: ${{ inputs.enclave_name }}
      file_name: ${{ inputs.file_name }}
    outputs:
      file: ${{ result.file }}
      summary: "${{ has(result.summary) ? result.summary : '' }}"
      schema:
        file:
          kind: artifact
          description: Downloaded enclave file
          required: true
        summary:
          type: string
          description: Short download summary
outputs:
  file: ${{ tasks.download_file.outputs.file }}
  summary: ${{ tasks.download_file.outputs.summary }}
