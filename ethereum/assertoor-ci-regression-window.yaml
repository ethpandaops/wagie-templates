kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/assertoor-ci-regression-window
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when an assertoor-test failure needs a factual last-known-good comparison before reproduction, bug-hunt, or source review. Usually called by assertoor-ci-investigate; emits a structured regression window rather than a root-cause verdict.
tags: ["assertoor", "ci", "regression", "baseline", "github-actions", "ethereum", "ethpandaops"]
defaults:
  retryable: true
  timeout: 45m
inputs:
  source_repo:
    type: string
    required: true
    description: GitHub repository whose Actions artifacts should be compared, e.g. ethpandaops/assertoor-test.
  gh_token:
    type: secret
    required: false
    description: Optional GitHub token secret used as GH_TOKEN for gh CLI commands. When unset, use ambient gh authentication.
  workflow_ref:
    type: string
    required: true
    description: Workflow file path or filename to search for the nearest previous success.
  head_branch:
    type: string
    default: ""
    description: Branch of the current failing run. Prefer previous successes on the same branch.
  shard_id:
    type: string
    required: true
    description: Matrix shard id to match across current and previous runs.
  test_name:
    type: string
    default: ""
    description: Failing assertoor test id, used to compare the exact test/config where possible.
  current_run_id:
    type: string
    required: true
    description: Current failing GitHub Actions run id.
  current_run_url:
    type: string
    default: ""
    description: Current failing GitHub Actions run URL.
  current_run_started_at:
    type: string
    default: ""
    description: Current failing run start timestamp.
  current_head_sha:
    type: string
    default: ""
    description: Source commit SHA tested by the current failing run.
  current_failure:
    type: object
    required: true
    description: NormalizedFailure for the representative failed shard.
    schema:
      type: object
      properties:
        shard_id:
          type: string
        test_name:
          type: string
        head_sha:
          type: string
        run_started_at:
          type: string
        artifact_paths:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              path:
                type: string
        kurtosis_params_path:
          type: string
        runtime_components:
          type: array
          items:
            type: object
            properties:
              service_name:
                type: string
              role:
                type: string
              client:
                type: string
              image_ref:
                type: string
              image_id:
                type: string
              manifest_digest:
                type: string
              source_repo:
                type: string
              source_revision:
                type: string
              version:
                type: string
              build_info:
                type: string
        original_artifact_evidence:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              category:
                type: string
              summary:
                type: string
              excerpt:
                type: string
        evidence_brief:
          type: object
          properties:
            headline:
              type: string
            artifact_signal:
              type: string
            component_hints:
              type: string
            routing_notes:
              type: string
tasks:
  build:
    selection:
      capabilities: [tool-use]
    run: assertoor-ci-regression-window
    retryable: true
    timeout: 45m
    quality-gate: "${{ has(result.baseline_summary) && has(result.component_changes) }}"
    instructions: |-
      Build a factual regression window by comparing this failed shard/test against the nearest previous successful workflow run for the same repo, branch, workflow, and shard.

      This task does not assign root cause. It produces structured change facts for downstream bug-hunt, classification, and source review.

      GitHub authentication:
      - `gh_token` is an optional secret. When present, use it only as the `GH_TOKEN` environment variable for `gh` commands and set `GH_PROMPT_DISABLED=1`.
      - When `gh_token` is absent, use the worker's ambient `gh` authentication (`gh auth status` should pass).
      - Command examples below omit the environment wrapper; apply the authentication environment to every `gh` invocation.
      - Do not run `gh auth login`, `gh auth token`, or `gh auth status --show-token`. Do not print, echo, persist, return, or write the token into files. Keep shell tracing and `GH_DEBUG` disabled while a token is in scope.

      Procedure:
      1. Locate the nearest previous successful GitHub Actions run before current_run_started_at.
         - Prefer same workflow_ref, same head_branch, same event class, and same shard_id.
         - Use gh api or gh run list against source_repo.
         - If no previous success is found in the first 100 runs, set baseline_found=false and preserve a useful limitation.
      2. Download that previous success's artifacts for shard_id, especially summary-<shard_id> and enclave-dump-*<shard_id>.
      3. Compare current vs previous:
         - source repo head SHA
         - test file path/commit when test_name is known
         - configured participant image refs from kurtosis-params.yaml
         - runtime image identity from service spec.json: Config.Image, Image, ImageManifestDescriptor.digest, OCI source/version/revision labels
         - startup build/version lines from service output.log
      4. Treat mutable tags such as latest, stable, master, main, nightly, dev, or unpinned repo images as unresolved until converted to a manifest digest or build/source revision from artifacts.
      5. Build component_changes as one row per comparable runtime or configured component:
         {component, service_name, role, previous_image_ref, current_image_ref, previous_digest, current_digest, previous_revision, current_revision, previous_version, current_version, changed, evidence}
      6. Split component_changes into:
         - changed_components: changed=true or strong evidence of different source/build identity
         - unchanged_components: confidently same digest/revision/version
         - unresolved_components: mutable or missing identity where equality cannot be proven
      7. Build target_ranking. Rank components highest when they both changed across the window and emitted concrete original artifact evidence. If no emitter changed, rank the smallest changed set before unresolved components.
      8. Build commit_ranges when both previous_revision and current_revision look like commits in the same source repo.
      9. Render baseline_summary as compact markdown under 100 lines:
         - previous success run id/url/timestamp/head sha
         - current failure run id/url/timestamp/head sha
         - changed components
         - unchanged components
         - unresolved components
         - suggested first diff target

      Degrade gracefully. Missing artifacts should produce baseline_found=false or unresolved components, not a failed task.
    inputs:
      source_repo: ${{ inputs.source_repo }}
      gh_token: ${{ inputs.?gh_token }}
      workflow_ref: ${{ inputs.workflow_ref }}
      head_branch: ${{ inputs.head_branch }}
      shard_id: ${{ inputs.shard_id }}
      test_name: ${{ inputs.test_name }}
      current_run_id: ${{ inputs.current_run_id }}
      current_run_url: ${{ inputs.current_run_url }}
      current_run_started_at: ${{ inputs.current_run_started_at }}
      current_head_sha: ${{ inputs.current_head_sha }}
      current_failure: ${{ inputs.current_failure }}
    outputs:
      baseline_found: "${{ has(result.baseline_found) ? result.baseline_found : false }}"
      previous_success_run_id: "${{ has(result.previous_success_run_id) ? result.previous_success_run_id : '' }}"
      previous_success_run_url: "${{ has(result.previous_success_run_url) ? result.previous_success_run_url : '' }}"
      previous_success_started_at: "${{ has(result.previous_success_started_at) ? result.previous_success_started_at : '' }}"
      previous_success_head_sha: "${{ has(result.previous_success_head_sha) ? result.previous_success_head_sha : '' }}"
      current_run_id: "${{ inputs.current_run_id }}"
      current_run_url: "${{ inputs.current_run_url }}"
      current_run_started_at: "${{ inputs.current_run_started_at }}"
      current_head_sha: "${{ inputs.current_head_sha }}"
      same_source_sha: "${{ has(result.same_source_sha) ? result.same_source_sha : false }}"
      same_test_sha: "${{ has(result.same_test_sha) ? result.same_test_sha : false }}"
      baseline_summary: "${{ result.baseline_summary }}"
      component_changes: "${{ has(result.component_changes) ? result.component_changes : [] }}"
      changed_components: "${{ has(result.changed_components) ? result.changed_components : [] }}"
      unchanged_components: "${{ has(result.unchanged_components) ? result.unchanged_components : [] }}"
      unresolved_components: "${{ has(result.unresolved_components) ? result.unresolved_components : [] }}"
      target_ranking: "${{ has(result.target_ranking) ? result.target_ranking : [] }}"
      commit_ranges: "${{ has(result.commit_ranges) ? result.commit_ranges : [] }}"
      confidence: "${{ has(result.confidence) ? result.confidence : 0 }}"
      limitations: "${{ has(result.limitations) ? result.limitations : [] }}"
      schema:
        baseline_found:
          type: boolean
        previous_success_run_id:
          type: string
        previous_success_run_url:
          type: string
        previous_success_started_at:
          type: string
        previous_success_head_sha:
          type: string
        current_run_id:
          type: string
        current_run_url:
          type: string
        current_run_started_at:
          type: string
        current_head_sha:
          type: string
        same_source_sha:
          type: boolean
        same_test_sha:
          type: boolean
        baseline_summary:
          type: string
        component_changes:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              role:
                type: string
              previous_image_ref:
                type: string
              current_image_ref:
                type: string
              previous_digest:
                type: string
              current_digest:
                type: string
              previous_revision:
                type: string
              current_revision:
                type: string
              previous_version:
                type: string
              current_version:
                type: string
              changed:
                type: boolean
              evidence:
                type: string
        changed_components:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              role:
                type: string
              previous_image_ref:
                type: string
              current_image_ref:
                type: string
              previous_digest:
                type: string
              current_digest:
                type: string
              previous_revision:
                type: string
              current_revision:
                type: string
              changed:
                type: boolean
              evidence:
                type: string
        unchanged_components:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              role:
                type: string
              previous_digest:
                type: string
              current_digest:
                type: string
              previous_revision:
                type: string
              current_revision:
                type: string
              evidence:
                type: string
        unresolved_components:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              role:
                type: string
              previous_image_ref:
                type: string
              current_image_ref:
                type: string
              reason:
                type: string
              evidence:
                type: string
        target_ranking:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              target_kind:
                type: string
              rank:
                type: number
              reason:
                type: string
              confidence:
                type: number
        commit_ranges:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              repo_url:
                type: string
              previous_revision:
                type: string
              current_revision:
                type: string
              range:
                type: string
        confidence:
          type: number
        limitations:
          type: array
          items:
            type: string
outputs:
  baseline_found: ${{ tasks.build.outputs.baseline_found }}
  previous_success_run_id: ${{ tasks.build.outputs.previous_success_run_id }}
  previous_success_run_url: ${{ tasks.build.outputs.previous_success_run_url }}
  previous_success_started_at: ${{ tasks.build.outputs.previous_success_started_at }}
  previous_success_head_sha: ${{ tasks.build.outputs.previous_success_head_sha }}
  current_run_id: ${{ tasks.build.outputs.current_run_id }}
  current_run_url: ${{ tasks.build.outputs.current_run_url }}
  current_run_started_at: ${{ tasks.build.outputs.current_run_started_at }}
  current_head_sha: ${{ tasks.build.outputs.current_head_sha }}
  same_source_sha: ${{ tasks.build.outputs.same_source_sha }}
  same_test_sha: ${{ tasks.build.outputs.same_test_sha }}
  baseline_summary: ${{ tasks.build.outputs.baseline_summary }}
  component_changes: ${{ tasks.build.outputs.component_changes }}
  changed_components: ${{ tasks.build.outputs.changed_components }}
  unchanged_components: ${{ tasks.build.outputs.unchanged_components }}
  unresolved_components: ${{ tasks.build.outputs.unresolved_components }}
  target_ranking: ${{ tasks.build.outputs.target_ranking }}
  commit_ranges: ${{ tasks.build.outputs.commit_ranges }}
  confidence: ${{ tasks.build.outputs.confidence }}
  limitations: ${{ tasks.build.outputs.limitations }}
  regression_window: |-
    ${{
      {
        "baseline_found": tasks.build.outputs.baseline_found,
        "previous_success_run_id": tasks.build.outputs.previous_success_run_id,
        "previous_success_run_url": tasks.build.outputs.previous_success_run_url,
        "previous_success_started_at": tasks.build.outputs.previous_success_started_at,
        "previous_success_head_sha": tasks.build.outputs.previous_success_head_sha,
        "current_run_id": tasks.build.outputs.current_run_id,
        "current_run_url": tasks.build.outputs.current_run_url,
        "current_run_started_at": tasks.build.outputs.current_run_started_at,
        "current_head_sha": tasks.build.outputs.current_head_sha,
        "same_source_sha": tasks.build.outputs.same_source_sha,
        "same_test_sha": tasks.build.outputs.same_test_sha,
        "baseline_summary": tasks.build.outputs.baseline_summary,
        "component_changes": tasks.build.outputs.component_changes,
        "changed_components": tasks.build.outputs.changed_components,
        "unchanged_components": tasks.build.outputs.unchanged_components,
        "unresolved_components": tasks.build.outputs.unresolved_components,
        "target_ranking": tasks.build.outputs.target_ranking,
        "commit_ranges": tasks.build.outputs.commit_ranges,
        "confidence": tasks.build.outputs.confidence,
        "limitations": tasks.build.outputs.limitations
      }
    }}
