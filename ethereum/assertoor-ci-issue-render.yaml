kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/assertoor-ci-issue-render
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when assertoor CI triage needs canonical GitHub issue bodies for pending or completed per-cluster investigations. Usually called by assertoor-ci-investigate before ci-investigate-issue-upsert-by-fingerprint.
tags: ["assertoor", "ci", "github-issues", "triage", "render"]
defaults:
  retryable: true
  timeout: 30m
inputs:
  mode:
    type: string
    required: true
    options: [pending, final, recurrence]
    description: Render pending reservation bodies, final completed investigation bodies, or recurrence-only updates for already-complete issues.
  clusters:
    type: array
    default: []
    description: Cluster objects aligned with cluster_fingerprints, cluster_human_labels, and statuses. Required for pending mode.
    schema:
      type: array
      items:
        type: object
        properties:
          cheap_fingerprint:
            type: string
          human_label:
            type: string
          representative_index:
            type: number
          member_shard_ids:
            type: array
            items:
              type: string
          member_count:
            type: number
  cluster_fingerprints:
    type: array
    default: []
    description: Cheap fingerprints aligned with clusters. Required for pending mode.
    schema:
      type: array
      items:
        type: string
  cluster_human_labels:
    type: array
    default: []
    description: Human labels aligned with clusters. Required for pending mode.
    schema:
      type: array
      items:
        type: string
  statuses:
    type: array
    default: []
    description: State-check statuses aligned with clusters.
    schema:
      type: array
      items:
        type: object
        properties:
          fingerprint:
            type: string
          status:
            type: string
          issue_number:
            type: number
          issue_url:
            type: string
          issue_state:
            type: string
          classification:
            type: string
          first_seen_run:
            type: string
          last_seen_run:
            type: string
          last_seen_at:
            type: string
          last_investigated_run:
            type: string
          last_investigated_at:
            type: string
          title_locked:
            type: boolean
  raw_findings:
    type: array
    default: []
    description: Nested per-cluster investigation findings from assertoor-ci-investigate. Required for final mode.
    schema:
      type: array
      items:
        type: object
        properties:
          cluster_idx:
            type: number
          cheap_fingerprint:
            type: string
          human_label:
            type: string
          cluster:
            type: object
            properties:
              member_shard_ids:
                type: array
                items:
                  type: string
              representative_index:
                type: number
              member_count:
                type: number
              member_indices:
                type: array
                items:
                  type: number
              rationale:
                type: string
          status:
            type: object
            properties:
              status:
                type: string
              issue_number:
                type: number
              issue_url:
                type: string
              issue_state:
                type: string
              classification:
                type: string
              first_seen_run:
                type: string
              last_seen_run:
                type: string
              last_seen_at:
                type: string
              last_investigated_run:
