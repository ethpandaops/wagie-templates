    description: Existing GitHub issue bodies aligned or keyed by cheap_fingerprint. Used to preserve recurrence, covered-stale pending bodies, and covered-complete bodies.
    schema:
      type: array
      items:
        type: object
        properties:
          cheap_fingerprint:
            type: string
          issue_body:
            type: string
  target_repo:
    type: string
    default: ""
    description: GitHub repository where issues are written, used only for prose/link context.
  run_id:
    type: string
    required: true
    description: Current failing GitHub Actions run id.
  run_url:
    type: string
    default: ""
    description: Current failing GitHub Actions run URL.
  run_started_at:
    type: string
    default: ""
