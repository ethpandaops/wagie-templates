kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/assertoor-ci-run-report
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when an assertoor CI investigation has finished and needs an operator-facing markdown run report. Usually called by assertoor-ci-investigate after issue rendering and publishing.
tags: ["assertoor", "ci", "report", "triage", "summary"]
defaults:
  retryable: true
  timeout: 30m
inputs:
  source_repo:
    type: string
    required: true
    description: GitHub repository where the CI run occurred.
  issue_repo:
    type: string
    required: true
    description: GitHub repository where canonical ci-investigate issues are created or updated.
  workflow_ref:
    type: string
    required: true
    description: Workflow file path or filename selected by the caller.
  requested_run_id:
    type: string
    default: ""
    description: Run id provided by the caller, when pinned; empty means the fetch step selected the run.
  schema_version:
    type: number
    required: true
    description: Marker schema version used by the investigation.
  skip_reproduction:
    type: boolean
    required: true
    description: Whether the investigation skipped local Kurtosis reproduction.
  max_bug_hunt_rounds:
    type: number
    required: true
    description: Maximum bug-hunt rounds used by the investigation.
  reproduction_attempt_timeout_minutes:
    type: number
    required: true
    description: Per-attempt timeout used by the reproduction watcher.
  reproduction_attempts:
    type: number
    required: true
    description: Maximum reproduction attempts per cluster.
  narrow_to_failing_test:
    type: boolean
    required: true
    description: Whether reproduction narrowed the assertoor queue to the originally failing test.
  enable_source_dive:
    type: boolean
    required: true
    description: Whether source-dive investigation was enabled.
  discord_min_confidence:
    type: number
    default: 85
    description: Minimum notification confidence required for Discord notification inclusion for known-classification issues.
  staleness_days:
    type: number
    required: true
    description: Staleness threshold used by issue state-check.
  closed_context_days:
    type: number
    required: true
    description: Recently closed issue context window used for fingerprint naming only.
  run_id:
    type: string
    required: true
    description: GitHub Actions run id actually investigated.
  run_url:
    type: string
    required: true
    description: URL of the GitHub Actions run actually investigated.
  run_started_at:
    type: string
    default: ""
    description: Run start timestamp from GitHub Actions, when available.
  head_sha:
    type: string
    default: ""
    description: Head commit SHA for the run.
  head_branch:
    type: string
    default: ""
    description: Head branch for the run.
  workflow_path:
    type: string
    default: ""
    description: Workflow path reported by the fetch step.
  no_failures:
    type: boolean
    default: false
    description: True when the selected run had no failures to investigate.
  failures_count:
    type: number
    default: 0
    description: Number of failed shards or jobs from the fetched run.
  clusters_count:
    type: number
    default: 0
    description: Number of root-cause clusters produced by clustering.
  clusters:
    type: array
    default: []
    description: Root-cause clusters from failure clustering.
    schema:
      type: array
      items:
        type: object
        properties:
          cheap_fingerprint:
            type: string
          human_label:
            type: string
          representative_index:
            type: number
          member_indices:
            type: array
            items:
              type: number
          member_shard_ids:
            type: array
            items:
              type: string
          member_count:
            type: number
          rationale:
            type: string
  state_check_statuses:
    type: array
    default: []
    description: Issue state-check results aligned to clusters.
    schema:
      type: array
      items:
        type: object
        properties:
          fingerprint:
            type: string
          status:
            type: string
          issue_number:
            type: number
          issue_url:
            type: string
          state:
            type: string
          issue_state:
            type: string
          marker_state:
            type: string
          last_seen_at:
            type: string
          last_investigated_at:
            type: string
  worklist_items:
    type: array
    default: []
    description: Worklist entries that were investigated or resumed.
    schema:
      type: array
      items:
        type: object
        properties:
          cluster_index:
            type: number
          fingerprint:
            type: string
          action:
            type: string
          state_check_status:
            type: string
          issue_number:
            type: number
          issue_url:
            type: string
          reason:
            type: string
  recurrence_worklist_items:
    type: array
    default: []
    description: Worklist entries that were recurrence-updated without expensive investigation worker placement.
    schema:
      type: array
      items:
        type: object
        properties:
          cluster_index:
            type: number
          fingerprint:
            type: string
          action:
            type: string
          state_check_status:
            type: string
          issue_number:
            type: number
          issue_url:
            type: string
          reason:
            type: string
  skipped_worklist_items:
    type: array
    default: []
    description: Worklist entries skipped because no action was needed, another pending issue already owns them, or the status was unknown.
    schema:
      type: array
      items:
        type: object
        properties:
          cluster_index:
            type: number
          fingerprint:
            type: string
          state_check_status:
            type: string
          issue_number:
            type: number
          issue_url:
            type: string
          reason:
            type: string
  pending_publish_results:
    type: array
    default: []
    description: GitHub issue create/update results from the early pending reservation publish.
    schema:
      type: array
      items:
        type: object
        properties:
          cheap_fingerprint:
            type: string
          issue_number:
            type: number
          issue_url:
            type: string
          action:
            type: string
          issue_body_chars:
            type: number
          deduplicated_issue_numbers:
            type: array
            items:
              type: number
          note:
            type: string
  recurrence_publish_results:
    type: array
    default: []
    description: GitHub issue update results from recurrence-only covered-complete issue updates.
    schema:
      type: array
      items:
        type: object
        properties:
          cheap_fingerprint:
            type: string
          issue_number:
            type: number
          issue_url:
            type: string
          action:
            type: string
          issue_body_chars:
            type: number
          deduplicated_issue_numbers:
            type: array
            items:
              type: number
          note:
            type: string
  raw_findings:
    type: array
    default: []
    description: Per-cluster investigation findings emitted by assertoor-ci-investigate.
    schema:
      type: array
      items:
        type: object
        properties:
          cluster_idx:
            type: number
          cheap_fingerprint:
            type: string
          human_label:
            type: string
          representative:
            type: object
            properties:
              test_name:
                type: string
              shard_id:
                type: string
              category:
                type: string
              affected_client_pairs:
                type: array
                items:
                  type: string
              artifact_coverage:
                type: object
                properties:
                  has_summary:
                    type: boolean
                  has_enclave_dump:
                    type: boolean
                  has_claude_output:
                    type: boolean
                  has_kurtosis_params:
                    type: boolean
                  missing:
                    type: array
                    items:
                      type: string
                  notes:
                    type: string
          test_inspection:
            type: object
            properties:
              summary:
                type: string
          reproduction:
            type: object
            properties:
              attempted:
                type: boolean
              launched:
                type: boolean
              reproduced:
                type: boolean
              test_result:
                type: string
              summary:
                type: string
          regression:
            type: object
            properties:
              summary:
                type: string
          bug_hunt:
            type: object
            properties:
              summary:
                type: string
          classification:
            type: object
            properties:
              decision:
                type: string
              confidence:
                type: number
              reasoning:
                type: string
          source_dive:
            type: object
            properties:
              target_kind:
                type: string
              cloned:
                type: boolean
              root_cause_description:
                type: string
              repo_url:
                type: string
              commit_sha:
                type: string
              component:
                type: string
              client_name:
                type: string
              resolution_method:
                type: string
              commit_exact:
                type: boolean
              resolution_caveat:
                type: string
              recent_change_signal:
                type: number
              recent_change_signal_notes:
                type: string
          launcher_audit:
            type: object
            properties:
              summary:
                type: string
              verdict:
                type: string
  cluster_reports:
    type: array
    default: []
    description: Canonical per-cluster issue bodies and labels produced by issue rendering.
    schema:
      type: array
      items:
        type: object
        properties:
          cheap_fingerprint:
            type: string
          human_label:
            type: string
          classification:
            type: string
          classification_confidence:
            type: number
          owner_confidence:
            type: number
          mechanism_confidence:
            type: number
          source_identity_confidence:
            type: number
          regression_pin_confidence:
            type: number
          diagnosis_confidence:
            type: number
          notification_confidence:
            type: number
          issue_body_md:
            type: string
          labels:
            type: array
            items:
              type: string
          existing_issue_number:
            type: number
          state_check_status:
            type: string
          desired_state:
            type: string
  recurrence_cluster_reports:
    type: array
    default: []
    description: Canonical issue bodies and labels produced by recurrence-only rendering.
    schema:
      type: array
      items:
        type: object
        properties:
          cheap_fingerprint:
            type: string
          human_label:
            type: string
          classification:
            type: string
          classification_confidence:
            type: number
          owner_confidence:
            type: number
          mechanism_confidence:
            type: number
          source_identity_confidence:
            type: number
          regression_pin_confidence:
            type: number
          diagnosis_confidence:
            type: number
          notification_confidence:
            type: number
          issue_body_md:
            type: string
          labels:
            type: array
            items:
              type: string
          existing_issue_number:
            type: number
          state_check_status:
            type: string
          desired_state:
            type: string
  publish_results:
    type: array
    default: []
    description: GitHub issue create/update/dedup/skipped results from issue upsert.
    schema:
      type: array
      items:
        type: object
        properties:
          cheap_fingerprint:
            type: string
          issue_number:
            type: number
          issue_url:
            type: string
          action:
            type: string
          issue_body_chars:
            type: number
          deduplicated_issue_numbers:
            type: array
            items:
              type: number
          note:
            type: string
tasks:
  render:
    selection:
      capabilities: [reasoning]
    run: render-assertoor-ci-run-report
    quality-gate: "${{ has(result.summary) && size(result.summary) > 0 }}"
    instructions: |-
      Produce an operator-facing markdown report for this ci-investigate run. The reader is whoever opened the artifact looking for "what happened in last night's triage?" - write for that audience.

      The report is delivered both as a `report` markdown artifact and a short `summary` string suitable for a Slack/Discord message or a workflow step-summary header.

      Sections (in order):

      1. **Title + run metadata.** Title: `# CI Investigation Report - <human-friendly run identifier>`. Below it: source repo (read-only, where the CI ran), issue repo (where issues land - call out explicitly when source and issue repo differ), workflow path, run id linked to run_url, run started_at, head branch + short SHA.

      2. **Top-line verdict (3-5 bullets).** Counts of: failed shards, root-cause clusters, issues created vs updated vs recurrence-only updated vs deduplicated vs skipped. When `no_failures == true`, say so prominently and skip downstream sections.

      3. **Per-cluster table.** One row per cluster in publish order, including recurrence-only updates. Columns: `#`, `Cluster label`, `Classification (notify/diag confidence)`, `Issue`, `Action`, `Members`, `Affected pairs`, `Reproduced?`. The `Issue` column links to the canonical issue (use `<issue_url>` from publish_results or recurrence_publish_results). The `Action` column shows `created | updated | recurrence | deduplicated | skipped`. For final investigation rows, read labels/confidence from `cluster_reports`. For recurrence-only rows, read classification from `recurrence_cluster_reports` but render confidence as `prior diagnosis preserved` or `not rerun` instead of showing zero-valued current confidence fields. `Reproduced?` reflects the nested `reproduction` outcome (`yes`, `no (success)`, `no (timeout)`, `blocked`, `skipped`, `launch failed`) or `not rerun` for recurrence-only updates.

      4. **Per-cluster notes.** Keep this as an index, not a duplicate copy of the canonical issue body. Use at most 3 bullets per touched issue:
         - Issue link, action, and state-check status.
         - Classification, notification confidence, diagnosis confidence, regression-pin confidence, and one-line owner reasoning. For recurrence-only updates, say the prior diagnosis was preserved and do not show zero current confidence values as a fresh verdict.
         - Only the highest-signal reproduction/regression/source-dive note, with code details left to the issue body.

      Read original CI context from `raw_findings[].representative.*` and stage outcomes from nested objects (`test_inspection`, `reproduction`, `regression`, `bug_hunt`, `classification`, `source_dive`, `launcher_audit`).

      5. **Notable events.** Bullet list of anything worth flagging:
         - Pending reservations created or updated before investigation (use `pending_publish_results`).
         - Recurrence-only issues updated without Kurtosis investigation (use `recurrence_publish_results`).
         - Clusters skipped by worklist policy because they were already recorded for this run, another pending issue owns them, or the status was unknown (use `skipped_worklist_items`).
         - Duplicate issues closed by reconciliation (use `deduplicated_issue_numbers` from publish_results).
         - Source-dive resolution failures (target_kind != skip but cloned=false).
         - Any cluster where `publish action == skipped` due to the `ci-investigate:ignore` label.
         - When `clusters_count == 0` but `failures_count > 0` (everything was deduped or covered) say so.
         Skip the section if nothing notable.

      6. **Inputs trail.** A small footer listing the inputs that produced this run: `source_repo`, `issue_repo`, `workflow_ref`, `requested_run_id` (when caller-pinned), `skip_reproduction`, `reproduction_attempts`, `reproduction_attempt_timeout_minutes`, `narrow_to_failing_test`, `max_bug_hunt_rounds`, `enable_source_dive`, `discord_min_confidence`, `staleness_days`, `closed_context_days`, `schema_version`.

      Length: roughly 30-90 lines depending on cluster count. Do not embed raw log dumps or long source-dive prose; those live in CI artifacts and the canonical issue body.

      `summary` (separate output): a 4-8 line plain-text/markdown TL;DR suitable for a Discord/Slack post. Format roughly: one headline line, one counts line, one bullet per touched issue (label + link + action + notification confidence when available, plus diagnosis/regression-pin confidence when materially lower). Never longer than 1500 chars.

      Always write the markdown report to the `report` artifact slot. Always emit `summary`. When `no_failures == true`, both should still be produced - a "nothing failed tonight" report is itself useful.
    inputs:
      source_repo: ${{ inputs.source_repo }}
      issue_repo: ${{ inputs.issue_repo }}
      workflow_ref: ${{ inputs.workflow_ref }}
      requested_run_id: ${{ inputs.requested_run_id }}
      schema_version: ${{ inputs.schema_version }}
      skip_reproduction: ${{ inputs.skip_reproduction }}
      max_bug_hunt_rounds: ${{ inputs.max_bug_hunt_rounds }}
      reproduction_attempt_timeout_minutes: ${{ inputs.reproduction_attempt_timeout_minutes }}
      reproduction_attempts: ${{ inputs.reproduction_attempts }}
      narrow_to_failing_test: ${{ inputs.narrow_to_failing_test }}
      enable_source_dive: ${{ inputs.enable_source_dive }}
      discord_min_confidence: ${{ inputs.discord_min_confidence }}
      staleness_days: ${{ inputs.staleness_days }}
      closed_context_days: ${{ inputs.closed_context_days }}
      run_id: ${{ inputs.run_id }}
      run_url: ${{ inputs.run_url }}
      run_started_at: ${{ inputs.run_started_at }}
      head_sha: ${{ inputs.head_sha }}
      head_branch: ${{ inputs.head_branch }}
      workflow_path: ${{ inputs.workflow_path }}
      no_failures: ${{ inputs.no_failures }}
      failures_count: ${{ inputs.failures_count }}
      clusters_count: ${{ inputs.clusters_count }}
      clusters: ${{ inputs.clusters }}
      state_check_statuses: ${{ inputs.state_check_statuses }}
      worklist_items: ${{ inputs.worklist_items }}
      recurrence_worklist_items: ${{ inputs.recurrence_worklist_items }}
      skipped_worklist_items: ${{ inputs.skipped_worklist_items }}
      raw_findings: ${{ inputs.raw_findings }}
      cluster_reports: ${{ inputs.cluster_reports }}
      recurrence_cluster_reports: ${{ inputs.recurrence_cluster_reports }}
      pending_publish_results: ${{ inputs.pending_publish_results }}
      recurrence_publish_results: ${{ inputs.recurrence_publish_results }}
      publish_results: ${{ inputs.publish_results }}
    outputs:
      summary: ${{ result.summary }}
      schema:
        report:
          kind: artifact
          content-type: text/markdown
          description: Operator-facing markdown report summarising the whole ci-investigate run
          required: true
        summary:
          type: string
          description: Short plain-text/markdown TL;DR (suitable for a Discord/Slack post or workflow step-summary header)
outputs:
  report: ${{ tasks.render.outputs.report }}
  summary: ${{ tasks.render.outputs.summary }}
