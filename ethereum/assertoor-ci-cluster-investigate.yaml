kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/assertoor-ci-cluster-investigate
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when one assertoor CI failure cluster needs recurrence update, local Kurtosis reproduction, live bug-hunt, classification, source-dive, and cleanup. Usually called by assertoor-ci-investigate.
tags: ["assertoor", "ci", "ethereum", "cluster", "investigation", "kurtosis", "source-dive"]
defaults:
  retryable: true
  timeout: 30h
inputs:
  cluster_idx:
    type: number
    required: true
  cluster:
    type: object
    required: true
    schema:
      type: object
      properties:
        member_shard_ids:
          type: array
          items:
            type: string
        representative_index:
          type: number
        member_count:
          type: number
  cheap_fingerprint:
    type: string
    required: true
  human_label:
    type: string
    required: true
  status:
    type: object
    required: true
    schema:
      type: object
      properties:
        status:
          type: string
        issue_number:
          type: number
        issue_url:
          type: string
  work_action:
    type: string
    default: investigate
    options: [investigate, resume, recurrence]
    description: Worklist action. `recurrence` updates issue state only; other values may run expensive investigation.
  representative:
    type: object
    required: true
    schema:
      type: object
      properties:
        test_name:
          type: string
        failed_step:
          type: string
        root_failed_step:
          type: string
        category:
          type: string
        error_signature:
          type: string
        shard_id:
          type: string
        head_sha:
          type: string
        kurtosis_params_path:
          type: string
        prior_ai_summary:
          type: string
        log_excerpts:
          type: array
          items:
            type: string
        evidence_brief:
          type: object
          properties:
            headline:
              type: string
            failure_shape:
              type: string
            client_scope:
              type: string
            task_scope:
              type: string
            artifact_signal:
              type: string
            component_hints:
              type: string
            routing_notes:
              type: string
        artifact_coverage:
          type: object
          properties:
            has_summary:
              type: boolean
            has_enclave_dump:
              type: boolean
            has_claude_output:
              type: boolean
            has_kurtosis_params:
              type: boolean
            missing:
              type: array
              items:
                type: string
            notes:
              type: string
  skip_reproduction:
    type: boolean
    default: false
  max_bug_hunt_rounds:
    type: number
    default: 3
  reproduction_attempt_timeout_minutes:
    type: number
    default: 360
  reproduction_attempts:
    type: number
    default: 4
  narrow_to_failing_test:
    type: boolean
    default: false
  enable_source_dive:
    type: boolean
    default: true
  source_repo:
    type: string
    required: true
  gh_token:
    type: secret
    required: false
    description: Optional GitHub token secret passed to GitHub-facing child templates as GH_TOKEN. When unset, children use ambient gh authentication.
  enclave_name:
    type: string
    required: true
  workflow_ref:
    type: string
    required: true
  head_branch:
    type: string
    default: ""
  run_id:
    type: string
    required: true
  run_url:
    type: string
    default: ""
  run_started_at:
    type: string
    default: ""
tasks:
  reproduce:
    if: "${{ inputs.work_action != 'recurrence' && inputs.skip_reproduction != true && inputs.status.status != 'covered-complete' && has(inputs.representative.kurtosis_params_path) && inputs.representative.kurtosis_params_path != '' }}"
    uses: io.ethpandaops/assertoor-ci-kurtosis-reproduce@1.0.0
    inputs:
      enclave_name: ${{ inputs.enclave_name }}
      kurtosis_params_path: ${{ inputs.representative.kurtosis_params_path }}
      assertoor_test_name: ${{ inputs.representative.test_name }}
      reproduction_attempt_timeout_minutes: ${{ inputs.reproduction_attempt_timeout_minutes }}
      narrow_to_failing_test: ${{ inputs.narrow_to_failing_test }}
      reproduction_attempts: ${{ inputs.reproduction_attempts }}
      prior_summary: "${{ has(inputs.representative.prior_ai_summary) ? inputs.representative.prior_ai_summary : '' }}"
    outputs:
      launched: launched
      enclave_name: enclave_name
      assertoor_url: assertoor_url
      services: services
      launch_summary: launch_summary
      reproduced: reproduced
      test_result: test_result
      reproduction_summary: reproduction_summary
      evidence: evidence
      matches_prior: matches_prior
      attempts_made: attempts_made
      attempts_converged: attempts_converged
      attempt_log: attempt_log
  inspect_test:
    if: "${{ inputs.work_action != 'recurrence' && inputs.status.status != 'covered-complete' && has(inputs.representative.test_name) && inputs.representative.test_name != '' && inputs.representative.test_name != 'kurtosis-startup' }}"
    uses: io.ethpandaops/assertoor-ci-test-inspect@1.0.0
    inputs:
      test_name: ${{ inputs.representative.test_name }}
      source_repo: ${{ inputs.source_repo }}
      gh_token: ${{ inputs.?gh_token }}
      head_sha: "${{ has(inputs.representative.head_sha) ? inputs.representative.head_sha : '' }}"
    outputs:
      test_summary: test_summary
      recent_test_changes: recent_test_changes
  regression_window:
    if: "${{ inputs.work_action != 'recurrence' && inputs.status.status != 'covered-complete' && has(inputs.representative.shard_id) && inputs.representative.shard_id != '' }}"
    uses: io.ethpandaops/assertoor-ci-regression-window@1.0.0
    inputs:
      source_repo: ${{ inputs.source_repo }}
      gh_token: ${{ inputs.?gh_token }}
      workflow_ref: ${{ inputs.workflow_ref }}
      head_branch: ${{ inputs.head_branch }}
      shard_id: ${{ inputs.representative.shard_id }}
      test_name: ${{ inputs.representative.test_name }}
      current_run_id: ${{ inputs.run_id }}
      current_run_url: ${{ inputs.run_url }}
      current_run_started_at: ${{ inputs.run_started_at }}
      current_head_sha: "${{ has(inputs.representative.head_sha) ? inputs.representative.head_sha : '' }}"
      current_failure: ${{ inputs.representative }}
    outputs:
      baseline_found: baseline_found
      previous_success_run_id: previous_success_run_id
      previous_success_run_url: previous_success_run_url
      previous_success_started_at: previous_success_started_at
      previous_success_head_sha: previous_success_head_sha
      baseline_summary: baseline_summary
      component_changes: component_changes
      changed_components: changed_components
      unchanged_components: unchanged_components
      unresolved_components: unresolved_components
      target_ranking: target_ranking
      commit_ranges: commit_ranges
      confidence: confidence
      limitations: limitations
      regression_window: regression_window
  bug_hunt:
    needs: [reproduce, inspect_test, regression_window]
    if: "${{ has(tasks.reproduce.outputs.reproduced) && tasks.reproduce.outputs.reproduced == true }}"
    uses: io.ethpandaops/kurtosis-ethereum-bug-hunt@1.0.0
    inputs:
      enclave_name: ${{ inputs.enclave_name }}
      launch: false
      auto_cleanup: false
      config_source: "existing-enclave"
      max_iterations: ${{ inputs.max_bug_hunt_rounds }}
      min_iterations: 1
      stop_on_sufficient: true
      prior_summary: "${{ has(inputs.representative.prior_ai_summary) ? inputs.representative.prior_ai_summary : '' }}"
      test_context: "${{ has(tasks.inspect_test.outputs.test_summary) ? tasks.inspect_test.outputs.test_summary : '' }}"
      regression_window: "${{ has(tasks.regression_window.outputs.regression_window) ? tasks.regression_window.outputs.regression_window : {} }}"
      hunt_focus: "${{ inputs.representative.category == 'infra-startup' ? 'service-health' : 'general' }}"
      goal: |-
        Investigate this assertoor failure that just reproduced locally on the live enclave.
        Test: ${{ inputs.representative.test_name }}
        Failed step: ${{ inputs.representative.failed_step }}
        Root failed step: ${{ has(inputs.representative.root_failed_step) ? inputs.representative.root_failed_step : inputs.representative.failed_step }}
        Failure category: ${{ inputs.representative.category }}
        Error signature: ${{ inputs.representative.error_signature }}
        Cluster label: ${{ inputs.human_label }}
        Affected shards: ${{ inputs.cluster.member_shard_ids }}
        Evidence brief:
        - Headline: ${{ has(inputs.representative.evidence_brief.headline) ? inputs.representative.evidence_brief.headline : '' }}
        - Failure shape: ${{ has(inputs.representative.evidence_brief.failure_shape) ? inputs.representative.evidence_brief.failure_shape : '' }}
        - Client scope: ${{ has(inputs.representative.evidence_brief.client_scope) ? inputs.representative.evidence_brief.client_scope : '' }}
        - Task scope: ${{ has(inputs.representative.evidence_brief.task_scope) ? inputs.representative.evidence_brief.task_scope : '' }}
        - Original artifact signal: ${{ has(inputs.representative.evidence_brief.artifact_signal) ? inputs.representative.evidence_brief.artifact_signal : '' }}
        - Component hints: ${{ has(inputs.representative.evidence_brief.component_hints) ? inputs.representative.evidence_brief.component_hints : '' }}
        - Routing notes: ${{ has(inputs.representative.evidence_brief.routing_notes) ? inputs.representative.evidence_brief.routing_notes : '' }}
        Regression window summary:
        ${{ has(tasks.regression_window.outputs.baseline_summary) ? tasks.regression_window.outputs.baseline_summary : 'not available' }}
        Regression target ranking:
        ${{ has(tasks.regression_window.outputs.target_ranking) ? tasks.regression_window.outputs.target_ranking : [] }}

        Focus on confirming the root cause rather than rediscovering symptoms. The CI-side prior summary and original artifact evidence are provided separately; validate or refute them with concrete enclave evidence (logs, state, RPC). Compare the live reproduced enclave against the original dump evidence and distinguish mechanisms when relevant: devnet/network propagation, client-local policy or state handling, caller/workload account lifecycle, test design/config, and plain infra flake.

        Investigation order:
        - If the original artifacts contain a concrete RPC/API/log error emitted by a named client/service, probe that emitting component first: logs, RPC/API state, runtime image/build identity, and behavior. Treat the caller/orchestrator/generator as fallback unless there is evidence it sent invalid input.
        - If the reproduced enclave differs from the original run because test lists, timeouts, config, image tags, or workload parameters changed, mark the repro as non-faithful. Explain the repro, but do not let it override the original artifact signal.
        - Use the previous-success baseline to ask what changed between last known-good and current failure. Floating tags are meaningful only after resolving to digest/build/source revision from artifacts.
    outputs:
      findings: findings
      remaining_gaps: remaining_gaps
      summary: summary
      recommended_actions: recommended_actions
      completeness: completeness
      information_gain: information_gain
      iterations_used: iterations_used
      converged: converged
  classify:
    needs: [reproduce, bug_hunt, regression_window]
    if: "${{ inputs.work_action != 'recurrence' && inputs.status.status != 'covered-complete' }}"
    uses: io.ethpandaops/assertoor-ci-classify@1.0.0
    inputs:
      human_label: ${{ inputs.human_label }}
      representative: ${{ inputs.representative }}
      reproduction_launched: "${{ has(tasks.reproduce.outputs.launched) ? tasks.reproduce.outputs.launched : false }}"
      reproduction_reproduced: "${{ has(tasks.reproduce.outputs.reproduced) ? tasks.reproduce.outputs.reproduced : false }}"
      reproduction_test_result: "${{ has(tasks.reproduce.outputs.test_result) ? tasks.reproduce.outputs.test_result : 'not-run' }}"
      reproduction_matches_prior: "${{ has(tasks.reproduce.outputs.matches_prior) ? tasks.reproduce.outputs.matches_prior : false }}"
      reproduction_summary: "${{ has(tasks.reproduce.outputs.reproduction_summary) ? tasks.reproduce.outputs.reproduction_summary : 'not run' }}"
      regression_summary: "${{ has(tasks.regression_window.outputs.baseline_summary) ? tasks.regression_window.outputs.baseline_summary : '' }}"
      regression_window: "${{ has(tasks.regression_window.outputs.regression_window) ? tasks.regression_window.outputs.regression_window : {} }}"
      bug_hunt_findings: "${{ has(tasks.bug_hunt.outputs.findings) ? tasks.bug_hunt.outputs.findings : [] }}"
      bug_hunt_summary: "${{ has(tasks.bug_hunt.outputs.summary) ? tasks.bug_hunt.outputs.summary : '' }}"
    outputs:
      decision: decision
      confidence: confidence
      reasoning: reasoning
  source_dive:
    needs: [reproduce, bug_hunt, classify, regression_window]
    if: "${{ inputs.enable_source_dive == true && has(tasks.classify.outputs.decision) && (tasks.classify.outputs.decision == 'framework-bug' || tasks.classify.outputs.decision == 'framework-dependency' || tasks.classify.outputs.decision == 'single-client' || tasks.classify.outputs.decision == 'multi-client' || tasks.classify.outputs.decision == 'devnet-network' || tasks.classify.outputs.decision == 'config-issue' || tasks.classify.outputs.decision == 'mixed') }}"
    uses: io.ethpandaops/ethereum-component-source-dive@1.0.0
    inputs:
      classification: ${{ tasks.classify.outputs.decision }}
      enclave_name: ${{ inputs.enclave_name }}
      representative: ${{ inputs.representative }}
      source_repo: ${{ inputs.source_repo }}
      bug_hunt_findings: "${{ has(tasks.bug_hunt.outputs.findings) ? tasks.bug_hunt.outputs.findings : [] }}"
      bug_hunt_summary: "${{ has(tasks.bug_hunt.outputs.summary) ? tasks.bug_hunt.outputs.summary : '' }}"
      baseline_context: "${{ has(tasks.regression_window.outputs.baseline_summary) ? tasks.regression_window.outputs.baseline_summary : '' }}"
      regression_window: "${{ has(tasks.regression_window.outputs.regression_window) ? tasks.regression_window.outputs.regression_window : {} }}"
      reproduction_evidence: "${{ has(tasks.reproduce.outputs.evidence) ? tasks.reproduce.outputs.evidence : [] }}"
      reproduction_matches_prior: "${{ has(tasks.reproduce.outputs.matches_prior) ? tasks.reproduce.outputs.matches_prior : false }}"
    outputs:
      target_kind: target_kind
      skip_reason: skip_reason
      repo_url: repo_url
      commit_sha: commit_sha
      component: component
      client_name: client_name
      resolution_method: resolution_method
      commit_exact: commit_exact
      resolution_caveat: resolution_caveat
      workdir: workdir
      cloned: cloned
      alternate_targets: alternate_targets
      candidates: candidates
      search_summary: search_summary
      regression_context: regression_context
      literal_search_signal: literal_search_signal
      recent_change_signal: recent_change_signal
      recent_change_signal_notes: recent_change_signal_notes
      root_cause_description: root_cause_description
      suggested_change_md: suggested_change_md
      top_candidates: top_candidates
      code_refs: code_refs
      confidence: confidence
      confidence_note: confidence_note
  launcher_audit:
    needs: [classify, source_dive]
    if: "${{ inputs.enable_source_dive == true && has(tasks.classify.outputs.decision) && tasks.classify.outputs.decision == 'single-client' && ((has(tasks.classify.outputs.confidence) && tasks.classify.outputs.confidence < 85) || !(has(tasks.source_dive.outputs.cloned) && tasks.source_dive.outputs.cloned == true) || !(has(tasks.source_dive.outputs.confidence) && tasks.source_dive.outputs.confidence >= 75)) }}"
    uses: io.ethpandaops/ethereum-package-launcher-audit@1.0.0
    inputs:
      client_name: "${{ has(tasks.source_dive.outputs.client_name) ? tasks.source_dive.outputs.client_name : '' }}"
      gh_token: ${{ inputs.?gh_token }}
      bug_hunt_summary: "${{ has(tasks.bug_hunt.outputs.summary) ? tasks.bug_hunt.outputs.summary : '' }}"
      root_cause_description: "${{ has(tasks.source_dive.outputs.root_cause_description) ? tasks.source_dive.outputs.root_cause_description : '' }}"
      classify_confidence: ${{ tasks.classify.outputs.confidence }}
    outputs:
      audit_summary: audit_summary
      verdict: verdict
finally:
  cleanup_enclave:
    if: "${{ has(tasks.reproduce.outputs.launched) && tasks.reproduce.outputs.launched == true }}"
    uses: io.ethpandaops/kurtosis-enclave-cleanup@1.0.0
    inputs:
      enclave_name: ${{ inputs.enclave_name }}
      force: true
    outputs:
      removed: removed
      summary: summary
outputs:
  raw_finding: |-
    ${{
      {
        "cluster_idx": inputs.cluster_idx,
        "cluster": inputs.cluster,
        "cheap_fingerprint": inputs.cheap_fingerprint,
        "human_label": inputs.human_label,
        "status": inputs.status,
        "work_action": inputs.work_action,
        "representative": inputs.representative,
        "enclave_name": inputs.enclave_name,
        "test_inspection": {
          "attempted": has(tasks.inspect_test.outputs.test_summary),
          "summary": has(tasks.inspect_test.outputs.test_summary) ? tasks.inspect_test.outputs.test_summary : "",
          "recent_changes": has(tasks.inspect_test.outputs.recent_test_changes) ? tasks.inspect_test.outputs.recent_test_changes : ""
        },
        "reproduction": {
          "attempted": has(tasks.reproduce.outputs.launched),
          "launched": has(tasks.reproduce.outputs.launched) ? tasks.reproduce.outputs.launched : false,
          "reproduced": has(tasks.reproduce.outputs.reproduced) ? tasks.reproduce.outputs.reproduced : false,
          "test_result": has(tasks.reproduce.outputs.test_result) ? tasks.reproduce.outputs.test_result : "",
          "summary": has(tasks.reproduce.outputs.reproduction_summary) ? tasks.reproduce.outputs.reproduction_summary : "",
          "evidence": has(tasks.reproduce.outputs.evidence) ? tasks.reproduce.outputs.evidence : [],
          "matches_prior": has(tasks.reproduce.outputs.matches_prior) ? tasks.reproduce.outputs.matches_prior : false,
          "attempts_made": has(tasks.reproduce.outputs.attempts_made) ? tasks.reproduce.outputs.attempts_made : 0,
          "attempts_converged": has(tasks.reproduce.outputs.attempts_converged) ? tasks.reproduce.outputs.attempts_converged : false,
          "attempt_log": has(tasks.reproduce.outputs.attempt_log) ? tasks.reproduce.outputs.attempt_log : ""
        },
        "regression": {
          "attempted": has(tasks.regression_window.outputs.baseline_summary),
          "found": has(tasks.regression_window.outputs.baseline_found) ? tasks.regression_window.outputs.baseline_found : false,
          "summary": has(tasks.regression_window.outputs.baseline_summary) ? tasks.regression_window.outputs.baseline_summary : "",
          "window": has(tasks.regression_window.outputs.regression_window) ? tasks.regression_window.outputs.regression_window : {},
          "component_changes": has(tasks.regression_window.outputs.component_changes) ? tasks.regression_window.outputs.component_changes : [],
          "changed_components": has(tasks.regression_window.outputs.changed_components) ? tasks.regression_window.outputs.changed_components : [],
          "unchanged_components": has(tasks.regression_window.outputs.unchanged_components) ? tasks.regression_window.outputs.unchanged_components : [],
          "unresolved_components": has(tasks.regression_window.outputs.unresolved_components) ? tasks.regression_window.outputs.unresolved_components : [],
          "target_ranking": has(tasks.regression_window.outputs.target_ranking) ? tasks.regression_window.outputs.target_ranking : [],
          "commit_ranges": has(tasks.regression_window.outputs.commit_ranges) ? tasks.regression_window.outputs.commit_ranges : []
        },
        "bug_hunt": {
          "attempted": has(tasks.bug_hunt.outputs.findings),
          "findings": has(tasks.bug_hunt.outputs.findings) ? tasks.bug_hunt.outputs.findings : [],
          "summary": has(tasks.bug_hunt.outputs.summary) ? tasks.bug_hunt.outputs.summary : "",
          "recommended_actions": has(tasks.bug_hunt.outputs.recommended_actions) ? tasks.bug_hunt.outputs.recommended_actions : [],
          "completeness": has(tasks.bug_hunt.outputs.completeness) ? tasks.bug_hunt.outputs.completeness : "",
          "iterations_used": has(tasks.bug_hunt.outputs.iterations_used) ? tasks.bug_hunt.outputs.iterations_used : 0,
          "converged": has(tasks.bug_hunt.outputs.converged) ? tasks.bug_hunt.outputs.converged : false
        },
        "classification": {
          "attempted": has(tasks.classify.outputs.decision),
          "decision": has(tasks.classify.outputs.decision) ? tasks.classify.outputs.decision : "unknown",
          "confidence": has(tasks.classify.outputs.confidence) ? tasks.classify.outputs.confidence : 0,
          "reasoning": has(tasks.classify.outputs.reasoning) ? tasks.classify.outputs.reasoning : ""
        },
        "source_dive": {
          "attempted": has(tasks.source_dive.outputs.target_kind),
          "target_kind": has(tasks.source_dive.outputs.target_kind) ? tasks.source_dive.outputs.target_kind : "",
          "skip_reason": has(tasks.source_dive.outputs.skip_reason) ? tasks.source_dive.outputs.skip_reason : "",
          "repo_url": has(tasks.source_dive.outputs.repo_url) ? tasks.source_dive.outputs.repo_url : "",
          "commit_sha": has(tasks.source_dive.outputs.commit_sha) ? tasks.source_dive.outputs.commit_sha : "",
          "component": has(tasks.source_dive.outputs.component) ? tasks.source_dive.outputs.component : "",
          "client_name": has(tasks.source_dive.outputs.client_name) ? tasks.source_dive.outputs.client_name : "",
          "resolution_method": has(tasks.source_dive.outputs.resolution_method) ? tasks.source_dive.outputs.resolution_method : "",
          "commit_exact": has(tasks.source_dive.outputs.commit_exact) ? tasks.source_dive.outputs.commit_exact : false,
          "resolution_caveat": has(tasks.source_dive.outputs.resolution_caveat) ? tasks.source_dive.outputs.resolution_caveat : "",
          "workdir": has(tasks.source_dive.outputs.workdir) ? tasks.source_dive.outputs.workdir : "",
          "cloned": has(tasks.source_dive.outputs.cloned) ? tasks.source_dive.outputs.cloned : false,
          "alternate_targets": has(tasks.source_dive.outputs.alternate_targets) ? tasks.source_dive.outputs.alternate_targets : [],
          "root_cause_description": has(tasks.source_dive.outputs.root_cause_description) ? tasks.source_dive.outputs.root_cause_description : "",
          "suggested_change_md": has(tasks.source_dive.outputs.suggested_change_md) ? tasks.source_dive.outputs.suggested_change_md : "",
          "top_candidates": has(tasks.source_dive.outputs.top_candidates) ? tasks.source_dive.outputs.top_candidates : [],
          "code_refs": has(tasks.source_dive.outputs.code_refs) ? tasks.source_dive.outputs.code_refs : [],
          "confidence": has(tasks.source_dive.outputs.confidence) ? tasks.source_dive.outputs.confidence : 0,
          "confidence_note": has(tasks.source_dive.outputs.confidence_note) ? tasks.source_dive.outputs.confidence_note : "",
          "search_summary": has(tasks.source_dive.outputs.search_summary) ? tasks.source_dive.outputs.search_summary : "",
          "regression_context": has(tasks.source_dive.outputs.regression_context) ? tasks.source_dive.outputs.regression_context : "",
          "literal_search_signal": has(tasks.source_dive.outputs.literal_search_signal) ? tasks.source_dive.outputs.literal_search_signal : 0,
          "recent_change_signal": has(tasks.source_dive.outputs.recent_change_signal) ? tasks.source_dive.outputs.recent_change_signal : 0,
          "recent_change_signal_notes": has(tasks.source_dive.outputs.recent_change_signal_notes) ? tasks.source_dive.outputs.recent_change_signal_notes : ""
        },
        "launcher_audit": {
          "attempted": has(tasks.launcher_audit.outputs.audit_summary),
          "summary": has(tasks.launcher_audit.outputs.audit_summary) ? tasks.launcher_audit.outputs.audit_summary : "",
          "verdict": has(tasks.launcher_audit.outputs.verdict) ? tasks.launcher_audit.outputs.verdict : ""
        }
      }
    }}
