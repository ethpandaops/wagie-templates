                      type: object
                      properties:
                        service_name:
                          type: string
                        role:
                          type: string
                        client:
                          type: string
                        image_ref:
                          type: string
                        image_id:
                          type: string
                        manifest_digest:
                          type: string
                        source_repo:
                          type: string
                        source_revision:
                          type: string
                        version:
