kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/assertoor-ci-investigate
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use after an assertoor-test scheduled run to triage its failures into long-lived per-root-cause GitHub issues, with optional local reproduction and bug-hunt investigation per new cluster. Fetches the failing run, parses per-shard artifacts, fingerprints + clusters by root cause, skips fingerprints already covered by any existing issue, compares each new cluster against its nearest previous successful baseline, reproduces representative failures on Kurtosis workers, runs the bug-hunt loop against each reproduced network, classifies the root cause, and creates one issue per new cluster.
tags: ["ci", "assertoor", "ethereum", "ethpandaops", "triage", "nightly", "auto-debug", "kurtosis", "bug-hunt"]
defaults:
  retryable: true
  timeout: 30h
inputs:
  source_repo:
    type: string
    default: "ethpandaops/assertoor-test"
    description: GitHub repository whose failing CI run is being triaged. Workflow runs and artifacts are read from here. GitHub issue side effects land in `issue_repo`, or in `source_repo` when `issue_repo` is empty.
  issue_repo:
    type: string
    default: ""
    description: "GitHub repository where ci-investigate creates issues. When empty, falls back to `source_repo`."
  gh_token:
    type: secret
    required: false
    description: Optional GitHub token secret passed to GitHub-facing child templates as GH_TOKEN. When unset, children use ambient gh authentication.
  workflow_ref:
    type: string
    default: "run-scheduled.yml"
    description: Workflow file path or filename to triage on `source_repo`. Defaults to the nightly scheduled run.
  run_id:
    type: string
    default: ""
    description: Specific run id to triage; when empty, the latest completed scheduled workflow run is selected and the template no-ops when that latest completed run is green/non-failing.
  skip_reproduction:
    type: boolean
    default: false
    description: When true, the per-cluster matrix skips the kurtosis reproduction + bug-hunt steps entirely and renders a triage-only report. Useful for cheap dry runs.
  max_bug_hunt_rounds:
    type: number
    default: 3
    description: Maximum probe rounds for the per-cluster bug-hunt loop. Assertoor CI usually stops after one sufficient round and leaves deeper attribution to source-dive.
  reproduction_attempt_timeout_minutes:
    type: number
    default: 360
    description: Maximum minutes the assertoor watcher waits per reproduction attempt before declaring not-reproduced. Total wall-clock budget per cluster scales with `reproduction_attempts`.
  reproduction_attempts:
    type: number
    default: 4
    description: >-
      How many times each cluster's reproduce task retries launch then await_assertoor before giving up. Forwarded to `assertoor-ci-kurtosis-reproduce`. The loop stops early on the first successful reproduction. Every attempt preserves the original assertoor timeout values and uses the selected test scope. Default 4 gives ~94% cumulative odds for a 50% per-attempt bug and ~68% for a 25% per-attempt bug. Bump for stubborn / rare non-deterministic bugs; set to 1 to disable retries.
  narrow_to_failing_test:
    type: boolean
    default: true
    description: Forwarded to `assertoor-ci-kurtosis-reproduce`. When true (default), reproduction patches the args file to run only the originally-failing assertoor test while preserving its stock YAML and timeout values. Set false for a faithful full-queue run when queue/order/state coupling is suspected.
  enable_source_dive:
    type: boolean
    default: true
    description: When true and classification implicates code (framework-bug, framework-dependency, single-client, multi-client, devnet-network, config-issue, mixed), clones the implicated repo into the source-dive task workspace and runs an evidence-driven source review to surface candidate root-cause files and a suggested change description.
  discord_webhook_url:
    type: secret
    required: false
    description: Optional Discord incoming webhook URL secret. When provided, the final issue-publish summary sends one best-effort Discord message after issue bodies are published.
  discord_min_confidence:
    type: number
    default: 65
    description: Minimum notification confidence required for a created issue to be included in the Discord notification. Set to 0 or lower to notify for every created issue with a known classification.
tasks:
  fetch:
    uses: io.ethpandaops/github-actions-failure-fetch@1.0.0
    inputs:
      repo: ${{ inputs.source_repo }}
      gh_token: ${{ inputs.?gh_token }}
      workflow_ref: ${{ inputs.workflow_ref }}
      run_id: ${{ inputs.run_id }}
      artifact_patterns:
        - "summary-*"
        - "enclave-dump-*"
        - "claude-code-output-*"
      conclusion_filter: ["failure", "timed_out"]
    outputs:
      run_id: run_id
      run_url: run_url
      run_started_at: run_started_at
      head_sha: head_sha
      head_branch: head_branch
      workflow_path: workflow_path
      no_failures: no_failures
      failures: failures
      summary: summary
  adapt:
    needs: [fetch]
    if: "${{ tasks.fetch.outputs.no_failures != true && size(tasks.fetch.outputs.failures) > 0 }}"
    uses: io.ethpandaops/assertoor-ci-normalize@1.0.0
    inputs:
      failures: ${{ tasks.fetch.outputs.failures }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      head_sha: ${{ tasks.fetch.outputs.head_sha }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
    outputs:
      normalized_failures: normalized_failures
      summary: summary
  issue_context:
    needs: [adapt]
    if: "${{ has(tasks.adapt.outputs.normalized_failures) && size(tasks.adapt.outputs.normalized_failures) > 0 }}"
    uses: io.ethpandaops/ci-investigate-issue-context@1.0.0
    inputs:
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      gh_token: ${{ inputs.?gh_token }}
      max_issues: 500
    outputs:
      issues: issues
      fingerprints: fingerprints
      summary: summary
  fingerprint_each:
    needs: [adapt, issue_context]
    if: "${{ has(tasks.adapt.outputs.normalized_failures) && size(tasks.adapt.outputs.normalized_failures) > 0 }}"
    strategy:
      matrix:
        idx: "${{ range(tasks.adapt.outputs.normalized_failures.size()) }}"
      fail-fast: false
    inputs:
      failures: ${{ tasks.adapt.outputs.normalized_failures }}
      existing_issues: ${{ tasks.issue_context.outputs.issues }}
      idx: "${{ matrix.idx }}"
    tasks:
      fp:
        uses: io.ethpandaops/assertoor-ci-fingerprint@1.0.0
        inputs:
          failure: "${{ inputs.failures[inputs.idx] }}"
          existing_issues: ${{ inputs.existing_issues }}
        outputs:
          cheap_fingerprint: cheap_fingerprint
          cluster_label: cluster_label
    outputs:
      fingerprints: 'append(${{ {"index": inputs.idx, "cheap_fingerprint": tasks.fp.outputs.cheap_fingerprint, "cluster_label": tasks.fp.outputs.cluster_label} }})'
      schema:
        fingerprints:
          type: array
          items:
            type: object
            properties:
              index:
                type: number
              cheap_fingerprint:
                type: string
              cluster_label:
                type: string
            required: [index, cheap_fingerprint, cluster_label]
  cluster:
    needs: [adapt, fingerprint_each]
    if: "${{ has(tasks.adapt.outputs.normalized_failures) && size(tasks.adapt.outputs.normalized_failures) > 0 }}"
    uses: io.ethpandaops/failure-cluster@1.0.0
    inputs:
      failures: ${{ tasks.adapt.outputs.normalized_failures }}
      fingerprints: ${{ tasks.fingerprint_each.outputs.fingerprints }}
    outputs:
      clusters: clusters
      cluster_fingerprints: cluster_fingerprints
      cluster_labels: cluster_labels
      summary: summary
  state_check:
    needs: [issue_context, cluster]
    if: "${{ has(tasks.cluster.outputs.clusters) && size(tasks.cluster.outputs.clusters) > 0 }}"
    uses: io.ethpandaops/ci-investigate-issue-state-check@1.0.0
    inputs:
      issues: ${{ tasks.issue_context.outputs.issues }}
      fingerprints: ${{ tasks.cluster.outputs.cluster_fingerprints }}
    outputs:
      statuses: statuses
      items: items
      skipped_items: skipped_items
      summary: summary
  investigate_each:
    needs: [fetch, adapt, cluster, state_check]
    strategy:
      matrix:
        idx: "${{ range(tasks.state_check.outputs.items.size()) }}"
      fail-fast: false
    inputs:
      work_item: "${{ tasks.state_check.outputs.items[matrix.idx] }}"
      cluster_idx: "${{ tasks.state_check.outputs.items[matrix.idx].cluster_index }}"
      cluster: "${{ tasks.cluster.outputs.clusters[tasks.state_check.outputs.items[matrix.idx].cluster_index] }}"
      cheap_fingerprint: "${{ tasks.cluster.outputs.cluster_fingerprints[tasks.state_check.outputs.items[matrix.idx].cluster_index] }}"
      cluster_label: "${{ tasks.cluster.outputs.cluster_labels[tasks.state_check.outputs.items[matrix.idx].cluster_index] }}"
      status: "${{ tasks.state_check.outputs.statuses[tasks.state_check.outputs.items[matrix.idx].cluster_index] }}"
      representative: "${{ tasks.adapt.outputs.normalized_failures[tasks.cluster.outputs.clusters[tasks.state_check.outputs.items[matrix.idx].cluster_index].representative_index] }}"
      skip_reproduction: ${{ inputs.skip_reproduction }}
      max_bug_hunt_rounds: "${{ inputs.max_bug_hunt_rounds }}"
      reproduction_attempt_timeout_minutes: "${{ inputs.reproduction_attempt_timeout_minutes }}"
      reproduction_attempts: ${{ inputs.reproduction_attempts }}
      narrow_to_failing_test: ${{ inputs.narrow_to_failing_test }}
      enable_source_dive: ${{ inputs.enable_source_dive }}
      workflow_ref: ${{ inputs.workflow_ref }}
      head_branch: ${{ tasks.fetch.outputs.head_branch }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      source_repo: ${{ inputs.source_repo }}
      gh_token: ${{ inputs.?gh_token }}
      enclave_name: '${{ "ci-investigate-" + tasks.fetch.outputs.run_id + "-" + string(tasks.state_check.outputs.items[matrix.idx].cluster_index) }}'
    tasks:
      investigate:
        uses: io.ethpandaops/assertoor-ci-cluster-investigate@1.0.0
        inputs:
          cluster_idx: ${{ inputs.cluster_idx }}
          cluster: ${{ inputs.cluster }}
          cheap_fingerprint: ${{ inputs.cheap_fingerprint }}
          cluster_label: ${{ inputs.cluster_label }}
          status: ${{ inputs.status }}
          representative: ${{ inputs.representative }}
          skip_reproduction: ${{ inputs.skip_reproduction }}
          max_bug_hunt_rounds: ${{ inputs.max_bug_hunt_rounds }}
          reproduction_attempt_timeout_minutes: ${{ inputs.reproduction_attempt_timeout_minutes }}
          reproduction_attempts: ${{ inputs.reproduction_attempts }}
          narrow_to_failing_test: ${{ inputs.narrow_to_failing_test }}
          enable_source_dive: ${{ inputs.enable_source_dive }}
          source_repo: ${{ inputs.source_repo }}
          gh_token: ${{ inputs.?gh_token }}
          enclave_name: ${{ inputs.enclave_name }}
          workflow_ref: ${{ inputs.workflow_ref }}
          head_branch: ${{ inputs.head_branch }}
          run_id: ${{ inputs.run_id }}
          run_url: ${{ inputs.run_url }}
          run_started_at: ${{ inputs.run_started_at }}
        outputs:
          raw_finding: raw_finding
    outputs:
      raw_findings: 'append(${{ tasks.investigate.outputs.raw_finding }})'
      schema:
        raw_findings:
          type: array
          items:
            type: object
            properties:
              cluster_idx:
                type: number
              cluster:
                type: object
                properties:
                  member_shard_ids:
                    type: array
                    items:
                      type: string
                  representative_index:
                    type: number
                  member_indices:
                    type: array
                    items:
                      type: number
                  member_count:
                    type: number
                  rationale:
                    type: string
              cheap_fingerprint:
                type: string
              cluster_label:
                type: string
              status:
                type: object
                properties:
                  status:
                    type: string
                  issue_number:
                    type: number
                  issue_url:
                    type: string
                  schema_version:
                    type: number
                  classification:
                    type: string
              representative:
                type: object
                properties:
                  test_name:
                    type: string
                  failed_step:
                    type: string
                  root_failed_step:
                    type: string
                  category:
                    type: string
                  error_signature:
                    type: string
                  shard_id:
                    type: string
                  head_sha:
                    type: string
                  run_started_at:
