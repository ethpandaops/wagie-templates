kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/assertoor-ci-investigate
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use after an assertoor-test scheduled run to triage its failures into long-lived per-root-cause GitHub issues, with optional local reproduction and bug-hunt investigation per cluster. Fetches the failing run, parses per-shard artifacts, fingerprints + clusters by root cause, dedups against existing issues, compares each cluster against its nearest previous successful baseline, reproduces representative failures on kurtosis workers, runs the bug-hunt loop against each live enclave (existing-enclave mode, no wasted config-design call), classifies the root cause, and upserts one canonical issue body per cluster.
tags: ["ci", "assertoor", "ethereum", "ethpandaops", "triage", "nightly", "auto-debug", "kurtosis", "bug-hunt"]
defaults:
  retryable: true
  timeout: 30h
inputs:
  source_repo:
    type: string
    default: "ethpandaops/assertoor-test"
    description: GitHub repository whose failing CI run is being triaged. Workflow runs and artifacts are read from here. GitHub issue side effects land in `issue_repo`, or in `source_repo` when `issue_repo` is empty.
  issue_repo:
    type: string
    default: ""
    description: "GitHub repository where ALL ci-investigate side effects land: new issues, canonical body/label edits, and dedup-driven closes. When empty, falls back to `source_repo`."
  gh_token:
    type: secret
    required: false
    description: Optional GitHub token secret passed to GitHub-facing child templates as GH_TOKEN. When unset, children use ambient gh authentication.
  workflow_ref:
    type: string
    default: "run-scheduled.yml"
    description: Workflow file path or filename to triage on `source_repo`. Defaults to the nightly scheduled run.
  run_id:
    type: string
    default: ""
    description: Specific run id to triage; when empty, the latest completed scheduled workflow run is selected and the template no-ops when that latest completed run is green/non-failing.
  staleness_days:
    type: number
    default: 30
    description: Open covering issues older than this many days are treated as stale and re-investigated.
  closed_context_days:
    type: number
    default: 14
    description: Recently closed marker-bearing issues within this many days are used only as fingerprint naming context. Closed issues never cover, block, reopen, or receive recurrence updates.
  schema_version:
    type: number
    default: 1
    description: Marker schema version this template writes.
  skip_reproduction:
    type: boolean
    default: false
    description: When true, the per-cluster matrix skips the kurtosis reproduction + bug-hunt steps entirely and renders a triage-only report. Useful for cheap dry runs.
  max_bug_hunt_rounds:
    type: number
    default: 3
    description: Maximum probe rounds for the per-cluster bug-hunt loop. Assertoor CI usually stops after one sufficient round and leaves deeper attribution to source-dive.
  reproduction_attempt_timeout_minutes:
    type: number
    default: 360
    description: Maximum minutes the assertoor watcher waits per reproduction attempt before declaring not-reproduced. Total wall-clock budget per cluster scales with `reproduction_attempts`.
  reproduction_attempts:
    type: number
    default: 4
    description: >-
      How many times each cluster's reproduce task retries launch then await_assertoor before giving up. Forwarded to `assertoor-ci-kurtosis-reproduce`. The loop stops early on the first successful reproduction. Every attempt uses the stock assertoor test YAML and original timeout values. Default 4 gives ~94% cumulative odds for a 50% per-attempt bug and ~68% for a 25% per-attempt bug. Bump for stubborn / rare non-deterministic bugs; set to 1 to disable retries.
  narrow_to_failing_test:
    type: boolean
    default: false
    description: Forwarded to `assertoor-ci-kurtosis-reproduce`. When false (default), reproduction mirrors the CI's full sequential queue. Set true only for a deliberately narrowed diagnostic run that drops every `assertoor_params.tests` entry except the originally-failing test.
  enable_source_dive:
    type: boolean
    default: true
    description: When true and classification implicates code (framework-bug, framework-dependency, single-client, multi-client, devnet-network, config-issue, mixed), clones the implicated repo into the source-dive task workspace and runs an evidence-driven source review to surface candidate root-cause files and a suggested change description.
  discord_webhook_url:
    type: secret
    required: false
    description: Optional Discord incoming webhook URL secret. When provided, the final issue-publish summary sends one best-effort Discord message after canonical issue bodies are written. Pending reservation issue writes never notify.
  discord_min_confidence:
    type: number
    default: 85
    description: Minimum notification confidence required for a final issue to be included in the Discord notification. Set to 0 or lower to notify for every final touched issue with a known classification.
tasks:
  fetch:
    uses: io.ethpandaops/github-actions-failure-fetch@1.0.0
    inputs:
      repo: ${{ inputs.source_repo }}
      gh_token: ${{ inputs.?gh_token }}
      workflow_ref: ${{ inputs.workflow_ref }}
      run_id: ${{ inputs.run_id }}
      conclusion_filter: ["failure", "timed_out"]
    outputs:
      run_id: run_id
      run_url: run_url
      run_started_at: run_started_at
      head_sha: head_sha
      head_branch: head_branch
      workflow_path: workflow_path
      no_failures: no_failures
      failures: failures
      summary: summary
  adapt:
    needs: [fetch]
    if: "${{ tasks.fetch.outputs.no_failures != true && size(tasks.fetch.outputs.failures) > 0 }}"
    uses: io.ethpandaops/assertoor-ci-normalize@1.0.0
    inputs:
      failures: ${{ tasks.fetch.outputs.failures }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      head_sha: ${{ tasks.fetch.outputs.head_sha }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
    outputs:
      normalized_failures: normalized_failures
      summary: summary
  issue_context:
    needs: [adapt]
    if: "${{ has(tasks.adapt.outputs.normalized_failures) && size(tasks.adapt.outputs.normalized_failures) > 0 }}"
    uses: io.ethpandaops/ci-investigate-issue-context@1.0.0
    inputs:
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      gh_token: ${{ inputs.?gh_token }}
      schema_version: ${{ inputs.schema_version }}
      max_issues: 500
      closed_window_days: ${{ inputs.closed_context_days }}
    outputs:
      issues: issues
      fingerprints: fingerprints
      summary: summary
  fingerprint_each:
    needs: [adapt, issue_context]
    if: "${{ has(tasks.adapt.outputs.normalized_failures) && size(tasks.adapt.outputs.normalized_failures) > 0 }}"
    strategy:
      matrix:
        idx: "${{ range(tasks.adapt.outputs.normalized_failures.size()) }}"
      fail-fast: false
    inputs:
      failures: ${{ tasks.adapt.outputs.normalized_failures }}
      existing_issues: ${{ tasks.issue_context.outputs.issues }}
      idx: "${{ matrix.idx }}"
    tasks:
      fp:
        uses: io.ethpandaops/assertoor-ci-fingerprint@1.0.0
        inputs:
          failure: "${{ inputs.failures[inputs.idx] }}"
          existing_issues: ${{ inputs.existing_issues }}
        outputs:
          cheap_fingerprint: cheap_fingerprint
          human_label: human_label
    outputs:
      fingerprints: 'append(${{ {"index": inputs.idx, "cheap_fingerprint": tasks.fp.outputs.cheap_fingerprint, "human_label": tasks.fp.outputs.human_label} }})'
      schema:
        fingerprints:
          type: array
          items:
            type: object
            properties:
              index:
                type: number
              cheap_fingerprint:
                type: string
              human_label:
                type: string
            required: [index, cheap_fingerprint, human_label]
  cluster:
    needs: [adapt, fingerprint_each]
    if: "${{ has(tasks.adapt.outputs.normalized_failures) && size(tasks.adapt.outputs.normalized_failures) > 0 }}"
    uses: io.ethpandaops/failure-cluster@1.0.0
    inputs:
      failures: ${{ tasks.adapt.outputs.normalized_failures }}
      fingerprints: ${{ tasks.fingerprint_each.outputs.fingerprints }}
    outputs:
      clusters: clusters
      cluster_fingerprints: cluster_fingerprints
      cluster_human_labels: cluster_human_labels
      summary: summary
  state_check:
    needs: [cluster]
    if: "${{ has(tasks.cluster.outputs.clusters) && size(tasks.cluster.outputs.clusters) > 0 }}"
    uses: io.ethpandaops/ci-investigate-issue-state-check@1.0.0
    inputs:
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      gh_token: ${{ inputs.?gh_token }}
      fingerprints: ${{ tasks.cluster.outputs.cluster_fingerprints }}
      staleness_days: ${{ inputs.staleness_days }}
      schema_version: ${{ inputs.schema_version }}
    outputs:
      statuses: statuses
      existing_issue_bodies: existing_issue_bodies
      summary: summary
  worklist:
    needs: [fetch, cluster, state_check]
    if: "${{ has(tasks.state_check.outputs.statuses) && size(tasks.state_check.outputs.statuses) > 0 }}"
    uses: io.ethpandaops/ci-investigate-worklist@1.0.0
    inputs:
      statuses: ${{ tasks.state_check.outputs.statuses }}
      current_run_id: ${{ tasks.fetch.outputs.run_id }}
    outputs:
      items: items
      recurrence_items: recurrence_items
      skipped_items: skipped_items
      summary: summary
  investigate_each:
    needs: [fetch, adapt, cluster, state_check, worklist]
    if: "${{ has(tasks.worklist.outputs.items) && size(tasks.worklist.outputs.items) > 0 }}"
    strategy:
      matrix:
        idx: "${{ range(tasks.worklist.outputs.items.size()) }}"
      fail-fast: false
    selection:
      sticky: true
      labels: [kurtosis]
    inputs:
      work_item: "${{ tasks.worklist.outputs.items[matrix.idx] }}"
      cluster_idx: "${{ tasks.worklist.outputs.items[matrix.idx].cluster_index }}"
      cluster: "${{ tasks.cluster.outputs.clusters[tasks.worklist.outputs.items[matrix.idx].cluster_index] }}"
      cheap_fingerprint: "${{ tasks.cluster.outputs.cluster_fingerprints[tasks.worklist.outputs.items[matrix.idx].cluster_index] }}"
      human_label: "${{ tasks.cluster.outputs.cluster_human_labels[tasks.worklist.outputs.items[matrix.idx].cluster_index] }}"
      status: "${{ tasks.state_check.outputs.statuses[tasks.worklist.outputs.items[matrix.idx].cluster_index] }}"
      representative: "${{ tasks.adapt.outputs.normalized_failures[tasks.cluster.outputs.clusters[tasks.worklist.outputs.items[matrix.idx].cluster_index].representative_index] }}"
      skip_reproduction: ${{ inputs.skip_reproduction }}
      max_bug_hunt_rounds: "${{ inputs.max_bug_hunt_rounds }}"
      reproduction_attempt_timeout_minutes: "${{ inputs.reproduction_attempt_timeout_minutes }}"
      reproduction_attempts: ${{ inputs.reproduction_attempts }}
      narrow_to_failing_test: ${{ inputs.narrow_to_failing_test }}
      enable_source_dive: ${{ inputs.enable_source_dive }}
      workflow_ref: ${{ inputs.workflow_ref }}
      head_branch: ${{ tasks.fetch.outputs.head_branch }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      source_repo: ${{ inputs.source_repo }}
      gh_token: ${{ inputs.?gh_token }}
      enclave_name: '${{ "ci-investigate-" + tasks.fetch.outputs.run_id + "-" + string(tasks.worklist.outputs.items[matrix.idx].cluster_index) }}'
    tasks:
      investigate:
        uses: io.ethpandaops/assertoor-ci-cluster-investigate@1.0.0
        inputs:
          cluster_idx: ${{ inputs.cluster_idx }}
          cluster: ${{ inputs.cluster }}
          cheap_fingerprint: ${{ inputs.cheap_fingerprint }}
          human_label: ${{ inputs.human_label }}
          status: ${{ inputs.status }}
          work_action: ${{ inputs.work_item.action }}
          representative: ${{ inputs.representative }}
          skip_reproduction: ${{ inputs.skip_reproduction }}
          max_bug_hunt_rounds: ${{ inputs.max_bug_hunt_rounds }}
          reproduction_attempt_timeout_minutes: ${{ inputs.reproduction_attempt_timeout_minutes }}
          reproduction_attempts: ${{ inputs.reproduction_attempts }}
          narrow_to_failing_test: ${{ inputs.narrow_to_failing_test }}
          enable_source_dive: ${{ inputs.enable_source_dive }}
          source_repo: ${{ inputs.source_repo }}
          gh_token: ${{ inputs.?gh_token }}
          enclave_name: ${{ inputs.enclave_name }}
          workflow_ref: ${{ inputs.workflow_ref }}
          head_branch: ${{ inputs.head_branch }}
          run_id: ${{ inputs.run_id }}
          run_url: ${{ inputs.run_url }}
          run_started_at: ${{ inputs.run_started_at }}
        outputs:
          raw_finding: raw_finding
    outputs:
      raw_findings: 'append(${{ tasks.investigate.outputs.raw_finding }})'
      schema:
        raw_findings:
          type: array
          items:
            type: object
            properties:
              cluster_idx:
                type: number
              cluster:
                type: object
                properties:
                  member_shard_ids:
                    type: array
                    items:
                      type: string
                  representative_index:
                    type: number
                  member_indices:
                    type: array
                    items:
                      type: number
                  member_count:
                    type: number
                  rationale:
                    type: string
              cheap_fingerprint:
                type: string
              human_label:
                type: string
              status:
                type: object
                properties:
                  status:
                    type: string
                  issue_number:
                    type: number
                  issue_url:
                    type: string
                  issue_state:
                    type: string
                  classification:
                    type: string
                  first_seen_run:
                    type: string
                  last_seen_run:
                    type: string
                  last_seen_at:
                    type: string
                  last_investigated_run:
                    type: string
                  last_investigated_at:
                    type: string
                  title_locked:
                    type: boolean
              work_action:
                type: string
              enclave_name:
                type: string
              representative:
                type: object
                properties:
                  test_name:
                    type: string
                  failed_step:
                    type: string
                  root_failed_step:
                    type: string
                  category:
                    type: string
                  error_signature:
                    type: string
                  shard_id:
                    type: string
                  head_sha:
                    type: string
                  run_started_at:
                    type: string
                  prior_ai_summary:
                    type: string
                  assertoor_image:
                    type: string
                  affected_client_pairs:
                    type: array
                    items:
                      type: string
                  passing_client_pairs:
                    type: array
                    items:
                      type: string
                  failed_task_leaves:
                    type: array
                    items:
                      type: object
                      properties:
                        task_name:
                          type: string
                        title:
                          type: string
                        role:
                          type: string
                        client_pair:
                          type: string
                  client_pairs:
                    type: array
                    items:
                      type: object
                      properties:
                        pair_id:
                          type: string
                        el_type:
                          type: string
                        cl_type:
                          type: string
                        vc_type:
                          type: string
                        el_image:
                          type: string
                        cl_image:
                          type: string
                        vc_image:
                          type: string
                  runtime_components:
                    type: array
                    items:
                      type: object
                      properties:
                        service_name:
                          type: string
                        role:
                          type: string
                        client:
                          type: string
                        image_ref:
                          type: string
                        image_id:
                          type: string
                        manifest_digest:
                          type: string
                        source_repo:
                          type: string
                        source_revision:
                          type: string
                        version:
                          type: string
                        build_info:
                          type: string
                        source:
                          type: string
                  original_artifact_evidence:
                    type: array
                    items:
                      type: object
                      properties:
                        source:
                          type: string
                        category:
                          type: string
                        summary:
                          type: string
                        excerpt:
                          type: string
                  artifact_coverage:
                    type: object
                    properties:
                      has_summary:
                        type: boolean
                      has_enclave_dump:
                        type: boolean
                      has_claude_output:
                        type: boolean
                      has_kurtosis_params:
                        type: boolean
                      artifact_names:
                        type: array
                        items:
                          type: string
                      missing:
                        type: array
                        items:
                          type: string
                      notes:
                        type: string
                  component_hints:
                    type: array
                    items:
                      type: string
                  evidence_brief:
                    type: object
                    properties:
                      headline:
                        type: string
                      failure_shape:
                        type: string
                      client_scope:
                        type: string
                      task_scope:
                        type: string
                      artifact_signal:
                        type: string
                      component_hints:
                        type: string
                      routing_notes:
                        type: string
              test_inspection:
                type: object
                properties:
                  attempted:
                    type: boolean
                  summary:
                    type: string
                  recent_changes:
                    type: string
              reproduction:
                type: object
                properties:
                  attempted:
                    type: boolean
                  launched:
                    type: boolean
                  reproduced:
                    type: boolean
                  test_result:
                    type: string
                  summary:
                    type: string
                  evidence:
                    type: array
                    items:
                      type: string
                  matches_prior:
                    type: boolean
                  attempts_made:
                    type: number
                  attempts_converged:
                    type: boolean
                  attempt_log:
                    type: string
              regression:
                type: object
                properties:
                  attempted:
                    type: boolean
                  found:
                    type: boolean
                  summary:
                    type: string
                  window:
                    type: object
                    properties:
                      baseline_found:
                        type: boolean
                      previous_success_run_id:
                        type: string
                      previous_success_run_url:
                        type: string
                      previous_success_head_sha:
                        type: string
                      current_head_sha:
                        type: string
                  component_changes:
                    type: array
                    items:
                      type: object
                      properties:
                        component:
                          type: string
                        service_name:
                          type: string
                        role:
                          type: string
                        previous_image_ref:
                          type: string
                        current_image_ref:
                          type: string
                        previous_digest:
                          type: string
                        current_digest:
                          type: string
                        previous_revision:
                          type: string
                        current_revision:
                          type: string
                        changed:
                          type: boolean
                        evidence:
                          type: string
                  changed_components:
                    type: array
                    items:
                      type: object
                      properties:
                        component:
                          type: string
                        service_name:
                          type: string
                        role:
                          type: string
                        previous_revision:
                          type: string
                        current_revision:
                          type: string
                        evidence:
                          type: string
                  unchanged_components:
                    type: array
                    items:
                      type: object
                      properties:
                        component:
                          type: string
                        service_name:
                          type: string
                        role:
                          type: string
                        evidence:
                          type: string
                  unresolved_components:
                    type: array
                    items:
                      type: object
                      properties:
                        component:
                          type: string
                        service_name:
                          type: string
                        role:
                          type: string
                        reason:
                          type: string
                        evidence:
                          type: string
                  target_ranking:
                    type: array
                    items:
                      type: object
                      properties:
                        component:
                          type: string
                        service_name:
                          type: string
                        target_kind:
                          type: string
                        rank:
                          type: number
                        reason:
                          type: string
                        confidence:
                          type: number
                  commit_ranges:
                    type: array
                    items:
                      type: object
                      properties:
                        component:
                          type: string
                        repo_url:
