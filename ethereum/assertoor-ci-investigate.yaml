                        previous_revision:
                          type: string
                        current_revision:
                          type: string
                        range:
                          type: string
              bug_hunt:
                type: object
                properties:
                  attempted:
                    type: boolean
                  findings:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        severity:
                          type: string
                        summary:
                          type: string
                        affected_scope:
                          type: string
                        evidence:
                          type: array
                          items:
                            type: string
                  summary:
                    type: string
                  recommended_actions:
                    type: array
                    items:
                      type: string
                  completeness:
                    type: string
                  iterations_used:
                    type: number
                  converged:
                    type: boolean
              classification:
                type: object
                properties:
                  attempted:
                    type: boolean
                  decision:
                    type: string
                  confidence:
                    type: number
                  reasoning:
                    type: string
