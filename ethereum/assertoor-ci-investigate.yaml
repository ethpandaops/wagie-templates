                        type: string
                      service_name:
                        type: string
                      commit_sha:
                        type: string
                      image_ref:
                        type: string
                      reason:
                        type: string
                  alternate_code_refs:
                    type: array
                    items:
                      type: object
                      properties:
                        label:
                          type: string
                        repo_url:
                          type: string
                        commit_sha:
                          type: string
                        path:
                          type: string
                        start_line:
                          type: number
                        end_line:
                          type: number
                        permalink:
                          type: string
                        stable:
                          type: boolean
