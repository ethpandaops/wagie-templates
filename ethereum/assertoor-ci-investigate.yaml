                type: object
                properties:
                  attempted:
                    type: boolean
                  summary:
                    type: string
                  verdict:
                    type: string
            required: [cluster_idx, cheap_fingerprint, cluster_label]
  render_cluster_reports:
    needs: [fetch, investigate_each]
    uses: io.ethpandaops/assertoor-ci-issue-render@1.0.0
    inputs:
      raw_findings: "${{ has(tasks.investigate_each.outputs.raw_findings) ? tasks.investigate_each.outputs.raw_findings : [] }}"
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
    outputs:
      cluster_reports: cluster_reports
      summary: summary
  publish:
    needs: [fetch, render_cluster_reports]
    uses: io.ethpandaops/ci-investigate-issue-publish-by-fingerprint@1.0.0
    inputs:
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      gh_token: ${{ inputs.?gh_token }}
      cluster_reports: "${{ has(tasks.render_cluster_reports.outputs.cluster_reports) ? tasks.render_cluster_reports.outputs.cluster_reports : [] }}"
    outputs:
      results: results
      summary: summary
  report_run:
    needs: [fetch, adapt, cluster, state_check, investigate_each, render_cluster_reports, publish]
    if: "${{ tasks.fetch.outputs.no_failures != true }}"
    uses: io.ethpandaops/assertoor-ci-run-report@1.0.0
    inputs:
      source_repo: ${{ inputs.source_repo }}
      issue_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      workflow_ref: ${{ inputs.workflow_ref }}
      requested_run_id: ${{ inputs.run_id }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      head_sha: ${{ tasks.fetch.outputs.head_sha }}
      head_branch: ${{ tasks.fetch.outputs.head_branch }}
      workflow_path: ${{ tasks.fetch.outputs.workflow_path }}
      no_failures: ${{ tasks.fetch.outputs.no_failures }}
      failures_count: "${{ size(tasks.fetch.outputs.failures) }}"
      clusters_count: "${{ has(tasks.cluster.outputs.clusters) ? size(tasks.cluster.outputs.clusters) : 0 }}"
      clusters: "${{ has(tasks.cluster.outputs.clusters) ? tasks.cluster.outputs.clusters : [] }}"
      state_check_statuses: "${{ has(tasks.state_check.outputs.statuses) ? tasks.state_check.outputs.statuses : [] }}"
      investigation_items: "${{ has(tasks.state_check.outputs.items) ? tasks.state_check.outputs.items : [] }}"
      skipped_items: "${{ has(tasks.state_check.outputs.skipped_items) ? tasks.state_check.outputs.skipped_items : [] }}"
      raw_findings: "${{ has(tasks.investigate_each.outputs.raw_findings) ? tasks.investigate_each.outputs.raw_findings : [] }}"
      cluster_reports: "${{ has(tasks.render_cluster_reports.outputs.cluster_reports) ? tasks.render_cluster_reports.outputs.cluster_reports : [] }}"
      publish_results: "${{ has(tasks.publish.outputs.results) ? tasks.publish.outputs.results : [] }}"
    outputs:
      report: report
      summary: summary
  notify_discord:
    needs: [fetch, render_cluster_reports, publish]
    if: "${{ has(inputs.discord_webhook_url) && has(tasks.publish.outputs.results) && size(tasks.publish.outputs.results) > 0 }}"
    uses: io.ethpandaops/discord-webhook-notify@1.0.0
    inputs:
      webhook_url: ${{ inputs.discord_webhook_url }}
      title: "Assertoor CI triage issues published"
      summary: "${{ has(tasks.render_cluster_reports.outputs.summary) ? tasks.render_cluster_reports.outputs.summary : '' }}"
      source_repo: ${{ inputs.source_repo }}
      issue_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      workflow_ref: ${{ inputs.workflow_ref }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      cluster_reports: ${{ tasks.render_cluster_reports.outputs.cluster_reports }}
      publish_results: ${{ tasks.publish.outputs.results }}
      min_confidence: ${{ inputs.discord_min_confidence }}
    outputs:
      sent: sent
      issue_count: issue_count
      omitted_issue_count: omitted_issue_count
      summary: summary
  report_no_failures:
    needs: [fetch]
    if: "${{ tasks.fetch.outputs.no_failures == true }}"
    uses: io.ethpandaops/assertoor-ci-run-report@1.0.0
    inputs:
      source_repo: ${{ inputs.source_repo }}
      issue_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      workflow_ref: ${{ inputs.workflow_ref }}
      requested_run_id: ${{ inputs.run_id }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      head_sha: ${{ tasks.fetch.outputs.head_sha }}
      head_branch: ${{ tasks.fetch.outputs.head_branch }}
      workflow_path: ${{ tasks.fetch.outputs.workflow_path }}
      no_failures: ${{ tasks.fetch.outputs.no_failures }}
      failures_count: "${{ size(tasks.fetch.outputs.failures) }}"
      clusters_count: 0
      clusters: []
      state_check_statuses: []
      investigation_items: []
      skipped_items: []
      raw_findings: []
      cluster_reports: []
      publish_results: []
    outputs:
      report: report
      summary: summary
outputs:
  run_id: ${{ tasks.fetch.outputs.run_id }}
  run_url: ${{ tasks.fetch.outputs.run_url }}
  no_failures: ${{ tasks.fetch.outputs.no_failures }}
  failures_count: "${{ size(tasks.fetch.outputs.failures) }}"
  clusters_count: "${{ has(tasks.cluster.outputs.clusters) ? size(tasks.cluster.outputs.clusters) : 0 }}"
  clusters: "${{ has(tasks.cluster.outputs.clusters) ? tasks.cluster.outputs.clusters : [] }}"
  state_check_statuses: "${{ has(tasks.state_check.outputs.statuses) ? tasks.state_check.outputs.statuses : [] }}"
  raw_findings: "${{ has(tasks.investigate_each.outputs.raw_findings) ? tasks.investigate_each.outputs.raw_findings : [] }}"
  cluster_reports: "${{ has(tasks.render_cluster_reports.outputs.cluster_reports) ? tasks.render_cluster_reports.outputs.cluster_reports : [] }}"
  publish_results: "${{ has(tasks.publish.outputs.results) ? tasks.publish.outputs.results : [] }}"
  fetch_summary: ${{ tasks.fetch.outputs.summary }}
  cluster_summary: "${{ has(tasks.cluster.outputs.summary) ? tasks.cluster.outputs.summary : '' }}"
  state_check_summary: "${{ has(tasks.state_check.outputs.summary) ? tasks.state_check.outputs.summary : '' }}"
  publish_summary: "${{ has(tasks.publish.outputs.summary) ? tasks.publish.outputs.summary : '' }}"
  investigation_items: "${{ has(tasks.state_check.outputs.items) ? tasks.state_check.outputs.items : [] }}"
  skipped_items: "${{ has(tasks.state_check.outputs.skipped_items) ? tasks.state_check.outputs.skipped_items : [] }}"
  discord_notification_sent: "${{ has(tasks.notify_discord.outputs.sent) ? tasks.notify_discord.outputs.sent : false }}"
  discord_notification_issue_count: "${{ has(tasks.notify_discord.outputs.issue_count) ? tasks.notify_discord.outputs.issue_count : 0 }}"
  discord_notification_omitted_issue_count: "${{ has(tasks.notify_discord.outputs.omitted_issue_count) ? tasks.notify_discord.outputs.omitted_issue_count : 0 }}"
  discord_notification_summary: "${{ has(tasks.notify_discord.outputs.summary) ? tasks.notify_discord.outputs.summary : '' }}"
  report: "${{ has(tasks.report_run.outputs.report) ? tasks.report_run.outputs.report : (has(tasks.report_no_failures.outputs.report) ? tasks.report_no_failures.outputs.report : '') }}"
  summary: "${{ has(tasks.report_run.outputs.summary) ? tasks.report_run.outputs.summary : (has(tasks.report_no_failures.outputs.summary) ? tasks.report_no_failures.outputs.summary : '') }}"
