                          type: string
                        role:
                          type: string
                        previous_image_ref:
                          type: string
                        current_image_ref:
                          type: string
                        previous_digest:
                          type: string
                        current_digest:
                          type: string
                        previous_revision:
                          type: string
                        current_revision:
                          type: string
                        previous_version:
                          type: string
                        current_version:
                          type: string
                        changed:
                          type: boolean
                        evidence:
                          type: string
                  changed_components:
                    type: array
                    items:
                      type: object
                      properties:
                        component:
                          type: string
                        service_name:
                          type: string
                        role:
                          type: string
                        previous_revision:
