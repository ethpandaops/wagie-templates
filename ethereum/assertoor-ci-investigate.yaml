                    type: string
                  repo_url:
                    type: string
                  commit_sha:
                    type: string
                  component:
                    type: string
                  client_name:
                    type: string
                  resolution_method:
                    type: string
                  commit_exact:
                    type: boolean
                  resolution_caveat:
                    type: string
                  workdir:
                    type: string
                  cloned:
                    type: boolean
                  alternate_targets:
                    type: array
                    items:
                      type: object
                      properties:
                        target_kind:
                          type: string
                        component:
                          type: string
                        repo_url:
                          type: string
                        service_name:
                          type: string
                        reason:
                          type: string
                  root_cause_description:
                    type: string
                  suggested_change_md:
                    type: string
                  top_candidates:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        line_range:
                          type: string
                        start_line:
                          type: number
                        end_line:
                          type: number
                        permalink:
                          type: string
                        stable:
                          type: boolean
                        relevance_assessment:
                          type: string
                        suggested_change:
                          type: string
                        verified:
                          type: string
                        verification_notes:
                          type: string
                  code_refs:
                    type: array
                    items:
                      type: object
                      properties:
                        label:
                          type: string
                        repo_url:
                          type: string
                        commit_sha:
                          type: string
                        path:
                          type: string
                        start_line:
                          type: number
                        end_line:
                          type: number
                        permalink:
                          type: string
                        stable:
                          type: boolean
                        reason:
                          type: string
                  confidence:
                    type: number
                  confidence_note:
                    type: string
                  search_summary:
                    type: string
                  regression_context:
                    type: string
                  literal_search_signal:
                    type: number
                  recent_change_signal:
                    type: number
                  recent_change_signal_notes:
                    type: string
              launcher_audit:
                type: object
                properties:
                  attempted:
                    type: boolean
                  summary:
                    type: string
                  verdict:
                    type: string
            required: [cluster_idx, cheap_fingerprint, human_label]
  render_pending_cluster_reports:
    needs: [fetch, cluster, state_check]
    if: "${{ has(tasks.state_check.outputs.statuses) && size(tasks.state_check.outputs.statuses) > 0 }}"
    uses: io.ethpandaops/assertoor-ci-issue-render@1.0.0
    inputs:
      mode: pending
      clusters: ${{ tasks.cluster.outputs.clusters }}
      cluster_fingerprints: ${{ tasks.cluster.outputs.cluster_fingerprints }}
      cluster_human_labels: ${{ tasks.cluster.outputs.cluster_human_labels }}
      statuses: ${{ tasks.state_check.outputs.statuses }}
      existing_issue_bodies: ${{ tasks.state_check.outputs.existing_issue_bodies }}
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      schema_version: ${{ inputs.schema_version }}
    outputs:
      cluster_reports: cluster_reports
      summary: summary
  publish_pending:
    needs: [fetch, render_pending_cluster_reports]
    if: "${{ has(tasks.render_pending_cluster_reports.outputs.cluster_reports) && size(tasks.render_pending_cluster_reports.outputs.cluster_reports) > 0 }}"
    uses: io.ethpandaops/ci-investigate-issue-upsert-by-fingerprint@1.0.0
    inputs:
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      gh_token: ${{ inputs.?gh_token }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      cluster_reports: ${{ tasks.render_pending_cluster_reports.outputs.cluster_reports }}
      schema_version: ${{ inputs.schema_version }}
    outputs:
      results: results
      summary: summary
  render_recurrence_cluster_reports:
    needs: [fetch, cluster, state_check, worklist]
    if: "${{ has(tasks.worklist.outputs.recurrence_items) && size(tasks.worklist.outputs.recurrence_items) > 0 }}"
    uses: io.ethpandaops/assertoor-ci-issue-render@1.0.0
    inputs:
      mode: recurrence
      clusters: ${{ tasks.cluster.outputs.clusters }}
      cluster_fingerprints: ${{ tasks.cluster.outputs.cluster_fingerprints }}
      cluster_human_labels: ${{ tasks.cluster.outputs.cluster_human_labels }}
      statuses: ${{ tasks.state_check.outputs.statuses }}
      existing_issue_bodies: ${{ tasks.state_check.outputs.existing_issue_bodies }}
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      schema_version: ${{ inputs.schema_version }}
    outputs:
      cluster_reports: cluster_reports
      summary: summary
  publish_recurrence:
    needs: [fetch, render_recurrence_cluster_reports]
    if: "${{ has(tasks.render_recurrence_cluster_reports.outputs.cluster_reports) && size(tasks.render_recurrence_cluster_reports.outputs.cluster_reports) > 0 }}"
    uses: io.ethpandaops/ci-investigate-issue-upsert-by-fingerprint@1.0.0
    inputs:
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      gh_token: ${{ inputs.?gh_token }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      cluster_reports: ${{ tasks.render_recurrence_cluster_reports.outputs.cluster_reports }}
      schema_version: ${{ inputs.schema_version }}
    outputs:
      results: results
      summary: summary
  render_cluster_reports:
    needs: [fetch, cluster, investigate_each, state_check]
    if: "${{ has(tasks.investigate_each.outputs.raw_findings) && size(tasks.investigate_each.outputs.raw_findings) > 0 }}"
    uses: io.ethpandaops/assertoor-ci-issue-render@1.0.0
    inputs:
      mode: final
      raw_findings: ${{ tasks.investigate_each.outputs.raw_findings }}
      existing_issue_bodies: ${{ tasks.state_check.outputs.existing_issue_bodies }}
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      schema_version: ${{ inputs.schema_version }}
    outputs:
      cluster_reports: cluster_reports
      summary: summary
  publish:
    needs: [fetch, render_cluster_reports]
    if: "${{ has(tasks.render_cluster_reports.outputs.cluster_reports) && size(tasks.render_cluster_reports.outputs.cluster_reports) > 0 }}"
    uses: io.ethpandaops/ci-investigate-issue-upsert-by-fingerprint@1.0.0
    inputs:
      target_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      gh_token: ${{ inputs.?gh_token }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      cluster_reports: ${{ tasks.render_cluster_reports.outputs.cluster_reports }}
      schema_version: ${{ inputs.schema_version }}
    outputs:
      results: results
      summary: summary
  report_run:
    needs: [fetch, adapt, cluster, state_check, worklist, publish_pending, render_recurrence_cluster_reports, publish_recurrence, investigate_each, render_cluster_reports, publish]
    if: "${{ tasks.fetch.outputs.no_failures != true }}"
    uses: io.ethpandaops/assertoor-ci-run-report@1.0.0
    inputs:
      source_repo: ${{ inputs.source_repo }}
      issue_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      workflow_ref: ${{ inputs.workflow_ref }}
      requested_run_id: ${{ inputs.run_id }}
      schema_version: ${{ inputs.schema_version }}
      skip_reproduction: ${{ inputs.skip_reproduction }}
      max_bug_hunt_rounds: ${{ inputs.max_bug_hunt_rounds }}
      reproduction_attempt_timeout_minutes: ${{ inputs.reproduction_attempt_timeout_minutes }}
      reproduction_attempts: ${{ inputs.reproduction_attempts }}
      narrow_to_failing_test: ${{ inputs.narrow_to_failing_test }}
      enable_source_dive: ${{ inputs.enable_source_dive }}
      discord_min_confidence: ${{ inputs.discord_min_confidence }}
      staleness_days: ${{ inputs.staleness_days }}
      closed_context_days: ${{ inputs.closed_context_days }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      head_sha: ${{ tasks.fetch.outputs.head_sha }}
      head_branch: ${{ tasks.fetch.outputs.head_branch }}
      workflow_path: ${{ tasks.fetch.outputs.workflow_path }}
      no_failures: ${{ tasks.fetch.outputs.no_failures }}
      failures_count: "${{ size(tasks.fetch.outputs.failures) }}"
      clusters_count: "${{ has(tasks.cluster.outputs.clusters) ? size(tasks.cluster.outputs.clusters) : 0 }}"
      clusters: "${{ has(tasks.cluster.outputs.clusters) ? tasks.cluster.outputs.clusters : [] }}"
      state_check_statuses: "${{ has(tasks.state_check.outputs.statuses) ? tasks.state_check.outputs.statuses : [] }}"
      worklist_items: "${{ has(tasks.worklist.outputs.items) ? tasks.worklist.outputs.items : [] }}"
      recurrence_worklist_items: "${{ has(tasks.worklist.outputs.recurrence_items) ? tasks.worklist.outputs.recurrence_items : [] }}"
      skipped_worklist_items: "${{ has(tasks.worklist.outputs.skipped_items) ? tasks.worklist.outputs.skipped_items : [] }}"
      raw_findings: "${{ has(tasks.investigate_each.outputs.raw_findings) ? tasks.investigate_each.outputs.raw_findings : [] }}"
      cluster_reports: "${{ has(tasks.render_cluster_reports.outputs.cluster_reports) ? tasks.render_cluster_reports.outputs.cluster_reports : [] }}"
      recurrence_cluster_reports: "${{ has(tasks.render_recurrence_cluster_reports.outputs.cluster_reports) ? tasks.render_recurrence_cluster_reports.outputs.cluster_reports : [] }}"
      pending_publish_results: "${{ has(tasks.publish_pending.outputs.results) ? tasks.publish_pending.outputs.results : [] }}"
      recurrence_publish_results: "${{ has(tasks.publish_recurrence.outputs.results) ? tasks.publish_recurrence.outputs.results : [] }}"
      publish_results: "${{ has(tasks.publish.outputs.results) ? tasks.publish.outputs.results : [] }}"
    outputs:
      report: report
      summary: summary
  notify_discord:
    needs: [fetch, render_cluster_reports, publish, report_run]
    if: "${{ has(inputs.discord_webhook_url) && has(tasks.publish.outputs.results) && size(tasks.publish.outputs.results) > 0 }}"
    uses: io.ethpandaops/discord-webhook-notify@1.0.0
    inputs:
      webhook_url: ${{ inputs.discord_webhook_url }}
      title: "Assertoor CI triage issues published"
      summary: ${{ tasks.report_run.outputs.summary }}
      source_repo: ${{ inputs.source_repo }}
      issue_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      workflow_ref: ${{ inputs.workflow_ref }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      cluster_reports: ${{ tasks.render_cluster_reports.outputs.cluster_reports }}
      publish_results: ${{ tasks.publish.outputs.results }}
      min_confidence: ${{ inputs.discord_min_confidence }}
    outputs:
      sent: sent
      issue_count: issue_count
      omitted_issue_count: omitted_issue_count
      summary: summary
  report_no_failures:
    needs: [fetch]
    if: "${{ tasks.fetch.outputs.no_failures == true }}"
    uses: io.ethpandaops/assertoor-ci-run-report@1.0.0
    inputs:
      source_repo: ${{ inputs.source_repo }}
      issue_repo: "${{ inputs.issue_repo != '' ? inputs.issue_repo : inputs.source_repo }}"
      workflow_ref: ${{ inputs.workflow_ref }}
      requested_run_id: ${{ inputs.run_id }}
      schema_version: ${{ inputs.schema_version }}
      skip_reproduction: ${{ inputs.skip_reproduction }}
      max_bug_hunt_rounds: ${{ inputs.max_bug_hunt_rounds }}
      reproduction_attempt_timeout_minutes: ${{ inputs.reproduction_attempt_timeout_minutes }}
      reproduction_attempts: ${{ inputs.reproduction_attempts }}
      narrow_to_failing_test: ${{ inputs.narrow_to_failing_test }}
      enable_source_dive: ${{ inputs.enable_source_dive }}
      discord_min_confidence: ${{ inputs.discord_min_confidence }}
      staleness_days: ${{ inputs.staleness_days }}
      closed_context_days: ${{ inputs.closed_context_days }}
      run_id: ${{ tasks.fetch.outputs.run_id }}
      run_url: ${{ tasks.fetch.outputs.run_url }}
      run_started_at: ${{ tasks.fetch.outputs.run_started_at }}
      head_sha: ${{ tasks.fetch.outputs.head_sha }}
      head_branch: ${{ tasks.fetch.outputs.head_branch }}
      workflow_path: ${{ tasks.fetch.outputs.workflow_path }}
      no_failures: ${{ tasks.fetch.outputs.no_failures }}
      failures_count: "${{ size(tasks.fetch.outputs.failures) }}"
      clusters_count: 0
      clusters: []
      state_check_statuses: []
      worklist_items: []
      recurrence_worklist_items: []
      skipped_worklist_items: []
      raw_findings: []
      cluster_reports: []
      recurrence_cluster_reports: []
      pending_publish_results: []
      recurrence_publish_results: []
      publish_results: []
    outputs:
      report: report
      summary: summary
outputs:
  run_id: ${{ tasks.fetch.outputs.run_id }}
  run_url: ${{ tasks.fetch.outputs.run_url }}
  no_failures: ${{ tasks.fetch.outputs.no_failures }}
  failures_count: "${{ size(tasks.fetch.outputs.failures) }}"
  clusters_count: "${{ has(tasks.cluster.outputs.clusters) ? size(tasks.cluster.outputs.clusters) : 0 }}"
  clusters: "${{ has(tasks.cluster.outputs.clusters) ? tasks.cluster.outputs.clusters : [] }}"
  state_check_statuses: "${{ has(tasks.state_check.outputs.statuses) ? tasks.state_check.outputs.statuses : [] }}"
  raw_findings: "${{ has(tasks.investigate_each.outputs.raw_findings) ? tasks.investigate_each.outputs.raw_findings : [] }}"
  cluster_reports: "${{ has(tasks.render_cluster_reports.outputs.cluster_reports) ? tasks.render_cluster_reports.outputs.cluster_reports : [] }}"
  recurrence_cluster_reports: "${{ has(tasks.render_recurrence_cluster_reports.outputs.cluster_reports) ? tasks.render_recurrence_cluster_reports.outputs.cluster_reports : [] }}"
  publish_results: "${{ has(tasks.publish.outputs.results) ? tasks.publish.outputs.results : [] }}"
  fetch_summary: ${{ tasks.fetch.outputs.summary }}
  cluster_summary: "${{ has(tasks.cluster.outputs.summary) ? tasks.cluster.outputs.summary : '' }}"
  state_check_summary: "${{ has(tasks.state_check.outputs.summary) ? tasks.state_check.outputs.summary : '' }}"
  publish_summary: "${{ has(tasks.publish.outputs.summary) ? tasks.publish.outputs.summary : '' }}"
  recurrence_publish_summary: "${{ has(tasks.publish_recurrence.outputs.summary) ? tasks.publish_recurrence.outputs.summary : '' }}"
  worklist_summary: "${{ has(tasks.worklist.outputs.summary) ? tasks.worklist.outputs.summary : '' }}"
  skipped_worklist_items: "${{ has(tasks.worklist.outputs.skipped_items) ? tasks.worklist.outputs.skipped_items : [] }}"
  recurrence_worklist_items: "${{ has(tasks.worklist.outputs.recurrence_items) ? tasks.worklist.outputs.recurrence_items : [] }}"
  pending_publish_results: "${{ has(tasks.publish_pending.outputs.results) ? tasks.publish_pending.outputs.results : [] }}"
  recurrence_publish_results: "${{ has(tasks.publish_recurrence.outputs.results) ? tasks.publish_recurrence.outputs.results : [] }}"
  discord_notification_sent: "${{ has(tasks.notify_discord.outputs.sent) ? tasks.notify_discord.outputs.sent : false }}"
  discord_notification_issue_count: "${{ has(tasks.notify_discord.outputs.issue_count) ? tasks.notify_discord.outputs.issue_count : 0 }}"
  discord_notification_omitted_issue_count: "${{ has(tasks.notify_discord.outputs.omitted_issue_count) ? tasks.notify_discord.outputs.omitted_issue_count : 0 }}"
  discord_notification_summary: "${{ has(tasks.notify_discord.outputs.summary) ? tasks.notify_discord.outputs.summary : '' }}"
  report: "${{ has(tasks.report_run.outputs.report) ? tasks.report_run.outputs.report : (has(tasks.report_no_failures.outputs.report) ? tasks.report_no_failures.outputs.report : '') }}"
  summary: "${{ has(tasks.report_run.outputs.summary) ? tasks.report_run.outputs.summary : (has(tasks.report_no_failures.outputs.summary) ? tasks.report_no_failures.outputs.summary : '') }}"
