kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/assertoor-ci-normalize
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when raw per-job artifacts from an assertoor-test GitHub Actions run need to be normalized into the generic NormalizedFailure shape consumed by CI triage primitives. Enriches each failure with failed leaves, client pairs, runtime image identity, and original dump evidence.
tags: ["ci", "assertoor", "ethereum", "ethpandaops", "adapter"]
defaults:
  retryable: true
  timeout: 30m
inputs:
  failures:
    type: array
    required: true
    description: Per-job descriptors from io.ethpandaops/github-actions-failure-fetch, with `artifacts_dir` populated
    schema:
      type: array
      items:
        type: object
        properties:
          job_id:
            type: string
          job_name:
            type: string
          conclusion:
            type: string
          artifacts_dir:
            type: string
          artifact_names:
            type: array
            items:
              type: string
        required: [job_id, job_name, artifacts_dir, artifact_names]
  run_id:
    type: string
    required: true
    description: GitHub Actions run id (passed through onto each NormalizedFailure)
  run_url:
    type: string
    required: true
    description: GitHub Actions run URL (passed through onto each NormalizedFailure)
  head_sha:
    type: string
    default: ""
    description: Git commit SHA tested by the workflow run, passed through for source/test inspection context
  run_started_at:
    type: string
    default: ""
    description: Workflow run start timestamp, passed through for timeline context
tasks:
  adapt:
    selection:
      capabilities: [tool-use]
    run: assertoor-ci-normalize
    quality-gate: "${{ has(result.normalized_failures) && size(result.normalized_failures) == size(inputs.failures) }}"
    instructions: |-
      Parse the assertoor-test pipeline's per-job artifacts into the generic NormalizedFailure shape. Produce exactly one NormalizedFailure per input job, in the same order. Emit a best-effort enriched entry even when artifacts are partial; never drop a failed job.

      For each job in `failures`:

      1. Derive `shard_id`. The assertoor pipeline's `--name` for each artifact is the matrix shard id (e.g. "latest-releases-7", "vc-compatibility-3"). It typically appears as the suffix of artifact directory names:
         - `summary-<shard_id>`
         - `claude-code-output-<run_id>-<shard_id>` (only present on failure shards)
         - `enclave-dump-assertoor-<run_id>-<shard_id>`
         Parse the shard_id from those directory names. If multiple candidates, prefer the one shared by all three artifact directory names.

      2. Read `summary.json` from inside the `summary-<shard_id>` artifact directory (path: `<artifacts_dir>/summary-<shard_id>/summary.json`). It has fields `test_result`, `test_status`, `failed_test_status`, `ai_summary`, `enclave_dump_artifact`. If absent, treat as `test_result=""`.

      3. Determine `category`:
         - If `summary.json` is missing or unreadable: `category = "unknown"` unless the downloaded artifacts contain concrete launch/startup failure evidence. Do not label artifact-download or artifact-mapping gaps as `infra-startup`; add a concise `original_artifact_evidence` or `log_excerpts` note that summary metadata was missing.
         - Else if `test_result` is empty: use `infra-startup` only when `failed_test_status`, kurtosis output, or enclave-dump evidence shows the testnet/assertoor service never reached the test phase. Otherwise use `unknown` and record the partial-artifact limitation.
         - Else if `test_result == "failure"`: parse the prose. Look at `failed_test_status` lines. If the failed task description mentions `timeout`, `deadline exceeded`, or `context deadline`: `category = "timeout"`. If it mentions `panic` or `crash`: `category = "crash"`. If it mentions `connection`, `unreachable`, `refused`: `category = "infra-startup"`. Otherwise: `category = "assertion"`.
         - Else: `category = "unknown"`.

      4. Extract the failed task tree from `failed_test_status`. The prose is a column-aligned table with ANSI colour codes; strip ANSI escapes first (`sed -r "s/\x1B\[[0-9;]*[mK]//g"`). Each row is `<index> <status1> <status2> <task_name> <description>`. Preserve all rows in `failed_task_tree` as objects:
         `{index, depth, status, result, task_name, title}`.
         - Infer `depth` from indentation, tree glyphs, or prefix nesting. If depth is unclear, use 0 for the first failed row and increment only when indentation clearly increases.
         - `root_failed_step` is the task_name from the FIRST row whose `result`/second status is `failure`.
         - `failed_task_leaves` are failed rows that have no deeper failed descendant before the tree unwinds. For each leaf add:
           `{index, depth, task_name, title, role, client_pair}`.
         - `role` should be one of `proposal-check`, `tx-generator`, `background`, `matrix`, `other`. Use task names and titles (`check_consensus_block_proposals`, `generate_eoa_transactions`, `run_task_background`, matrix/pair wording) to classify.
         - Parse `client_pair` from titles such as `from 1-reth-prysm`, `via 1-reth-teku`, `on 7-besu-lighthouse`, or similar `<number>-<el>-<cl>` substrings. Leave empty when absent.
         The top-level `test_name` is the assertoor test id (e.g. `eoa-transactions-test`) — derive it from `test_status`'s failed entry (it has the same colon-table format; first failed row's task slug is the test name). Set `failed_step` to the deepest/actionable failed leaf task_name when available; otherwise use `root_failed_step`. When `category == infra-startup`, set `test_name = "kurtosis-startup"`, `root_failed_step = "testnet-launch"`, and `failed_step = "testnet-launch"`.

      5. Read `ai_summary` from summary.json into `prior_ai_summary`. If absent, also try `<artifacts_dir>/claude-code-output-*-<shard_id>/claude_code_summary.txt`. If both are empty/absent, set `prior_ai_summary = ""`.

      6. Parse `kurtosis-params.yaml` from the original dump when present. Populate:
         - `client_pairs`: one object per participant with `{pair_id, el_type, cl_type, vc_type, el_image, cl_image, vc_image, params}`. Use ids from the participant index or client names; examples: `1-reth-prysm`, `7-besu-lighthouse`.
         - `assertoor_image`, `kurtosis_tests`, `disable_peer_scoring`, `snooper_enabled`, and `additional_services` when those fields are present.
         - `affected_client_pairs`: unique pair_ids found in failed leaf titles, prior_ai_summary, and original artifact evidence.
         - `passing_client_pairs`: pair_ids with explicit success rows in the failed task tree, when available. Do not infer passing from absence of failure.

      7. Digest the original enclave dump when present. Recursively scan every service `spec.json` and `output.log` under the `enclave-dump-*` artifact.

         First, build `runtime_components`: one object per runtime service where identity can be recovered. Do not limit this to the affected client pair. Include every participant EL/CL/VC service that maps to `client_pairs`, plus material non-client services configured by the args file such as `assertoor`. For each service, capture best-effort `{service_name, role, client, image_ref, image_id, manifest_digest, source_repo, source_revision, version, build_info, source}` from:
         - Docker `spec.json`: `.Config.Image`, `.Image`, `.ImageManifestDescriptor.digest` (also tolerate `.ImageManifestDescriptor.Digest`), OCI labels such as `org.opencontainers.image.source`, `org.opencontainers.image.revision`, and `org.opencontainers.image.version`, plus ethereum-package labels when present.
         - Startup logs: build/version lines, client-version strings, and git branch/tag/commit fields.
         For the assertoor service, set `role="assertoor"` and `client="assertoor"` and capture both the configured image ref and manifest digest when present. Keep this factual. These identities are used later to compare a failed run against a previous successful run and to replay the original run, especially when the configured image was a floating tag such as `latest`, `stable`, `master`, or a nightly.

         Also build `package_runtime_identity` for the Kurtosis package invocation when evidence is present. Scan kurtosis-api/output.log and package runner logs for package execution lines, package ids, absolute locators, imported module locators, timestamps, and resolved commits. Return best-effort:
         `{package_ref, package_started_at, source_repo, source_revision, source, evidence}`.
         - `package_ref`: the locator Kurtosis executed, such as `github.com/ethpandaops/ethereum-package`.
         - `package_started_at`: the closest timestamp for the package execution step, not merely the GitHub workflow start, when a timestamp can be parsed from logs.
         - `source_repo`: normalized GitHub repo URL or owner/name for the package source when known.
         - `source_revision`: resolved tag/branch/commit only when the logs prove it.
         - `evidence`: one concise log-path/excerpt string that supports the identity.

         Then return up to 12 `original_artifact_evidence` entries. Each entry is `{source, category, summary, excerpt}` where `source` is a relative path plus line number when possible. Prefer high-signal excerpts from these categories:
         - `client-rpc-error`: a named client/service returned a concrete RPC/API error to a caller. Preserve the emitting service, API/RPC method, literal error string, and approximate count when available.
         - `client-runtime-identity`: service image digest/build identity evidence that is likely useful for regression comparison.
         - `p2p-peer-count`: peer count stuck low, "No GoodPeers", discovery/ENR problems, disconnected peers, mesh too sparse.
         - `txpool-admission`: transaction acceptance, promotion, replacement, nonce ordering, account queue, or pending-pool policy symptoms.
         - `txpool-queued-pending`: pending/queued divergence, txpool full/dropped, local tx accepted but not promoted.
         - `workload-account-error`: workload/account setup, wallet/account pool, nonce manager, generator, cancellation, or skipped bookkeeping errors in framework/dependency logs.
         - `late-tx-inclusion`: blocks eventually include the expected txs after the assertoor deadline/window.
         - `engine-api-warning`: engine payload, forkchoice, payload attributes, EL/CL engine API mismatch.
         - `client-panic`: panic, fatal crash, stack trace, database corruption.
         - `discovery-routing`: bootnode, discovery service, discv4/discv5, ENR, routing, or peer discovery symptoms.
         - `test-timeout`: explicit assertoor timeout/deadline lines.
         Cap each excerpt at 15 lines / 1500 characters. Do not include giant logs; cite the artifact path so humans can inspect the full dump.

      8. Infer `component_hints`: a short array of implicated components from the prior summary, failed leaves, client pairs, original artifact evidence, and runtime components. Include client names (`reth`, `besu`, `erigon`, `teku`, ...), and non-client components when evidence points there (`assertoor`, `spamoor`, `ethereum-package`, `bootnodoor`). This is a routing hint, not a verdict.

      9. Build `evidence_brief`: a compact object for later investigation prompts so they do not need to inline the full task tree, client matrix, and artifact excerpts. Keep it factual and terse:
         - `headline`: one sentence describing the observed failure surface.
         - `failure_shape`: test, root failed step, selected failed_step, category, and error signature.
         - `client_scope`: affected client pairs, passing client pairs, and notable participant/client image or runtime identity facts in one short paragraph.
         - `task_scope`: failed task leaves summarized by task_name, role, and client_pair.
         - `artifact_signal`: top original artifact evidence categories and sources, with no more than 5 concise bullets or sentences.
         - `component_hints`: component_hints joined as a comma-separated string.
         - `routing_notes`: one or two sentences explaining whether the evidence points toward client, framework, framework dependency, devnet-network, config, mixed, or unknown. When a concrete RPC/API/log error is emitted by a named client or service, say that the emitting component is the first source-dive target and the caller/tool is fallback evidence unless there is evidence it generated invalid input. This is a hint, not a classification.
         Cap each string field at roughly 1200 characters.

      10. Build `error_signature`: take the first non-empty line of either (a) `prior_ai_summary`'s first paragraph if it starts with "FAILED:" or similar one-line headline, (b) the deepest failed leaf title, or (c) the root failed row's description column from `failed_test_status`. Strip per-run noise: run ids, container hashes, ISO timestamps, hex addresses, port numbers. Keep it short (under 200 chars) and information-dense. This string will be normalised again by the fingerprint template — do not pre-normalise here.

      11. Build `log_excerpts`: short evidence strings useful in issue bodies and run reports. Include up to 6 entries:
         - The cleaned failed_test_status row (one line).
         - The first 5 lines of `prior_ai_summary` when present (joined with newlines).
         - A compact "failed leaves" summary listing task_name + title + client_pair.
         - The top 2-3 original artifact evidence excerpts, especially when they show client reject/drop policy, txpool state, account/workload lifecycle, p2p peer counts, propagation/discovery symptoms, or launcher/config errors.
         - When `category == infra-startup` and the enclave dump has a `services_list.txt` or similar, include its head.
         Cap each excerpt at 30 lines / 2000 characters.

      12. Build `artifact_paths`: list the artifact subdirectories present under `artifacts_dir` with their absolute paths. Each entry is `{name, path}`.

      13. Build `artifact_coverage`: a compact object describing which expected assertoor artifacts were present for this failed job:
          `{has_summary, has_enclave_dump, has_ai_summary_artifact, has_kurtosis_params, artifact_names, missing, notes}`.
          Set `missing` to expected artifact families that were absent or unreadable. Include coverage gaps in `notes` and in `log_excerpts` when they materially limit diagnosis.

      14. Determine `kurtosis_params_path`: look inside the `enclave-dump-*` artifact subdirectory for a file literally named `kurtosis-params.yaml` (the assertoor pipeline saves it there before dumping). Set `kurtosis_params_path` to its absolute path. If the enclave dump artifact is absent or the file is missing, set `kurtosis_params_path = ""` — an empty path signals that reproduction should skip. Reflect this in `artifact_coverage.has_kurtosis_params`.

      15. Set the pass-through fields: `job_id`, `job_name` from the input, `run_id`, `run_url`, `head_sha`, and `run_started_at` from the template inputs.

      Return `normalized_failures` aligned with the input `failures` array. Size MUST equal the input size — emit a best-effort partial entry rather than dropping a job. Include a short `summary` of the adapter run.
    inputs:
      failures: ${{ inputs.failures }}
      run_id: ${{ inputs.run_id }}
      run_url: ${{ inputs.run_url }}
      head_sha: ${{ inputs.head_sha }}
      run_started_at: ${{ inputs.run_started_at }}
    outputs:
      normalized_failures: "${{ result.normalized_failures }}"
      summary: "${{ has(result.summary) ? result.summary : '' }}"
      schema:
        normalized_failures:
          type: array
          items:
            type: object
            properties:
              job_id:
                type: string
              job_name:
                type: string
              shard_id:
                type: string
              test_name:
                type: string
              failed_step:
                type: string
              root_failed_step:
                type: string
              category:
                type: string
                enum: [timeout, assertion, exception, infra-startup, crash, unknown]
              error_signature:
                type: string
              failed_task_tree:
                type: array
                items:
                  type: object
                  properties:
                    index:
                      type: number
                    depth:
                      type: number
                    status:
                      type: string
                    result:
                      type: string
                    task_name:
                      type: string
                    title:
                      type: string
                  required: [index, task_name]
              failed_task_leaves:
                type: array
                items:
                  type: object
                  properties:
                    index:
                      type: number
                    depth:
                      type: number
                    task_name:
                      type: string
                    title:
                      type: string
                    role:
                      type: string
                      enum: [proposal-check, tx-generator, background, matrix, other]
                    client_pair:
                      type: string
                  required: [index, task_name]
              affected_client_pairs:
                type: array
                items:
                  type: string
              passing_client_pairs:
                type: array
                items:
                  type: string
              client_pairs:
                type: array
                items:
                  type: object
                  properties:
                    pair_id:
                      type: string
                    el_type:
                      type: string
                    cl_type:
                      type: string
                    vc_type:
                      type: string
                    el_image:
                      type: string
                    cl_image:
                      type: string
                    vc_image:
                      type: string
                    params:
                      type: object
                      properties:
                        raw:
                          type: string
                          description: Optional serialized participant params when the adapter cannot model the arbitrary config shape
                  required: [pair_id]
              assertoor_image:
                type: string
              kurtosis_tests:
                type: array
                items:
                  type: string
              disable_peer_scoring:
                type: boolean
              snooper_enabled:
                type: boolean
              additional_services:
                type: array
                items:
                  type: string
              original_artifact_evidence:
                type: array
                items:
                  type: object
                  properties:
                    source:
                      type: string
                    category:
                      type: string
                      enum: [client-rpc-error, client-runtime-identity, p2p-peer-count, txpool-admission, txpool-queued-pending, workload-account-error, late-tx-inclusion, engine-api-warning, client-panic, discovery-routing, test-timeout, other]
                    summary:
                      type: string
                    excerpt:
                      type: string
                  required: [source, category, summary]
              component_hints:
                type: array
                items:
                  type: string
              runtime_components:
                type: array
                items:
                  type: object
                  properties:
                    service_name:
                      type: string
                    role:
                      type: string
                    client:
                      type: string
                    image_ref:
                      type: string
                    image_id:
                      type: string
                    manifest_digest:
                      type: string
                    source_repo:
                      type: string
                    source_revision:
                      type: string
                    version:
                      type: string
                    build_info:
                      type: string
                    source:
                      type: string
              package_runtime_identity:
                type: object
                properties:
                  package_ref:
                    type: string
                  package_started_at:
                    type: string
                    description: Closest timestamp for the Kurtosis package execution step, when parsed from original CI logs
                  source_repo:
                    type: string
                  source_revision:
                    type: string
                  source:
                    type: string
                  evidence:
                    type: string
              evidence_brief:
                type: object
                properties:
                  headline:
                    type: string
                  failure_shape:
                    type: string
                  client_scope:
                    type: string
                  task_scope:
                    type: string
                  artifact_signal:
                    type: string
                  component_hints:
                    type: string
                  routing_notes:
                    type: string
              log_excerpts:
                type: array
                items:
                  type: string
              artifact_paths:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    path:
                      type: string
                  required: [name, path]
              artifact_coverage:
                type: object
                properties:
                  has_summary:
                    type: boolean
                  has_enclave_dump:
                    type: boolean
                  has_ai_summary_artifact:
                    type: boolean
                  has_kurtosis_params:
                    type: boolean
                  artifact_names:
                    type: array
                    items:
                      type: string
                  missing:
                    type: array
                    items:
                      type: string
                  notes:
                    type: string
              kurtosis_params_path:
                type: string
                description: Absolute path to the kurtosis-params.yaml inside the enclave-dump artifact; empty when the dump was not present
              prior_ai_summary:
                type: string
              run_id:
                type: string
              run_url:
                type: string
              head_sha:
                type: string
              run_started_at:
                type: string
            required: [job_id, job_name, shard_id, test_name, failed_step, category, error_signature, run_id, run_url]
          description: NormalizedFailure entries aligned with the input failures array
        summary:
          type: string
outputs:
  normalized_failures: ${{ tasks.adapt.outputs.normalized_failures }}
  summary: ${{ tasks.adapt.outputs.summary }}
