kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/devnet-finality-assessment
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when a workflow needs a structured Ethereum devnet finality assessment; gathers finality observations and classifies the current finality state.
tags: ["devnet", "ethereum", "ethpandaops", "finality"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 1h
inputs:
  network_name:
    type: string
    required: true
    description: Resolved target devnet name
  investigation_timeframe:
    type: string
    required: true
    description: Active investigation timeframe
  threshold_epochs:
    type: number
    default: 4
    description: Epochs behind finality after which the situation is degraded
  instances:
    type: array
    default: []
    description: Specific instances to inspect first
    schema:
      type: array
      items:
        type: string
  data_profile:
    type: object
    required: true
    description: Available debugging surfaces and recommended mode
    schema:
      type: object
      properties:
        mode:
          type: string
          enum: [local, remote]
        has_dora:
          type: boolean
        has_loki:
          type: boolean
        loki_datasource:
          type: string
        has_ethnode:
          type: boolean
        has_clickhouse:
          type: boolean
        has_prometheus:
          type: boolean
        has_direct_node_access:
          type: boolean
        loki_schema:
          type: string
          enum: [ethpandaops, kurtosis]
      required: [mode, has_dora, has_loki, loki_datasource, has_ethnode, has_direct_node_access, loki_schema]
  context_summary:
    type: string
    description: Optional normalized context summary (fork schedule, deployment mode, available surfaces)
  notes_summary:
    type: string
    description: Optional high-signal notes summary for the devnet
  notes_highlights:
    type: array
    default: []
    description: Optional structured notes highlights worth preserving in the assessment
    schema:
      type: array
      items:
        type: string
tasks:
  observe:
    selection: {capabilities: [reasoning, tool-use]}
    run: assess-devnet-finality
    quality-gate: "${{ has(result.finality_summary) && size(result.finality_summary) > 0 }}"
    instructions: |-
      Assess the network's finality state. This is a focused finality drill-down — broad
      baseline work (fork detection, missing proposers, offline attesters, general node health)
      is handled by the baseline template. Focus on where finality is, why it stopped, and
      whether it's recovering.

      Use the `panda` CLI. For Python API calls, use heredoc stdin to avoid quote issues:
      ```
      panda execute <<'PYEOF'
      <python code here — no escaping needed>
      PYEOF
      ```

      ## Finality checkpoint collection

      The Dora overview only returns a `finalized` boolean, not the epoch number. Use ethnode
      for the authoritative finalized epoch:
      - `panda ethnode finality <network> <instance>` — returns finalized epoch/root,
        current_justified epoch/root, previous_justified epoch/root.

      Query 2-3 nodes from different client types. If finalized epochs or roots disagree,
      the network has split and nodes are finalizing different chains.

      Compute: `epochs_behind = current_epoch - finalized_epoch`

      ## Participation trend (epoch walk)

      Walk recent epochs to find the drop-off point and assess direction:
      ```
      panda execute <<'PYEOF'
      from ethpandaops import dora
      network = "<network>"
      overview = dora.get_network_overview(network)
      head_epoch = overview["current_epoch"]
      for e in range(head_epoch - 1, max(head_epoch - 20, 0), -1):
          ep = dora.get_epoch(network, e)
          d = ep["data"]
          print(f"  epoch={d['epoch']} finalized={d['finalized']} participation={d['globalparticipationrate']}% proposed={d['blockscount']}/{d['blockscount']+d['missedblocks']}")
      PYEOF
      ```

      From this, identify:
      - `finality_broke_epoch`: first epoch after the last finalized one.
      - `participation_trend`: recovering (increasing), stable, or declining.

      The head epoch is in progress — start analysis from head_epoch - 1.

      ## Finality thresholds

      - Finality requires >66.7% (2/3) of stake attesting.
      - Normal lag: 2 epochs. Concern: >4. Critical: >8.

      <example>
      Good finality summary:
      "Finality stalled at epoch 3742. Last finalized epoch: 3741 (82% participation).
      Epoch 3742 dropped to 31% and has not recovered — current epoch 3912 is 170 epochs
      behind. Participation stable at 30% across last 20 epochs (no recovery trend).
      lighthouse-geth-1 and lodestar-geth-1 disagree on finalized checkpoint (3741 vs 3740),
      suggesting a split occurred near the finality boundary."
      </example>

      ## Report artifact

      Build a markdown report as you go. Append raw API responses after each collection
      step. Write the final report as the `report` output artifact.

      ## Evidence and uncertainty

      Ground every observation in a specific tool output. If a data source is unavailable or
      a query fails, say so rather than inferring. If evidence is ambiguous, express that —
      a qualified assessment is more useful than a confident wrong one.
    inputs:
      network_name: ${{ inputs.network_name }}
      investigation_timeframe: ${{ inputs.investigation_timeframe }}
      threshold_epochs: ${{ inputs.threshold_epochs }}
      instances: ${{ inputs.instances }}
      data_profile: ${{ inputs.data_profile }}
      context_summary: "${{ has(inputs.context_summary) ? inputs.context_summary : '' }}"
      notes_summary: "${{ has(inputs.notes_summary) ? inputs.notes_summary : '' }}"
      notes_highlights: "${{ has(inputs.notes_highlights) ? inputs.notes_highlights : [] }}"
    outputs:
      finality_summary: ${{ result.finality_summary }}
      epochs_behind: "${{ has(result.epochs_behind) ? result.epochs_behind : 0 }}"
      finality_broke_epoch: "${{ has(result.finality_broke_epoch) ? result.finality_broke_epoch : -1 }}"
      participation_trend: "${{ has(result.participation_trend) ? result.participation_trend : 'unknown' }}"
      evidence: "${{ has(result.evidence) ? result.evidence : [] }}"
      report: "${{ has(result.report) ? result.report : '' }}"
      finality_checkpoints: "${{ has(result.finality_checkpoints) ? result.finality_checkpoints : [] }}"
      participation_by_epoch: "${{ has(result.participation_by_epoch) ? result.participation_by_epoch : [] }}"
      schema:
        finality_summary:
          type: string
          description: Concise finality assessment summary
        epochs_behind:
          type: number
          description: Epochs behind finality (current_epoch - finalized_epoch)
        finality_broke_epoch:
          type: number
          description: The epoch where finality stopped progressing (-1 if unknown)
        participation_trend:
          type: string
          enum: [recovering, stable, declining, unknown]
          description: Direction of participation rate across recent epochs
        evidence:
          type: array
          items:
            type: string
          description: Observations supporting the finality assessment
        report:
          kind: artifact
          content-type: text/markdown
          description: Finality report with raw API responses
        finality_checkpoints:
          type: array
          items:
            type: object
            properties:
              instance_name:
                type: string
              finalized_epoch:
                type: number
              finalized_root:
                type: string
              justified_epoch:
                type: number
              justified_root:
                type: string
            required: [instance_name, finalized_epoch, justified_epoch]
          description: Per-node finality checkpoint data showing agreement or divergence
        participation_by_epoch:
          type: array
          items:
            type: object
            properties:
              epoch:
                type: number
              finalized:
                type: boolean
              participation_rate:
                type: number
              proposed_blocks:
                type: number
              missed_blocks:
                type: number
            required: [epoch, participation_rate]
          description: Epoch-by-epoch participation and finality status
  classify_status:
    needs: [observe]
    uses: dev.wagie/decide@1.0.0
    inputs:
      question: "Based on the finality observations, what is the current finality state?"
      context: |-
        Finality summary: ${{ tasks.observe.outputs.finality_summary }}
        Epochs behind: ${{ tasks.observe.outputs.epochs_behind }}
        Finality broke at epoch: ${{ tasks.observe.outputs.finality_broke_epoch }}
        Participation trend: ${{ tasks.observe.outputs.participation_trend }}
        Evidence: ${{ tasks.observe.outputs.evidence }}
        Finality checkpoints: ${{ tasks.observe.outputs.finality_checkpoints }}
        Participation by epoch: ${{ tasks.observe.outputs.participation_by_epoch }}

        Finality state diagnostic signatures:
        - healthy: Finality progressing normally, <=2 epochs behind, participation >66.7%.
        - delayed: 3-8 epochs behind finality, participation hovering near 66.7%, possible recovery. Participation trend is recovering or stable.
        - stalled: >8 epochs behind, participation well below 66.7%, no recovery trend. Participation trend is stable or declining.
        - split-driven: Finality delay caused by a network split — /forks shows multiple forks with different head_roots; nodes disagree on finalized checkpoints; validators attesting on different forks dilute effective participation below threshold.
        - unknown: Evidence insufficient to classify finality state.
      options: ["healthy", "delayed", "stalled", "split-driven", "unknown"]
    outputs:
      finality_status: decision
      confidence: confidence
      reasoning: reasoning
outputs:
  finality_status: ${{ tasks.classify_status.outputs.finality_status }}
  finality_status_confidence: ${{ tasks.classify_status.outputs.confidence }}
  finality_status_reasoning: ${{ tasks.classify_status.outputs.reasoning }}
  finality_summary: ${{ tasks.observe.outputs.finality_summary }}
  epochs_behind: ${{ tasks.observe.outputs.epochs_behind }}
  finality_broke_epoch: ${{ tasks.observe.outputs.finality_broke_epoch }}
  participation_trend: ${{ tasks.observe.outputs.participation_trend }}
  evidence: ${{ tasks.observe.outputs.evidence }}
  report: ${{ tasks.observe.outputs.report }}
  finality_checkpoints: ${{ tasks.observe.outputs.finality_checkpoints }}
  participation_by_epoch: ${{ tasks.observe.outputs.participation_by_epoch }}
