name: ethpandaops/devnet-finality-assessment
version: "1.0"
description: >-
  Use when a workflow needs a structured Ethereum devnet finality assessment; gathers finality observations and classifies the current finality state.
tags: ["devnet", "ethereum", "ethpandaops", "finality"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 3m
inputs:
  network_name:
    type: string
    required: true
    description: Resolved target devnet name
  investigation_timeframe:
    type: string
    required: true
    description: Active investigation timeframe
  threshold_epochs:
    type: number
    default: 4
    description: Epochs behind finality after which the situation is degraded
  instances:
    type: array
    default: []
    description: Specific instances to inspect first
    schema:
      type: array
      items:
        type: string
  data_profile:
    type: object
    required: true
    description: Available debugging surfaces and recommended mode
    schema:
      type: object
      properties:
        mode:
          type: string
          enum: [local, remote]
        has_dora:
          type: boolean
        has_loki:
          type: boolean
        has_ethnode:
          type: boolean
        has_direct_node_access:
          type: boolean
        loki_schema:
          type: string
          enum: [ethpandaops, kurtosis]
      required: [mode, has_dora, has_loki, has_ethnode, has_direct_node_access, loki_schema]
  notes_summary:
    type: string
    description: Optional high-signal notes summary for the devnet
  notes_highlights:
    type: array
    default: []
    description: Optional structured notes highlights worth preserving in the assessment
    schema:
      type: array
      items:
        type: string
  observe_model:
    type: string
    description: "Model for finality observation (e.g. claude-sonnet-4-6). Tool-heavy; cheaper models work well."
  observe_provider:
    type: string
    description: "Provider for finality observation (e.g. claudecode, codex)"
  classify_model:
    type: string
    description: "Model for finality classification (e.g. claude-opus-4-6). Benefits from strong reasoning."
  classify_provider:
    type: string
    description: "Provider for finality classification (e.g. claudecode, codex)"
tasks:
  observe:
    worker: {match: "'tool-use' in capabilities && 'reasoning' in capabilities"}
    run: assess-devnet-finality
    quality-gate: "${{ has(result.finality_summary) && size(result.finality_summary) > 0 }}"
    instructions: |-
      Assess the network's finality state using the best available sources.

      Use the `panda` CLI and MCP tools as the primary tool surface.

      Panda commands for finality assessment:
      - Network overview: `panda dora overview <network>` for finalized epoch, head epoch, participation rate.
      - Epoch detail: `panda dora epoch <network> <epoch>` — start from head_epoch - 1 (head epoch is in-progress).
      - Missing proposers: use `panda execute` with `dora.missing_proposers("<network>", epoch=N)`.
      - Offline attesters: use `panda execute` with `dora.offline_attesters("<network>", epoch=N)`.
      - Finality checkpoints: `panda ethnode finality <network> <instance>` for direct checkpoint queries.
      - Cross-node comparison: use `panda execute` with Python to compare finality checkpoints across multiple instances.
      - Reference procedures: `panda search runbooks "finality"` for tested finality investigation procedures.

      Finality thresholds:
      - Finality requires >66.7% (2/3) of stake attesting.
      - Normal finality lag: 2 epochs.
      - Concern: >4 epochs without finality.
      - Critical: >8 epochs without finality.

      Priorities:
      - Use Dora first when available for finalized epoch, head epoch, participation rates, missed slots, and fork visibility.
      - Head epoch caveat: the head epoch is still in progress and will show artificially low participation. Always start analysis from head epoch - 1.
      - If Dora is unavailable and nodes are queryable, compare finality checkpoints and sync status across instances directly. Use `panda ethnode finality <network> <instance>` and `panda ethnode syncing <network> <instance>`. Look for checkpoint disagreement.
      - If only Loki is available, infer likely finality blockers from CL error patterns and instance health.
      - Preserve note-derived expectations when they matter for interpreting the finality state.

      Evidence rules:
      - Every observation MUST reference a specific tool output from this session.
      - If a data source is unavailable, state that explicitly rather than inferring.

      Produce a concise finality summary, epochs-behind estimate, and supporting evidence.
    inputs:
      network_name: ${{ inputs.network_name }}
      investigation_timeframe: ${{ inputs.investigation_timeframe }}
      threshold_epochs: ${{ inputs.threshold_epochs }}
      instances: ${{ inputs.instances }}
      data_profile: ${{ inputs.data_profile }}
      notes_summary: "${{ has(inputs.notes_summary) ? inputs.notes_summary : '' }}"
      notes_highlights: "${{ has(inputs.notes_highlights) ? inputs.notes_highlights : [] }}"
    outputs:
      finality_summary: ${{ result.finality_summary }}
      epochs_behind: "${{ has(result.epochs_behind) ? result.epochs_behind : 0 }}"
      evidence: "${{ has(result.evidence) ? result.evidence : [] }}"
      schema:
        finality_summary:
          type: string
          description: Concise finality baseline summary
        epochs_behind:
          type: number
          description: Estimated epochs behind finality
        evidence:
          type: array
          items:
            type: string
          description: Observations supporting the finality assessment
  classify_status:
    needs: [observe]
    uses: wagie/decide@1
    inputs:
      question: "Based on the finality observations, what is the current finality state?"
      context: |-
        Finality summary: ${{ tasks.observe.outputs.finality_summary }}
        Epochs behind: ${{ tasks.observe.outputs.epochs_behind }}
        Evidence: ${{ tasks.observe.outputs.evidence }}

        Finality state diagnostic signatures:
        - healthy: Finality progressing normally, <=2 epochs behind, participation >66.7%.
        - delayed: 3-8 epochs behind finality, participation hovering near 66.7%, possible recovery.
        - stalled: >8 epochs behind, participation well below 66.7%, no recovery trend.
        - split-driven: Finality delay caused by a network split — validators attesting on different forks dilute effective participation below threshold.
        - unknown: Evidence insufficient to classify finality state.
      options: ["healthy", "delayed", "stalled", "split-driven", "unknown"]
    outputs:
      finality_status: decision
      confidence: confidence
      reasoning: reasoning
outputs:
  finality_status: ${{ tasks.classify_status.outputs.finality_status }}
  finality_status_confidence: ${{ tasks.classify_status.outputs.confidence }}
  finality_status_reasoning: ${{ tasks.classify_status.outputs.reasoning }}
  finality_summary: ${{ tasks.observe.outputs.finality_summary }}
  epochs_behind: ${{ tasks.observe.outputs.epochs_behind }}
  evidence: ${{ tasks.observe.outputs.evidence }}
