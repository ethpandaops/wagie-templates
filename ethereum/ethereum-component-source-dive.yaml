kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/ethereum-component-source-dive
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use to dive into the Ethereum client, framework, dependency, devnet-network, or test-config repository implicated by an observed assertoor failure. Picks the target repo from evidence, resolves client images to source when needed, searches literal evidence plus git history, and reviews candidate files.
tags: ["kurtosis", "ethereum", "ethpandaops", "source-dive", "investigation", "code-review", "assertoor", "bootnodoor", "ethereum-package"]
defaults:
  retryable: true
  timeout: 1h
inputs:
  classification:
    type: string
    required: true
    description: Root-cause classification from upstream (framework-bug, framework-dependency, single-client, multi-client, devnet-network, config-issue, mixed, …).
  enclave_name:
    type: string
    required: true
    description: Kurtosis enclave name; used to inspect service images when a client repo needs to be identified.
  representative:
    type: object
    required: true
    description: NormalizedFailure for the cluster representative (test_name, failed_step, error_signature, prior_ai_summary, …).
    schema:
      type: object
      properties:
        test_name:
          type: string
        failed_step:
          type: string
        category:
          type: string
        error_signature:
          type: string
        log_excerpts:
          type: array
          items:
            type: string
        prior_ai_summary:
          type: string
        affected_client_pairs:
          type: array
          items:
            type: string
        failed_task_leaves:
          type: array
          items:
            type: object
            properties:
              task_name:
                type: string
              title:
                type: string
              role:
                type: string
              client_pair:
                type: string
        original_artifact_evidence:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              category:
                type: string
              summary:
                type: string
              excerpt:
                type: string
        component_hints:
          type: array
          items:
            type: string
        runtime_components:
          type: array
          items:
            type: object
            properties:
              service_name:
                type: string
              role:
                type: string
              client:
                type: string
              image_ref:
                type: string
              image_id:
                type: string
              manifest_digest:
                type: string
              source_repo:
                type: string
              source_revision:
                type: string
              version:
                type: string
              build_info:
                type: string
              source:
                type: string
        evidence_brief:
          type: object
          properties:
            headline:
              type: string
            failure_shape:
              type: string
            client_scope:
              type: string
            task_scope:
              type: string
            artifact_signal:
              type: string
            component_hints:
              type: string
            routing_notes:
              type: string
      required: [test_name, failed_step, category, error_signature]
  source_repo:
    type: string
    default: "ethpandaops/assertoor-test"
    description: Repository containing the failing CI workflow and assertoor-test configuration; used when classification routes to test/config source.
  bug_hunt_findings:
    type: array
    default: []
    description: Findings from the bug-hunt loop, when present.
    schema:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
          severity:
            type: string
          summary:
            type: string
          affected_scope:
            type: string
          evidence:
            type: array
            items:
              type: string
        required: [title, summary]
  bug_hunt_summary:
    type: string
    default: ""
  baseline_context:
    type: string
    default: ""
    description: Optional previous-success/change-window summary from the caller. Used to prioritize components whose image/source changed between the nearest previous successful run and the current failure.
  regression_window:
    type: object
    description: Optional structured previous-success/change-window facts. Prefer this over parsing baseline_context when present.
    schema:
      type: object
      properties:
        baseline_found:
          type: boolean
        baseline_summary:
          type: string
        changed_components:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              role:
                type: string
              previous_revision:
                type: string
              current_revision:
                type: string
              evidence:
                type: string
        unresolved_components:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              reason:
                type: string
        commit_ranges:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              repo_url:
                type: string
              previous_revision:
                type: string
              current_revision:
                type: string
              range:
                type: string
        target_ranking:
          type: array
          items:
            type: object
            properties:
              component:
                type: string
              service_name:
                type: string
              reason:
                type: string
              confidence:
                type: number
  reproduction_evidence:
    type: array
    default: []
    description: Faithful local reproduction evidence, when available. Use as corroborating source context; original CI artifacts remain primary.
    schema:
      type: array
      items:
        type: string
  reproduction_matches_prior:
    type: boolean
    default: false
    description: Whether the local reproduction evidence matched the original CI failure shape. Only matching reproduction evidence should be promoted into literal source-search excerpts.
  max_candidates:
    type: number
    default: 8
    description: Maximum candidate files to surface from code-evidence-locate.
tasks:
  prepare_evidence:
    selection:
      capabilities: [reasoning]
    run: prepare-source-dive-evidence
    quality-gate: "${{ has(result.evidence_excerpts) }}"
    instructions: |-
      Build the compact literal evidence array used for source search and candidate review.

      Rules:
      - Preserve original CI evidence first. Include `representative.log_excerpts` and concise strings from `representative.original_artifact_evidence[]` using source, category, summary, and excerpt.
      - Include `reproduction_evidence` only when `reproduction_matches_prior == true`. If the reproduction did not match, keep it out of literal search so it cannot pull source review toward a different failure mode.
      - If original excerpts are thin, synthesize up to two short literal-oriented entries from `representative.evidence_brief.headline`, `artifact_signal`, and `routing_notes`.
      - Deduplicate exact or near-identical strings. Keep at most 12 entries, each under roughly 2000 characters. Prefer exact RPC/API/log errors, reject/drop reasons, method names, and distinctive constants.

      Return `evidence_excerpts` as an array of strings. Empty is allowed only when no evidence exists.
    inputs:
      representative: ${{ inputs.representative }}
      reproduction_evidence: ${{ inputs.reproduction_evidence }}
      reproduction_matches_prior: ${{ inputs.reproduction_matches_prior }}
    outputs:
      evidence_excerpts: "${{ has(result.evidence_excerpts) ? result.evidence_excerpts : [] }}"
      schema:
        evidence_excerpts:
          type: array
          items:
            type: string
  identify_target:
    selection:
      capabilities: [reasoning]
    run: identify-source-dive-target
    quality-gate: "${{ has(result.target_kind) }}"
    instructions: |-
      Decide which repository to dive into based on the cluster's classification and evidence. Use `evidence_brief` first when present, then original artifact evidence, runtime_components, regression_window, bug_hunt_findings, bug_hunt_summary, faithful reproduction_evidence, prior_ai_summary, and component_hints. Treat reproduction_evidence as corroborating context only when `reproduction_matches_prior=true`; original CI artifacts remain primary.

      Owner-first rule:
      - When artifacts contain a concrete RPC/API/log error emitted by a named client or service, route the first source dive to the emitting component. The caller/generator/orchestrator is fallback evidence unless there is affirmative evidence it generated invalid input.
      - When the configured image is mutable (`latest`, `stable`, `master`, nightly, date-less dev tags), prefer the component whose resolved image digest/build/source revision changed across the previous-success baseline, especially when it also emitted the error.
      - Do not route to a framework, dependency, launcher, or other tool merely because it submitted the request that received a client error. Route there only after the emitting component's source/history is exhausted, or when evidence points to invalid input, wrong configuration, or orchestration behavior produced by that tool.
      - Classification is an upstream hint, not a hard override. If `classification=framework-dependency` but the original artifact evidence says a client service emitted the distinctive error, pick `target_kind=client` and explain the override in `reason`.
      - For client targets, resolve source from the original CI runtime identity before relying on a live reproduced enclave. If `representative.runtime_components` has a matching client/service with `source_repo` and `source_revision`, set `direct_repo_url` and `direct_commit` from those fields. Normalize owner/name source repos to `https://github.com/<owner>/<repo>`. If it has `image_ref` but no source revision, set `image_ref` so the resolver can inspect or map the image. A reproduced enclave is helpful but not required for client source-dive.

      Routing table:

      | classification | evidence trigger | target_kind | direct_repo_url / service | component |
      | --- | --- | --- | --- | --- |
      | framework-bug | Assertoor scheduler/assertion/orchestration/account or workload setup logic | framework | https://github.com/ethpandaops/assertoor | assertoor |
      | framework-dependency | Evidence names a dependency responsible for workload generation, transaction management, account state, or helper orchestration | framework-dependency | evidence-named repo; use https://github.com/ethpandaops/spamoor only when Spamoor is named | dependency name |
      | framework-dependency | Dependency evidence is generic or points back to Assertoor integration code | framework-dependency | https://github.com/ethpandaops/assertoor | assertoor |
      | single-client | One EL/CL client is implicated | client | matching Kurtosis service name; resolve image downstream | client name |
      | multi-client | CL/finality/attestation/fork-choice evidence | spec | https://github.com/ethereum/consensus-specs | spec |
      | multi-client | EL/transactions/EVM/engine API/payload evidence | spec | https://github.com/ethereum/execution-specs | spec |
      | devnet-network | bootnodoor, bootnodes, ENR, discv4/discv5, discovery routing, `No GoodPeers` | devnet-network | https://github.com/ethpandaops/bootnodoor | bootnodoor |
      | devnet-network | generated devnet wiring, p2p topology, ethereum-package launcher/network behavior | devnet-network | https://github.com/ethpandaops/ethereum-package | ethereum-package |
      | config-issue | assertoor-test args, test config, `assertoor-tests`, `kurtosis-config`, participants matrix, workflow config | config | https://github.com/<source_repo> | assertoor-test |
      | config-issue | ethereum-package launcher files or package-generated flags | devnet-network | https://github.com/ethpandaops/ethereum-package | ethereum-package |
      | mixed | concrete framework-dependency evidence | framework-dependency | evidence-named dependency repo | dependency name |
      | mixed | concrete p2p topology/discovery evidence | devnet-network | bootnodoor or ethereum-package per evidence above | bootnodoor or ethereum-package |
      | mixed | one client is explicitly named as the strongest actionable target | client | matching Kurtosis service name; resolve image downstream | client name |
      | test-design, infra-flake, unknown | no actionable source-dive target | skip | empty | empty |

      For `single-client` and mixed client routing, set `service_name` to the EL or CL Kurtosis service most explicitly named by the evidence when known. If both are implicated, choose the one with higher-severity findings. It is valid to leave `service_name` empty when `direct_repo_url` or `image_ref` already resolves the target from original CI runtime identity. Return `reason` whenever target_kind is `skip`.

      Also return `alternate_targets`: up to two secondary source targets that should be investigated next if the primary target is exhausted. Each entry should include `{target_kind, component, repo_url, service_name, reason}`. Keep this generic; do not hardcode a past incident.
    inputs:
      classification: ${{ inputs.classification }}
      enclave_name: ${{ inputs.enclave_name }}
      representative: ${{ inputs.representative }}
      source_repo: ${{ inputs.source_repo }}
      bug_hunt_findings: ${{ inputs.bug_hunt_findings }}
      bug_hunt_summary: ${{ inputs.bug_hunt_summary }}
      reproduction_evidence: ${{ inputs.reproduction_evidence }}
      reproduction_matches_prior: ${{ inputs.reproduction_matches_prior }}
      baseline_context: "${{ inputs.baseline_context }}"
      regression_window: "${{ has(inputs.regression_window) ? inputs.regression_window : {} }}"
    outputs:
      target_kind: ${{ result.target_kind }}
      reason: "${{ has(result.reason) ? result.reason : '' }}"
      service_name: "${{ has(result.service_name) ? result.service_name : '' }}"
      image_ref: "${{ has(result.image_ref) ? result.image_ref : '' }}"
      direct_repo_url: "${{ has(result.direct_repo_url) ? result.direct_repo_url : '' }}"
      direct_commit: "${{ has(result.direct_commit) ? result.direct_commit : '' }}"
      identified_client: "${{ has(result.identified_client) ? result.identified_client : '' }}"
      alternate_targets: "${{ has(result.alternate_targets) ? result.alternate_targets : [] }}"
      schema:
        target_kind:
          type: string
          enum: [framework, framework-dependency, client, spec, devnet-network, config, skip]
        reason:
          type: string
          description: Required when target_kind is `skip`; also use when routing overrides the upstream classification, e.g. emitting-component evidence points to a client.
        service_name:
          type: string
          description: Kurtosis service to resolve when target_kind=client
        image_ref:
          type: string
          description: Image reference when known directly (rare; usually resolved downstream)
        direct_repo_url:
          type: string
          description: Repo URL when target_kind is framework, framework-dependency, devnet-network, config, or spec (bypasses image resolution)
        direct_commit:
          type: string
          description: Commit SHA when target_kind is a direct repository target and a specific revision is wanted
        identified_client:
          type: string
          description: Short name of the implicated component; for target_kind=client this is the client name
        alternate_targets:
          type: array
          items:
            type: object
            properties:
              target_kind:
                type: string
              component:
                type: string
              repo_url:
                type: string
              service_name:
                type: string
              reason:
                type: string
  resolve_image:
    needs: [identify_target]
    if: "${{ tasks.identify_target.outputs.target_kind == 'client' && !(has(tasks.identify_target.outputs.direct_repo_url) && tasks.identify_target.outputs.direct_repo_url != '') && ((has(tasks.identify_target.outputs.image_ref) && tasks.identify_target.outputs.image_ref != '') || (has(tasks.identify_target.outputs.service_name) && tasks.identify_target.outputs.service_name != '')) }}"
    uses: io.ethpandaops/ethereum-client-image-resolve@1.0.0
    inputs:
      image_ref: ${{ tasks.identify_target.outputs.image_ref }}
      enclave_name: ${{ inputs.enclave_name }}
      service_name: ${{ tasks.identify_target.outputs.service_name }}
    outputs:
      repo_url: repo_url
      commit_sha: commit_sha
      client_name: client_name
      resolution_method: resolution_method
      commit_exact: commit_exact
      resolution_caveat: resolution_caveat
      summary: summary
  clone:
    needs: [identify_target, resolve_image]
    if: "${{ tasks.identify_target.outputs.target_kind != 'skip' }}"
    selection:
      capabilities: [tool-use]
    run: clone-source-dive-repo
    quality-gate: "${{ has(result.cloned) }}"
    instructions: |-
      Clone the resolved repository into the task's working directory and output the absolute path to the clone root.

      Inputs:
      - `repo_url` — when target_kind=framework, framework-dependency, devnet-network, config, or spec, comes from `direct_repo_url`; when client, prefer the target picker repo hint and fall back to the resolve_image task.
      - `commit_sha` — prefer the target picker commit hint, then image labels. May be empty (use HEAD of default branch in that case), but never discard a non-empty commit hint just because a mutable image tag lacks an OCI revision label.
      - `client_name` — short identifier surfaced in the output for downstream rendering; does not influence the workdir path.

      Procedure:
      1. If `repo_url` is empty, set `cloned=false` and return `workdir=""` — nothing to clone (resolution failed upstream).
      2. Clone into the current task working directory:
         - When `commit_sha` is non-empty, use an exact bounded fetch first: `git init .`, `git remote add origin <repo_url>`, `git fetch --depth 1 origin <commit_sha>`, `git checkout --detach FETCH_HEAD`.
         - If exact fetch by SHA is rejected, fall back to `git clone --filter=blob:none --no-checkout <repo_url> .`, then fetch/check out the requested SHA with the smallest practical depth increase. Do not perform an unbounded full clone unless every bounded option failed and the repository is small enough to finish quickly.
         - When `commit_sha` is empty, use `git clone --depth 1 --filter=blob:none <repo_url> .` (HEAD only).
      3. Capture `workdir = $(pwd)` (the absolute path of the task's working directory, now containing the cloned repo).
      4. Capture `effective_commit = $(git rev-parse HEAD)` (full 40-character SHA for stable GitHub permalinks).
      5. Return `cloned=true`, `workdir`, `effective_commit`.

      Do not delete the working directory at the end of this task.
    inputs:
      target_kind: ${{ tasks.identify_target.outputs.target_kind }}
      repo_url: "${{ tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.identify_target.outputs.direct_repo_url) && tasks.identify_target.outputs.direct_repo_url != '' ? tasks.identify_target.outputs.direct_repo_url : (has(tasks.resolve_image.outputs.repo_url) ? tasks.resolve_image.outputs.repo_url : '')) : tasks.identify_target.outputs.direct_repo_url }}"
      commit_sha: "${{ tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.identify_target.outputs.direct_commit) && tasks.identify_target.outputs.direct_commit != '' ? tasks.identify_target.outputs.direct_commit : (has(tasks.resolve_image.outputs.commit_sha) ? tasks.resolve_image.outputs.commit_sha : '')) : tasks.identify_target.outputs.direct_commit }}"
      client_name: "${{ tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.resolve_image.outputs.client_name) && tasks.resolve_image.outputs.client_name != '' ? tasks.resolve_image.outputs.client_name : (has(tasks.identify_target.outputs.identified_client) ? tasks.identify_target.outputs.identified_client : 'unknown')) : (tasks.identify_target.outputs.target_kind == 'spec' ? 'spec' : (has(tasks.identify_target.outputs.identified_client) && tasks.identify_target.outputs.identified_client != '' ? tasks.identify_target.outputs.identified_client : tasks.identify_target.outputs.target_kind)) }}"
    outputs:
      cloned: ${{ result.cloned }}
      workdir: "${{ has(result.workdir) ? result.workdir : '' }}"
      effective_commit: "${{ has(result.effective_commit) ? result.effective_commit : '' }}"
      schema:
        cloned:
          type: boolean
        workdir:
          type: string
        effective_commit:
          type: string
  locate_evidence:
    needs: [clone, prepare_evidence]
    if: "${{ has(tasks.clone.outputs.cloned) && tasks.clone.outputs.cloned == true }}"
    uses: io.ethpandaops/code-evidence-locate@1.0.0
    inputs:
      workdir: ${{ tasks.clone.outputs.workdir }}
      evidence_excerpts: ${{ tasks.prepare_evidence.outputs.evidence_excerpts }}
      focus_hint: |-
        ${{ inputs.bug_hunt_summary }}

        Prior CI summary:
        ${{ has(inputs.representative.prior_ai_summary) ? inputs.representative.prior_ai_summary : "" }}

        Reproduction evidence (secondary, only when faithful):
        ${{ inputs.reproduction_matches_prior == true ? inputs.reproduction_evidence : [] }}

        Previous-success / change-window context:
        ${{ inputs.baseline_context }}

        Structured regression window:
        ${{ has(inputs.regression_window) ? inputs.regression_window : {} }}

        Source-location rules:
        - Start with literal evidence, not semantic guessing. Search exact error strings, RPC/API method names, log phrases, distinctive constants/counts, discard/reject reasons, and service/component names from the original artifacts.
        - Prefer files that both contain those literal strings or nearby validation logic and sit under the emitting component's subsystem.
        - Treat caller-side files as secondary unless the evidence shows invalid input construction or wrong configuration before the emitting component rejected the request.
      max_candidates: ${{ inputs.max_candidates }}
    outputs:
      candidates: candidates
      search_summary: search_summary
      tokens_used: tokens_used
  regression_history:
    needs: [clone, prepare_evidence]
    if: "${{ has(tasks.clone.outputs.cloned) && tasks.clone.outputs.cloned == true }}"
    timeout: 15m
    selection: {capabilities: [tool-use]}
    run: source-dive-regression-history
    quality-gate: "${{ has(result.regression_context) }}"
    instructions: |-
      Produce a compact source-history and literal-evidence search summary for the cloned repository. This task is generic: it should catch recent regressions in any implicated client, tool, package, or spec repo without hardcoding known failure modes.

      Procedure:
      1. `cd` into `workdir`. Keep history operations bounded. If the clone is shallow, fetch a small amount of extra history first (`git fetch --deepen=200 origin` or a specific `<previous>..<current>` range when provided). Do NOT run an unbounded `git fetch --unshallow` on large client repos. Wrap expensive git commands in short `timeout` guards and degrade the summary when history is incomplete.
      2. Extract up to 8 high-signal search terms from the inputs:
         - exact quoted error strings and reject/discard reasons
         - RPC/API method names
         - subsystem terms such as txpool, engine, p2p, sync, forkchoice, validator, builder, gossip, networking, config
         - distinctive constants/counts/timeouts when they appear to be behavioral thresholds
         - service/component names from the original artifacts
         Prefer terms from original CI artifacts over local reproduction when `matches_prior=false` is mentioned in the context.
      3. For each exact string or short phrase, run bounded source search with `rg -n -i --fixed-strings` where possible. For subsystem terms, use a compact regex and cap output.
      4. Run git history probes:
         - `git log --oneline -20` for repo recency.
         - `git log -S "<exact string>" --all --oneline -- <likely subsystem paths>` for exact evidence strings.
         - `git log -G "<regex of evidence terms>" --all --oneline -- <likely subsystem paths>` for validation-policy changes.
         - `git log --grep "<domain terms>" --all --oneline` for commit subjects/PRs.
         - If `regression_window` or `baseline_context` contains a previous and current source revision for this repo, include bounded range checks: `git log --oneline <previous>..<current>` and `git diff --stat <previous>..<current> -- <likely subsystem paths>`. If either revision is missing locally, fetch exactly those revisions by SHA with shallow depth before falling back to broader history.
      5. Render `regression_context` as compact markdown:
         - `## Literal/source search`
         - `## History/change-window`
         - `## Interpretation`
         In interpretation, say whether the evidence suggests a recent regression, longstanding behavior newly exposed by the workload, or insufficient history.
      6. Compute `literal_search_signal` (0-100): high when exact artifact strings or strongly matching validation code are found; medium for subsystem-only matches; low when no relevant matches are found.

      Bash only; do not edit files. Keep `regression_context` under ~80 lines. Failures, missing history, or command timeouts should degrade the summary rather than failing the task.
    inputs:
      workdir: ${{ tasks.clone.outputs.workdir }}
      target_kind: ${{ tasks.identify_target.outputs.target_kind }}
      component: "${{ tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.resolve_image.outputs.client_name) && tasks.resolve_image.outputs.client_name != '' ? tasks.resolve_image.outputs.client_name : tasks.identify_target.outputs.identified_client) : tasks.identify_target.outputs.identified_client }}"
      evidence_excerpts: ${{ tasks.prepare_evidence.outputs.evidence_excerpts }}
      prior_ai_summary: "${{ has(inputs.representative.prior_ai_summary) ? inputs.representative.prior_ai_summary : '' }}"
      original_artifact_evidence: "${{ has(inputs.representative.original_artifact_evidence) ? inputs.representative.original_artifact_evidence : [] }}"
      runtime_components: "${{ has(inputs.representative.runtime_components) ? inputs.representative.runtime_components : [] }}"
      reproduction_evidence: ${{ inputs.reproduction_evidence }}
      reproduction_matches_prior: ${{ inputs.reproduction_matches_prior }}
      baseline_context: "${{ inputs.baseline_context }}"
      regression_window: "${{ has(inputs.regression_window) ? inputs.regression_window : {} }}"
    outputs:
      regression_context: "${{ result.regression_context }}"
      literal_search_signal: "${{ has(result.literal_search_signal) ? result.literal_search_signal : 0 }}"
      schema:
        regression_context:
          type: string
          description: Compact markdown summary of literal source matches and git-history/change-window evidence
        literal_search_signal:
          type: number
          description: 0-100 — strength of exact/literal source-history evidence
  recent_commits:
    needs: [clone, locate_evidence]
    if: "${{ has(tasks.locate_evidence.outputs.candidates) && size(tasks.locate_evidence.outputs.candidates) > 0 }}"
    selection: {capabilities: [tool-use]}
    run: source-dive-recent-commits
    quality-gate: "${{ has(result.commits_context) }}"
    instructions: |-
      Pull recent git history for each candidate path. The investigator panel and judge need this to answer "is this a regression or longstanding code?" — a function changed 3 days ago is different evidence than one untouched for 2 years. This supplements the broader literal/history scan; do not ignore its findings when candidate paths differ.

      Procedure:
      1. `cd` into `workdir`.
      2. For each candidate path:
         - `git log --oneline -20 -- <path>` — most recent commits touching it
         - `git log -1 --format="%ai %h %s" -- <path>` — last-touched timestamp + subject
         - When the path is a directory, the same flags work
      3. Also pull repo-level recent activity to anchor the timeline:
         - `git log --oneline -10` — most recent overall commits
         - `git log -1 --format="%ai"` — head commit timestamp
      4. Render `commits_context` as a compact markdown block:
         ```
         ## Recent git activity

         **Repo HEAD:** <sha> @ <timestamp> — <subject>

         **Per-candidate (most recent first):**
         - `<path>` — last touched <relative-time> in `<sha>` "<subject>"
           - <sha> <subject>
           - ...
         ```
         Keep it under ~40 lines total. Skip per-candidate sections when a path has no commits in the last year (note it as "untouched > 1y").
      5. Compute `recent_change_signal` (0-100): high when MULTIPLE candidates were touched within the last 30 days (strong regression hint); moderate when one candidate was recently touched; low when all candidates are untouched > 1 year.
      6. Optional: when one or more candidates are recently-touched, surface the top 1-2 commit subjects verbatim in `recent_change_signal_notes` (the investigator panel and judge will weigh these).

      Bash only; do not edit files. Failures (e.g. shallow clone missing history) should produce a degraded `commits_context` noting the limitation rather than failing the task.
    inputs:
      workdir: ${{ tasks.clone.outputs.workdir }}
      candidate_paths: ${{ tasks.locate_evidence.outputs.candidates }}
    outputs:
      commits_context: "${{ result.commits_context }}"
      recent_change_signal: "${{ has(result.recent_change_signal) ? result.recent_change_signal : 0 }}"
      recent_change_signal_notes: "${{ has(result.recent_change_signal_notes) ? result.recent_change_signal_notes : '' }}"
      schema:
        commits_context:
          type: string
          description: Compact markdown summary of recent commits touching each candidate path
        recent_change_signal:
          type: number
          description: 0-100 — how strongly recent commits implicate the candidates (regression-likelihood proxy)
        recent_change_signal_notes:
          type: string
          description: Short note quoting the most relevant recent commit subjects when the signal is non-trivial
  review_candidates:
    needs: [clone, prepare_evidence, locate_evidence, recent_commits, regression_history]
    if: "${{ has(tasks.locate_evidence.outputs.candidates) && size(tasks.locate_evidence.outputs.candidates) > 0 }}"
    uses: io.ethpandaops/source-investigation-committee@1.0.0
    inputs:
      workdir: ${{ tasks.clone.outputs.workdir }}
      candidate_paths: ${{ tasks.locate_evidence.outputs.candidates }}
      evidence_excerpts: ${{ tasks.prepare_evidence.outputs.evidence_excerpts }}
      bug_context: |-
        ${{ inputs.bug_hunt_summary }}

        Reproduction evidence (secondary, only when faithful):
        ${{ inputs.reproduction_matches_prior == true ? inputs.reproduction_evidence : [] }}

        Previous-success / change-window context:
        ${{ inputs.baseline_context }}

        Structured regression window:
        ${{ has(inputs.regression_window) ? inputs.regression_window : {} }}

        Literal/history scan:
        ${{ has(tasks.regression_history.outputs.regression_context) ? tasks.regression_history.outputs.regression_context : "" }}

        Candidate recent commits:
        ${{ has(tasks.recent_commits.outputs.commits_context) ? tasks.recent_commits.outputs.commits_context : "" }}

        Review rule: prefer the emitting component's source/history explanation when a concrete error originates there. Only shift blame to callers/tools when the reviewed code path cannot explain the evidence or caller-side invalid input/configuration is demonstrated.
    outputs:
      root_cause_description: root_cause_description
      suggested_change_md: suggested_change_md
      top_candidates: top_candidates
      confidence: confidence
      confidence_note: confidence_note
      agreement_score: agreement_score
      reviews: reviews
  build_code_refs:
    needs: [clone, review_candidates]
    if: "${{ has(tasks.review_candidates.outputs.top_candidates) && size(tasks.review_candidates.outputs.top_candidates) > 0 }}"
    selection:
      capabilities: [reasoning]
    run: build-source-code-permalinks
    quality-gate: "${{ has(result.code_refs) && has(result.top_candidates) }}"
    instructions: |-
      Build stable GitHub source links for the source-dive candidates.

      Inputs:
      - `repo_url` is the resolved repository URL. Normalize GitHub remotes to `https://github.com/<owner>/<repo>` by removing a trailing `.git` and converting `git@github.com:owner/repo.git` when needed.
      - `commit_sha` is the effective checked-out commit. Use it for stable permalinks when non-empty. If it is empty, use `HEAD` in the URL and set `stable=false`.
      - `top_candidates` are the reviewed candidate files. Preserve every original field.

      For each candidate:
      1. Parse `line_range` generically. Accept forms such as `1873-1916`, `lines 1873-1916`, `L1873-L1916`, `1873`, or an empty value.
      2. Set `start_line` and `end_line` when integers are present. If only one integer is found, use it for both.
      3. Build `permalink`:
         - With line range: `<repo_web>/blob/<commit_or_HEAD>/<path>#L<start_line>-L<end_line>`
         - With one line: `<repo_web>/blob/<commit_or_HEAD>/<path>#L<start_line>`
         - Without lines: `<repo_web>/blob/<commit_or_HEAD>/<path>`
      4. Return `top_candidates` enriched with `repo_url`, `commit_sha`, `start_line`, `end_line`, `permalink`, and `stable`.
      5. Return `code_refs` as a compact list for downstream issue rendering: `label`, `repo_url`, `commit_sha`, `path`, `start_line`, `end_line`, `permalink`, `stable`, and `reason`. Use the candidate's `relevance_assessment` as the reason, trimmed to one concise sentence when possible.

      If `repo_url` is not a GitHub URL, still return candidates but leave `permalink` empty and set `stable=false`.
    inputs:
      repo_url: "${{ tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.identify_target.outputs.direct_repo_url) && tasks.identify_target.outputs.direct_repo_url != '' ? tasks.identify_target.outputs.direct_repo_url : (has(tasks.resolve_image.outputs.repo_url) ? tasks.resolve_image.outputs.repo_url : '')) : (has(tasks.identify_target.outputs.direct_repo_url) ? tasks.identify_target.outputs.direct_repo_url : '') }}"
      commit_sha: "${{ has(tasks.clone.outputs.effective_commit) ? tasks.clone.outputs.effective_commit : '' }}"
      top_candidates: ${{ tasks.review_candidates.outputs.top_candidates }}
    outputs:
      top_candidates: "${{ result.top_candidates }}"
      code_refs: "${{ result.code_refs }}"
      schema:
        top_candidates:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              line_range:
                type: string
              start_line:
                type: number
              end_line:
                type: number
              permalink:
                type: string
              stable:
                type: boolean
              relevance_assessment:
                type: string
              suggested_change:
                type: string
        code_refs:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              repo_url:
                type: string
              commit_sha:
                type: string
              path:
                type: string
              start_line:
                type: number
              end_line:
                type: number
              permalink:
                type: string
              stable:
                type: boolean
              reason:
                type: string
outputs:
  target_kind: ${{ tasks.identify_target.outputs.target_kind }}
  skip_reason: "${{ has(tasks.identify_target.outputs.reason) ? tasks.identify_target.outputs.reason : '' }}"
  repo_url: "${{ tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.identify_target.outputs.direct_repo_url) && tasks.identify_target.outputs.direct_repo_url != '' ? tasks.identify_target.outputs.direct_repo_url : (has(tasks.resolve_image.outputs.repo_url) ? tasks.resolve_image.outputs.repo_url : '')) : (has(tasks.identify_target.outputs.direct_repo_url) ? tasks.identify_target.outputs.direct_repo_url : '') }}"
  commit_sha: "${{ has(tasks.clone.outputs.effective_commit) ? tasks.clone.outputs.effective_commit : '' }}"
  component: "${{ tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.resolve_image.outputs.client_name) ? tasks.resolve_image.outputs.client_name : (has(tasks.identify_target.outputs.identified_client) ? tasks.identify_target.outputs.identified_client : '')) : (tasks.identify_target.outputs.target_kind == 'spec' ? 'spec' : (has(tasks.identify_target.outputs.identified_client) && tasks.identify_target.outputs.identified_client != '' ? tasks.identify_target.outputs.identified_client : tasks.identify_target.outputs.target_kind)) }}"
  client_name: "${{ tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.resolve_image.outputs.client_name) ? tasks.resolve_image.outputs.client_name : (has(tasks.identify_target.outputs.identified_client) ? tasks.identify_target.outputs.identified_client : '')) : (tasks.identify_target.outputs.target_kind == 'spec' ? 'spec' : (has(tasks.identify_target.outputs.identified_client) && tasks.identify_target.outputs.identified_client != '' ? tasks.identify_target.outputs.identified_client : tasks.identify_target.outputs.target_kind)) }}"
  resolution_method: "${{ has(tasks.identify_target.outputs.direct_repo_url) && tasks.identify_target.outputs.direct_repo_url != '' ? (has(tasks.identify_target.outputs.direct_commit) && tasks.identify_target.outputs.direct_commit != '' ? (tasks.identify_target.outputs.target_kind == 'client' ? 'runtime-source-revision' : 'direct-source-revision') : 'direct-repo-head-fallback') : (has(tasks.resolve_image.outputs.resolution_method) ? tasks.resolve_image.outputs.resolution_method : '') }}"
  commit_exact: "${{ tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.identify_target.outputs.direct_commit) && tasks.identify_target.outputs.direct_commit != '' ? true : (has(tasks.resolve_image.outputs.commit_exact) ? tasks.resolve_image.outputs.commit_exact : false)) : (has(tasks.identify_target.outputs.direct_commit) && tasks.identify_target.outputs.direct_commit != '') }}"
  resolution_caveat: "${{ has(tasks.identify_target.outputs.direct_repo_url) && tasks.identify_target.outputs.direct_repo_url != '' && !(has(tasks.identify_target.outputs.direct_commit) && tasks.identify_target.outputs.direct_commit != '') ? 'repository known, but tested image/source revision is unresolved; cloned repository HEAD is not proven to be the tested commit' : (tasks.identify_target.outputs.target_kind == 'client' ? (has(tasks.resolve_image.outputs.resolution_caveat) ? tasks.resolve_image.outputs.resolution_caveat : '') : '') }}"
  workdir: "${{ has(tasks.clone.outputs.workdir) ? tasks.clone.outputs.workdir : '' }}"
  cloned: "${{ has(tasks.clone.outputs.cloned) ? tasks.clone.outputs.cloned : false }}"
  alternate_targets: "${{ has(tasks.identify_target.outputs.alternate_targets) ? tasks.identify_target.outputs.alternate_targets : [] }}"
  candidates: "${{ has(tasks.locate_evidence.outputs.candidates) ? tasks.locate_evidence.outputs.candidates : [] }}"
  search_summary: "${{ has(tasks.locate_evidence.outputs.search_summary) ? tasks.locate_evidence.outputs.search_summary : '' }}"
  regression_context: "${{ has(tasks.regression_history.outputs.regression_context) ? tasks.regression_history.outputs.regression_context : '' }}"
  literal_search_signal: "${{ has(tasks.regression_history.outputs.literal_search_signal) ? tasks.regression_history.outputs.literal_search_signal : 0 }}"
  recent_change_signal: "${{ has(tasks.recent_commits.outputs.recent_change_signal) ? tasks.recent_commits.outputs.recent_change_signal : 0 }}"
  recent_change_signal_notes: "${{ has(tasks.recent_commits.outputs.recent_change_signal_notes) ? tasks.recent_commits.outputs.recent_change_signal_notes : '' }}"
  root_cause_description: "${{ has(tasks.review_candidates.outputs.root_cause_description) ? tasks.review_candidates.outputs.root_cause_description : '' }}"
  suggested_change_md: "${{ has(tasks.review_candidates.outputs.suggested_change_md) ? tasks.review_candidates.outputs.suggested_change_md : '' }}"
  top_candidates: "${{ has(tasks.build_code_refs.outputs.top_candidates) ? tasks.build_code_refs.outputs.top_candidates : (has(tasks.review_candidates.outputs.top_candidates) ? tasks.review_candidates.outputs.top_candidates : []) }}"
  code_refs: "${{ has(tasks.build_code_refs.outputs.code_refs) ? tasks.build_code_refs.outputs.code_refs : [] }}"
  confidence: "${{ has(tasks.review_candidates.outputs.confidence) ? tasks.review_candidates.outputs.confidence : 0 }}"
  confidence_note: "${{ has(tasks.review_candidates.outputs.confidence_note) ? tasks.review_candidates.outputs.confidence_note : '' }}"
  agreement_score: "${{ has(tasks.review_candidates.outputs.agreement_score) ? tasks.review_candidates.outputs.agreement_score : 0 }}"
  reviews: "${{ has(tasks.review_candidates.outputs.reviews) ? tasks.review_candidates.outputs.reviews : [] }}"
