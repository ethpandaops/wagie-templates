name: ethpandaops/devnet-notes
version: "1.0"
description: >-
  Use when a workflow needs the canonical operator notes for an Ethereum devnet; resolves the expected notes URL, extracts the most relevant network setup guidance, and summarizes assumptions or gaps.
tags: ["atomic", "devnet", "ethereum", "ethpandaops", "notes", "context", "building-block", "type:atomic", "cap:reasoning", "cap:tool-use"]
inputs:
  network:
    type: string
    required: true
    description: Target devnet name to resolve notes for
  notes_url:
    type: string
    description: Optional explicit notes URL override
tasks:
  fetch_notes:
    run: fetch-devnet-notes
    retry:
      max: 2
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 5s
        factor: 2
        max-delay: 30s
        jitter: true
      timeout: 2m
    worker:
      match: "'tool-use' in capabilities && 'reasoning' in skills"
    quality-gate: "${{ has(result.notes_url) && size(result.notes_url) > 0 && has(result.notes_summary) && size(result.notes_summary) > 0 }}"
    instructions: |-
      Resolve and summarize the canonical notes for the target devnet.

      Use the notes surface as the primary context source for this task.
      Use the expected ethpandaops notes URL pattern when an explicit notes URL is not provided.

      Required behavior:
      1. Resolve the notes URL for the target devnet.
      2. Fetch the notes content and extract only the details that materially help debugging or Kurtosis reproduction.
      3. Prioritize client readiness, image hints, fork/network settings, special flags, and any example Kurtosis or ethereum-package config fragments.
      4. Separate concrete facts from assumptions or stale-looking guidance.
      5. Return a concise summary plus a short list of the most reusable highlights.
    inputs:
      network: ${{ inputs.network }}
      notes_url: "${{ has(inputs.notes_url) ? inputs.notes_url : '' }}"
    outputs:
      notes_url: ${{ result.notes_url }}
      notes_summary: ${{ result.notes_summary }}
      highlights: "${{ has(result.highlights) ? result.highlights : [] }}"
      assumptions: "${{ has(result.assumptions) ? result.assumptions : [] }}"
      schema:
        notes_url:
          type: string
          description: Resolved notes URL used for the devnet
        notes_summary:
          type: string
          description: Concise summary of the most relevant notes content
        highlights:
          type: array
          items:
            type: string
          description: High-signal details worth reusing in downstream workflows
        assumptions:
          type: array
          items:
            type: string
          description: Assumptions or caveats where the notes were incomplete or ambiguous
outputs:
  notes_url: ${{ tasks.fetch_notes.outputs.notes_url }}
  notes_summary: ${{ tasks.fetch_notes.outputs.notes_summary }}
  highlights: ${{ tasks.fetch_notes.outputs.highlights }}
  assumptions: ${{ tasks.fetch_notes.outputs.assumptions }}
