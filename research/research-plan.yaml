kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/research-plan
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when a research topic needs structured decomposition before investigation; discovers diverse perspectives and produces a prioritized plan of sub-questions.
tags: ["research", "planning", "decomposition"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 1h
inputs:
  topic:
    type: string
    required: true
    description: The topic to plan research for
  depth:
    type: string
    default: moderate
    options: [shallow, moderate, deep]
    description: >-
      Desired research depth. shallow: 3-5 sub-questions. moderate: 5-10. deep: 10-15.
  context:
    type: string
    description: Optional context or constraints to guide planning
  model:
    type: string
    description: "Preferred model (e.g. claude-opus-4-6). Planning benefits from strong reasoning."
  provider:
    type: string
    description: "Preferred provider (e.g. claudecode, codex)"
tasks:
  plan:
    selection:
      capabilities: [reasoning]
      match: >-
        (!has(inputs.provider) || inputs.provider == '' || inputs.provider in providers)
        && (!has(inputs.model) || inputs.model == '' || inputs.model in models)
    run: decompose-research-topic
    quality-gate: "${{ has(result.perspectives) && size(result.perspectives) > 1 && has(result.questions) && size(result.questions) > 2 }}"
    instructions: |
      Decompose the topic into a structured research plan.

      Step 1 — Perspective discovery:
      Identify 3-5 distinct perspectives, roles, or stakeholder viewpoints
      that would each approach this topic differently. A scientific topic
      might have perspectives like: researcher, practitioner, critic,
      historian, regulator. A technical topic might have: architect,
      operator, end-user, security auditor.

      Always include a "baseline" perspective that covers fundamental
      facts and definitions.

      Step 2 — Sub-question generation:
      For each perspective, generate questions that perspective would
      naturally ask. Prioritize questions that:
      - Cover ground no other perspective covers
      - Target the most important unknowns
      - Are specific enough to be answerable with evidence

      Step 3 — Prioritization:
      Rank questions by expected research value. Questions that unlock
      understanding of other questions should rank higher. Assign
      difficulty estimates to help downstream investigation allocate
      effort.

      Depth calibration:
      - shallow: 3-5 total sub-questions across 2-3 perspectives
      - moderate: 5-10 total sub-questions across 3-4 perspectives
      - deep: 10-15 total sub-questions across 4-5 perspectives

      Do NOT generate generic questions like "What are the pros and
      cons?" — every question should be specific to this topic and
      perspective.
    inputs:
      topic: "${{ inputs.topic }}"
      depth: "${{ inputs.depth }}"
      context: "${{ has(inputs.context) ? inputs.context : '' }}"
    outputs:
      perspectives: "${{ result.perspectives }}"
      questions: "${{ result.questions }}"
      schema:
        perspectives:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: Short label for this perspective
              rationale:
                type: string
                description: Why this perspective matters for the topic
            required: [name, rationale]
          description: Discovered perspectives for the topic
        questions:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              perspective:
                type: string
                description: Which perspective this question comes from
              priority:
                type: string
                enum: [high, medium, low]
              difficulty:
                type: string
                enum: [easy, moderate, hard]
              rationale:
                type: string
                description: Why this question matters
            required: [question, perspective, priority, difficulty]
          description: Prioritized research sub-questions
outputs:
  perspectives: ${{ tasks.plan.outputs.perspectives }}
  questions: ${{ tasks.plan.outputs.questions }}
