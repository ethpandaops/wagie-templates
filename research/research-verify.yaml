name: ethpandaops/research-verify
version: "1.0"
description: >-
  Use when accumulated research findings need adversarial verification; probes for missing perspectives, checks evidence-claim alignment, and calibrates confidence.
tags: ["research", "verification", "adversarial"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff:
      delay: 5s
      factor: 2
      max-delay: 20s
      jitter: true
    timeout: 2m
inputs:
  topic:
    type: string
    required: true
    description: Topic that was researched
  findings:
    type: array
    required: true
    description: Accumulated findings to verify
    schema:
      type: array
      items:
        type: object
        properties:
          claim:
            type: string
          evidence:
            type: string
          confidence:
            type: number
          source_type:
            type: string
          evidence_strength:
            type: string
          corroboration:
            type: number
          contradictions:
            type: string
        required: [claim, evidence, confidence]
  perspectives:
    type: array
    default: []
    description: Perspectives used during research planning
    schema:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          rationale:
            type: string
        required: [name]
tasks:
  verify:
    worker: {match: "'reasoning' in capabilities"}
    run: adversarial-verification
    quality-gate: "${{ has(result.verified_findings) && size(result.verified_findings) > 0 && has(result.issues) && has(result.open_questions) && has(result.verification_summary) && size(result.verification_summary) > 0 }}"
    instructions: |
      You are a rigorous research auditor. Your job is to stress-test
      these findings, not to validate them. Assume every claim might be
      wrong until the evidence convinces you otherwise.

      Step 1 — Evidence-claim alignment:
      For each finding, assess whether the stated evidence actually
      supports the claim at the stated confidence level. Flag:
      - Claims where confidence exceeds what the evidence warrants
      - Claims where evidence is vague, circular, or unverifiable
      - Claims that rely on a single source for a strong assertion

      Step 2 — Adversarial probing:
      Actively challenge the research by asking:
      - What evidence would contradict the strongest conclusions?
      - Which perspectives or stakeholders are not represented?
      - What assumptions are unstated but load-bearing?
      - Are there temporal, geographic, or methodological blind spots?

      Step 3 — Contradiction audit:
      Identify findings that conflict with each other. For each
      conflict, determine whether it reflects genuine disagreement
      in the evidence or a flaw in the research.

      Step 4 — Confidence calibration:
      Adjust confidence scores based on your audit:
      - Increase confidence where evidence is strong but was
        conservatively scored
      - Decrease confidence where evidence is weak but was
        aggressively scored
      - Flag findings where confidence should be "unknown" rather
        than a number

      Step 5 — Open questions:
      List substantive questions that the research did not answer
      and could not reasonably be expected to answer with available
      sources. Distinguish these from gaps that further research
      could fill.

      Do NOT soften your assessment. If findings are well-supported,
      say so directly. If they are weak, say that directly too.
    inputs:
      topic: "${{ inputs.topic }}"
      findings: "${{ inputs.findings }}"
      perspectives: "${{ inputs.perspectives }}"
    outputs:
      verified_findings: "${{ result.verified_findings }}"
      issues: "${{ result.issues }}"
      open_questions: "${{ result.open_questions }}"
      verification_summary: "${{ result.verification_summary }}"
      schema:
        verified_findings:
          type: array
          items:
            type: object
            properties:
              claim:
                type: string
              evidence:
                type: string
              original_confidence:
                type: number
              adjusted_confidence:
                type: number
              confidence_rationale:
                type: string
              source_type:
                type: string
              evidence_strength:
                type: string
              corroboration:
                type: number
              contradictions:
                type: string
            required: [claim, evidence, original_confidence, adjusted_confidence, confidence_rationale]
          description: Findings with calibrated confidence scores
        issues:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [over-confident, under-supported, contradiction, missing-perspective, unstated-assumption]
              description:
                type: string
              affected_claims:
                type: array
                items:
                  type: string
              severity:
                type: string
                enum: [high, medium, low]
            required: [type, description, severity]
          description: Problems found during verification
        open_questions:
          type: array
          items:
            type: string
          description: Substantive questions the research could not answer
        verification_summary:
          type: string
          description: Overall assessment of research quality and reliability
outputs:
  verified_findings: ${{ tasks.verify.outputs.verified_findings }}
  issues: ${{ tasks.verify.outputs.issues }}
  open_questions: ${{ tasks.verify.outputs.open_questions }}
  verification_summary: ${{ tasks.verify.outputs.verification_summary }}
