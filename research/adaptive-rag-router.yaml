name: ethpandaops/adaptive-rag-router
version: "1.0"
description: >-
  Use when answering questions with uncertain evidence needs; routes between direct answer, local RAG, web research, and graph retrieval, then returns grounded answer plus citations.
tags: ["pattern", "routing", "rag", "retrieval", "building-block", "type:pattern", "flow:compose", "cap:reasoning"]
inputs:
  query:
    type: string
    required: true
    description: User query to answer
  context:
    type: string
    description: Optional domain context
  sources:
    type: array
    default:
      - local_docs
      - web
      - knowledge_graph
    description: Available retrieval sources
    schema:
      type: array
      items:
        type: string
  citation_required:
    type: boolean
    default: true
    description: Whether to require explicit citations in the final answer
tasks:
  route:
    worker: {match: "'reasoning' in skills"}
    run: route-retrieval-mode
    retry:
      max: 1
      on: [error, timeout, schema-validation, quality-gate]
      backoff:
        delay: 5s
        factor: 2
        max-delay: 20s
        jitter: true
      timeout: 2m
    quality-gate: "${{ has(result.rationale) && size(result.rationale) > 0 }}"
    instructions: |-
      Choose the best retrieval mode for this query.

      Modes:
      - direct: no retrieval needed
      - local_rag: retrieve from local/internal sources
      - web_rag: retrieve from web/external sources
      - graph_rag: graph-style entity/relationship retrieval
    inputs:
      query: "${{ inputs.query }}"
      context: "${{ has(inputs.context) ? inputs.context : '' }}"
      sources: "${{ inputs.sources }}"
      citation_required: "${{ inputs.citation_required }}"
    outputs:
      mode: "${{ result.mode }}"
      rationale: "${{ result.rationale }}"
      schema:
        mode:
          type: string
          enum: [direct, local_rag, web_rag, graph_rag]
          description: Selected retrieval mode
        rationale:
          type: string
          description: Why this mode was selected
  gather:
    needs: [route]
    inputs:
      mode: "${{ tasks.route.outputs.mode }}"
      query: "${{ inputs.query }}"
      context: "${{ has(inputs.context) ? inputs.context : '' }}"
      sources: "${{ inputs.sources }}"
    tasks:
      direct:
        if: ${{ inputs.mode == 'direct' }}
        uses: ethpandaops/answer-direct@1
        inputs:
          query: "${{ inputs.query }}"
          context: "${{ has(inputs.context) ? inputs.context : '' }}"
        outputs:
          answer: answer
      local_rag:
        if: ${{ inputs.mode == 'local_rag' }}
        uses: ethpandaops/local-evidence-retrieval@1
        inputs:
          query: ${{ inputs.query }}
          sources: ${{ inputs.sources }}
          context: "${{ has(inputs.context) ? inputs.context : '' }}"
        outputs:
          evidence: evidence
          synthesis: summary
      web_rag:
        if: ${{ inputs.mode == 'web_rag' }}
        uses: ethpandaops/deep-research@1
        inputs:
          topic: "${{ inputs.query }}"
          depth: moderate
          max_iterations: 3
        outputs:
          findings: findings
          summary: summary
      graph_rag:
        if: ${{ inputs.mode == 'graph_rag' }}
        worker: {match: "'reasoning' in skills"}
        run: graph-rag-retrieve
        retry:
          max: 1
          on: [error, timeout, schema-validation, quality-gate]
          backoff:
            delay: 5s
            factor: 2
            max-delay: 20s
            jitter: true
          timeout: 2m
        instructions: |-
          Retrieve graph-structured evidence (entities and relations)
          relevant to the query and summarize key paths.
          Keep the retrieved entities, relationships, and paths concise and relevant.
        inputs:
          query: "${{ inputs.query }}"
          context: "${{ has(inputs.context) ? inputs.context : '' }}"
          sources: "${{ inputs.sources }}"
        outputs:
          graph_evidence: "${{ result.graph_evidence }}"
          summary: "${{ result.summary }}"
          schema:
            graph_evidence:
              type: object
              properties:
                entities:
                  type: array
                  items:
                    type: string
                relationships:
                  type: array
                  items:
                    type: object
                    properties:
                      source:
                        type: string
                      relation:
                        type: string
                      target:
                        type: string
                    required: [source, relation, target]
                paths:
                  type: array
                  items:
                    type: string
              required: [entities, relationships, paths]
              description: Graph retrieval evidence
            summary:
              type: string
              description: Graph retrieval summary
    outputs:
      draft_answer: "${{ has(tasks.direct.outputs.answer) ? tasks.direct.outputs.answer : '' }}"
      evidence: '${{ has(tasks.local_rag.outputs.evidence) ? {"kind": "local_rag", "summary": tasks.local_rag.outputs.synthesis, "payload_json": string(tasks.local_rag.outputs.evidence)} : (has(tasks.web_rag.outputs.findings) ? {"kind": "web_rag", "summary": tasks.web_rag.outputs.summary, "payload_json": string(tasks.web_rag.outputs.findings)} : (has(tasks.graph_rag.outputs.graph_evidence) ? {"kind": "graph_rag", "summary": tasks.graph_rag.outputs.summary, "payload_json": string(tasks.graph_rag.outputs.graph_evidence)} : {"kind": "none", "summary": "", "payload_json": "[]"})) }}'
      evidence_summary: "${{ has(tasks.local_rag.outputs.synthesis) ? tasks.local_rag.outputs.synthesis : (has(tasks.web_rag.outputs.summary) ? tasks.web_rag.outputs.summary : (has(tasks.graph_rag.outputs.summary) ? tasks.graph_rag.outputs.summary : '')) }}"
  answer:
    needs: [gather]
    uses: ethpandaops/answer-from-evidence@1
    inputs:
      query: "${{ inputs.query }}"
      direct_answer: "${{ tasks.gather.outputs.draft_answer }}"
      evidence: "${{ tasks.gather.outputs.evidence }}"
      evidence_summary: "${{ tasks.gather.outputs.evidence_summary }}"
      citation_required: "${{ inputs.citation_required }}"
    outputs:
      answer: answer
      citations: citations
outputs:
  mode: ${{ tasks.route.outputs.mode }}
  routing_rationale: ${{ tasks.route.outputs.rationale }}
  answer: ${{ tasks.answer.outputs.answer }}
  citations: ${{ tasks.answer.outputs.citations }}
  evidence: ${{ tasks.gather.outputs.evidence }}
