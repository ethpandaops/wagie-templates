kind: Template
schemaVersion: wagie/v1
id: io.ethpandaops/experiment-loop
version: "1.0.0"
license: MIT
authors: [savid]
homepage: https://github.com/ethpandaops/wagie-templates
repository: https://github.com/ethpandaops/wagie-templates
description: >-
  Use when iteratively tuning any git-tracked artifact in a repo against a scalar metric. Caller only needs to provide `repo_url`, `goal`, and `result_branch`; the setup task clones the repo, discovers or scaffolds the missing pieces (target files, setup command, benchmark, correctness command, metric name) from the goal and repo conventions, then the loop proposes → applies → checks → measures → keeps-or-reverts greedily until a patience window of no-improvement or max iterations. Works for code performance, SQL queries, prompts, configs, ML training loops, Docker image size, or any repo that can emit a scalar from a shell command. Any of the discovered parameters can be overridden by the caller when they are known up front.
tags: ["experiment", "optimization", "hillclimb", "benchmark", "autonomous", "autoresearch", "metric"]
defaults:
  retry:
    max: 1
    on: [error, timeout, schema-validation, quality-gate]
    backoff:
      delay: 10s
      factor: 2
      max-delay: 1m
      jitter: true
    timeout: 1h
inputs:
  repo_url:
    type: string
    required: true
    description: Git URL of the repo to clone (SSH or HTTPS). Worker must have fetch and push credentials.
  base_branch:
    type: string
    default: main
    description: Branch to start from
  result_branch:
    type: string
    required: true
    description: Branch name to push the final accumulated state to (e.g. `autoresearch/run-2026-04-14`)
  setup_command:
    type: string
    default: ""
    description: Optional override for the one-time setup command run after clone (e.g. `pnpm install && pnpm build`). Empty means the setup task discovers or skips based on repo conventions.
  target_files:
    type: array
    default: []
    description: Optional override listing files the agent may modify. Empty means the setup task infers scope from the goal and repo. Keep tight when provided; exclude bench/test files that scoring depends on.
    schema:
      type: array
      items:
        type: string
  correctness_command:
    type: string
    default: ""
    description: Optional override for the correctness gate command (e.g. `pnpm test src/parser`). Empty means the setup task discovers or scaffolds tests covering the target, or disables the gate if the domain doesn't need one (e.g. Karpathy-style ML where a broken model produces bad metric naturally).
  experiment_command:
    type: string
    default: ""
    description: Optional override for the command that runs the experiment and emits the scalar metric (e.g. `pnpm bench:parser --json`, `uv run train.py`). Empty means the setup task discovers or scaffolds a benchmark.
  metric_name:
    type: string
    default: ""
    description: Optional override for the metric label the worker extracts from experiment output (e.g. `val_bpb`, `ns_per_op_parseJson`). Empty means the setup task derives one from the scaffolded/discovered benchmark.
  metric_direction:
    type: string
    default: minimize
    description: Whether lower or higher metric values are better
    schema:
      type: string
      enum: [minimize, maximize]
  goal:
    type: string
    required: true
    description: Natural-language description of what to optimize and why. Passed to the proposer each round.
  max_iterations:
    type: number
    default: 20
    description: Hard cap on experiment rounds
  patience:
    type: number
    default: 5
    description: Stop after this many consecutive rounds with no accepted improvement. Must be strictly less than `max_iterations` or the loop can never converge before hitting the cap.
  plateau_patience:
    type: number
    default: 3
    description: Stop after this many consecutive rounds where the measured metric does not move outside the noise band of the current best (within `noise_epsilon`). Catches the case where the metric saturates at a floor (e.g. memoization cache hits, timer resolution) and every round becomes a tie.
  noise_epsilon:
    type: number
    default: 0
    description: Relative tolerance used both as an acceptance threshold and a plateau detector. A round is considered "no movement" when `|new - best| <= noise_epsilon * max(|baseline|, 1)`. Default 0 keeps the strict accept rule. Set above the benchmark's run-to-run jitter when measurements are noisy.
  auto_cleanup:
    type: boolean
    default: false
    description: Whether to prune the scratch workspace after a successful run. Default off so failed runs stay inspectable.
tasks:
  experiment:
    selection:
      sticky: true
    inputs:
      repo_url: ${{ inputs.repo_url }}
      base_branch: ${{ inputs.base_branch }}
      result_branch: ${{ inputs.result_branch }}
      setup_command: ${{ inputs.setup_command }}
      target_files: ${{ inputs.target_files }}
      correctness_command: ${{ inputs.correctness_command }}
      experiment_command: ${{ inputs.experiment_command }}
      metric_name: ${{ inputs.metric_name }}
      metric_direction: ${{ inputs.metric_direction }}
      goal: ${{ inputs.goal }}
      max_iterations: ${{ inputs.max_iterations }}
      patience: ${{ inputs.patience }}
      plateau_patience: ${{ inputs.plateau_patience }}
      noise_epsilon: ${{ inputs.noise_epsilon }}
      auto_cleanup: ${{ inputs.auto_cleanup }}
    tasks:
      setup:
        selection: {capabilities: [reasoning, tool-use]}
        run: discover-and-setup-experiment
        retry:
          max: 1
          on: [error, timeout, schema-validation, quality-gate]
          backoff:
            delay: 30s
            factor: 2
            max-delay: 5m
            jitter: true
          timeout: 1h
        quality-gate: "${{ has(result.baseline_metric) && has(result.baseline_commit) && size(result.baseline_commit) > 0 && has(result.workspace_path) && size(result.workspace_path) > 0 && has(result.effective_target_files) && size(result.effective_target_files) > 0 && has(result.effective_experiment_command) && size(result.effective_experiment_command) > 0 && has(result.effective_metric_name) && size(result.effective_metric_name) > 0 }}"
        instructions: |-
          Prepare a clean scratch workspace AND resolve all missing experiment parameters from the repo itself. Leadership only knows the repo URL and the goal; you have the cloned code, so you own discovery. The scaffolded benchmark *is* the scoring contract for the entire run — a sloppy bench will produce a meaningless run no matter how good the proposer is. Treat this task as the most important one in the loop.

          Step 0 — Validate inputs.
          - `patience` MUST be strictly less than `max_iterations`. If `patience >= max_iterations`, the loop's no-improvement exit can never trigger before the hard cap, so the run will burn the full budget on plateaus. Fail this task with a clear error: `patience (X) must be < max_iterations (Y)`.
          - `plateau_patience` should be at least 2 and strictly less than `max_iterations`. If invalid, fail with a clear error.
          - `noise_epsilon` must be >= 0. If negative, fail.

          Step 1 — Clone and branch.
          - Clone `repo_url` into a fresh scratch directory (e.g. under `/tmp/experiment-<run-id>/` or the worker's working directory).
          - Check out `base_branch`. Create local branch `result_branch` from it.
          - Capture the **absolute path** of the clone root and return it as `workspace_path`. Every downstream task in this run will `cd` into this path before running anything.

          Step 2 — Resolve each parameter. For each field below, honour the caller-provided value when it is non-empty; otherwise derive it from the repo and goal.

          `effective_setup_command`:
          - If `setup_command` was provided, use it.
          - Else detect the project's conventional install/build sequence by reading the manifest files at the repo root (package manager lockfile, project config, Makefile). Use the project's idiomatic command. If nothing is obviously needed, return `""`.

          `effective_target_files` (the **mutable** scope):
          - If `target_files` was provided (non-empty), use it.
          - Else read the repo + goal and identify the artifact being optimized. Prefer the narrowest scope that covers the goal. Profile-guided where possible: include hot helpers the target plausibly dominates through; exclude obviously cold callees.
          - Hard rule: this list must NOT contain any file the benchmark or correctness command reads as scoring input. Mutable code and frozen scoring code are disjoint. The proposer must never be able to edit its own scorer.

          `effective_experiment_command` and `effective_metric_name` (the **frozen** scoring contract):
          - If `experiment_command` was provided, use it (the caller has decided). If `metric_name` was also provided, use it; otherwise infer from the command's output format.
          - Else first try to discover an existing benchmark in the project's conventional framework. If you find one that already targets the goal's artifact and reports a meaningful scalar, use it.
          - Else scaffold one. **Before writing a single line, read the docs for the benchmarking framework you intend to use** (web search the framework's "best practices" / "guidelines" / "common pitfalls" page — every mature harness has one) and apply the framework's anti-pitfall guidance. Generic scaffolding rules that apply in every language and domain follow below.

          The frozen-vs-mutable separation:
          - The benchmark file and any helper data it depends on are FROZEN. They are committed in this setup step and the proposer is forbidden from editing them. Place them outside `effective_target_files`.
          - The metric is the loop's accept/revert oracle. If the oracle is gameable, the loop will game it instead of solving the goal. Karpathy's autoresearch enforces this with a separate frozen `prepare.py` containing the eval function — borrow that pattern: scoring lives in files the agent cannot touch.

          Anti-patterns the scaffolded benchmark MUST avoid (these traps cause the metric to plateau at a meaningless saturation point and turn the loop into noise):
          - **Repeated identical inputs in a tight loop**: if you call the target N times with the same arguments, a one-line memoization will pin every subsequent call to a cache hit. Vary inputs across iterations, or invalidate caches between runs, or measure cold-start cost explicitly. If the goal is specifically to measure cache-hit fast-path, name the metric for that and add a parallel cold-path metric so the optimizer cannot collapse one onto the other.
          - **Dead-code elimination**: optimizing compilers/JITs may notice the target's return value is unused and eliminate the call entirely. Always consume the result — sum it, write it to a sink, return it from the bench function, write it to a side-effecting variable (a `volatile`, a global, a printed line). Pick whatever idiom the chosen framework prescribes.
          - **Constant folding**: hardcoded inputs may be computed at compile time. Construct inputs with runtime randomness (seeded for reproducibility) or read from a fixture file.
          - **No warmup**: first invocations include JIT compilation, lazy module loading, page faults, branch predictor cold start. Run an explicit warmup phase BEFORE timing and discard those samples. Most frameworks have a `Warmup` or equivalent decorator — use it.
          - **Single-run measurement**: a single sample is dominated by noise. Measure N times and report the median (preferred) or trimmed mean. Choose N so total measurement runtime is at least 1-2 seconds, but bench duration stays under ~30s per round so the loop can iterate fast.
          - **Resolution underflow / formatting truncation**: if the operation completes in less time than your timer's resolution, you'll measure 0. If you format the metric with limited decimal precision (e.g. `.toFixed(3)` on milliseconds for a 100ns operation), you'll print 0. Pick units and precision such that the baseline reads ~3-5 significant digits above the timer's resolution. If the operation is too fast, batch it into the timed region (call N times under one start/stop) and divide.
          - **Setup time bleeding into measurement**: only the call-under-test should be inside the timed region. Construct fixtures, allocate buffers, and warm caches *before* `start = clock()`.
          - **Ambiguous output**: emit the metric on a single line in a regex-grabbable form (`metric_name: <number>`) at the end of the run. Downstream extraction is intentionally dumb — one regex, no JSON parsing, no walking results trees. Borrow Karpathy's pattern: print a `---` separator then the metric line.
          - **Mixing wall clock with CPU time**: pick one. Wall clock is honest for end-user latency, CPU time is honest for compute-bound work. Document which.
          - **Coarse-grained metric for fine-grained changes**: if rounds change individual instructions but the metric measures end-to-end latency dominated by I/O, the signal-to-noise will be terrible. Make the bench narrow enough that the proposer's plausible changes move the metric.

          Per-domain hints (apply when relevant, do NOT shoehorn):
          - Code performance: time a function under representative workload. Vary inputs across iterations. Median-of-N. Warmup. Consume return value.
          - SQL / query optimization: time the query against a fixed, restored fixture dataset. Run `EXPLAIN` or equivalent to ensure the plan is real, not a cache hit. Reset query cache between runs if the engine has one.
          - Prompt / LLM tuning: metric is task accuracy or rubric score on a held-out eval set. Eval set is FROZEN. Score with a deterministic scorer (string match, regex, judge model with seed and temp 0).
          - Config / hyperparameter tuning: metric is downstream task performance, measured with the same protocol the goal cares about. Held-out split, multiple seeds if cheap.
          - ML training loop: metric is val loss / val metric on a pinned held-out split, measured under a fixed wall-clock or step budget so runs are comparable. Eval split MUST never be in the training set. Karpathy's autoresearch is the canonical example here: `VAL_SHARD = MAX_SHARD` lives in frozen code.
          - Artifact size (Docker images, bundles, binaries): metric is `size_bytes` after a clean build. Cache invalidation is critical — measure from a clean state.

          When you finish drafting the scaffolded benchmark, do a five-line self-review against the anti-pattern list above. If the bench fails any of them, revise before committing.

          `effective_correctness_command`:
          - If `correctness_command` was provided, use it.
          - Else detect existing tests that cover the target. If found, construct the invocation that runs the relevant subset.
          - If no tests cover the target and the domain warrants correctness checking (most domains except those where a broken artifact naturally produces a bad metric — ML, generative quality scoring), scaffold minimal tests that capture current observable behaviour of the target. Commit them. Use their invocation.
          - The correctness command file(s), like the benchmark, are FROZEN scoring inputs. Place them outside `effective_target_files`.
          - If the domain does not need a correctness gate, return `""`.

          Step 3 — Execute setup.
          - If `effective_setup_command` is non-empty, run it. Fail the task if setup fails.

          Step 4 — Commit scaffolding.
          - Any bench or test files you scaffolded in Step 2 must be committed before step 5. Use a clear commit message like `scaffold: add autoresearch bench for <target>`.

          Step 5 — Baseline measurement and sanity checks.
          - Run `effective_experiment_command` once. Extract the scalar labelled `effective_metric_name`. Return it as `baseline_metric`.
          - Sanity-check the baseline before declaring success. Reject these and revise your scaffold:
            - Baseline is exactly 0, NaN, infinity, or a degenerate value the metric direction makes uninteresting (e.g. `0` for a `minimize` metric — the loop has no headroom).
            - Baseline is at or below the noise floor of the chosen measurement (e.g. wall-clock under one millisecond on a millisecond-precision timer; perfect score on a tiny eval set).
            - Re-running the bench once more produces a value that disagrees with the first by more than ~30% (if so, your noise is huge — increase iteration count or use a more deterministic scorer).
          - If extraction fails or sanity checks fail, the quality-gate will reject this setup — revise your scaffold or extraction strategy and retry.

          Step 6 — Return state.
          - `baseline_commit`: the current HEAD sha after setup + scaffolding but before any experiment try commits.
          - `workspace_summary`: a short note describing repo state, any scaffolding, the chosen metric, and the baseline value with a one-sentence assessment of measurement quality (e.g. `noise = ±0.5%`, `single run, wall clock`).

          This worker is part of a sticky session — subsequent loop tasks will reuse the same workspace. Do not delete the workspace.
        inputs:
          repo_url: ${{ inputs.repo_url }}
          base_branch: ${{ inputs.base_branch }}
          result_branch: ${{ inputs.result_branch }}
          goal: ${{ inputs.goal }}
          metric_direction: ${{ inputs.metric_direction }}
          setup_command: ${{ inputs.setup_command }}
          target_files: ${{ inputs.target_files }}
          correctness_command: ${{ inputs.correctness_command }}
          experiment_command: ${{ inputs.experiment_command }}
          metric_name: ${{ inputs.metric_name }}
          max_iterations: ${{ inputs.max_iterations }}
          patience: ${{ inputs.patience }}
          plateau_patience: ${{ inputs.plateau_patience }}
          noise_epsilon: ${{ inputs.noise_epsilon }}
        outputs:
          baseline_metric: ${{ result.baseline_metric }}
          baseline_commit: ${{ result.baseline_commit }}
          workspace_path: ${{ result.workspace_path }}
          workspace_summary: ${{ result.workspace_summary }}
          effective_setup_command: "${{ has(result.effective_setup_command) ? result.effective_setup_command : '' }}"
          effective_target_files: ${{ result.effective_target_files }}
          effective_correctness_command: "${{ has(result.effective_correctness_command) ? result.effective_correctness_command : '' }}"
          effective_experiment_command: ${{ result.effective_experiment_command }}
          effective_metric_name: ${{ result.effective_metric_name }}
          scaffolding_notes: "${{ has(result.scaffolding_notes) ? result.scaffolding_notes : '' }}"
          schema:
            baseline_metric:
              type: number
              description: Scalar metric measured on the baseline commit before any experiments
            baseline_commit:
              type: string
              description: Git sha of the starting point (after any scaffolding, before the loop runs)
            workspace_path:
              type: string
              description: Absolute path to the cloned repo root. All downstream tasks `cd` here before running anything.
            workspace_summary:
              type: string
              description: Short summary of the prepared workspace
            effective_setup_command:
              type: string
              description: The setup command that was ultimately used (caller override or discovered)
            effective_target_files:
              type: array
              items:
                type: string
              description: Resolved editable scope the loop will operate on
            effective_correctness_command:
              type: string
              description: Resolved correctness command; empty means gate disabled
            effective_experiment_command:
              type: string
              description: Resolved experiment command producing the scalar metric
            effective_metric_name:
              type: string
              description: Resolved metric label extracted from experiment output
            scaffolding_notes:
              type: string
              description: Human-readable note on any bench or test files that were scaffolded
      hunt:
        needs: [setup]
        loop:
          max: "${{ inputs.max_iterations }}"
          init:
            best_metric: "${{ tasks.setup.outputs.baseline_metric }}"
            best_commit: "${{ tasks.setup.outputs.baseline_commit }}"
            no_improvement_streak: "${{ 0 }}"
            plateau_streak: "${{ 0 }}"
            experiment_log: "${{ '' }}"
            accepted_count: "${{ 0 }}"
            reverted_count: "${{ 0 }}"
          until: "${{ loop.no_improvement_streak >= inputs.patience || loop.plateau_streak >= inputs.plateau_patience }}"
          on-max-exhausted: continue
        inputs:
          workspace_path: ${{ tasks.setup.outputs.workspace_path }}
          goal: ${{ inputs.goal }}
          target_files: ${{ tasks.setup.outputs.effective_target_files }}
          metric_name: ${{ tasks.setup.outputs.effective_metric_name }}
          metric_direction: ${{ inputs.metric_direction }}
          correctness_command: ${{ tasks.setup.outputs.effective_correctness_command }}
          experiment_command: ${{ tasks.setup.outputs.effective_experiment_command }}
          baseline_metric: ${{ tasks.setup.outputs.baseline_metric }}
          noise_epsilon: ${{ inputs.noise_epsilon }}
          plateau_patience: ${{ inputs.plateau_patience }}
          best_metric: "${{ loop.best_metric }}"
          best_commit: "${{ loop.best_commit }}"
          experiment_log: "${{ loop.experiment_log }}"
          no_improvement_streak: "${{ loop.no_improvement_streak }}"
          plateau_streak: "${{ loop.plateau_streak }}"
          accepted_count: "${{ loop.accepted_count }}"
          reverted_count: "${{ loop.reverted_count }}"
        tasks:
          propose:
            selection: {capabilities: [reasoning, tool-use]}
            run: propose-experiment-change
            quality-gate: "${{ has(result.description) && size(result.description) > 0 && has(result.change_plan) && size(result.change_plan) > 0 }}"
            instructions: |-
              Before anything else, `cd` into `workspace_path`. All repo reads in this task are relative to that directory.

              Propose one change that is likely to improve `metric_name` in the direction of `metric_direction`, given the `goal`.

              Scope rules:
              - Only propose edits to files listed in `target_files`. If you believe a change outside that scope is needed, record the observation in `rationale` and propose the best in-scope alternative instead.
              - Do not edit any benchmark, test, or correctness-verification file, even if it appears in `target_files`.

              Use `experiment_log` to inform the proposal:
              - Avoid repeating changes that were already tried and reverted (they failed — don't re-propose unless combined with a new idea).
              - Build on kept changes (the repo HEAD reflects the accumulated accepted state).
              - If `no_improvement_streak` is high, try a different direction — exhaust one idea's neighborhood before resetting.

              Plateau handling: if `plateau_streak` is non-zero, the metric has stopped responding to recent changes — every recent measurement is within `noise_epsilon` of the current best. This usually means one of three things:
              1. You've genuinely found a near-optimum and should propose more *radical* structural changes (different algorithm, different data structure, different approach to the goal) rather than micro-tweaks of the current implementation.
              2. The metric is saturated against a measurement floor or ceiling (e.g. a cache made the bench effectively free, or accuracy hit 100%). Micro-tweaks will not help. State this hypothesis clearly in `rationale` — the loop is configured to terminate on extended plateaus, so this signal is actionable for leadership even when no proposal helps.
              3. Run-to-run noise dominates real changes. Suggest tightening measurement (e.g. larger N, better isolation) in `rationale`.
              When `plateau_streak >= 2`, prefer proposals that target a substantially different code path or approach than the kept changes. Do not propose another small variation of the existing fast path.

              Return a short single-line `description` of the change and a concrete `change_plan` describing exactly what edits the apply step should make.
            inputs:
              workspace_path: ${{ inputs.workspace_path }}
              goal: ${{ inputs.goal }}
              target_files: ${{ inputs.target_files }}
              metric_name: ${{ inputs.metric_name }}
              metric_direction: ${{ inputs.metric_direction }}
              baseline_metric: ${{ inputs.baseline_metric }}
              best_metric: ${{ inputs.best_metric }}
              experiment_log: ${{ inputs.experiment_log }}
              no_improvement_streak: ${{ inputs.no_improvement_streak }}
              plateau_streak: ${{ inputs.plateau_streak }}
              noise_epsilon: ${{ inputs.noise_epsilon }}
            outputs:
              description: ${{ result.description }}
              change_plan: ${{ result.change_plan }}
              rationale: "${{ has(result.rationale) ? result.rationale : '' }}"
              schema:
                description:
                  type: string
                  description: Short one-line summary, used as the try commit message
                change_plan:
                  type: string
                  description: Concrete plan the apply step will execute
                rationale:
                  type: string
                  description: Why this change is likely to improve the metric
          apply:
            needs: [propose]
            selection: {capabilities: [tool-use]}
            run: apply-experiment-change
            quality-gate: "${{ has(result.commit_sha) && size(result.commit_sha) > 0 }}"
            instructions: |-
              Before anything else, `cd` into `workspace_path`. All edits and git commands in this task run relative to that directory.

              Execute the `change_plan`. Edit only files listed in `target_files`.

              After editing, stage and commit with a message shaped as `try: {description}`.
              Return the commit sha.
            inputs:
              workspace_path: ${{ inputs.workspace_path }}
              target_files: ${{ inputs.target_files }}
              description: ${{ tasks.propose.outputs.description }}
              change_plan: ${{ tasks.propose.outputs.change_plan }}
            outputs:
              commit_sha: ${{ result.commit_sha }}
              files_touched: "${{ has(result.files_touched) ? result.files_touched : [] }}"
              schema:
                commit_sha:
                  type: string
                  description: Sha of the try commit
                files_touched:
                  type: array
                  items:
                    type: string
                  description: Files the apply step actually modified
          correctness:
            needs: [apply]
            selection: {capabilities: [tool-use]}
            run: run-experiment-correctness-check
            quality-gate: "${{ has(result.passed) && has(result.summary) }}"
            instructions: |-
              Before anything else, `cd` into `workspace_path`. Run `correctness_command` from there.

              Determine whether the current commit is correct enough to score.

              If `correctness_command` is empty, return `passed: true` immediately with a summary noting the gate was skipped.
              Otherwise, run `correctness_command` and set `passed` based on its exit code. Summarize failures concisely; don't dump the full log.
            inputs:
              workspace_path: ${{ inputs.workspace_path }}
              correctness_command: ${{ inputs.correctness_command }}
            outputs:
              passed: ${{ result.passed }}
              summary: ${{ result.summary }}
              schema:
                passed:
                  type: boolean
                  description: True if correctness passed or the gate was skipped
                summary:
                  type: string
                  description: Short note on what happened
          execute:
            if: "${{ tasks.correctness.outputs.passed }}"
            needs: [apply, correctness]
            selection: {capabilities: [tool-use]}
            run: run-experiment-command
            quality-gate: "${{ has(result.metric) }}"
            instructions: |-
              Before anything else, `cd` into `workspace_path`. Run `experiment_command` from there.

              Extract the scalar value labelled `metric_name` from the command's output.

              Parsing strategy:
              - If the output includes a `name=value` or `name: value` line, use that.
              - If the output is JSON, parse it and look up the key.
              - If a results file path is emitted, read it.
              - If extraction is ambiguous, prefer the last occurrence and include a note in `stdout_tail`.

              Return `metric` as a number. Quality-gate will reject non-numeric output and trigger a retry.
            inputs:
              workspace_path: ${{ inputs.workspace_path }}
              experiment_command: ${{ inputs.experiment_command }}
              metric_name: ${{ inputs.metric_name }}
            outputs:
              metric: ${{ result.metric }}
              duration_seconds: "${{ has(result.duration_seconds) ? result.duration_seconds : 0 }}"
              stdout_tail: "${{ has(result.stdout_tail) ? result.stdout_tail : '' }}"
              schema:
                metric:
                  type: number
                  description: Extracted scalar value for metric_name
                duration_seconds:
                  type: number
                  description: Wall-clock seconds the experiment_command took
                stdout_tail:
                  type: string
                  description: Last few lines of the command output for diagnostic context
          decide:
            needs: [correctness, execute]
            uses: dev.wagie/decide@1.0.0
            inputs:
              question: "Should this experiment change be kept or reverted?"
              context: |-
                Goal: ${{ inputs.goal }}
                Metric: ${{ inputs.metric_name }} (direction: ${{ inputs.metric_direction }})
                Baseline: ${{ inputs.baseline_metric }}
                Best so far: ${{ inputs.best_metric }}
                Noise epsilon (relative): ${{ inputs.noise_epsilon }}
                Proposed change: ${{ tasks.propose.outputs.description }}
                Files touched: ${{ tasks.apply.outputs.files_touched }}
                Correctness passed: ${{ tasks.correctness.outputs.passed }}
                Correctness summary: ${{ tasks.correctness.outputs.summary }}
                New metric (if measured): ${{ tasks.correctness.outputs.passed ? tasks.execute.outputs.metric : 'n/a - correctness failed' }}

                Acceptance rule:
                - If correctness failed, revert.
                - Else compute the noise band: `band = noise_epsilon * max(|baseline|, 1)`. Treat the new metric as a "real" improvement only if the move outside the band is in the goal direction:
                  - minimize: keep iff `(best_metric - new_metric) > band`.
                  - maximize: keep iff `(new_metric - best_metric) > band`.
                - Tie-and-near-tie tiebreaker (Karpathy-style simplicity preference): if the new metric is *within* the noise band of best (neither clearly better nor clearly worse) AND the proposed change is meaningfully simpler than what it replaces (smaller diff, fewer lines, removes complexity, deletes dead code, drops a layer of abstraction), keep — simplicity at no metric cost is a real win and worth advancing the branch for. Otherwise revert. When in doubt, revert: the earlier commit wins ties.
                - If `noise_epsilon == 0`, the band is zero and exact ties revert (the strict accept rule).
              options: ["keep", "revert"]
            outputs:
              decision: decision
              decision_reasoning: reasoning
          apply_and_log:
            needs: [decide]
            selection: {capabilities: [tool-use, reasoning]}
            run: apply-experiment-decision-and-log
            quality-gate: "${{ has(result.applied) && has(result.tsv_row) && size(result.tsv_row) > 0 && has(result.plateau_streak_next) }}"
            instructions: |-
              Before anything else, `cd` into `workspace_path`. Any git command in this task runs relative to that directory.

              Apply the decision, produce a TSV log row, and update the plateau streak.

              Apply:
              - If `decision` is `revert`, run `git reset --hard HEAD~1` to discard the try commit.
              - If `decision` is `keep`, leave HEAD alone.
              - Return `applied` as the decision string.

              Log:
              - Produce a single TSV line ending with `\n`.
              - Columns (tab-separated): timestamp_iso, decision, correctness_passed, metric_value_or_na, best_metric_so_far, plateau_streak_next, description.
              - When correctness was not measured, write `na` in the metric column.

              Plateau streak update:
              - The plateau streak counts consecutive rounds where the metric did not move outside the noise band of the current best (the loop terminates when this streak hits `plateau_patience`).
              - Compute `band = noise_epsilon * max(|baseline_metric|, 1)`.
              - If correctness failed (`metric_measured == false`), leave the streak unchanged: an unmeasurable round is neither movement nor non-movement.
              - Else if `|metric - best_metric| <= band`, increment the streak (the metric is within noise of best — no real movement).
              - Else reset the streak to 0 (the metric moved outside the noise band, regardless of direction; the plateau is broken whether or not the move was an improvement).
              - Return the new value as `plateau_streak_next` (number) and a boolean `at_plateau` set to true iff `plateau_streak_next >= plateau_patience - 1` (so that the *next* propose round can see a strong escalation signal one step early).
            inputs:
              workspace_path: ${{ inputs.workspace_path }}
              decision: ${{ tasks.decide.outputs.decision }}
              description: ${{ tasks.propose.outputs.description }}
              correctness_passed: ${{ tasks.correctness.outputs.passed }}
              metric: "${{ tasks.correctness.outputs.passed ? tasks.execute.outputs.metric : 0 }}"
              metric_measured: ${{ tasks.correctness.outputs.passed }}
              best_metric: ${{ inputs.best_metric }}
              baseline_metric: ${{ inputs.baseline_metric }}
              noise_epsilon: ${{ inputs.noise_epsilon }}
              plateau_streak: ${{ inputs.plateau_streak }}
              plateau_patience: ${{ inputs.plateau_patience }}
            outputs:
              applied: ${{ result.applied }}
              tsv_row: ${{ result.tsv_row }}
              plateau_streak_next: ${{ result.plateau_streak_next }}
              at_plateau: ${{ result.at_plateau }}
              schema:
                applied:
                  type: string
                  description: Decision that was applied (keep or revert)
                tsv_row:
                  type: string
                  description: One TSV line summarising this iteration (trailing newline included)
                plateau_streak_next:
                  type: number
                  description: Updated plateau streak count after this iteration
                at_plateau:
                  type: boolean
                  description: True when the streak is one step from triggering the plateau exit
        outputs:
          best_metric: >-
            ${{ tasks.decide.outputs.decision == 'keep' ? tasks.execute.outputs.metric : inputs.best_metric }}
          best_commit: >-
            ${{ tasks.decide.outputs.decision == 'keep' ? tasks.apply.outputs.commit_sha : inputs.best_commit }}
          no_improvement_streak: >-
            ${{ tasks.decide.outputs.decision == 'keep' ? 0 : inputs.no_improvement_streak + 1 }}
          plateau_streak: ${{ tasks.apply_and_log.outputs.plateau_streak_next }}
          experiment_log: "${{ inputs.experiment_log + tasks.apply_and_log.outputs.tsv_row }}"
          accepted_count: >-
            ${{ tasks.decide.outputs.decision == 'keep' ? inputs.accepted_count + 1 : inputs.accepted_count }}
          reverted_count: >-
            ${{ tasks.decide.outputs.decision == 'revert' ? inputs.reverted_count + 1 : inputs.reverted_count }}
          schema:
            best_metric:
              type: number
              description: Best metric seen so far after this iteration
            best_commit:
              type: string
              description: Commit sha that produced best_metric
            no_improvement_streak:
              type: number
              description: Consecutive rounds without an accepted improvement
            plateau_streak:
              type: number
              description: Consecutive rounds whose measured metric was within the noise band of best
            experiment_log:
              type: string
              description: Accumulated TSV of all iterations
            accepted_count:
              type: number
              description: Number of rounds whose change was kept
            reverted_count:
              type: number
              description: Number of rounds whose change was reverted
      finalize:
        needs: [hunt]
        selection: {capabilities: [tool-use, reasoning]}
        run: finalize-experiment-run
        retry:
          max: 1
          on: [error, timeout, schema-validation, quality-gate]
          backoff:
            delay: 10s
            factor: 2
            max-delay: 1m
            jitter: true
          timeout: 1h
        quality-gate: "${{ has(result.result_branch_url) && size(result.result_branch_url) > 0 && has(result.exit_reason) && size(result.exit_reason) > 0 }}"
        instructions: |-
          Before anything else, `cd` into `workspace_path`. The git push and any commands in this task run relative to that directory.

          Finalize the experiment run. The reader of these artifacts is leadership trying to decide whether to ship the kept changes and whether to trust this loop's verdict — write for them.

          Step 1 — Push.
          - Push HEAD to `result_branch` on `origin`. Force-push is acceptable if the branch already exists from a prior run.
          - Record the resulting branch URL (e.g. https://github.com/owner/repo/tree/<branch>) as `result_branch_url`.

          Step 2 — TSV artifact.
          - Write the accumulated `experiment_log` to the `experiment_log_artifact` slot, preserving iteration order. This is the raw ledger; do not summarise or reorder it.

          Step 3 — Determine the exit reason. Pick exactly one and return it as `exit_reason`:
          - `improvement`: best_metric is meaningfully better than baseline (in goal direction) AND `converged == true` is not from a plateau.
          - `patience`: the loop exited because `no_improvement_streak` hit `patience` — proposer ran out of useful ideas.
          - `plateau`: the loop exited because `plateau_streak` hit `plateau_patience` — the metric stopped responding (often a sign the bench is saturated, not that the goal is solved).
          - `max_iterations`: hit the hard cap without converging.
          - `no_improvement`: ran the full budget but best_metric never moved off baseline.
          You can disambiguate `patience` vs `plateau` by inspecting the trailing rows of `experiment_log` — repeated identical metric values point at plateau; varying metrics with no acceptances point at patience.

          Step 4 — Progress report (`progress_report` artifact, markdown).
          - Render a markdown document with these sections:
            - **Run summary**: goal, metric (with direction), baseline value, best value, absolute and percent improvement, exit reason, total rounds, accepted, reverted.
            - **Resolved parameters**: effective_target_files (as a code-fenced list), effective_experiment_command, effective_metric_name, effective_correctness_command, scaffolding_notes if non-empty.
            - **Iteration table**: one row per iteration, columns: `#`, `decision`, `correctness`, `metric`, `best`, `description`. Build this from `experiment_log` (it is already TSV; transpose into a markdown table). Highlight the row whose metric became the new best (e.g. bold the metric value).
            - **Progress visualisation**: this is the headline artefact — modeled on Karpathy's `progress.png` (https://github.com/karpathy/autoresearch/blob/master/progress.png), a chart of best-so-far across iterations. Try the following in order, stop at the first that succeeds, and embed the result in the markdown:
              1. If `gnuplot` is available (`command -v gnuplot`), generate `progress.png` from the TSV (best-so-far line per iteration; prefer dual-line: per-round metric as light dots and best-so-far as a bold line; clearly mark accept vs revert markers if feasible). Embed via `![progress](progress.png)`.
              2. Else if `python3` is available with `matplotlib` (probe with `python3 -c 'import matplotlib'`), generate `progress.png` the same way and embed it.
              3. Else if any other charting tool is in PATH that you recognise (R + ggplot2, plotly-cli, etc.), use it.
              4. Fallback: emit an ASCII sparkline of best-so-far across iterations in a fenced code block (one character per iteration).
            - The chart and the iteration table are both produced — the chart is the at-a-glance signal, the table is the receipts.
            - **Convergence note**: 2-3 sentence assessment. Did the loop converge cleanly, plateau early, or burn budget? If `exit_reason == plateau`, explicitly call out that the bench may have saturated and recommend whether the run is trustworthy.
            - **Best commit & branch**: best_commit sha and result_branch_url.

          Step 5 — Concise summary (`summary` artifact, markdown).
          - A 6-12 line executive summary suitable for a PR description: goal, the change in one sentence, baseline → best, exit reason, link to result branch and progress report.

          Both the summary and the progress report are markdown artifacts. The progress report is the in-depth read; the summary is the elevator pitch.
        inputs:
          workspace_path: ${{ tasks.setup.outputs.workspace_path }}
          repo_url: ${{ inputs.repo_url }}
          result_branch: ${{ inputs.result_branch }}
          goal: ${{ inputs.goal }}
          metric_name: ${{ tasks.setup.outputs.effective_metric_name }}
          metric_direction: ${{ inputs.metric_direction }}
          effective_target_files: ${{ tasks.setup.outputs.effective_target_files }}
          effective_experiment_command: ${{ tasks.setup.outputs.effective_experiment_command }}
          effective_correctness_command: ${{ tasks.setup.outputs.effective_correctness_command }}
          scaffolding_notes: ${{ tasks.setup.outputs.scaffolding_notes }}
          baseline_metric: ${{ tasks.setup.outputs.baseline_metric }}
          best_metric: ${{ tasks.hunt.outputs.best_metric }}
          best_commit: ${{ tasks.hunt.outputs.best_commit }}
          accepted_count: ${{ tasks.hunt.outputs.accepted_count }}
          reverted_count: ${{ tasks.hunt.outputs.reverted_count }}
          experiment_log: ${{ tasks.hunt.outputs.experiment_log }}
          converged: ${{ tasks.hunt.loop.converged }}
          patience: ${{ inputs.patience }}
          plateau_patience: ${{ inputs.plateau_patience }}
          max_iterations: ${{ inputs.max_iterations }}
        outputs:
          result_branch_url: ${{ result.result_branch_url }}
          exit_reason: ${{ result.exit_reason }}
          schema:
            summary:
              kind: artifact
              content-type: text/markdown
              description: Short executive summary suitable for a PR description
              required: true
            result_branch_url:
              type: string
              description: URL of the pushed result branch
            experiment_log_artifact:
              kind: artifact
              content-type: text/tab-separated-values
              description: Iteration-by-iteration TSV log
              required: true
            progress_report:
              kind: artifact
              content-type: text/markdown
              description: In-depth markdown report with iteration table and progress chart (or ASCII fallback)
              required: true
            exit_reason:
              type: string
              description: Why the loop ended — one of improvement, patience, plateau, max_iterations, no_improvement
      cleanup:
        if: "${{ inputs.auto_cleanup == true }}"
        needs: [finalize]
        selection: {capabilities: [tool-use]}
        run: cleanup-experiment-workspace
        quality-gate: "${{ has(result.removed) }}"
        instructions: |-
          Remove the scratch workspace at `workspace_path`. Do not touch anything outside it. Refuse to proceed if `workspace_path` is empty, root (`/`), or obviously not under a scratch prefix like `/tmp/`.
        inputs:
          workspace_path: ${{ tasks.setup.outputs.workspace_path }}
        outputs:
          removed: ${{ result.removed }}
          schema:
            removed:
              type: boolean
              description: Whether the scratch workspace was successfully removed
    outputs:
      baseline_metric: ${{ tasks.setup.outputs.baseline_metric }}
      best_metric: ${{ tasks.hunt.outputs.best_metric }}
      best_commit: ${{ tasks.hunt.outputs.best_commit }}
      rounds_completed: "${{ tasks.hunt.outputs.accepted_count + tasks.hunt.outputs.reverted_count }}"
      accepted_count: ${{ tasks.hunt.outputs.accepted_count }}
      reverted_count: ${{ tasks.hunt.outputs.reverted_count }}
      result_branch_url: ${{ tasks.finalize.outputs.result_branch_url }}
      experiment_log: ${{ tasks.finalize.outputs.experiment_log_artifact }}
      summary: ${{ tasks.finalize.outputs.summary }}
      progress_report: ${{ tasks.finalize.outputs.progress_report }}
      exit_reason: ${{ tasks.finalize.outputs.exit_reason }}
      converged: ${{ tasks.hunt.loop.converged }}
      effective_target_files: ${{ tasks.setup.outputs.effective_target_files }}
      effective_experiment_command: ${{ tasks.setup.outputs.effective_experiment_command }}
      effective_metric_name: ${{ tasks.setup.outputs.effective_metric_name }}
      effective_correctness_command: ${{ tasks.setup.outputs.effective_correctness_command }}
      effective_setup_command: ${{ tasks.setup.outputs.effective_setup_command }}
      workspace_path: ${{ tasks.setup.outputs.workspace_path }}
      scaffolding_notes: ${{ tasks.setup.outputs.scaffolding_notes }}
      schema:
        baseline_metric:
          type: number
        best_metric:
          type: number
        best_commit:
          type: string
        rounds_completed:
          type: number
        accepted_count:
          type: number
        reverted_count:
          type: number
        result_branch_url:
          type: string
        experiment_log:
          kind: artifact
          content-type: text/tab-separated-values
        summary:
          kind: artifact
          content-type: text/markdown
        progress_report:
          kind: artifact
          content-type: text/markdown
        exit_reason:
          type: string
        converged:
          type: boolean
        effective_target_files:
          type: array
          items:
            type: string
        effective_experiment_command:
          type: string
        effective_metric_name:
          type: string
        effective_correctness_command:
          type: string
        effective_setup_command:
          type: string
        workspace_path:
          type: string
        scaffolding_notes:
          type: string
outputs:
  baseline_metric: ${{ tasks.experiment.outputs.baseline_metric }}
  best_metric: ${{ tasks.experiment.outputs.best_metric }}
  best_commit: ${{ tasks.experiment.outputs.best_commit }}
  improvement_pct: >-
    ${{ inputs.metric_direction == 'minimize'
          ? (tasks.experiment.outputs.baseline_metric - tasks.experiment.outputs.best_metric) / tasks.experiment.outputs.baseline_metric * double(100)
          : (tasks.experiment.outputs.best_metric - tasks.experiment.outputs.baseline_metric) / tasks.experiment.outputs.baseline_metric * double(100) }}
  improved: >-
    ${{ inputs.metric_direction == 'minimize'
          ? tasks.experiment.outputs.best_metric < tasks.experiment.outputs.baseline_metric
          : tasks.experiment.outputs.best_metric > tasks.experiment.outputs.baseline_metric }}
  rounds_completed: ${{ tasks.experiment.outputs.rounds_completed }}
  accepted_count: ${{ tasks.experiment.outputs.accepted_count }}
  reverted_count: ${{ tasks.experiment.outputs.reverted_count }}
  result_branch: ${{ inputs.result_branch }}
  result_branch_url: ${{ tasks.experiment.outputs.result_branch_url }}
  experiment_log: ${{ tasks.experiment.outputs.experiment_log }}
  summary: ${{ tasks.experiment.outputs.summary }}
  progress_report: ${{ tasks.experiment.outputs.progress_report }}
  exit_reason: ${{ tasks.experiment.outputs.exit_reason }}
  converged: ${{ tasks.experiment.outputs.converged }}
  effective_target_files: ${{ tasks.experiment.outputs.effective_target_files }}
  effective_experiment_command: ${{ tasks.experiment.outputs.effective_experiment_command }}
  effective_metric_name: ${{ tasks.experiment.outputs.effective_metric_name }}
  effective_correctness_command: ${{ tasks.experiment.outputs.effective_correctness_command }}
  effective_setup_command: ${{ tasks.experiment.outputs.effective_setup_command }}
  workspace_path: ${{ tasks.experiment.outputs.workspace_path }}
  scaffolding_notes: ${{ tasks.experiment.outputs.scaffolding_notes }}
